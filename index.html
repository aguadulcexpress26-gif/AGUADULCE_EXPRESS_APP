<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express v85</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark: #020617; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: white; margin: 0; -webkit-tap-highlight-color: transparent; }
        
        /* Glassmorphism Header */
        header {
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky; top: 0; z-index: 50;
        }

        /* Restaurantes: Diseño v70 mejorado */
        .card-rest {
            position: relative; overflow: hidden; border-radius: 2.2rem;
            height: 190px; border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.3s cubic-bezier(0, 0, 0.2, 1);
        }
        .card-rest:active { transform: scale(0.96); }
        .card-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.9; }
        .card-gradient {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(2,6,23,1) 5%, rgba(2,6,23,0.3) 60%, transparent 100%);
        }

        /* DISEÑO DE PLATOS APROBADO (Tarjetas horizontales) */
        .plato-item {
            background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.03) 100%);
            border-radius: 1.8rem;
            padding: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            margin-bottom: 14px;
        }
        .plato-img {
            width: 75px; height: 75px;
            border-radius: 1.2rem;
            object-fit: cover;
            border: 2px solid rgba(6, 182, 212, 0.3);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Modal Detalle */
        #modal-plato { 
            position: fixed; inset: 0; background: var(--dark); 
            z-index: 1000; display: none; flex-direction: column; 
            overflow-y: auto; animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .btn-cerrar { 
            position: absolute; top: 25px; left: 25px; z-index: 1010;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
            width: 44px; height: 44px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.15);
        }
    </style>
</head>
<body>

    <header class="px-6 py-5 flex items-center gap-4">
        <div class="w-11 h-11 bg-white rounded-[14px] flex items-center justify-center border-2 border-cyan-400 shadow-[0_0_20px_rgba(6,182,212,0.4)]">
            <span class="text-dark font-black text-xl">A</span>
        </div>
        <div class="flex flex-col">
            <span class="font-extrabold text-2xl tracking-tighter leading-none">AGUADULCE</span>
            <div class="flex items-center gap-2">
                 <span class="text-[9px] font-bold tracking-[0.4em] text-cyan-400 uppercase">Express</span>
                 <span class="bg-cyan-500/10 text-cyan-400 text-[7px] font-black px-1.5 py-0.5 rounded border border-cyan-400/20 uppercase tracking-widest">v85</span>
            </div>
        </div>
    </header>

    <main id="app-container" class="px-5 py-6">
        <div class="text-center py-32">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-cyan-400"></div>
            <p class="text-[10px] text-slate-500 mt-5 font-bold uppercase tracking-widest">Sincronizando Bóveda...</p>
        </div>
    </main>

    <div id="modal-plato">
        <button onclick="cerrarModal()" class="btn-cerrar text-white">✕</button>
        <img id="modal-img" src="" class="w-full h-[42vh] object-cover shadow-2xl">
        <div class="px-8 py-10 pb-40">
            <div id="modal-header-info"></div>
            <div id="modal-opciones" class="mt-8"></div>
        </div>
        <div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-dark via-dark/95 to-transparent">
            <button class="w-full bg-cyan-500 text-dark font-black py-5 rounded-[1.8rem] uppercase text-[11px] tracking-[0.2em] shadow-[0_10px_30px_rgba(6,182,212,0.3)] active:scale-95 transition-all">
                Añadir al Carrito • <span id="modal-precio-btn">0.00</span>€
            </button>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbysDVL_3M-2AfW5eGS8chw3KB3uFIXJU9kVltWHOQF0Lo9mzcBBn6nQwVy1mrkaH2tZ/exec';
        let db = { restaurantes: [], menu: [] };

        async function cargarDatos() {
            try {
                const respuesta = await fetch(scriptURL);
                const data = await respuesta.json();
                const findSheet = (n) => data[Object.keys(data).find(k => k.toLowerCase().trim() === n.toLowerCase())] || [];
                
                db.restaurantes = findSheet('RESTAURANTES');
                db.menu = findSheet('MENU_GENERAL');
                renderizarRestaurantes();
            } catch (e) {
                document.getElementById('app-container').innerHTML = `<p class="text-center text-[10px] text-red-400 uppercase py-20 font-bold">Error de sincronización</p>`;
            }
        }

        function renderizarRestaurantes() {
            const contenedor = document.getElementById('app-container');
            let html = `<div class="mb-8 ml-1"><h2 class="text-[10px] tracking-[0.3em] text-slate-500 uppercase font-black">Restaurantes Premium</h2></div>`;
            
            db.restaurantes.forEach(rest => {
                html += `
                <div class="card-rest mb-6 shadow-2xl" onclick="verMenuRestaurante('${rest.NOMBRE_RESTAURANTE}', '${rest.ID_RESTAURANTE}')">
                    <img src="${rest.FOTO || ''}" class="card-img">
                    <div class="card-gradient"></div>
                    <div class="absolute top-5 right-6 bg-black/60 backdrop-blur-md px-3 py-1 rounded-full border border-white/10 text-[10px] font-bold">
                        <span class="text-amber-400">⭐</span> ${rest.CALIFICACION || '4.8'}
                    </div>
                    <div class="absolute bottom-6 left-7 text-left">
                        <p class="text-[9px] text-cyan-400 font-black uppercase tracking-[0.3em] mb-1.5">${rest.CATEGORIA || 'GOURMET'}</p>
                        <h3 class="text-2xl font-black text-white tracking-tighter leading-none uppercase italic">${rest.NOMBRE_RESTAURANTE}</h3>
                    </div>
                </div>`;
            });
            contenedor.innerHTML = html;
        }

        function verMenuRestaurante(nombreRest, idRest) {
            const contenedor = document.getElementById('app-container');
            const platos = db.menu.filter(p => String(p.ID_RESTAURANTE).trim() === String(idRest).trim());
            
            let html = `
                <div class="flex items-center gap-5 mb-10">
                    <button onclick="renderizarRestaurantes()" class="bg-white/5 w-12 h-12 rounded-[15px] text-cyan-400 flex items-center justify-center border border-white/10 shadow-lg">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"></path></svg>
                    </button>
                    <div>
                        <h2 class="text-2xl font-black text-white uppercase tracking-tighter leading-none">${nombreRest}</h2>
                        <p class="text-[10px] text-cyan-400 font-black uppercase tracking-widest mt-1.5 opacity-80">La Bóveda de Sabores</p>
                    </div>
                </div>`;

            platos.forEach(plato => {
                html += `
                <div class="plato-item active:scale-[0.98] transition-all" 
                    onclick="abrirDetallePlato(${JSON.stringify(plato).replace(/"/g, '&quot;')})">
                    <div class="flex-1 pr-5 text-left">
                        <div class="font-extrabold text-white text-[13px] uppercase mb-1.5 tracking-tight leading-snug">${plato.PLATO}</div>
                        <div class="text-cyan-400 font-black text-xl tracking-tighter italic">${parseFloat(plato.PRECIO || 0).toFixed(2)}€</div>
                    </div>
                    <img src="${plato.FOTO_PLATO || ''}" class="plato-img">
                </div>`;
            });
            contenedor.innerHTML = html;
            window.scrollTo(0,0);
        }

        function abrirDetallePlato(plato) {
            const modal = document.getElementById('modal-plato');
            const precio = parseFloat(plato.PRECIO || 0).toFixed(2);
            document.getElementById('modal-img').src = plato.FOTO_PLATO || '';
            document.getElementById('modal-header-info').innerHTML = `
                <div class="mb-4"><span class="bg-cyan-500/10 text-cyan-400 text-[10px] font-black px-3 py-1 rounded-full border border-cyan-400/20 uppercase tracking-widest">Plato Destacado</span></div>
                <h2 class="text-3xl font-black text-white tracking-tighter mb-3 uppercase leading-none">${plato.PLATO}</h2>
                <p class="text-slate-400 text-sm leading-relaxed mb-8 font-medium italic opacity-80">"${plato.DESCRIPCION || 'Una experiencia culinaria única diseñada por nuestros mejores chefs.'}"</p>
                <div class="text-4xl font-black text-cyan-400 tracking-tighter italic">${precio}€</div>
            `;
            document.getElementById('modal-precio-btn').innerText = precio;
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function cerrarModal() {
            document.getElementById('modal-plato').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        cargarDatos();
    </script>
</body>
</html>
