<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express Pro v91</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark: #020617; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: white; margin: 0; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .brand { font-family: 'Orbitron', sans-serif; }
        
        /* HEADER PREMIUM (v70) */
        header { background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.08); }
        .logo-circle { width: 44px; height: 44px; background: white; border-radius: 14px; padding: 2px; border: 2px solid var(--cyan); box-shadow: 0 0 15px rgba(6, 182, 212, 0.3); }

        /* TARJETAS RESTAURANTE (v70) */
        .card-rest { position: relative; overflow: hidden; border-radius: 2.2rem; height: 180px; border: 1px solid rgba(255,255,255,0.06); transition: all 0.3s cubic-bezier(0, 0, 0.2, 1); }
        .card-rest:active { transform: scale(0.96); }
        .card-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .card-gradient { position: absolute; inset: 0; background: linear-gradient(to top, rgba(2,6,23,1) 0%, rgba(2,6,23,0.3) 60%, transparent 100%); }

        /* MODAL DE PASOS (v61) */
        #modal-plato { position: fixed; inset: 0; background: var(--dark); z-index: 1000; display: none; flex-direction: column; overflow-y: auto; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .step-title { font-size: 0.7rem; font-weight: bold; color: var(--cyan); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 1.2rem; display: block; text-align: left; }
        .opcion-unica { border: 2px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 15px; text-align: center; font-size: 0.8rem; font-weight: 600; cursor: pointer; }
        .opcion-unica.active { border-color: var(--cyan); background: rgba(6, 182, 212, 0.1); color: var(--cyan); }
        
        .ingrediente-chip { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); font-size: 0.8rem; text-align: center; cursor: pointer; }
        .ingrediente-chip.selected { border-color: var(--cyan); background: rgba(6, 182, 212, 0.1); color: var(--cyan); }

        .extra-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .contador-box { display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 15px; }
        .btn-control { color: var(--cyan); font-size: 1.5rem; font-weight: bold; width: 30px; text-align: center; cursor: pointer; }
        
        .bebida-item { background: rgba(255,255,255,0.03); padding: 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 8px; font-size: 0.85rem; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .bebida-item.active { border-color: var(--cyan); color: var(--cyan); background: rgba(6, 182, 212, 0.1); }
    </style>
</head>
<body>

    <header class="sticky top-0 z-50 px-6 py-5 flex items-center gap-4">
        <img src="apple-touch-icon.png" class="logo-circle" onerror="this.src='https://via.placeholder.com/100?text=A'">
        <div class="flex flex-col text-left">
            <span class="brand text-xl tracking-tight text-white leading-none">AGUADULCE</span>
            <div class="flex items-center gap-2">
                <span class="text-[9px] font-bold tracking-[0.4em] text-cyan-400 uppercase">Express</span>
                <span class="bg-cyan-500/10 text-cyan-400 text-[7px] font-black px-1.5 py-0.5 rounded border border-cyan-400/20 uppercase tracking-widest text-left">v91</span>
            </div>
        </div>
    </header>

    <main id="app-container" class="px-5 py-6">
        <div class="text-center py-24 text-cyan-400 animate-pulse font-black text-xs tracking-[0.3em] uppercase">Iniciando Sistema...</div>
    </main>

    <div id="modal-plato">
        <button onclick="cerrarModal()" class="absolute top-6 left-6 z-50 bg-black/50 backdrop-blur-md w-11 h-11 rounded-xl border border-white/10 text-white flex items-center justify-center">✕</button>
        <img id="modal-img" src="" class="w-full h-[35vh] object-cover">
        
        <div class="px-7 py-8">
            <div class="flex justify-between items-start mb-6 text-left">
                <div class="max-w-[70%]">
                    <h2 id="modal-titulo" class="brand text-2xl uppercase leading-tight tracking-tighter"></h2>
                    <p id="modal-desc" class="text-slate-400 text-xs mt-2 italic leading-relaxed"></p>
                </div>
                <div id="modal-precio-base" class="bg-cyan-500 text-dark px-4 py-2 rounded-xl font-black text-lg shadow-lg shadow-cyan-500/30">0.00€</div>
            </div>

            <hr class="border-white/5 my-8">

            <div id="contenedor-pasos"></div>

            <button class="w-full bg-cyan-500 text-dark font-black py-5 rounded-[2rem] mt-10 uppercase text-xs tracking-[0.2em] shadow-xl shadow-cyan-500/20 active:scale-95 transition-all">
                Añadir al Pedido • <span id="modal-total">0.00</span>€
            </button>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbysDVL_3M-2AfW5eGS8chw3KB3uFIXJU9kVltWHOQF0Lo9mzcBBn6nQwVy1mrkaH2tZ/exec';
        let db = { restaurantes: [], menu: [] };

        async function cargarSistema() {
            try {
                const res = await fetch(scriptURL);
                const data = await res.json();
                const find = (n) => data[Object.keys(data).find(k => k.toLowerCase().trim() === n.toLowerCase())] || [];
                db.restaurantes = find('RESTAURANTES');
                db.menu = find('MENU_GENERAL');
                renderRestaurantes();
            } catch (e) { document.getElementById('app-container').innerHTML = "Error de enlace."; }
        }

        function renderRestaurantes() {
            let html = `<div class="mb-6 ml-1 text-left"><h2 class="text-[10px] tracking-[0.2em] text-slate-500 uppercase font-extrabold">Descubre sabores locales</h2></div>`;
            db.restaurantes.forEach(r => {
                html += `
                <div class="card-rest mb-5 shadow-2xl" onclick="verMenu('${r.NOMBRE_RESTAURANTE}', '${r.ID_RESTAURANTE}')">
                    <img src="${r.FOTO}" class="card-img">
                    <div class="card-gradient"></div>
                    <div class="absolute top-4 left-5 bg-black/40 backdrop-blur-md px-2.5 py-1 rounded-xl border border-white/5 text-[10px] font-bold">⭐ ${r.CALIFICACION || '4.8'}</div>
                    <div class="absolute bottom-6 left-7 text-left">
                        <p class="text-[8px] text-cyan-400 font-black uppercase tracking-widest mb-1">${r.CATEGORIA || 'PREMIUM'}</p>
                        <h3 class="brand text-xl text-white italic uppercase">${r.NOMBRE_RESTAURANTE}</h3>
                    </div>
                </div>`;
            });
            document.getElementById('app-container').innerHTML = html;
        }

        function verMenu(nombre, id) {
            const platos = db.menu.filter(p => String(p.ID_RESTAURANTE) === String(id));
            let html = `
                <div class="flex items-center gap-4 mb-8 text-left">
                    <button onclick="renderRestaurantes()" class="w-11 h-11 rounded-xl bg-white/5 text-cyan-400 border border-white/10 flex items-center justify-center">←</button>
                    <div><h2 class="brand text-lg uppercase">${nombre}</h2><p class="text-[9px] text-cyan-400/60 font-black uppercase tracking-widest">Menú Principal</p></div>
                </div>
                <div class="grid gap-4">`;
            
            platos.forEach(p => {
                html += `
                <div class="bg-gradient-to-br from-white/10 to-transparent p-4 rounded-[1.8rem] flex justify-between items-center border border-white/5 active:scale-95 transition-all shadow-xl" 
                     onclick='abrirDetalle(${JSON.stringify(p).replace(/'/g, "&apos;")})'>
                    <div class="text-left flex-1 pr-4">
                        <h4 class="font-bold text-white text-xs uppercase mb-1.5 tracking-wide">${p.PLATO}</h4>
                        <p class="text-cyan-400 font-black text-xl italic">${parseFloat(p.PRECIO).toFixed(2)}€</p>
                    </div>
                    <img src="${p.FOTO_PLATO}" class="w-16 h-16 rounded-2xl object-cover border border-white/10 shadow-lg">
                </div>`;
            });
            document.getElementById('app-container').innerHTML = html + `</div>`;
        }

        function abrirDetalle(p) {
            const modal = document.getElementById('modal-plato');
            document.getElementById('modal-titulo').innerText = p.PLATO;
            document.getElementById('modal-desc').innerText = p.DESCRIPCION || "Preparado con ingredientes frescos de la mejor calidad.";
            document.getElementById('modal-img').src = p.FOTO_PLATO;
            document.getElementById('modal-precio-base').innerText = parseFloat(p.PRECIO).toFixed(2) + '€';
            document.getElementById('modal-total').innerText = parseFloat(p.PRECIO).toFixed(2);
            
            let htmlPasos = "";
            
            // PASO 1: OBLIGATORIAS (v61)
            if(p.OPCIONES_OBLIGATORIAS) {
                htmlPasos += `<div class="mb-10 text-left"><span class="step-title">1. Selección Obligatoria</span><div class="grid grid-cols-2 gap-3">`;
                p.OPCIONES_OBLIGATORIAS.split(',').forEach((opt, i) => {
                    htmlPasos += `<div class="opcion-unica ${i===0?'active':''}" onclick="toggleActive(this, 'opcion-unica')">${opt.trim()}</div>`;
                });
                htmlPasos += `</div></div>`;
            }

            // PASO 2: CHIPS (v61)
            if(p.INGREDIENTES_SELECCION) {
                htmlPasos += `<div class="mb-10 text-left"><span class="step-title">2. Elige tus opciones</span><div class="grid grid-cols-2 gap-3">`;
                p.INGREDIENTES_SELECCION.split(',').forEach(ing => {
                    htmlPasos += `<div class="ingrediente-chip" onclick="this.classList.toggle('selected')">✓ ${ing.trim()}</div>`;
                });
                htmlPasos += `</div></div>`;
            }

            // PASO 3: EXTRAS CON CONTADOR (v61)
            if(p.EXTRAS_ADICIONALES) {
                htmlPasos += `<div class="mb-10 text-left"><span class="step-title">3. Extras Adicionales</span><div class="space-y-3">`;
                p.EXTRAS_ADICIONALES.split(',').forEach(ex => {
                    htmlPasos += `
                    <div class="extra-row">
                        <span class="text-xs uppercase font-bold tracking-tight">${ex.trim()}</span>
                        <div class="contador-box"><span class="btn-control">−</span><span class="font-bold">0</span><span class="btn-control">+</span></div>
                    </div>`;
                });
                htmlPasos += `</div></div>`;
            }

            // PASO 4: BEBIDAS (v61)
            if(p.BEBIDAS) {
                htmlPasos += `<div class="mb-10 text-left"><span class="step-title">4. Selecciona tu Bebida</span><div class="space-y-2">`;
                p.BEBIDAS.split(',').forEach(beb => {
                    htmlPasos += `<div class="bebida-item" onclick="toggleActive(this, 'bebida-item')"><span class="uppercase font-bold text-[11px] tracking-tight">${beb.trim()}</span><span class="text-[10px] font-black">+1.50€</span></div>`;
                });
                htmlPasos += `</div></div>`;
            }

            document.getElementById('contenedor-pasos').innerHTML = htmlPasos;
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function toggleActive(el, cls) {
            el.parentElement.querySelectorAll('.'+cls).forEach(o => o.classList.remove('active'));
            el.classList.add('active');
        }

        function cerrarModal() { 
            document.getElementById('modal-plato').style.display = 'none'; 
            document.body.style.overflow = 'auto';
        }

        cargarSistema();
    </script>
</body>
</html>
