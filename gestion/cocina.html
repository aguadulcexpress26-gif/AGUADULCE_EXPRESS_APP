<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Cocina - Aguadulce Express</title>
    <style>
        .blink { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans p-4 pb-32">

    <div class="flex flex-wrap justify-between items-center bg-slate-800 p-5 rounded-3xl mb-8 shadow-2xl border border-white/5">
        <div>
            <h1 class="text-2xl font-black text-cyan-400 italic tracking-tighter">COCINA APP</h1>
            <p id="infoRes" class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">ID: RT33M5</p>
        </div>
        
        <div class="flex items-center gap-4">
            <div class="text-right">
                <p id="labelEstado" class="text-[10px] font-bold uppercase">Cargando...</p>
                <p class="text-[9px] opacity-40">Estado del local</p>
            </div>
            <button id="btnToggle" onclick="toggleEstado()" class="px-6 py-3 rounded-2xl font-black transition-all active:scale-95 shadow-lg text-sm">
                ---
            </button>
        </div>
    </div>

    <div id="lista-pedidos" class="grid gap-6 grid-cols-1 md:grid-cols-2 lg:grid-cols-3">
        <div class="col-span-full text-center py-20 opacity-30 text-xl italic">Conectando con el servidor...</div>
    </div>

    <div class="fixed bottom-0 left-0 w-full bg-cyan-700 p-5 text-center shadow-[0_-10px_40px_rgba(0,0,0,0.6)] border-t border-white/10">
        <p class="text-[10px] uppercase font-black opacity-70 tracking-widest mb-1">Ganancias Acumuladas (Esta Semana)</p>
        <h2 id="gananciaSemana" class="text-4xl font-black text-white">0.00 €</h2>
    </div>

    <audio id="audioNuevo" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        // CONFIGURACIÓN - PEGA AQUÍ TU URL /exec
        const scriptURL = "https://script.google.com/macros/s/AKfycbzmIW4rvilG6rCN7NbT-sQw-VniY0PDyi7wxQuBYbmDXOGbMup8J4tMEu99uqwzMHuq/exec"; 
        const resId = "RT33M5"; // ID del Restaurante (Debe estar en Columna A de CONFIGURACION)
        let totalPedidosAnterior = 0;

        async function refrescarTodo() {
            try {
                // 1. Obtener Pedidos 'en proceso'
                const resP = await fetch(`${scriptURL}?action=leerRestaurante&id=${resId}`);
                const pedidos = await resP.json();
                
                // Alerta sonora si entra un pedido nuevo
                if (pedidos.length > totalPedidosAnterior) {
                    document.getElementById('audioNuevo').play().catch(e => {});
                }
                totalPedidosAnterior = pedidos.length;
                renderPedidos(pedidos);

                // 2. Obtener Estado ABIERTO/CERRADO
                const resS = await fetch(`${scriptURL}?action=checkStatus&id=${resId}`);
                const dataS = await resS.json();
                actualizarBotonEstado(dataS.status);

                // 3. Obtener Ganancias
                const resG = await fetch(`${scriptURL}?action=ganancias&id=${resId}`);
                const dataG = await resG.json();
                document.getElementById('gananciaSemana').innerText = (dataG.semana || 0).toFixed(2) + " €";

            } catch (e) { console.error("Error de conexión:", e); }
        }

        function renderPedidos(lista) {
            const cont = document.getElementById('lista-pedidos');
            if (!lista || lista.length === 0) {
                cont.innerHTML = `<div class="col-span-full text-center py-20 opacity-20 text-2xl font-bold italic">No hay pedidos pendientes</div>`;
                return;
            }

            cont.innerHTML = lista.map(p => `
                <div class="bg-slate-800 p-6 rounded-[2rem] border border-white/5 shadow-2xl relative overflow-hidden">
                    <div class="flex justify-between items-start mb-4">
                        <span class="bg-rose-600 text-[10px] px-3 py-1 rounded-full font-black blink">NUEVO</span>
                        <span class="text-[10px] font-mono opacity-40">${p.HORA || p.B || ''}</span>
                    </div>
                    
                    <h3 class="text-3xl font-black mb-1 text-white">${p.ID_PEDIDO || p.A}</h3>
                    <p class="text-cyan-400 font-bold text-sm mb-4">👤 ${p.CLIENTE_INFO || p.D}</p>
                    
                    <div class="bg-black/30 p-5 rounded-2xl mb-6 border border-white/5 text-slate-200 italic leading-relaxed text-lg">
                        ${p.PEDIDO_INFO || p.F}
                    </div>

                    <button onclick="marcarListo('${p.ID_PEDIDO || p.A}')" class="w-full bg-white text-slate-900 font-black py-5 rounded-2xl hover:bg-cyan-400 transition-all active:scale-95 shadow-xl">
                        MARCAR COMO LISTO
                    </button>
                </div>
            `).join('');
        }

        function actualizarBotonEstado(estado) {
            const btn = document.getElementById('btnToggle');
            const label = document.getElementById('labelEstado');
            
            if(estado === "ABIERTO") {
                btn.innerText = "CERRAR LOCAL";
                btn.className = "px-6 py-3 rounded-2xl font-black bg-rose-600 text-white shadow-rose-900/20 shadow-lg";
                label.innerText = "LOCAL ABIERTO";
                label.className = "text-[10px] font-bold uppercase text-emerald-400";
            } else {
                btn.innerText = "ABRIR LOCAL";
                btn.className = "px-6 py-3 rounded-2xl font-black bg-emerald-500 text-white shadow-emerald-900/20 shadow-lg";
                label.innerText = "LOCAL CERRADO";
                label.className = "text-[10px] font-bold uppercase text-rose-500";
            }
        }

        async function toggleEstado() {
            const btn = document.getElementById('btnToggle');
            const nuevoEstado = btn.innerText.includes("CERRAR") ? "CERRADO" : "ABIERTO";
            btn.innerText = "PROCESANDO...";
            
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action: "toggleRes", id: resId, nuevoEstado: nuevoEstado })
            });
            setTimeout(refrescarTodo, 1500);
        }

        async function marcarListo(idPedido) {
            if(!confirm("¿El pedido está listo para reparto?")) return;
            
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ 
                    action: "cambiarEstado", 
                    idPedido: idPedido, 
                    nuevoEstado: "listo" 
                })
            });
            setTimeout(refrescarTodo, 1000);
        }

        // Intervalo de refresco cada 15 segundos
        setInterval(refrescarTodo, 15000);
        refrescarTodo();
    </script>
</body>
</html>
