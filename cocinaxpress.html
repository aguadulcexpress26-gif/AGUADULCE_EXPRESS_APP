<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AE COCINA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .switch { position: relative; display: inline-block; width: 46px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #334155; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #06b6d4; }
        input:checked + .slider:before { transform: translateX(22px); }
        .modal-blur { backdrop-filter: blur(12px); background: rgba(0,0,0,0.8); }
        #pinInput { text-transform: uppercase; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <audio id="alerta" loop src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <div id="loginScreen" class="fixed inset-0 z-[100] bg-slate-950 flex items-center justify-center p-6">
        <div class="glass w-full max-w-xs rounded-[2.5rem] p-8 text-center border border-white/10 shadow-2xl">
            <div class="text-cyan-400 font-black italic text-3xl mb-1">AE</div>
            <h2 class="text-white font-black italic text-xl mb-6 tracking-tighter">COCINA XPRESS</h2>
            <input type="text" id="pinInput" placeholder="CÓDIGO" 
                class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 text-center text-2xl font-black text-cyan-400 focus:outline-none focus:ring-2 focus:ring-cyan-500 mb-4 uppercase">
            <button onclick="verificarPIN()" class="w-full bg-cyan-500 text-black py-4 rounded-2xl font-black uppercase shadow-lg shadow-cyan-500/20 active:scale-95 transition-transform">Entrar</button>
            <p id="loginError" class="text-red-500 text-[10px] font-bold mt-4 uppercase hidden italic">Código Incorrecto o sin permiso</p>
        </div>
    </div>

    <div id="appContent" class="hidden">
        <nav class="sticky top-0 z-40 glass border-b border-white/5 p-4 shadow-2xl">
            <div class="max-w-xl mx-auto flex justify-between items-start">
                <div>
                    <h1 class="text-cyan-400 font-black italic tracking-tighter text-xl leading-none">AGUADULCE COCINA</h1>
                    <p id="resNombre" class="text-[10px] text-slate-400 font-bold uppercase mt-1 tracking-widest italic font-bold">Cargando...</p>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="abrirHistorial()" class="bg-white/5 p-2 rounded-xl border border-white/10">
                        <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </button>
                    <div class="flex flex-col items-end">
                        <span id="txtEstado" class="text-[8px] font-black mb-1">---</span>
                        <label class="switch">
                            <input type="checkbox" id="tiendaToggle" onchange="confirmarToggleTienda()">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </div>
        </nav>

        <main class="max-w-xl mx-auto p-4 space-y-4" id="lista"></main>
    </div>

    <div id="customModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-6 modal-blur">
        <div class="glass w-full max-w-xs rounded-[2.5rem] p-8 border border-white/10 shadow-2xl text-center">
            <h3 id="modalTitle" class="text-xl font-black mb-2 text-cyan-400 italic uppercase"></h3>
            <p id="modalSub" class="text-white font-bold text-sm mb-4"></p>
            <div id="modalBody" class="bg-white/5 p-4 rounded-2xl text-slate-300 text-sm mb-8 text-left border border-white/5 max-h-48 overflow-y-auto italic"></div>
            <div id="modalFooter" class="flex gap-3"></div>
        </div>
    </div>

    <div id="sideHistorial" class="fixed inset-y-0 right-0 w-full max-w-sm glass z-50 transform translate-x-full transition-transform duration-300 p-6 overflow-y-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-black italic text-cyan-400">DESPACHADOS HOY</h2>
            <button onclick="cerrarHistorial()" class="text-slate-400 font-bold bg-white/5 px-3 py-1 rounded-lg text-xs uppercase">Cerrar</button>
        </div>
        <div id="listaHistorial" class="space-y-3"></div>
    </div>

    <script>
        // CONFIGURACIÓN DE ACCESOS (ALFANUMÉRICOS)
        const ACCESS_DB = {
            "DELI10": { id: "6G4L1V", rol: "REPARTIDOR" },
            "CHUN20": { id: "RT33M5", rol: "PARTNER" },
            "HARO30": { id: "8N3Z7K", rol: "PARTNER" },
            "SUCU40": { id: "TR92X5", rol: "PARTNER" },
            "PERU50": { id: "9V1L8K", rol: "PARTNER" },
            "LIMA60": { id: "FL44K8", rol: "PARTNER" },
            "PECA70": { id: "CV11Q9", rol: "PARTNER" },
            "JUAN80": { id: "REPART01", rol: "REPARTIDOR" }
        };

        const scriptURL = "https://script.google.com/macros/s/AKfycbzmIW4rvilG6rCN7NbT-sQw-VniY0PDyi7wxQuBYbmDXOGbMup8J4tMEu99uqwzMHuq/exec"; 
        let MI_ID_REST = localStorage.getItem('AE_REST_ID') || "";
        let pedidosActivos = [], historialHoy = [], aceptados = new Set(), tiendaAbierta = false;
        let audioHabilitado = false;

        // Desbloquear audio al primer clic
        document.addEventListener('click', () => {
            if(!audioHabilitado) {
                const a = document.getElementById('alerta');
                a.play().then(() => { a.pause(); audioHabilitado = true; }).catch(()=>{});
            }
        }, { once: true });

        window.onload = () => {
            if(MI_ID_REST) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('appContent').classList.remove('hidden');
                cargar();
            }
        };

        function verificarPIN() {
            const pin = document.getElementById('pinInput').value.trim().toUpperCase();
            const errorMsg = document.getElementById('loginError');
            const user = ACCESS_DB[pin];

            if (user) {
                if (user.rol === "REPARTIDOR") {
                    alert("Acceso denegado: Este código es para el Panel de Repartidores.");
                    return;
                }
                MI_ID_REST = user.id;
                localStorage.setItem('AE_REST_ID', MI_ID_REST);
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('appContent').classList.remove('hidden');
                cargar();
            } else {
                errorMsg.classList.remove('hidden');
                document.getElementById('pinInput').value = "";
            }
        }

        async function cargar() {
            try {
                const r = await fetch(`${scriptURL}?action=leerPanelCompleto&idRest=${MI_ID_REST}`);
                const data = await r.json();
                document.getElementById('resNombre').innerText = data.tienda.nombre;
                tiendaAbierta = (data.tienda.estado === "Abierto");
                document.getElementById('tiendaToggle').checked = tiendaAbierta;
                
                const txtE = document.getElementById('txtEstado');
                txtE.innerText = tiendaAbierta ? "ABIERTO" : "CERRADO";
                txtE.className = tiendaAbierta ? "text-[8px] font-black text-emerald-400" : "text-[8px] font-black text-slate-500";
                
                pedidosActivos = data.pedidos;
                historialHoy = data.historial;

                const alerta = document.getElementById('alerta');
                if(pedidosActivos.some(p => !aceptados.has(p.ID_PEDIDO)) && pedidosActivos.length > 0) {
                    alerta.play().catch(()=>{});
                } else {
                    alerta.pause();
                }
                render();
            } catch (e) { console.error(e); }
        }

        function render() {
            const cont = document.getElementById('lista');
            if(pedidosActivos.length === 0) {
                cont.innerHTML = `<div class="text-center py-20 opacity-20 font-black italic">SIN PENDIENTES</div>`;
                return;
            }
            cont.innerHTML = pedidosActivos.map(p => `
                <div class="glass p-6 rounded-[2.5rem] border border-white/5 shadow-xl">
                    <div class="flex justify-between items-start mb-6">
                        <div><span class="text-cyan-400 font-black text-2xl italic tracking-tighter">#${p.ID_PEDIDO}</span><h2 class="text-white font-bold uppercase text-[10px] mt-1 opacity-60">${p.CLIENTE}</h2></div>
                        <p class="text-2xl font-black text-white">${parseFloat(p.TOTAL).toFixed(2)}€</p>
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="aceptarPedido('${p.ID_PEDIDO}')" class="py-4 rounded-2xl text-[9px] font-black uppercase ${aceptados.has(p.ID_PEDIDO) ? 'bg-slate-800 text-slate-600' : 'bg-white text-black ring-4 ring-white/10'}">${aceptados.has(p.ID_PEDIDO) ? 'ACEPTADO' : 'ACEPTAR'}</button>
                        <button onclick="verDetalles('${p.ID_PEDIDO}')" class="bg-slate-800 text-cyan-400 py-4 rounded-2xl text-[9px] font-black uppercase border border-cyan-400/20">DETALLES</button>
                        <button onclick="confirmarListo('${p.ID_PEDIDO}')" class="bg-cyan-500 text-black py-4 rounded-2xl text-[9px] font-black uppercase shadow-lg shadow-cyan-500/20">LISTO</button>
                    </div>
                </div>`).join('');
        }

        function verDetalles(id) {
            const p = pedidosActivos.find(x => x.ID_PEDIDO === id) || historialHoy.find(x => x.ID_PEDIDO === id);
            mostrarModal("DETALLES", `#${id} - ${p.CLIENTE}`, 
                `PRODUCTOS:<br>${p.PEDIDO_DETALLE}<br><br>DIR: ${p.DIRECCION}`,
                `<div class="flex flex-col w-full gap-2"><button onclick="imprimirTicket('${id}')" class="w-full bg-cyan-600 py-3 rounded-xl font-bold text-xs uppercase text-white">Imprimir Recibo 🖨️</button><button onclick="cerrarModal()" class="w-full bg-slate-800 py-3 rounded-xl font-bold text-xs uppercase text-slate-400">Cerrar</button></div>`);
        }

        function imprimirTicket(id) {
            const p = pedidosActivos.find(x => x.ID_PEDIDO === id) || historialHoy.find(x => x.ID_PEDIDO === id);
            if (!p) return;
            const resNombre = document.getElementById('resNombre').innerText;
            const ESC = "\x1B", NORMAL = ESC + "!" + "\x00", NEGRITA = ESC +
