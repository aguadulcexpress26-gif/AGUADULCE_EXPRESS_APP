<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express Pro v93</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark: #020617; }
        /* TIPOGRAFÍA: Outfit para lectura suave, Orbitron para marca */
        body { font-family: 'Outfit', sans-serif; background: var(--dark) !important; color: white; margin: 0; -webkit-tap-highlight-color: transparent; }
        .brand { font-family: 'Orbitron', sans-serif; }
        
        /* CARTA DE PLATOS (DISEÑO v61) */
        .plato-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 2rem; padding: 20px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
        }
        .precio-badge {
            background: var(--cyan); color: var(--dark); padding: 5px 15px; border-radius: 12px;
            font-weight: 800; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(6,182,212,0.3); font-family: 'Orbitron', sans-serif;
        }

        /* MODAL Y PASOS (v61 REAL) */
        #modal-plato { position: fixed; inset: 0; background: var(--dark); z-index: 1000; display: none; flex-direction: column; overflow-y: auto; }
        .foto-header-modal { width: 100%; height: 320px; object-fit: cover; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; }
        
        /* Estilo de los Chips y Botones de Selección */
        .opcion-unica { border: 2px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 18px; text-align: center; font-size: 0.85rem; font-weight: 600; transition: all 0.3s; }
        .opcion-unica.active { border-color: var(--cyan); background: rgba(6,182,212,0.15); color: var(--cyan); }
        
        .ingrediente-chip { background: rgba(255,255,255,0.04); padding: 12px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); font-size: 0.8rem; text-align: center; }
        .ingrediente-chip.selected { border-color: var(--cyan); background: rgba(6,182,212,0.1); color: var(--cyan); }

        /* Contadores de Extras */
        .extra-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .contador-box { display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.05); padding: 8px 16px; border-radius: 16px; }
        .btn-control { color: var(--cyan); font-size: 1.4rem; font-weight: bold; width: 30px; text-align: center; cursor: pointer; }

        .step-title { font-size: 0.75rem; font-weight: 700; color: var(--cyan); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 1.2rem; display: block; text-align: left; }
    </style>
</head>
<body>

    <header class="p-6 flex items-center gap-4 bg-[#020617]/90 backdrop-blur-xl sticky top-0 z-50 border-b border-white/5">
        <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center border-2 border-cyan-400 font-black text-dark brand text-2xl">A</div>
        <div class="text-left">
            <h1 class="brand text-2xl leading-none text-white tracking-tighter">AGUADULCE</h1>
            <p class="text-[10px] tracking-[0.4em] text-cyan-400 uppercase font-bold mt-1">Express Pro</p>
        </div>
    </header>

    <main id="app-container" class="px-6 py-6">
        <div class="text-center py-24 text-cyan-400 animate-pulse font-bold text-xs uppercase tracking-widest">Sincronizando Menú...</div>
    </main>

    <div id="modal-plato">
        <button onclick="cerrarModal()" class="absolute top-6 left-6 z-50 bg-black/60 backdrop-blur-md w-12 h-12 rounded-2xl text-white border border-white/10 flex items-center justify-center text-xl">✕</button>
        <img id="modal-img" src="" class="foto-header-modal shadow-2xl">
        
        <div class="px-8 py-10">
            <div class="flex justify-between items-start mb-8">
                <div class="max-w-[70%] text-left">
                    <h2 id="modal-titulo" class="brand text-3xl uppercase leading-tight text-white italic"></h2>
                    <p id="modal-desc" class="text-slate-400 text-sm mt-3 leading-relaxed font-light"></p>
                </div>
                <div id="modal-precio-float" class="precio-badge !text-lg !py-3">0.00€</div>
            </div>

            <div id="contenedor-pasos" class="space-y-12">
                </div>

            <button class="w-full bg-cyan-500 text-dark font-black py-6 rounded-[2rem] mt-12 shadow-xl shadow-cyan-500/30 brand text-sm tracking-widest uppercase">
                Añadir al Pedido
            </button>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbysDVL_3M-2AfW5eGS8chw3KB3uFIXJU9kVltWHOQF0Lo9mzcBBn6nQwVy1mrkaH2tZ/exec';
        let db = { restaurantes: [], menu: [] };

        async function init() {
            try {
                const res = await fetch(scriptURL);
                const data = await res.json();
                db.restaurantes = data.RESTAURANTES || [];
                db.menu = data.MENU_GENERAL || [];
                renderHome();
            } catch (e) { console.error(e); }
        }

        function renderHome() {
            let html = `<div class="mb-8 text-left text-slate-500 text-[11px] uppercase font-bold tracking-[0.2em]">Selecciona un restaurante</div>`;
            db.restaurantes.forEach(r => {
                html += `
                <div class="relative rounded-[2.5rem] overflow-hidden h-[190px] mb-6 border border-white/5 shadow-2xl" onclick="verMenu('${r.NOMBRE_RESTAURANTE}', '${r.ID_RESTAURANTE}')">
                    <img src="${r.FOTO}" class="absolute inset-0 w-full h-full object-cover opacity-90">
                    <div class="absolute inset-0 bg-gradient-to-t from-[#020617] via-[#020617]/20 to-transparent"></div>
                    <div class="absolute bottom-7 left-8 text-left">
                        <p class="text-cyan-400 text-[9px] font-black uppercase mb-2 tracking-[0.3em]">${r.CATEGORIA || 'PREMIUM'}</p>
                        <h3 class="brand text-2xl italic uppercase text-white">${r.NOMBRE_RESTAURANTE}</h3>
                    </div>
                </div>`;
            });
            document.getElementById('app-container').innerHTML = html;
        }

        function verMenu(nombre, id) {
            const platos = db.menu.filter(p => String(p.ID_RESTAURANTE) === String(id));
            let html = `
                <div class="flex items-center gap-5 mb-10 text-left">
                    <button onclick="renderHome()" class="w-12 h-12 rounded-2xl bg-white/5 border border-white/10 text-cyan-400 flex items-center justify-center">←</button>
                    <div><h2 class="brand text-xl text-white uppercase italic">${nombre}</h2><p class="text-[10px] text-cyan-400 font-bold uppercase tracking-widest mt-1">Menú exclusivo</p></div>
                </div>`;
            
            platos.forEach(p => {
                html += `
                <div class="plato-card" onclick='abrirDetalle(${JSON.stringify(p).replace(/'/g, "&apos;")})'>
                    <div class="text-left flex-1 pr-5">
                        <h4 class="font-bold text-white text-[15px] uppercase tracking-tight mb-3 leading-tight">${p.PLATO}</h4>
                        <span class="precio-badge">${parseFloat(p.PRECIO).toFixed(2)}€</span>
                    </div>
                    <img src="${p.FOTO_PLATO}" class="w-20 h-20 rounded-2xl object-cover border border-cyan-400/20 shadow-lg">
                </div>`;
            });
            document.getElementById('app-container').innerHTML = html;
            window.scrollTo(0,0);
        }

        function abrirDetalle(p) {
            document.getElementById('modal-titulo').innerText = p.PLATO;
            document.getElementById('modal-desc').innerText = p.DESCRIPCION || "Selección premium elaborada con los mejores ingredientes.";
            document.getElementById('modal-img').src = p.FOTO_PLATO;
            document.getElementById('modal-precio-float').innerText = parseFloat(p.PRECIO).toFixed(2) + "€";
            
            let htmlPasos = "";
            
            // 1. SELECCIÓN OBLIGATORIA (Si existe en Excel)
            if(p.SELECCION_OBLIGATORIA) {
                htmlPasos += `<div class="text-left"><span class="step-title">1. Selección Obligatoria</span><div class="grid grid-cols-2 gap-3">`;
                p.SELECCION_OBLIGATORIA.split(',').forEach((opt, i) => {
                    htmlPasos += `<div class="opcion-unica ${i===0?'active':''}" onclick="toggleActive(this, 'opcion-unica')">${opt.trim()}</div>`;
                });
                htmlPasos += `</div></div>`;
            }

            // 2. SELECCIÓN ÚNICA (Si existe en Excel)
            if(p.SELECCION_UNICA) {
                htmlPasos += `<div class="text-left"><span class="step-title">2. Personaliza tu base</span><div class="grid grid-cols-2 gap-3">`;
                p.SELECCION_UNICA.split(',').forEach((opt, i) => {
                    htmlPasos += `<div class="opcion-unica" onclick="toggleActive(this, 'opcion-unica')">${opt.trim()}</div>`;
                });
                htmlPasos += `</div></div>`;
            }

            // 3. EXTRAS (Si existe en Excel)
            if(p.EXTRAS) {
                htmlPasos += `<div class="text-left"><span class="step-title">3. Agrega extras</span><div class="space-y-2">`;
                p.EXTRAS.split(',').forEach(ex => {
                    htmlPasos += `
                    <div class="extra-row">
                        <span class="text-sm font-semibold uppercase tracking-tight">${ex.trim()}</span>
                        <div class="contador-box"><span class="btn-control">−</span><span class="font-bold text-white">0</span><span class="btn-control">+</span></div>
                    </div>`;
                });
                htmlPasos += `</div></div>`;
            }

            // 4. BEBIDAS (Si existe en Excel)
            if(p.SELECCION_DE_BEBIDAS) {
                htmlPasos += `<div class="text-left"><span class="step-title">4. Elige tu bebida</span><div class="space-y-3">`;
                p.SELECCION_DE_BEBIDAS.split(',').forEach(beb => {
                    htmlPasos += `
                    <div class="bg-white/5 p-4 rounded-2xl border border-white/5 flex justify-between items-center" onclick="toggleActive(this, 'bebida-item')">
                        <span class="text-xs font-bold uppercase">${beb.trim()}</span>
                        <span class="text-[10px] text-cyan-400 font-black">+1.50€</span>
                    </div>`;
                });
                htmlPasos += `</div></div>`;
            }

            document.getElementById('contenedor-pasos').innerHTML = htmlPasos;
            document.getElementById('modal-plato').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function toggleActive(el, cls) {
            el.parentElement.querySelectorAll('div').forEach(o => o.classList.remove('active', 'border-cyan-400'));
            el.classList.add('active', 'border-cyan-400');
        }

        function cerrarModal() { document.getElementById('modal-plato').style.display = 'none'; document.body.style.overflow = 'auto'; }

        init();
    </script>
</body>
</html>
