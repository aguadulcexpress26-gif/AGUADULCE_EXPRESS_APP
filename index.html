<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express Pro v101</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark: #020617; --red: #ef4444; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark) !important; color: white; margin: 0; -webkit-tap-highlight-color: transparent; }
        
        /* CARGA BÓVEDA */
        #loader { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(6,182,212,0.1); border-top-color: var(--cyan); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* CATEGORÍAS */
        .category-bar { display: flex; gap: 10px; overflow-x: auto; padding: 15px 0; scrollbar-width: none; }
        .cat-chip { padding: 10px 20px; background: rgba(255,255,255,0.05); border-radius: 14px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.1); }
        .cat-chip.active { background: var(--cyan); color: var(--dark); }
        .hidden-plato { display: none !important; }

        /* MODALES */
        #modal-plato, #panel-checkout, #modal-alerta { position: fixed; inset: 0; background: var(--dark); z-index: 1000; display: none; flex-direction: column; overflow-y: auto; }
        #modal-alerta { background: rgba(2,6,23,0.8); backdrop-blur: 20px; justify-content: center; align-items: center; padding: 30px; z-index: 9000; }
        
        .grid-option { border: 2px solid rgba(255,255,255,0.05); padding: 14px; text-align: center; font-size: 10px; font-weight: 800; text-transform: uppercase; border-radius: 15px; transition: 0.2s; }
        .grid-option.selected { border-color: var(--cyan); background: rgba(6,182,212,0.1); color: var(--cyan); }
        
        .price-plus { font-size: 8px; color: var(--red); display: block; margin-top: 4px; }
        
        input, select { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 16px; border-radius: 15px; color: white; width: 100%; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner mb-4"></div>
        <p class="text-cyan-400 text-[10px] font-black uppercase tracking-[0.3em] animate-pulse">Abriendo Bóveda de Datos...</p>
    </div>

    <div id="modal-alerta">
        <div class="bg-[#0f172a] border border-white/10 p-8 rounded-[2.5rem] text-center max-w-xs shadow-2xl">
            <div class="text-cyan-400 text-3xl mb-4">⚠️</div>
            <h3 class="text-white font-black uppercase text-sm mb-2 italic">¿Cambiar de Restaurante?</h3>
            <p class="text-white/50 text-[10px] leading-relaxed mb-6">Tu cesta actual se vaciará para poder añadir productos de este nuevo local.</p>
            <div class="flex flex-col gap-3">
                <button id="confirm-alerta" class="bg-cyan-400 text-dark font-black py-4 rounded-2xl uppercase text-[10px]">Vaciar y Continuar</button>
                <button onclick="cerrarAlerta()" class="text-white/40 font-bold py-2 uppercase text-[9px]">Cancelar</button>
            </div>
        </div>
    </div>

    <header class="p-5 flex items-center justify-between bg-[#020617]/95 backdrop-blur-xl sticky top-0 z-50 border-b border-white/5">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center border-2 border-cyan-400 font-black text-dark text-lg">A</div>
            <div class="text-left"><h1 class="text-lg leading-none font-bold italic uppercase">Aguadulce</h1><p class="text-[8px] tracking-[0.4em] text-cyan-400 font-bold uppercase mt-1">Express Pro</p></div>
        </div>
    </header>

    <main id="app-container" class="px-5 py-5 pb-32"></main>

    <div id="cesta-flotante" class="fixed bottom-5 left-4 right-4 bg-cyan-400 text-dark p-4 rounded-2xl hidden justify-between items-center z-[100] shadow-2xl">
        <div class="flex-1" onclick="abrirCheckout()">
            <span id="cesta-info" class="font-black text-sm italic uppercase">🛒 0 PRODUCTOS</span>
            <span id="cesta-total" class="block text-[10px] font-bold uppercase tracking-widest">0.00€ TOTAL</span>
        </div>
        <div class="text-red-600 font-black text-2xl pl-4 border-l border-black/10 px-2 cursor-pointer" onclick="vaciarCesta()">✕</div>
    </div>

    <div id="modal-plato">
        <button onclick="cerrarModal()" class="absolute top-5 left-5 z-[1001] bg-black/50 w-10 h-10 rounded-full text-white">✕</button>
        <img id="modal-img" src="" class="w-full h-[250px] object-cover">
        <div class="px-6 py-8 pb-40">
            <div class="flex justify-between items-start mb-8 text-left">
                <div class="flex-1 pr-4">
                    <h2 id="modal-titulo" class="text-2xl font-black italic uppercase leading-tight"></h2>
                    <p id="modal-desc" class="opacity-50 text-[11px] mt-2"></p>
                </div>
                <div id="modal-precio-base" class="bg-cyan-400 text-dark px-4 py-2 rounded-xl font-black text-lg">0€</div>
            </div>
            <div id="contenedor-pasos" class="space-y-10"></div>
        </div>
        <div class="fixed bottom-0 left-0 right-0 p-5 bg-gradient-to-t from-dark via-dark to-transparent">
            <button id="btn-anadir-modal" onclick="confirmarAnadir()" class="w-full bg-white/10 text-white/20 font-black py-5 rounded-2xl uppercase text-xs flex justify-between px-8 items-center transition-all">
                <span id="txt-anadir">Elige obligatorio</span>
                <span id="total-modal-btn">0.00€</span>
            </button>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbysDVL_3M-2AfW5eGS8chw3KB3uFIXJU9kVltWHOQF0Lo9mzcBBn6nQwVy1mrkaH2tZ/exec';
        let db = { menu: [], restaurantes: [] };
        let cesta = [];
        let rActivo = { id: null, nombre: "" };
        let itemActual = { pBase: 0, pExtras: 0, pOpcion: 0, obligOk: false };

        async function init() {
            try {
                const res = await fetch(scriptURL);
                const data = await res.json();
                db.restaurantes = data.RESTAURANTES || [];
                db.menu = data.MENU_GENERAL || [];
                document.getElementById('loader').style.display = 'none';
                renderHome();
            } catch (e) { console.error("Error Bóveda"); }
        }

        function renderHome() {
            let html = `<p class="text-[9px] font-black text-white/20 uppercase tracking-widest mb-6 text-left">Locales Disponibles</p>`;
            db.restaurantes.forEach(r => {
                html += `
                <div class="relative rounded-[2.5rem] overflow-hidden h-[180px] mb-5 border border-white/5" onclick="validarCambioRestaurante('${r.NOMBRE_RESTAURANTE}', '${r.ID_RESTAURANTE}')">
                    <img src="${r.FOTO}" class="absolute inset-0 w-full h-full object-cover opacity-60">
                    <div class="absolute inset-0 bg-gradient-to-t from-dark via-transparent"></div>
                    <div class="absolute bottom-6 left-8 text-left">
                        <p class="text-cyan-400 text-[9px] font-black uppercase mb-1 tracking-widest">${r.CATEGORIA || 'Gourmet'}</p>
                        <h2 class="text-2xl font-black italic uppercase">${r.NOMBRE_RESTAURANTE}</h2>
                    </div>
                </div>`;
            });
            document.getElementById('app-container').innerHTML = html;
        }

        function validarCambioRestaurante(nombre, id) {
            if (rActivo.id && rActivo.id !== String(id)) {
                document.getElementById('modal-alerta').style.display = 'flex';
                document.getElementById('confirm-alerta').onclick = () => {
                    vaciarCesta(false);
                    verMenu(nombre, id);
                    cerrarAlerta();
                };
            } else { verMenu(nombre, id); }
        }

        function cerrarAlerta() { document.getElementById('modal-alerta').style.display = 'none'; }

        function verMenu(nombre, id) {
            const platos = db.menu.filter(p => String(p.ID_RESTAURANTE) === String(id));
            const cats = [...new Set(platos.map(p => p.CATEGORIA || "General"))];
            let html = `
                <div class="flex items-center gap-4 mb-4 text-left">
                    <button onclick="renderHome()" class="w-10 h-10 rounded-xl bg-white/5 text-cyan-400">←</button>
                    <h2 class="text-lg font-bold uppercase italic">${nombre}</h2>
                </div>
                <div class="category-bar">
                    <div class="cat-chip active" onclick="filtrarCat('TODOS', this)">Todos</div>
                    ${cats.map(c => `<div class="cat-chip" onclick="filtrarCat('${c}', this)">${c}</div>`).join('')}
                </div>
                <div id="lista-platos" class="mt-6">`;
            
            cats.forEach(cat => {
                platos.filter(p => (p.CATEGORIA || "General") === cat).forEach(p => {
                    html += `
                    <div class="plato-card" data-cat="${cat}" onclick='abrirDetalle(${JSON.stringify(p).replace(/'/g, "&apos;")})'>
                        <div class="text-left flex-1 pr-4">
                            <h4 class="font-bold text-[14px] uppercase mb-2 leading-tight">${p.PLATO}</h4>
                            <span class="bg-cyan-400 text-dark px-3 py-1 rounded-lg font-black text-[10px]">${parseFloat(p.PRECIO).toFixed(2)}€</span>
                        </div>
                        <img src="${p.FOTO_PLATO}" class="w-20 h-20 rounded-2xl object-cover shadow-lg">
                    </div>`;
                });
            });
            document.getElementById('app-container').innerHTML = html + `</div>`;
        }

        function filtrarCat(cat, el) {
            document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.plato-card').forEach(p => {
                p.classList.toggle('hidden-plato', cat !== 'TODOS' && p.getAttribute('data-cat') !== cat);
            });
        }

        function abrirDetalle(p) {
            rActivo.nombre = p.NOMBRE_RESTAURANTE;
            rActivo.id = String(p.ID_RESTAURANTE);
            itemActual.pBase = parseFloat(p.PRECIO);
            itemActual.pExtras = 0;
            itemActual.pOpcion = 0;
            itemActual.obligOk = !p.SELECCION_OBLIGATORIA;

            document.getElementById('modal-titulo').innerText = p.PLATO;
            document.getElementById('modal-img').src = p.FOTO_PLATO;
            document.getElementById('modal-precio-base').innerText = itemActual.pBase.toFixed(2) + "€";
            
            let html = "";
            const renderSeccion = (titulo, datos, tipo, idSec) => {
                if(!datos) return "";
                let res = `<div class="text-left"><span class="text-[9px] font-black text-cyan-400 uppercase tracking-widest block mb-4">${titulo}</span>`;
                if(tipo === 'grid') {
                    res += `<div class="grid grid-cols-2 gap-2">`;
                    datos.split(',').forEach(d => {
                        const [name, price] = d.split(':+');
                        res += `<div class="grid-option" onclick="toggleOption(this, ${price || 0}, '${idSec}')">${name.trim()} ${price ? `<span class="price-plus">+${price}€</span>` : ''}</div>`;
                    });
                    res += `</div>`;
                } else {
                    res += `<div class="space-y-2">`;
                    datos.split(',').forEach(d => {
                        const [n, pr] = d.split(':');
                        const price = parseFloat(pr || 0);
                        res += `
                        <div class="flex justify-between items-center py-3 border-b border-white/5">
                            <div class="flex flex-col"><span class="text-[11px] font-bold uppercase">${n.trim()}</span><span class="text-[10px] font-black text-red-500">+${price.toFixed(2)}€</span></div>
                            <div class="flex items-center gap-4 bg-white/5 p-1 rounded-xl">
                                <div class="w-8 h-8 flex items-center justify-center text-cyan-400 font-bold" onclick="updExtra(this, -1, ${price})">−</div>
                                <span class="text-xs font-black qty">0</span>
                                <div class="w-8 h-8 flex items-center justify-center text-cyan-400 font-bold" onclick="updExtra(this, 1, ${price})">+</div>
                            </div>
                        </div>`;
                    });
                    res += `</div>`;
                }
                return res + `</div>`;
            };

            html += renderSeccion("Selección Obligatoria", p.SELECCION_OBLIGATORIA, 'grid', 'oblig');
            html += renderSeccion("Opciones Extras", p.EXTRAS, 'lista', 'extras');

            document.getElementById('contenedor-pasos').innerHTML = html;
            document.getElementById('modal-plato').style.display = 'flex';
            actualizarTotal();
        }

        function toggleOption(el, price, idSec) {
            el.parentElement.querySelectorAll('.grid-option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            if(idSec === 'oblig') {
                itemActual.obligOk = true;
                itemActual.pOpcion = price;
            }
            actualizarTotal();
        }

        function updExtra(el, change, price) {
            const span = el.parentElement.querySelector('.qty');
            let val = parseInt(span.innerText) + change;
            if(val >= 0) {
                span.innerText = val;
                itemActual.pExtras += (change * price);
                actualizarTotal();
            }
        }

        function actualizarTotal() {
            const total = itemActual.pBase + itemActual.pExtras + itemActual.pOpcion;
            document.getElementById('total-modal-btn').innerText = total.toFixed(2) + "€";
            const btn = document.getElementById('btn-anadir-modal');
            const txt = document.getElementById('txt-anadir');
            
            if(itemActual.obligOk) {
                btn.className = "w-full bg-cyan-400 text-dark font-black py-5 rounded-2xl uppercase text-xs flex justify-between px-8 items-center";
                txt.innerText = "Añadir al pedido";
                btn.disabled = false;
            } else {
                btn.className = "w-full bg-white/10 text-white/20 font-black py-5 rounded-2xl uppercase text-xs flex justify-between px-8 items-center";
                txt.innerText = "Elige obligatorio";
                btn.disabled = true;
            }
        }

        function vaciarCesta(render = true) {
            cesta = []; rActivo = { id: null, nombre: "" };
            document.getElementById('cesta-flotante').classList.add('hidden');
            if(render) renderHome();
        }

        function cerrarModal() { document.getElementById('modal-plato').style.display = 'none'; }
        init();
    </script>
</body>
</html>
