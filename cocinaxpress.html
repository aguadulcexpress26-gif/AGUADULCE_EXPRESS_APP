<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .switch { position: relative; display: inline-block; width: 46px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #334155; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #06b6d4; }
        input:checked + .slider:before { transform: translateX(22px); }
        .modal-blur { backdrop-filter: blur(12px); background: rgba(0,0,0,0.6); }
    </style>
</head>
<body class="min-h-screen pb-10">

    <audio id="alerta" loop src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <nav class="sticky top-0 z-40 glass border-b border-white/5 p-4 shadow-2xl">
        <div class="max-w-xl mx-auto flex justify-between items-start">
            <div>
                <h1 class="text-cyan-400 font-black italic tracking-tighter text-xl leading-none">AGUADULCE COCINA</h1>
                <p id="resNombre" class="text-[10px] text-slate-400 font-bold uppercase mt-1 tracking-widest italic">Cargando restaurante...</p>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="abrirHistorial()" class="bg-white/5 p-2 rounded-xl border border-white/10">
                    <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
                <div class="flex flex-col items-end">
                    <span id="txtEstado" class="text-[8px] font-black mb-1">---</span>
                    <label class="switch">
                        <input type="checkbox" id="tiendaToggle" onchange="confirmarToggleTienda()">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>
        <div class="max-w-xl mx-auto grid grid-cols-2 gap-3 mt-4 text-center">
            <div class="bg-white/5 rounded-2xl p-3 border border-white/5"><p class="text-[8px] text-slate-500 font-bold uppercase">Hoy</p><p id="vHoy" class="text-xl font-black">0.00€</p></div>
            <div class="bg-white/5 rounded-2xl p-3 border border-white/5"><p class="text-[8px] text-slate-500 font-bold uppercase">Acumulado</p><p id="vSem" class="text-xl font-black text-cyan-400">0.00€</p></div>
        </div>
    </nav>

    <main class="max-w-xl mx-auto p-4 space-y-4" id="lista"></main>

    <div id="customModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-6 modal-blur">
        <div class="glass w-full max-w-xs rounded-[2.5rem] p-8 border border-white/10 shadow-2xl text-center">
            <h3 id="modalTitle" class="text-xl font-black mb-2 text-cyan-400 italic uppercase"></h3>
            <p id="modalSub" class="text-white font-bold text-sm mb-4"></p>
            <div id="modalBody" class="bg-white/5 p-4 rounded-2xl text-slate-300 text-sm mb-8 text-left border border-white/5 max-h-48 overflow-y-auto italic"></div>
            <div id="modalFooter" class="flex gap-3"></div>
        </div>
    </div>

    <div id="sideHistorial" class="fixed inset-y-0 right-0 w-full max-w-sm glass z-50 transform translate-x-full transition-transform duration-300 p-6 overflow-y-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-black italic text-cyan-400">DESPACHADOS HOY</h2>
            <button onclick="cerrarHistorial()" class="text-slate-400 font-bold bg-white/5 px-3 py-1 rounded-lg text-xs uppercase">Cerrar</button>
        </div>
        <div id="listaHistorial" class="space-y-3"></div>
    </div>

    <script>
        // RECUERDA PONER AQUÍ TU URL DE SCRIPT ACTUALIZADA
        const scriptURL = "https://script.google.com/macros/s/AKfycbzmIW4rvilG6rCN7NbT-sQw-VniY0PDyi7wxQuBYbmDXOGbMup8J4tMEu99uqwzMHuq/exec"; 
        const MI_ID_REST = "RT33M5";
        let pedidosActivos = [], historialHoy = [], aceptados = new Set(), tiendaAbierta = false;

        async function cargar() {
            try {
                const r = await fetch(`${scriptURL}?action=leerPanelCompleto&idRest=${MI_ID_REST}`);
                const data = await r.json();
                document.getElementById('resNombre').innerText = data.tienda.nombre;
                tiendaAbierta = (data.tienda.estado === "Abierto");
                document.getElementById('tiendaToggle').checked = tiendaAbierta;
                document.getElementById('vHoy').innerText = data.stats.diaria + "€";
                document.getElementById('vSem').innerText = data.stats.semanal + "€";
                const txtE = document.getElementById('txtEstado');
                txtE.innerText = tiendaAbierta ? "ABIERTO" : "CERRADO";
                txtE.className = tiendaAbierta ? "text-[8px] font-black text-emerald-400" : "text-[8px] font-black text-slate-500";
                pedidosActivos = data.pedidos;
                historialHoy = data.historial;
                const suena = pedidosActivos.some(p => !aceptados.has(p.ID_PEDIDO));
                if(suena && pedidosActivos.length > 0) document.getElementById('alerta').play().catch(()=>{});
                else document.getElementById('alerta').pause();
                render();
            } catch (e) { console.error(e); }
        }

        function render() {
            const cont = document.getElementById('lista');
            if(pedidosActivos.length === 0) {
                cont.innerHTML = `<div class="text-center py-20 opacity-20 font-black italic">SIN PENDIENTES</div>`;
                return;
            }
            cont.innerHTML = pedidosActivos.map(p => `
                <div class="glass p-6 rounded-[2.5rem] border border-white/5 shadow-xl">
                    <div class="flex justify-between items-start mb-6">
                        <div><span class="text-cyan-400 font-black text-2xl italic tracking-tighter">#${p.ID_PEDIDO}</span><h2 class="text-white font-bold uppercase text-[10px] mt-1 opacity-60">${p.CLIENTE}</h2></div>
                        <p class="text-2xl font-black text-white">${parseFloat(p.TOTAL).toFixed(2)}€</p>
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="aceptarPedido('${p.ID_PEDIDO}')" class="py-4 rounded-2xl text-[9px] font-black uppercase ${aceptados.has(p.ID_PEDIDO) ? 'bg-slate-800 text-slate-600' : 'bg-white text-black ring-4 ring-white/10'}">${aceptados.has(p.ID_PEDIDO) ? 'ACEPTADO' : 'ACEPTAR'}</button>
                        <button onclick="verDetalles('${p.ID_PEDIDO}')" class="bg-slate-800 text-cyan-400 py-4 rounded-2xl text-[9px] font-black uppercase border border-cyan-400/20">DETALLES</button>
                        <button onclick="confirmarListo('${p.ID_PEDIDO}')" class="bg-cyan-500 text-black py-4 rounded-2xl text-[9px] font-black uppercase shadow-lg shadow-cyan-500/20">LISTO</button>
                    </div>
                </div>`).join('');
        }

        function verDetalles(id) {
            const p = pedidosActivos.find(x => x.ID_PEDIDO === id) || historialHoy.find(x => x.ID_PEDIDO === id);
            mostrarModal("DETALLES", `#${id} - ${p.CLIENTE}`, 
                `PRODUCTOS:<br>${p.PEDIDO_DETALLE}<br><br>DIR: ${p.DIRECCION}`,
                `<div class="flex flex-col w-full gap-2"><button onclick="imprimirTicket('${id}')" class="w-full bg-cyan-600 py-3 rounded-xl font-bold text-xs uppercase text-white">Imprimir Recibo 🖨️</button><button onclick="cerrarModal()" class="w-full bg-slate-800 py-3 rounded-xl font-bold text-xs uppercase text-slate-400">Cerrar</button></div>`);
        }

        // --- FUNCIÓN DE IMPRESIÓN REPARADA ---
        function imprimirTicket(id) {
            const p = pedidosActivos.find(x => x.ID_PEDIDO === id) || historialHoy.find(x => x.ID_PEDIDO === id);
            if (!p) return;

            const nombreRestaurante = document.getElementById('resNombre').innerText;
            const v = window.open('', 'PRINT', 'height=600,width=400');
            
            v.document.write(`
                <html>
                <head>
                    <style>
                        body { margin: 0; padding: 10px; width: 300px; font-family: 'Courier New', monospace; color: black; background: white; }
                        .text-center { text-align: center; }
                        .bold { font-weight: bold; }
                        .divider { border-bottom: 2px dashed black; margin: 10px 0; }
                        .ticket-id { background: black; color: white; text-align: center; padding: 5px; font-size: 20px; margin: 10px 0; }
                        .total-row { display: flex; justify-content: space-between; font-size: 18px; font-weight: bold; border-top: 1px solid black; padding-top: 5px; }
                        @media print { @page { margin: 0; } button { display: none; } }
                    </style>
                </head>
                <body>
                    <button onclick="window.print()" style="width: 100%; padding: 15px; background: #06b6d4; color: white; border: none; border-radius: 10px; font-weight: bold; margin-bottom: 20px; font-size: 16px;">
                        CLICK AQUÍ PARA IMPRIMIR 🖨️
                    </button>
                    <div class="text-center bold" style="font-size: 18px;">AGUADULCE EXPRESS</div>
                    <div class="text-center">${nombreRestaurante}</div>
                    <div class="divider"></div>
                    <div class="bold">ENTREGAR A:</div>
                    <div class="bold" style="font-size: 18px;">${p.CLIENTE}</div>
                    <div style="font-size: 14px;">${p.DIRECCION}</div>
                    <div class="ticket-id">#${p.ID_PEDIDO}</div>
                    <div class="divider"></div>
                    <div style="font-size: 14px;">${p.PEDIDO_DETALLE.replace(/,/g, '<br>')}</div>
                    <div class="divider"></div>
                    <div class="total-row"><span>TOTAL:</span><span>${parseFloat(p.TOTAL).toFixed(2)}€</span></div>
                    <div style="font-size: 12px; margin-top: 10px;">Pago: ${p.PAGO}<br>Fecha: ${p.FECHA}</div>
                    <div class="divider"></div>
                    <div class="text-center" style="margin-bottom: 50px;">*** GRACIAS ***</div>
                    <script>setTimeout(() => { window.print(); }, 500);<\/script>
                </body>
                </html>
            `);
            v.document.close();
        }

        function confirmarListo(id) {
            mostrarModal("¿PEDIDO TERMINADO?", `#${id}`, "Confirma que el pedido está listo para despacho.",
                `<button onclick="cerrarModal()" class="flex-1 bg-slate-800 py-4 rounded-2xl font-bold text-xs uppercase">No</button><button onclick="ejecutarListo('${id}')" class="flex-1 bg-cyan-500 text-black py-4 rounded-2xl font-black text-xs uppercase">Sí, Listo</button>`);
        }

        async function ejecutarListo(id) {
            cerrarModal(); await fetch(`${scriptURL}?action=marcarListo&idPedido=${id}`); cargar();
        }

        function aceptarPedido(id) {
            aceptados.add(id); document.getElementById('alerta').pause(); render();
        }

        function abrirHistorial() {
            const hCont = document.getElementById('listaHistorial');
            hCont.innerHTML = historialHoy.length === 0 ? '<p class="text-slate-600 text-center py-10 italic">Sin pedidos hoy.</p>' :
                historialHoy.map(h => `<div class="bg-white/5 p-4 rounded-2xl border border-white/5 flex justify-between items-center"><button onclick="verDetalles('${h.ID_PEDIDO}')" class="text-left"><span class="text-emerald-400 font-bold">#${h.ID_PEDIDO}</span><p class="text-[9px] text-slate-500 font-bold uppercase">${h.CLIENTE}</p></button><span class="font-black">${h.TOTAL}€</span></div>`).join('');
            document.getElementById('sideHistorial').style.transform = 'translateX(0)';
        }

        function cerrarHistorial() { document.getElementById('sideHistorial').style.transform = 'translateX(100%)'; }
        function mostrarModal(t, s, b, f) {
            document.getElementById('modalTitle').innerText = t; document.getElementById('modalSub').innerText = s;
            document.getElementById('modalBody').innerHTML = b; document.getElementById('modalFooter').innerHTML = f;
            document.getElementById('customModal').classList.remove('hidden'); document.getElementById('customModal').classList.add('flex');
        }
        function cerrarModal() { document.getElementById('customModal').classList.add('hidden'); }
        function confirmarToggleTienda() {
            const n = !tiendaAbierta ? "ABRIR" : "CERRAR";
            mostrarModal("¿ESTADO TIENDA?", n, `Confirmas que deseas ${n} el restaurante.`, `<button onclick="revertirToggle()" class="flex-1 bg-slate-800 py-4 rounded-2xl font-bold text-xs">NO</button><button onclick="ejecutarToggle()" class="flex-1 bg-cyan-500 text-black py-4 rounded-2xl font-black text-xs">SÍ</button>`);
        }
        function revertirToggle() { document.getElementById('tiendaToggle').checked = tiendaAbierta; cerrarModal(); }
        async function ejecutarToggle() {
            cerrarModal(); const rs = !tiendaAbierta ? "Abierto" : "Cerrado"; tiendaAbierta = !tiendaAbierta;
            await fetch(`${scriptURL}?action=toggleTienda&idRest=${MI_ID_REST}&nuevoEstado=${rs}`); cargar();
        }

        setInterval(cargar, 10000);
        cargar();
    </script>
</body>
</html>
