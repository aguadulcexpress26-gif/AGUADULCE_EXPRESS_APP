<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express - Versión 60 Corregida</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #06b6d4; --bg-dark: #020617; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-dark); color: white; }
        
        /* Estilo de Secciones sin números */
        .section-header { 
            font-size: 0.75rem; 
            font-weight: 700; 
            color: var(--accent); 
            text-transform: uppercase; 
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
            margin-top: 1.5rem;
        }

        /* Ajuste de Extras para mostrar el precio correcto */
        .extra-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .extra-label { display: flex; flex-direction: column; }
        .extra-price-tag { color: #ef4444; font-weight: 700; font-size: 0.85rem; }

        /* Botón de Vaciado en Cesta */
        .btn-vaciar-cesta {
            color: #ef4444;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px;
            transition: opacity 0.2s;
        }
        .btn-vaciar-cesta:hover { opacity: 0.7; }
    </style>
</head>
<body>

    <div id="modal-cesta" class="hidden fixed inset-0 bg-black/90 z-[100] p-6">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold">TU PEDIDO</h2>
            <div onclick="vaciarCesta()" class="btn-vaciar-cesta" title="Vaciar cesta">
                <span class="text-xs uppercase font-bold mr-1">Vaciar</span> ✕
            </div>
        </div>
        <div id="items-cesta" class="space-y-4"></div>
    </div>

    <script>
        // Función corregida para procesar "NOMBRE:PRECIO"
        function renderizarExtras(columnaDatos) {
            if (!columnaDatos) return "";
            
            const items = columnaDatos.split(',');
            return items.map(item => {
                // Separamos por el formato NOMBRE:PRECIO
                const partes = item.split(':');
                const nombre = partes[0].trim();
                const precio = partes[1] ? partes[1].trim() : "0.00";

                return `
                    <div class="extra-item">
                        <div class="extra-label">
                            <span class="text-sm font-semibold">${nombre}</span>
                            <span class="extra-price-tag">+${precio}€</span>
                        </div>
                        <div class="flex items-center gap-3 bg-white/5 rounded-lg px-2">
                            <button onclick="cambiarCantidad(this, -1, ${precio})" class="p-2 text-cyan-400 font-bold">-</button>
                            <span class="cantidad text-sm">0</span>
                            <button onclick="cambiarCantidad(this, 1, ${precio})" class="p-2 text-cyan-400 font-bold">+</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Ejemplo de aplicación de títulos sin números
        function actualizarInterfazProducto(p) {
            const contenedor = document.getElementById('opciones-producto');
            contenedor.innerHTML = `
                <div class="section-header">Selección Obligatoria</div>
                ${renderizarOpcionesSimples(p.SELECCION_OBLIGATORIA)}

                <div class="section-header">Selección Única</div>
                ${renderizarOpcionesSimples(p.SELECCION_UNICA)}

                <div class="section-header">Extras Adicionales</div>
                ${renderizarExtras(p.EXTRAS)}
            `;
        }

        function vaciarCesta() {
            if(confirm("¿Estás seguro de que quieres vaciar la cesta?")) {
                cesta = [];
                rActivo = { id: null, nombre: "" };
                actualizarCestaUI();
                alert("Cesta vaciada");
            }
        }
    </script>
</body>
</html>
