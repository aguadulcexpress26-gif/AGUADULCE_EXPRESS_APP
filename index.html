<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express v86 - Full</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark: #020617; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: white; margin: 0; -webkit-tap-highlight-color: transparent; }
        
        header { background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top: 0; z-index: 50; }

        /* Estilo Tarjetas de Platos Aprobado */
        .plato-item {
            background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.03) 100%);
            border-radius: 1.8rem; padding: 18px; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(255,255,255,0.08); margin-bottom: 14px;
        }
        .plato-img { width: 75px; height: 75px; border-radius: 1.2rem; object-fit: cover; border: 2px solid rgba(6, 182, 212, 0.3); }

        /* Estilo de Opciones y Extras */
        .option-pill { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; padding: 12px 16px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .option-pill.selected { border-color: var(--cyan); background: rgba(6, 182, 212, 0.1); }
        .dot { width: 18px; height: 18px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); position: relative; }
        .selected .dot { border-color: var(--cyan); background: var(--cyan); box-shadow: 0 0 10px var(--cyan); }

        #modal-plato { position: fixed; inset: 0; background: var(--dark); z-index: 1000; display: none; flex-direction: column; overflow-y: auto; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .btn-cerrar { position: absolute; top: 25px; left: 25px; z-index: 1010; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); width: 44px; height: 44px; border-radius: 14px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <header class="px-6 py-5 flex items-center gap-4">
        <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center border-2 border-cyan-400">
            <span class="text-dark font-black text-xl">A</span>
        </div>
        <div class="flex flex-col text-left">
            <span class="font-black text-xl tracking-tighter uppercase leading-none">AGUADULCE</span>
            <span class="text-[9px] font-bold tracking-[0.4em] text-cyan-400 uppercase">Express</span>
        </div>
    </header>

    <main id="app-container" class="px-5 py-6"></main>

    <div id="modal-plato">
        <button onclick="cerrarModal()" class="btn-cerrar text-white font-bold">✕</button>
        <img id="modal-img" src="" class="w-full h-[35vh] object-cover">
        <div class="px-8 py-8 pb-40">
            <div id="modal-header-info"></div>
            
            <div id="section-obligatoria" class="mt-8 hidden">
                <h3 class="text-cyan-400 font-black text-[10px] uppercase tracking-[0.2em] mb-4">Selección Obligatoria</h3>
                <div id="list-obligatoria"></div>
            </div>

            <div id="section-extras" class="mt-8 hidden">
                <h3 class="text-cyan-400 font-black text-[10px] uppercase tracking-[0.2em] mb-4">Extras Sugeridos</h3>
                <div id="list-extras"></div>
            </div>

            <div id="section-bebidas" class="mt-8 hidden">
                <h3 class="text-cyan-400 font-black text-[10px] uppercase tracking-[0.2em] mb-4">Bebida</h3>
                <div id="list-bebidas"></div>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-dark via-dark to-transparent">
            <button class="w-full bg-cyan-500 text-dark font-black py-5 rounded-[1.8rem] uppercase text-[11px] tracking-widest shadow-lg">
                Confirmar • <span id="modal-precio-btn">0.00</span>€
            </button>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbysDVL_3M-2AfW5eGS8chw3KB3uFIXJU9kVltWHOQF0Lo9mzcBBn6nQwVy1mrkaH2tZ/exec';
        let db = { restaurantes: [], menu: [] };
        let currentBasePrice = 0;
        let extraTotal = 0;

        async function cargarDatos() {
            const res = await fetch(scriptURL);
            const data = await res.json();
            const find = (n) => data[Object.keys(data).find(k => k.toLowerCase().includes(n.toLowerCase()))] || [];
            db.restaurantes = find('RESTAURANTES');
            db.menu = find('MENU_GENERAL');
            renderizarHome();
        }

        function renderizarHome() {
            let html = `<h2 class="text-left text-[10px] text-slate-500 uppercase font-black mb-6 tracking-widest">Establecimientos</h2>`;
            db.restaurantes.forEach(r => {
                html += `
                <div class="relative h-44 rounded-[2rem] overflow-hidden mb-6 border border-white/5" onclick="verMenu('${r.NOMBRE_RESTAURANTE}', '${r.ID_RESTAURANTE}')">
                    <img src="${r.FOTO}" class="absolute inset-0 w-full h-full object-cover opacity-80">
                    <div class="absolute inset-0 bg-gradient-to-t from-dark via-dark/20 to-transparent"></div>
                    <div class="absolute bottom-6 left-7 text-left">
                        <p class="text-[8px] text-cyan-400 font-black uppercase mb-1 tracking-widest">${r.CATEGORIA}</p>
                        <h3 class="text-2xl font-black text-white uppercase italic tracking-tighter">${r.NOMBRE_RESTAURANTE}</h3>
                    </div>
                </div>`;
            });
            document.getElementById('app-container').innerHTML = html;
        }

        function verMenu(nombre, id) {
            const platos = db.menu.filter(p => String(p.ID_RESTAURANTE).trim() === String(id).trim());
            let html = `<div class="flex items-center gap-4 mb-10"><button onclick="renderizarHome()" class="bg-white/5 w-10 h-10 rounded-xl border border-white/10 text-cyan-400">←</button><h2 class="text-xl font-black uppercase">${nombre}</h2></div>`;
            
            platos.forEach(p => {
                html += `
                <div class="plato-item" onclick='abrirDetalle(${JSON.stringify(p).replace(/'/g, "&apos;")})'>
                    <div class="text-left flex-1 pr-4">
                        <h4 class="font-bold text-white text-sm uppercase mb-1">${p.PLATO}</h4>
                        <p class="text-cyan-400 font-black text-xl">${parseFloat(p.PRECIO).toFixed(2)}€</p>
                    </div>
                    <img src="${p.FOTO_PLATO}" class="plato-img">
                </div>`;
            });
            document.getElementById('app-container').innerHTML = html;
        }

        function abrirDetalle(p) {
            currentBasePrice = parseFloat(p.PRECIO);
            extraTotal = 0;
            document.getElementById('modal-img').src = p.FOTO_PLATO;
            document.getElementById('modal-header-info').innerHTML = `<h2 class="text-3xl font-black uppercase leading-none mb-2">${p.PLATO}</h2><p class="text-slate-400 text-xs italic">${p.DESCRIPCION || ''}</p>`;
            
            // Lógica de extras (Suponiendo que los extras vienen en una columna llamada EXTRAS_NOMBRE y EXTRAS_PRECIO)
            // Aquí puedes mapear según como lo tengas en tu Excel:
            renderOpciones(p); 

            actualizarPrecioBotón();
            document.getElementById('modal-plato').style.display = 'flex';
        }

        function renderOpciones(p) {
            // Ejemplo de cómo procesaríamos si en el Excel tuvieras columnas de extras
            // Si no las tienes, podemos simularlas o configurarlas según tu estructura anterior.
            const listExtras = document.getElementById('list-extras');
            const secExtras = document.getElementById('section-extras');
            
            // Simulación de extras para que veas la presentación (esto debe conectarse a tus columnas)
            if(p.EXTRAS) {
               secExtras.classList.remove('hidden');
               // Aquí iría el bucle de tus extras reales
            }
        }

        function actualizarPrecioBotón() {
            document.getElementById('modal-precio-btn').innerText = (currentBasePrice + extraTotal).toFixed(2);
        }

        function cerrarModal() { document.getElementById('modal-plato').style.display = 'none'; }

        cargarDatos();
    </script>
</body>
</html>
