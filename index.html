<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express Pro v90</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark: #020617; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: white; margin: 0; -webkit-tap-highlight-color: transparent; }
        .brand { font-family: 'Orbitron', sans-serif; }
        
        /* HEADER v70 */
        header { background: rgba(2, 6, 23, 0.75); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.08); }

        /* TARJETAS RESTAURANTE v70 */
        .card-rest { position: relative; overflow: hidden; border-radius: 2.2rem; height: 180px; border: 1px solid rgba(255,255,255,0.06); transition: all 0.3s; }
        .card-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.85; }
        .card-gradient { position: absolute; inset: 0; background: linear-gradient(to top, rgba(2,6,23,0.98) 0%, rgba(2,6,23,0.4) 60%, transparent 100%); }

        /* ESTILOS DE PASOS v61 */
        #modal-plato { position: fixed; inset: 0; background: var(--dark); z-index: 1000; display: none; flex-direction: column; overflow-y: auto; }
        .step-title { font-size: 0.7rem; font-weight: bold; color: var(--cyan); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 1.2rem; display: block; text-align: left; }
        
        .opcion-unica { border: 2px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 15px; text-align: center; font-size: 0.8rem; font-weight: 600; }
        .opcion-unica.active { border-color: var(--cyan); background: rgba(6, 182, 212, 0.1); color: var(--cyan); }
        
        .ingrediente-chip { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); font-size: 0.8rem; text-align: center; }
        .ingrediente-chip.selected { border-color: var(--cyan); background: rgba(6, 182, 212, 0.1); color: var(--cyan); }

        .extra-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .contador-box { display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 15px; }
        .btn-control { color: var(--cyan); font-size: 1.5rem; font-weight: bold; width: 30px; text-align: center; }
    </style>
</head>
<body>

    <header class="sticky top-0 z-50 px-6 py-5 flex items-center gap-4">
        <div class="w-11 h-11 bg-white rounded-xl flex items-center justify-center border-2 border-cyan-400 font-black text-dark text-xl">A</div>
        <div class="flex flex-col text-left">
            <span class="brand text-xl tracking-tight text-white leading-none">AGUADULCE</span>
            <span class="text-[9px] font-bold tracking-[0.4em] text-cyan-400 uppercase leading-none mt-1">Express v90</span>
        </div>
    </header>

    <main id="app-container" class="px-5 py-6">
        <div class="text-center py-24"><div class="inline-block animate-spin rounded-full h-6 w-6 border-t-2 border-cyan-400"></div></div>
    </main>

    <div id="modal-plato">
        <button onclick="cerrarModal()" class="absolute top-6 left-6 z-50 bg-black/40 backdrop-blur-md w-11 h-11 rounded-xl border border-white/10 text-white">✕</button>
        <img id="modal-img" src="" class="w-full h-[320px] object-cover">
        
        <div class="px-6 py-8">
            <div class="flex justify-between items-start mb-6 text-left">
                <div class="max-w-[70%]">
                    <h2 id="modal-titulo" class="brand text-2xl uppercase leading-tight"></h2>
                    <p id="modal-desc" class="text-slate-400 text-xs mt-2 italic"></p>
                </div>
                <div id="modal-precio-float" class="bg-cyan-500 px-4 py-2 rounded-xl font-black text-dark">0.00€</div>
            </div>

            <hr class="border-white/5 my-8">

            <div id="bloques-personalizacion">
                </div>

            <button class="w-full bg-cyan-500 text-dark font-black py-5 rounded-[2rem] mt-10 uppercase text-xs tracking-[0.2em] shadow-xl shadow-cyan-500/20 active:scale-95 transition-all">
                Confirmar Selección • <span id="modal-total">0.00</span>€
            </button>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbysDVL_3M-2AfW5eGS8chw3KB3uFIXJU9kVltWHOQF0Lo9mzcBBn6nQwVy1mrkaH2tZ/exec';
        let db = { restaurantes: [], menu: [] };

        async function cargarDatos() {
            try {
                const res = await fetch(scriptURL);
                const data = await res.json();
                const find = (n) => data[Object.keys(data).find(k => k.toLowerCase().trim() === n.toLowerCase())] || [];
                db.restaurantes = find('RESTAURANTES');
                db.menu = find('MENU_GENERAL');
                renderRestaurantes();
            } catch (e) { console.error("Error de enlace"); }
        }

        function renderRestaurantes() {
            let html = `<h2 class="text-[10px] tracking-[0.2em] text-slate-500 uppercase font-black mb-6 text-left ml-1">Restaurantes Disponibles</h2>`;
            db.restaurantes.forEach(rest => {
                html += `
                <div class="card-rest mb-5 shadow-2xl" onclick="verMenu('${rest.NOMBRE_RESTAURANTE}', '${rest.ID_RESTAURANTE}')">
                    <img src="${rest.FOTO}" class="card-img">
                    <div class="card-gradient"></div>
                    <div class="absolute bottom-6 left-7 text-left">
                        <p class="text-[8px] text-cyan-400 font-black uppercase tracking-widest mb-1">${rest.CATEGORIA || 'PREMIUM'}</p>
                        <h3 class="brand text-xl text-white italic uppercase">${rest.NOMBRE_RESTAURANTE}</h3>
                    </div>
                </div>`;
            });
            document.getElementById('app-container').innerHTML = html;
        }

        function verMenu(nombre, id) {
            const platos = db.menu.filter(p => String(p.ID_RESTAURANTE) === String(id));
            let html = `<div class="flex items-center gap-4 mb-8 text-left"><button onclick="renderRestaurantes()" class="w-10 h-10 rounded-xl bg-white/5 text-cyan-400 flex items-center justify-center">←</button><h2 class="brand text-lg uppercase">${nombre}</h2></div>`;
            
            platos.forEach(p => {
                html += `
                <div class="bg-white/5 p-4 rounded-[2rem] flex justify-between items-center mb-4 border border-white/5" onclick='abrirDetalle(${JSON.stringify(p).replace(/'/g, "&apos;")})'>
                    <div class="text-left"><h4 class="font-bold text-white text-xs uppercase mb-1">${p.PLATO}</h4><p class="text-cyan-400 font-black text-xl italic">${parseFloat(p.PRECIO).toFixed(2)}€</p></div>
                    <img src="${p.FOTO_PLATO}" class="w-16 h-16 rounded-2xl object-cover border border-cyan-500/20 shadow-lg">
                </div>`;
            });
            document.getElementById('app-container').innerHTML = html;
        }

        function abrirDetalle(p) {
            document.getElementById('modal-titulo').innerText = p.PLATO;
            document.getElementById('modal-desc').innerText = p.DESCRIPCION || "Sabor artesanal premium.";
            document.getElementById('modal-img').src = p.FOTO_PLATO;
            document.getElementById('modal-precio-float').innerText = parseFloat(p.PRECIO).toFixed(2) + '€';
            document.getElementById('modal-total').innerText = parseFloat(p.PRECIO).toFixed(2);
            
            // INYECCIÓN DE PASOS v61
            let htmlPasos = "";
            
            if(p.OPCIONES_OBLIGATORIAS) {
                htmlPasos += `<div class="mb-10"><span class="step-title">1. Selección Obligatoria</span><div class="grid grid-cols-2 gap-3">`;
                p.OPCIONES_OBLIGATORIAS.split(',').forEach((opt, i) => {
                    htmlPasos += `<div class="opcion-unica ${i===0?'active':''}" onclick="toggleActive(this, 'opcion-unica')">${opt.trim()}</div>`;
                });
                htmlPasos += `</div></div>`;
            }

            if(p.INGREDIENTES_SELECCION) {
                htmlPasos += `<div class="mb-10"><span class="step-title">2. Elige tus opciones</span><div class="grid grid-cols-2 gap-3">`;
                p.INGREDIENTES_SELECCION.split(',').forEach(ing => {
                    htmlPasos += `<div class="ingrediente-chip" onclick="this.classList.toggle('selected')">✓ ${ing.trim()}</div>`;
                });
                htmlPasos += `</div></div>`;
            }

            if(p.EXTRAS_ADICIONALES) {
                htmlPasos += `<div class="mb-10"><span class="step-title">3. Extras Adicionales</span><div class="space-y-2">`;
                p.EXTRAS_ADICIONALES.split(',').forEach(ex => {
                    htmlPasos += `<div class="extra-row"><div><span class="text-xs uppercase font-bold">${ex.trim()}</span></div><div class="contador-box"><span class="btn-control">−</span><span class="font-bold">0</span><span class="btn-control">+</span></div></div>`;
                });
                htmlPasos += `</div></div>`;
            }

            document.getElementById('bloques-personalizacion').innerHTML = htmlPasos;
            document.getElementById('modal-plato').style.display = 'flex';
        }

        function toggleActive(el, cls) {
            el.parentElement.querySelectorAll('.'+cls).forEach(o => o.classList.remove('active'));
            el.classList.add('active');
        }

        function cerrarModal() { document.getElementById('modal-plato').style.display = 'none'; }

        cargarDatos();
    </script>
</body>
</html>
