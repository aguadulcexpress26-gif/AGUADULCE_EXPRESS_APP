<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express Pro v70</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark: #020617; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: white; margin: 0; -webkit-tap-highlight-color: transparent; }
        
        /* HEADER PREMIUM GLASSMORPHISM */
        header {
            background: rgba(2, 6, 23, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
        }
        .logo-circle {
            width: 44px; height: 44px;
            background: white; border-radius: 14px;
            padding: 2px; border: 2px solid var(--cyan);
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
        }

        /* TARJETAS RESTAURANTE: Altura Compacta (180px) */
        .card-rest {
            position: relative; overflow: hidden; border-radius: 2.2rem;
            height: 180px; border: 1px solid rgba(255,255,255,0.06);
            transition: all 0.3s cubic-bezier(0, 0, 0.2, 1);
        }
        .card-rest:active { transform: scale(0.96); }
        .card-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.85; }
        .card-gradient {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(2,6,23,0.98) 0%, rgba(2,6,23,0.4) 60%, transparent 100%);
        }
        .card-content { position: absolute; bottom: 0; left: 0; right: 0; padding: 18px 22px; }

        /* MODAL DE DETALLES (PUNTO 3) */
        #modal-plato { 
            position: fixed; inset: 0; background: var(--dark); 
            z-index: 1000; display: none; flex-direction: column; 
            overflow-y: auto; animation: slideUp 0.35s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .btn-cerrar { 
            position: absolute; top: 20px; left: 20px; z-index: 1010;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            width: 42px; height: 42px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <header class="sticky top-0 z-50 px-6 py-5 flex items-center gap-4">
        <img src="apple-touch-icon.png" class="logo-circle" onerror="this.src='https://via.placeholder.com/100?text=A'">
        <div class="flex flex-col">
            <span class="font-extrabold text-2xl tracking-tight text-white leading-none">AGUADULCE</span>
            <div class="flex items-center gap-2">
                <span class="text-[9px] font-bold tracking-[0.4em] text-cyan-400 uppercase">Express</span>
                <span class="bg-cyan-500/10 text-cyan-400 text-[7px] font-black px-1.5 py-0.5 rounded border border-cyan-400/20 uppercase tracking-widest">v70</span>
            </div>
        </div>
    </header>

    <main id="app-container" class="px-5 py-6">
        <div class="text-center py-24">
            <div class="inline-block animate-spin rounded-full h-6 w-6 border-t-2 border-cyan-400"></div>
        </div>
    </main>

    <div id="modal-plato">
        <button onclick="cerrarModal()" class="btn-cerrar text-white">✕</button>
        <img id="modal-img" src="" class="w-full h-[38vh] object-cover">
        <div class="px-7 py-8">
            <div id="modal-header-info"></div>
            <div id="modal-opciones" class="mt-8"></div>
            <button class="w-full bg-cyan-500 text-dark font-black py-5 rounded-[2rem] mt-10 uppercase text-sm tracking-widest shadow-xl shadow-cyan-500/20 active:scale-95 transition-all">
                Añadir al Pedido
            </button>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyutzaHTfEwHGnoWVy_ptlNg5vTU1GvwflEwU4-KIRt2q7CvU0tr_SacmnhakPTTJ_l/exec';
        let db = { restaurantes: [], menu: [] };

        async function cargarDatos() {
            try {
                const respuesta = await fetch(scriptURL);
                const data = await respuesta.json();
                const findSheet = (n) => data[Object.keys(data).find(k => k.toLowerCase().trim() === n.toLowerCase())] || [];
                db.restaurantes = findSheet('RESTAURANTES');
                db.menu = findSheet('MENU_GENERAL');
                renderizarRestaurantes();
            } catch (e) {
                document.getElementById('app-container').innerHTML = `<p class="text-center text-[10px] text-red-400 uppercase py-20">Error de enlace</p>`;
            }
        }

        function renderizarRestaurantes() {
            const contenedor = document.getElementById('app-container');
            let html = `<div class="mb-6 ml-1"><h2 class="text-[10px] tracking-[0.2em] text-slate-500 uppercase font-extrabold">Descubre sabores locales</h2></div>`;
            
            db.restaurantes.forEach(rest => {
                html += `
                <div class="card-rest mb-5 shadow-2xl" onclick="verMenuRestaurante('${rest.NOMBRE_RESTAURANTE}', '${rest.ID_RESTAURANTE}')">
                    <img src="${rest.FOTO || 'https://via.placeholder.com/600x400'}" class="card-img">
                    <div class="card-gradient"></div>
                    <div class="absolute top-4 left-5 bg-black/50 backdrop-blur-md px-2.5 py-1 rounded-xl border border-white/5 text-[11px] font-bold">
                        <span class="text-amber-400">⭐</span> ${rest.CALIFICACION || '4.0'}
                    </div>
                    <div class="card-content">
                        <p class="text-[8px] text-cyan-400 font-extrabold uppercase tracking-[0.2em] mb-1">${rest.CATEGORIA || 'DELI'}</p>
                        <h3 class="text-xl font-bold text-white tracking-tight mb-1 leading-tight uppercase">${rest.NOMBRE_RESTAURANTE}</h3>
                        <div class="flex items-center gap-1.5 text-white/50 text-[9px] font-semibold tracking-wider">
                            <svg class="w-3 h-3 text-cyan-400/60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            ABIERTOS: ${rest.HORARIO || 'Consultar'}
                        </div>
                    </div>
                </div>`;
            });
            contenedor.innerHTML = html;
        }

        function verMenuRestaurante(nombreRest, idRest) {
            const contenedor = document.getElementById('app-container');
            const platos = db.menu.filter(p => String(p.ID_RESTAURANTE) === String(idRest));
            let html = `
                <div class="flex items-center gap-4 mb-8">
                    <button onclick="renderizarRestaurantes()" class="bg-white/5 w-12 h-12 rounded-2xl border border-white/10 text-cyan-400 flex items-center justify-center">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"></path></svg>
                    </button>
                    <div><h2 class="text-xl font-bold text-white uppercase tracking-tight">${nombreRest}</h2><p class="text-[9px] text-cyan-400/60 font-black uppercase tracking-widest leading-none">Menú Principal</p></div>
                </div>
                <div class="grid gap-4">`;

            platos.forEach(plato => {
                html += `
                <div class="bg-gradient-to-br from-white/10 to-transparent p-4 rounded-[1.8rem] flex justify-between items-center border border-white/5 active:scale-95 transition-all shadow-xl" 
                     onclick="abrirDetallePlato(${JSON.stringify(plato).replace(/"/g, '&quot;')})">
                    <div class="flex-1 pr-4 text-left">
                        <div class="font-bold text-white text-xs uppercase mb-1.5 leading-tight tracking-wide">${plato.PLATO}</div>
                        <div class="text-cyan-400 font-black text-xl tracking-tighter">$${parseFloat(plato.PRECIO || 0).toFixed(2)}</div>
                    </div>
                    <img src="${plato.FOTO_PLATO || 'https://via.placeholder.com/150'}" class="w-16 h-16 rounded-2xl object-cover shadow-lg border border-white/5">
                </div>`;
            });
            contenedor.innerHTML = html + `</div>`;
        }

        function abrirDetallePlato(plato) {
            const modal = document.getElementById('modal-plato');
            document.getElementById('modal-img').src = plato.FOTO_PLATO || 'https://via.placeholder.com/600x400';
            document.getElementById('modal-header-info').innerHTML = `
                <h2 class="text-2xl font-black text-white tracking-tighter mb-2 uppercase leading-none">${plato.PLATO}</h2>
                <p class="text-slate-400 text-xs leading-relaxed mb-6">${plato.DESCRIPCION || 'Preparado con ingredientes frescos y la mejor calidad.'}</p>
                <div class="text-3xl font-black text-cyan-400 tracking-tighter">$${parseFloat(plato.PRECIO || 0).toFixed(2)}</div>
            `;
            document.getElementById('modal-opciones').innerHTML = `<p class="text-[10px] text-slate-600 font-bold uppercase tracking-widest text-center mt-10 pt-10 border-t border-white/5">Personaliza tu plato</p>`;
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function cerrarModal() {
            document.getElementById('modal-plato').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        cargarDatos();
    </script>
</body>
</html>
