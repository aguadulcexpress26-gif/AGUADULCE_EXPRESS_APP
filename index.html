<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express Pro v99</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark: #020617; --red: #ef4444; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark) !important; color: white; margin: 0; letter-spacing: -0.015em; -webkit-tap-highlight-color: transparent; }
        
        /* PANTALLA DE CARGA */
        #loader { position: fixed; inset: 0; background: var(--dark); z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(6,182,212,0.1); border-top-color: var(--cyan); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* FILTRADO */
        .category-bar { display: flex; gap: 10px; overflow-x: auto; padding: 15px 0; scrollbar-width: none; }
        .category-bar::-webkit-scrollbar { display: none; }
        .cat-chip { padding: 10px 20px; background: rgba(255,255,255,0.05); border-radius: 14px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; white-space: nowrap; border: 1px solid rgba(255,255,255,0.1); }
        .cat-chip.active { background: var(--cyan); color: var(--dark); border-color: var(--cyan); }
        .hidden-plato { display: none !important; }

        .plato-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 1.5rem; padding: 15px; display: flex; align-items: center; margin-bottom: 12px; }
        
        #modal-plato, #panel-checkout { position: fixed; inset: 0; background: var(--dark); z-index: 1000; display: none; flex-direction: column; overflow-y: auto; }
        .foto-header-modal { width: 100%; height: 260px; object-fit: cover; border-bottom: 2px solid var(--cyan); }
        
        input, select { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 16px; border-radius: 15px; color: white; width: 100%; margin-bottom: 15px; }
        .btn-control { width: 32px; height: 32px; background: rgba(255,255,255,0.1); border-radius: 8px; color: var(--cyan); display: flex; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner mb-4"></div>
        <p class="text-cyan-400 text-[10px] font-black uppercase tracking-[0.3em] animate-pulse">Abriendo Bóveda de Datos...</p>
    </div>

    <header class="p-5 flex items-center justify-between bg-[#020617]/95 backdrop-blur-xl sticky top-0 z-50 border-b border-white/5">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center border-2 border-cyan-400 font-black text-dark text-lg">A</div>
            <div class="text-left"><h1 class="text-lg leading-none font-bold italic uppercase">Aguadulce</h1><p class="text-[8px] tracking-[0.4em] text-cyan-400 font-bold uppercase mt-1">Express Pro</p></div>
        </div>
    </header>

    <main id="app-container" class="px-5 py-5 pb-32"></main>

    <div id="cesta-flotante" class="fixed bottom-5 left-4 right-4 bg-cyan-400 text-dark p-4 rounded-2xl hidden justify-between items-center z-[100] shadow-2xl">
        <div class="flex-1" onclick="abrirCheckout()">
            <span id="cesta-info" class="font-black text-sm italic uppercase">🛒 0 PRODUCTOS</span>
            <span id="cesta-total" class="block text-[10px] font-bold uppercase tracking-widest">0.00€ TOTAL</span>
        </div>
        <div class="text-red-600 font-black text-2xl pl-4 border-l border-black/10 px-2" onclick="vaciarCesta()">✕</div>
    </div>

    <div id="modal-plato">
        <button onclick="cerrarModal()" class="absolute top-5 left-5 z-50 bg-black/50 w-10 h-10 rounded-full text-white">✕</button>
        <img id="modal-img" src="" class="foto-header-modal">
        <div class="px-6 py-8 pb-40">
            <div class="flex justify-between items-start mb-6 text-left">
                <div class="flex-1 pr-4">
                    <h2 id="modal-titulo" class="text-xl font-black italic text-white uppercase"></h2>
                    <p id="modal-desc" class="opacity-60 text-[11px] mt-2"></p>
                </div>
                <div id="modal-precio-base" class="bg-cyan-400 text-dark px-4 py-2 rounded-xl font-black text-md">0€</div>
            </div>
            <div id="contenedor-pasos" class="space-y-10"></div>
        </div>
        <div class="fixed bottom-0 left-0 right-0 p-5 bg-gradient-to-t from-dark to-transparent">
            <button onclick="confirmarYAnadir()" class="w-full bg-cyan-400 text-dark font-black py-5 rounded-2xl uppercase text-xs flex justify-between px-8 items-center">
                <span>Añadir al pedido</span>
                <span id="total-modal-btn">0.00€</span>
            </button>
        </div>
    </div>

    <div id="panel-checkout" class="p-6">
        <div class="flex items-center gap-4 mb-8">
            <button onclick="cerrarCheckout()" class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 text-cyan-400">←</button>
            <h2 class="text-xl font-black italic uppercase">Tus Datos</h2>
        </div>
        <div class="space-y-4 text-left">
            <input type="text" id="nombre-cli" placeholder="Nombre completo">
            <input type="tel" id="tel-cli" placeholder="Teléfono">
            <input type="text" id="dir-cli" placeholder="Dirección Exacta">
            <select id="pago-cli">
                <option value="Efectivo">Efectivo</option>
                <option value="Bizum">Bizum</option>
                <option value="Tarjeta/TPV">Tarjeta / TPV (Punto Inalámbrico)</option>
            </select>
            <div class="flex gap-3 text-[10px] opacity-60 py-4">
                <input type="checkbox" id="check-legal" onchange="validarCheck()" style="width:20px; height:20px; margin:0">
                <label for="check-legal">Acepto la protección de datos y el tratamiento de información según la normativa española (RGPD).</label>
            </div>
            <button id="btn-final" disabled class="w-full bg-white/10 text-white/20 py-5 rounded-2xl font-black uppercase text-sm">Efectuar Pedido</button>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbysDVL_3M-2AfW5eGS8chw3KB3uFIXJU9kVltWHOQF0Lo9mzcBBn6nQwVy1mrkaH2tZ/exec';
        let db = { menu: [], restaurantes: [] };
        let cesta = [];
        let rActivo = { id: null, nombre: "" };
        let platoTemp = { base: 0, total: 0 };

        async function init() {
            try {
                const res = await fetch(scriptURL);
                const data = await res.json();
                db.restaurantes = data.RESTAURANTES || [];
                db.menu = data.MENU_GENERAL || [];
                document.getElementById('loader').style.display = 'none';
                renderHome();
            } catch (e) { console.error("Error al cargar"); }
        }

        function renderHome() {
            let html = `<p class="text-[9px] font-black text-white/30 uppercase tracking-widest mb-6 text-left">Selecciona un Restaurante</p>`;
            db.restaurantes.forEach(r => {
                html += `
                <div class="relative rounded-[2rem] overflow-hidden h-[160px] mb-4 border border-white/5" onclick="verMenu('${r.NOMBRE_RESTAURANTE}', '${r.ID_RESTAURANTE}')">
                    <img src="${r.FOTO}" class="absolute inset-0 w-full h-full object-cover opacity-60">
                    <div class="absolute inset-0 bg-gradient-to-t from-dark to-transparent"></div>
                    <div class="absolute bottom-6 left-6 text-left">
                        <p class="text-cyan-400 text-[8px] font-black uppercase mb-1 tracking-widest">${r.CATEGORIA || 'Premium'}</p>
                        <h2 class="text-xl font-black italic uppercase">${r.NOMBRE_RESTAURANTE}</h2>
                    </div>
                </div>`;
            });
            document.getElementById('app-container').innerHTML = html;
        }

        function verMenu(nombre, id) {
            const platos = db.menu.filter(p => String(p.ID_RESTAURANTE) === String(id));
            const cats = [...new Set(platos.map(p => p.CATEGORIA || "General"))];
            let html = `
                <div class="flex items-center gap-4 mb-4 text-left">
                    <button onclick="renderHome()" class="w-9 h-9 rounded-lg bg-white/5 border border-white/10 text-cyan-400">←</button>
                    <h2 class="text-md font-bold uppercase italic">${nombre}</h2>
                </div>
                <div class="category-bar">
                    <div class="cat-chip active" onclick="filtrarCat('TODOS', this)">Todos</div>
                    ${cats.map(c => `<div class="cat-chip" onclick="filtrarCat('${c}', this)">${c}</div>`).join('')}
                </div>
                <div id="lista-platos" class="mt-4">`;
            
            cats.forEach(cat => {
                platos.filter(p => (p.CATEGORIA || "General") === cat).forEach(p => {
                    html += `
                    <div class="plato-card" data-cat="${cat}" onclick='abrirDetalle(${JSON.stringify(p).replace(/'/g, "&apos;")})'>
                        <div class="text-left flex-1 pr-4">
                            <h4 class="font-bold text-[13px] uppercase mb-2">${p.PLATO}</h4>
                            <span class="bg-cyan-400 text-dark px-3 py-1 rounded-lg font-black text-[10px]">${parseFloat(p.PRECIO).toFixed(2)}€</span>
                        </div>
                        <img src="${p.FOTO_PLATO}" class="w-16 h-16 rounded-xl object-cover">
                    </div>`;
                });
            });
            document.getElementById('app-container').innerHTML = html + `</div>`;
        }

        function filtrarCat(cat, el) {
            document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.plato-card').forEach(p => {
                p.classList.toggle('hidden-plato', cat !== 'TODOS' && p.getAttribute('data-cat') !== cat);
            });
        }

        function abrirDetalle(p) {
            if (rActivo.id && rActivo.id !== String(p.ID_RESTAURANTE)) {
                if(!confirm(`¿Vaciar cesta de ${rActivo.nombre}?`)) return;
                vaciarCesta(false);
            }
            platoTemp.base = parseFloat(p.PRECIO);
            platoTemp.total = platoTemp.base;
            document.getElementById('modal-titulo').innerText = p.PLATO;
            document.getElementById('modal-desc').innerText = p.DESCRIPCION || "";
            document.getElementById('modal-img').src = p.FOTO_PLATO;
            document.getElementById('modal-precio-base').innerText = platoTemp.base.toFixed(2) + "€";
            document.getElementById('total-modal-btn').innerText = platoTemp.total.toFixed(2) + "€";
            
            let extraHtml = "";
            if(p.EXTRAS) {
                extraHtml = `<p class="text-[10px] font-black text-cyan-400 uppercase tracking-widest text-left mb-4">Extras</p>`;
                p.EXTRAS.split(',').forEach(ex => {
                    const [n, pr] = ex.split(':');
                    const price = parseFloat(pr || 0);
                    extraHtml += `
                    <div class="flex justify-between items-center py-3 border-b border-white/5">
                        <div class="text-left"><p class="text-xs font-bold uppercase">${n}</p><p class="text-[10px] text-red-500">+${price.toFixed(2)}€</p></div>
                        <div class="flex items-center gap-4 bg-white/5 rounded-lg p-1">
                            <div class="btn-control" onclick="updQty(this, -1, ${price})">−</div>
                            <span class="text-xs font-bold qty">0</span>
                            <div class="btn-control" onclick="updQty(this, 1, ${price})">+</div>
                        </div>
                    </div>`;
                });
            }
            document.getElementById('contenedor-pasos').innerHTML = extraHtml;
            document.getElementById('modal-plato').style.display = 'flex';
        }

        function updQty(el, change, price) {
            const span = el.parentElement.querySelector('.qty');
            let val = parseInt(span.innerText) + change;
            if(val >= 0) {
                span.innerText = val;
                platoTemp.total += (change * price);
                document.getElementById('total-modal-btn').innerText = platoTemp.total.toFixed(2) + "€";
            }
        }

        function vaciarCesta(render = true) {
            cesta = []; rActivo = { id: null, nombre: "" };
            document.getElementById('cesta-flotante').classList.add('hidden');
            if(render) renderHome();
        }

        function cerrarModal() { document.getElementById('modal-plato').style.display = 'none'; }
        function abrirCheckout() { document.getElementById('panel-checkout').style.display = 'flex'; }
        function cerrarCheckout() { document.getElementById('panel-checkout').style.display = 'none'; }
        
        function validarCheck() {
            const b = document.getElementById('btn-final');
            const c = document.getElementById('check-legal');
            b.disabled = !c.checked;
            b.className = c.checked ? "w-full bg-cyan-400 text-dark font-black py-5 rounded-2xl mt-8 uppercase text-sm" : "w-full bg-white/10 text-white/20 py-5 rounded-2xl font-black uppercase text-sm";
        }

        init();
    </script>
</body>
</html>
