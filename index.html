<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express Pro v61</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark: #020617; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: white; margin: 0; -webkit-tap-highlight-color: transparent; }
        .brand { font-family: 'Orbitron', sans-serif; }
        #modal-plato { position: fixed; inset: 0; background: var(--dark); z-index: 1000; display: none; flex-direction: column; overflow-y: auto; }
        .foto-header { width: 100%; height: 320px; object-fit: cover; }
        .precio-float { background: var(--cyan); padding: 10px 20px; border-radius: 15px; font-weight: 800; font-size: 1.2rem; box-shadow: 0 4px 15px rgba(6,182,212,0.4); }
        .opcion-unica { border: 2px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 15px; text-align: center; transition: all 0.3s; cursor: pointer; font-size: 0.8rem; font-weight: 600; }
        .opcion-unica.active { border-color: var(--cyan); background: rgba(6,182,212,0.1); color: var(--cyan); }
        .ingrediente-chip { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); font-size: 0.8rem; text-align: center; }
        .ingrediente-chip.selected { border-color: var(--cyan); background: rgba(6,182,212,0.1); color: var(--cyan); }
        .extra-precio { color: #ff4444; font-weight: 700; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header class="sticky top-0 z-50 bg-[#020617]/90 backdrop-blur-xl px-6 py-5 flex items-center justify-between border-b border-white/10">
        <div class="brand"><div class="text-2xl text-cyan-400 leading-none">AGUADULCE</div><div class="text-[10px] tracking-[0.4em] text-white/70 text-right">EXPRESS</div></div>
        <img src="apple-touch-icon.png" class="w-11 h-11 bg-white rounded-full p-1 border-2 border-cyan-400">
    </header>

    <main id="app-container" class="px-6 py-8">
        <div class="text-center p-20">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-cyan-400 mb-4"></div>
            <p class="brand text-[10px] text-cyan-400">CONECTANDO...</p>
        </div>
    </main>

    <div id="modal-plato">
        <button onclick="cerrarModal()" class="absolute top-6 left-6 z-50 bg-black/40 backdrop-blur-md w-12 h-12 rounded-2xl border border-white/10 text-white flex items-center justify-center">✕</button>
        <img id="modal-img" src="" class="foto-header">
        <div id="modal-contenido" class="px-6 py-8"></div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyutzaHTfEwHGnoWVy_ptlNg5vTU1GvwflEwU4-KIRt2q7CvU0tr_SacmnhakPTTJ_l/exec';
        let db = { restaurantes: [], menu: [] };

        async function cargarDatos() {
            try {
                const respuesta = await fetch(scriptURL);
                const data = await respuesta.json();
                db.restaurantes = data.RESTAURANTES || [];
                db.menu = data.MENU_GENERAL || [];
                renderizarRestaurantes();
            } catch (e) {
                document.getElementById('app-container').innerHTML = `<p class="text-center text-red-500 brand text-[10px]">ERROR DE CONEXIÓN</p>`;
            }
        }

        function renderizarRestaurantes() {
            const contenedor = document.getElementById('app-container');
            let html = `<h2 class="brand text-[10px] tracking-[0.3em] text-slate-500 uppercase mb-8 text-center">Restaurantes Disponibles</h2>`;
            db.restaurantes.forEach(rest => {
                html += `
                <div class="bg-gradient-to-br from-slate-800/40 to-slate-900/80 p-5 rounded-[2.2rem] flex items-center justify-between border border-white/5 mb-4 active:scale-95 transition-all shadow-xl" 
                     onclick="verMenuRestaurante('${rest.NOMBRE_RESTAURANTE}', '${rest.ID_RESTAURANTE}')">
                    <div class="flex items-center gap-5">
                        <img src="${rest.FOTO || 'https://via.placeholder.com/150'}" class="w-16 h-16 rounded-2xl object-cover border border-cyan-400/20">
                        <div class="text-left">
                            <h3 class="font-bold text-lg uppercase tracking-tight text-white leading-none mb-1">${rest.NOMBRE_RESTAURANTE}</h3>
                            <p class="text-[9px] text-cyan-400 font-bold uppercase tracking-widest">${rest.ESTADO || 'Abierto'}</p>
                        </div>
                    </div>
                    <div class="bg-cyan-500/10 w-10 h-10 rounded-2xl flex items-center justify-center"><span class="text-cyan-400 text-xl">→</span></div>
                </div>`;
            });
            contenedor.innerHTML = html;
        }

        function verMenuRestaurante(nombreRest, idRest) {
            const contenedor = document.getElementById('app-container');
            const platos = db.menu.filter(p => String(p.ID_RESTAURANTE) === String(idRest));
            let html = `
                <button onclick="renderizarRestaurantes()" class="text-cyan-400 text-[10px] brand mb-8 tracking-widest flex items-center gap-2"><span>←</span> VOLVER</button>
                <h2 class="brand text-2xl text-white mb-6 uppercase tracking-tight text-left border-l-4 border-cyan-400 pl-4">${nombreRest}</h2>
                <div class="grid gap-4">`;
            platos.forEach(plato => {
                html += `
                <div class="bg-white/5 p-4 rounded-[1.8rem] flex justify-between items-center border border-white/5 active:scale-95 transition-all" onclick="alert('Cargando ${plato.PLATO}...')">
                    <div class="flex-1 pr-4 text-left">
                        <div class="font-bold text-white text-sm uppercase leading-tight">${plato.PLATO}</div>
                        <div class="text-cyan-400 font-bold mt-2 text-lg">$${parseFloat(plato.PRECIO || 0).toFixed(2)}</div>
                    </div>
                    <img src="${plato.FOTO_PLATO || 'https://via.placeholder.com/100'}" class="w-20 h-20 rounded-2xl object-cover">
                </div>`;
            });
            contenedor.innerHTML = html + `</div>`;
        }

        function cerrarModal() { document.getElementById('modal-plato').style.display = 'none'; }

        cargarDatos();
    </script>
</body>
</html>
