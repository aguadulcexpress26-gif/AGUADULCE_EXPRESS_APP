<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express v84</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark: #020617; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: white; margin: 0; -webkit-tap-highlight-color: transparent; }
        
        /* Glassmorphism Header */
        header {
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            position: sticky; top: 0; z-index: 50;
        }

        /* Restaurantes Style */
        .card-rest {
            position: relative; overflow: hidden; border-radius: 2rem;
            height: 180px; border: 1px solid rgba(255,255,255,0.06);
            transition: transform 0.2s ease;
        }
        .card-rest:active { transform: scale(0.97); }
        .card-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
        .card-gradient {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(2,6,23,1) 10%, rgba(2,6,23,0.2) 100%);
        }

        /* Modal Smooth Slide */
        #modal-plato { 
            position: fixed; inset: 0; background: var(--dark); 
            z-index: 1000; display: none; flex-direction: column; 
            overflow-y: auto; animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .btn-cerrar { 
            position: absolute; top: 20px; left: 20px; z-index: 1010;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
            width: 40px; height: 40px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <header class="px-6 py-5 flex items-center gap-4">
        <div class="w-11 h-11 bg-white rounded-xl flex items-center justify-center border-2 border-cyan-400 shadow-[0_0_15px_rgba(6,182,212,0.4)]">
            <span class="text-dark font-black text-xl">A</span>
        </div>
        <div class="flex flex-col">
            <span class="font-extrabold text-2xl tracking-tight leading-none">AGUADULCE</span>
            <div class="flex items-center gap-2">
                 <span class="text-[9px] font-bold tracking-[0.4em] text-cyan-400 uppercase">Express</span>
                 <span class="bg-cyan-500/10 text-cyan-400 text-[7px] font-black px-1.5 py-0.5 rounded border border-cyan-400/20 uppercase">v84</span>
            </div>
        </div>
    </header>

    <main id="app-container" class="px-5 py-6">
        <div class="text-center py-24">
            <div class="inline-block animate-spin rounded-full h-6 w-6 border-t-2 border-cyan-400"></div>
            <p class="text-[10px] text-slate-500 mt-4 font-bold uppercase tracking-widest">Cargando Bóveda...</p>
        </div>
    </main>

    <div id="modal-plato">
        <button onclick="cerrarModal()" class="btn-cerrar text-white">✕</button>
        <img id="modal-img" src="" class="w-full h-[40vh] object-cover">
        <div class="px-7 py-8">
            <div id="modal-header-info"></div>
            <div id="modal-opciones" class="mt-8"></div>
            
            <div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-dark via-dark to-transparent">
                <button class="w-full bg-cyan-500 text-dark font-black py-5 rounded-[1.5rem] uppercase text-xs tracking-widest shadow-xl active:scale-95 transition-all">
                    Añadir al Pedido • <span id="modal-precio-btn">0.00</span>€
                </button>
            </div>
        </div>
    </div>

    <script>
        // URL de tu nueva cuenta actualizada
        const scriptURL = 'https://script.google.com/macros/s/AKfycbysDVL_3M-2AfW5eGS8chw3KB3uFIXJU9kVltWHOQF0Lo9mzcBBn6nQwVy1mrkaH2tZ/exec';
        let db = { restaurantes: [], menu: [] };

        async function cargarDatos() {
            try {
                const respuesta = await fetch(scriptURL);
                const data = await respuesta.json();
                
                // Función flexible que ya sabemos que funciona en v70
                const findSheet = (n) => data[Object.keys(data).find(k => k.toLowerCase().trim() === n.toLowerCase())] || [];
                
                db.restaurantes = findSheet('RESTAURANTES');
                db.menu = findSheet('MENU_GENERAL');
                
                renderizarRestaurantes();
            } catch (e) {
                document.getElementById('app-container').innerHTML = `<p class="text-center text-[10px] text-red-400 uppercase py-20 font-bold">Error de sincronización</p>`;
            }
        }

        function renderizarRestaurantes() {
            const contenedor = document.getElementById('app-container');
            let html = `<div class="mb-6 ml-1"><h2 class="text-[10px] tracking-[0.2em] text-slate-500 uppercase font-black">Establecimientos</h2></div>`;
            
            db.restaurantes.forEach(rest => {
                html += `
                <div class="card-rest mb-5 shadow-2xl" onclick="verMenuRestaurante('${rest.NOMBRE_RESTAURANTE}', '${rest.ID_RESTAURANTE}')">
                    <img src="${rest.FOTO || 'https://via.placeholder.com/600x400'}" class="card-img">
                    <div class="card-gradient"></div>
                    <div class="absolute top-4 right-5 bg-black/60 backdrop-blur-md px-3 py-1 rounded-full border border-white/10 text-[10px] font-bold">
                        <span class="text-amber-400">⭐</span> ${rest.CALIFICACION || '4.5'}
                    </div>
                    <div class="absolute bottom-5 left-6 text-left">
                        <p class="text-[8px] text-cyan-400 font-black uppercase tracking-[0.2em] mb-1">${rest.CATEGORIA || 'RESTAURANTE'}</p>
                        <h3 class="text-2xl font-black text-white tracking-tighter leading-none uppercase">${rest.NOMBRE_RESTAURANTE}</h3>
                    </div>
                </div>`;
            });
            contenedor.innerHTML = html;
        }

        function verMenuRestaurante(nombreRest, idRest) {
            const contenedor = document.getElementById('app-container');
            // Filtrado de IDs
            const platos = db.menu.filter(p => String(p.ID_RESTAURANTE).trim() === String(idRest).trim());
            
            let html = `
                <div class="flex items-center gap-4 mb-8">
                    <button onclick="renderizarRestaurantes()" class="bg-white/10 w-11 h-11 rounded-xl text-cyan-400 flex items-center justify-center border border-white/5">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"></path></svg>
                    </button>
                    <div>
                        <h2 class="text-xl font-black text-white uppercase tracking-tighter leading-none">${nombreRest}</h2>
                        <p class="text-[9px] text-cyan-400 font-bold uppercase tracking-widest mt-1">CARTA DISPONIBLE</p>
                    </div>
                </div>
                <div class="grid gap-3">`;

            if(platos.length === 0) {
                html += `<div class="py-20 text-slate-500 text-[10px] font-black uppercase tracking-widest text-center">No hay platos disponibles</div>`;
            }

            platos.forEach(plato => {
                html += `
                <div class="bg-white/5 p-4 rounded-[1.8rem] flex justify-between items-center border border-white/5 active:scale-95 transition-all" 
                    onclick="abrirDetallePlato(${JSON.stringify(plato).replace(/"/g, '&quot;')})">
                    <div class="flex-1 pr-4 text-left">
                        <div class="font-bold text-white text-[11px] uppercase mb-1 leading-tight tracking-wide">${plato.PLATO}</div>
                        <div class="text-cyan-400 font-black text-lg tracking-tighter">${parseFloat(plato.PRECIO || 0).toFixed(2)}€</div>
                    </div>
                    <img src="${plato.FOTO_PLATO || 'https://via.placeholder.com/150'}" class="w-16 h-16 rounded-2xl object-cover border border-white/10 shadow-lg">
                </div>`;
            });
            contenedor.innerHTML = html + `</div>`;
            window.scrollTo(0,0);
        }

        function abrirDetallePlato(plato) {
            const modal = document.getElementById('modal-plato');
            const precio = parseFloat(plato.PRECIO || 0).toFixed(2);
            document.getElementById('modal-img').src = plato.FOTO_PLATO || '';
            document.getElementById('modal-header-info').innerHTML = `
                <h2 class="text-2xl font-black text-white tracking-tighter mb-2 uppercase leading-none">${plato.PLATO}</h2>
                <p class="text-slate-400 text-xs leading-relaxed mb-6 font-medium">${plato.DESCRIPCION || 'Preparado con la mejor calidad de Aguadulce Express.'}</p>
                <div class="text-3xl font-black text-cyan-400 tracking-tighter">${precio}€</div>
            `;
            document.getElementById('modal-precio-btn').innerText = precio;
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function cerrarModal() {
            document.getElementById('modal-plato').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        cargarDatos();
    </script>
</body>
</html>
