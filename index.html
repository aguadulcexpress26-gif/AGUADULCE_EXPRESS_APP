<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express Pro v97</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark: #020617; --red: #ef4444; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--dark) !important; color: white; margin: 0; 
            -webkit-tap-highlight-color: transparent; letter-spacing: -0.015em; 
        }

        /* BARRA DE CATEGORÍAS */
        .category-bar {
            display: flex; gap: 10px; overflow-x: auto; padding: 10px 0;
            scrollbar-width: none; white-space: nowrap;
        }
        .category-bar::-webkit-scrollbar { display: none; }
        .cat-chip {
            padding: 8px 18px; background: rgba(255,255,255,0.05);
            border-radius: 12px; font-size: 0.7rem; font-weight: 800;
            text-transform: uppercase; border: 1px solid rgba(255,255,255,0.1);
        }
        .cat-chip.active { background: var(--cyan); color: var(--dark); border-color: var(--cyan); }

        .cat-separator {
            font-size: 0.75rem; font-weight: 800; color: var(--cyan);
            letter-spacing: 0.15em; text-transform: uppercase;
            margin: 30px 0 15px 0; display: flex; align-items: center; gap: 10px;
        }
        .cat-separator::after { content: ""; flex: 1; height: 1px; background: rgba(255,255,255,0.1); }

        .plato-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 1.5rem; padding: 15px; display: flex; align-items: center;
            justify-content: space-between; margin-bottom: 12px;
        }

        /* MODAL Y EXTRAS */
        #modal-plato { position: fixed; inset: 0; background: var(--dark); z-index: 1000; display: none; flex-direction: column; overflow-y: auto; }
        .extra-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .qty-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); border-radius: 8px; color: var(--cyan); font-weight: bold; }
        
        #cesta-flotante { 
            position: fixed; bottom: 20px; right: 15px; left: 15px; 
            background: var(--cyan); color: var(--dark); 
            padding: 15px 20px; border-radius: 20px; 
            display: none; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); z-index: 500;
        }
    </style>
</head>
<body>

    <header class="p-5 flex items-center justify-between bg-[#020617]/95 backdrop-blur-xl sticky top-0 z-50 border-b border-white/5">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center border-2 border-cyan-400 font-black text-dark text-lg">A</div>
            <div class="text-left">
                <h1 class="text-lg leading-none text-white font-bold italic uppercase">Aguadulce</h1>
                <p class="text-[8px] tracking-[0.4em] text-cyan-400 uppercase font-bold mt-1">Express Pro</p>
            </div>
        </div>
    </header>

    <main id="app-container" class="px-5 py-5 pb-32"></main>

    <div id="cesta-flotante">
        <div class="flex flex-col text-left flex-1" onclick="verCesta()">
            <span id="cesta-info" class="font-black text-sm uppercase italic">0 PRODUCTOS</span>
            <span id="cesta-total" class="text-[10px] font-bold opacity-80 uppercase tracking-widest">0.00€ TOTAL</span>
        </div>
        <div class="text-[#ef4444] font-black text-xl pl-4 border-l border-black/10" onclick="vaciarCesta()">✕</div>
    </div>

    <div id="modal-plato">
        <button onclick="cerrarModal()" class="absolute top-5 left-5 z-50 bg-black/50 backdrop-blur-md w-10 h-10 rounded-full text-white">✕</button>
        <img id="modal-img" src="" class="w-full h-[280px] object-cover border-b-2 border-cyan-400/20">
        <div class="px-6 py-8 pb-40">
            <div class="flex justify-between items-start mb-8 text-left">
                <div class="flex-1 pr-4">
                    <h2 id="modal-titulo" class="text-2xl uppercase font-black italic text-white leading-tight"></h2>
                    <p id="modal-desc" class="opacity-60 text-xs mt-2 leading-relaxed"></p>
                </div>
                <div id="modal-precio-base" class="bg-cyan-400 text-dark px-4 py-2 rounded-xl font-black text-lg">0€</div>
            </div>
            <div id="contenedor-pasos" class="space-y-10"></div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 p-5 bg-gradient-to-t from-dark via-dark/95 to-transparent">
            <button onclick="confirmarAnadir()" class="w-full bg-cyan-400 text-dark font-black py-5 rounded-2xl uppercase tracking-widest text-sm flex justify-between px-8 items-center">
                <span>Añadir al pedido</span>
                <span id="total-modal-btn">0.00€</span>
            </button>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbysDVL_3M-2AfW5eGS8chw3KB3uFIXJU9kVltWHOQF0Lo9mzcBBn6nQwVy1mrkaH2tZ/exec';
        let db = { menu: [], restaurantes: [] };
        let cesta = [];
        let rActivo = { id: null, nombre: "" };
        let subtotalActual = 0;
        let precioBasePlato = 0;

        async function init() {
            try {
                const res = await fetch(scriptURL);
                const data = await res.json();
                db.restaurantes = data.RESTAURANTES || [];
                db.menu = data.MENU_GENERAL || [];
                renderHome();
            } catch (e) { console.error("Error crítico"); }
        }

        function renderHome() {
            let html = `<div class="mb-5 text-left text-slate-500 text-[9px] uppercase font-bold tracking-widest px-1">Restaurantes</div>`;
            db.restaurantes.forEach(r => {
                html += `
                <div class="relative rounded-[2rem] overflow-hidden h-[160px] mb-4" onclick="verMenu('${r.NOMBRE_RESTAURANTE}', '${r.ID_RESTAURANTE}')">
                    <img src="${r.FOTO}" class="absolute inset-0 w-full h-full object-cover opacity-70">
                    <div class="absolute inset-0 bg-gradient-to-t from-dark via-transparent"></div>
                    <div class="absolute bottom-5 left-6 text-left">
                        <p class="text-cyan-400 text-[8px] font-black uppercase mb-1 tracking-widest">${r.CATEGORIA || 'Gourmet'}</p>
                        <h3 class="text-lg italic font-black uppercase text-white">${r.NOMBRE_RESTAURANTE}</h3>
                    </div>
                </div>`;
            });
            document.getElementById('app-container').innerHTML = html;
        }

        function verMenu(nombre, id) {
            const platos = db.menu.filter(p => String(p.ID_RESTAURANTE) === String(id));
            const cats = [...new Set(platos.map(p => p.CATEGORIA || "General"))];
            
            let html = `
                <div class="flex items-center gap-4 mb-4 text-left">
                    <button onclick="renderHome()" class="w-9 h-9 rounded-lg bg-white/5 border border-white/10 text-cyan-400">←</button>
                    <h2 class="text-md text-white font-bold uppercase italic">${nombre}</h2>
                </div>
                <div class="category-bar mb-6">
                    <div class="cat-chip active" onclick="filtrarCat('TODOS', this)">Todos</div>
                    ${cats.map(c => `<div class="cat-chip" onclick="filtrarCat('${c}', this)">${c}</div>`).join('')}
                </div>
                <div id="lista-platos">`;
            
            cats.forEach(cat => {
                html += `<div class="cat-separator" id="section-${cat.replace(/\s/g, '')}">${cat}</div>`;
                platos.filter(p => (p.CATEGORIA || "General") === cat).forEach(p => {
                    html += `
                    <div class="plato-card" onclick='abrirDetalle(${JSON.stringify(p).replace(/'/g, "&apos;")})'>
                        <div class="text-left flex-1 pr-4">
                            <h4 class="font-bold text-white text-[13px] uppercase mb-2 leading-tight">${p.PLATO}</h4>
                            <span class="bg-cyan-400 text-dark px-3 py-1 rounded-lg font-black text-xs">${parseFloat(p.PRECIO).toFixed(2)}€</span>
                        </div>
                        <img src="${p.FOTO_PLATO}" class="w-16 h-16 rounded-xl object-cover">
                    </div>`;
                });
            });
            html += `</div>`;
            document.getElementById('app-container').innerHTML = html;
            window.scrollTo(0,0);
        }

        function filtrarCat(cat, el) {
            document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            if(cat === 'TODOS') { window.scrollTo({ top: 0, behavior: 'smooth' }); }
            else {
                const target = document.getElementById(`section-${cat.replace(/\s/g, '')}`);
                if(target) window.scrollTo({ top: target.offsetTop - 100, behavior: 'smooth' });
            }
        }

        function abrirDetalle(p) {
            if (rActivo.id && rActivo.id !== String(p.ID_RESTAURANTE)) {
                if(!confirm(`¿Vaciar cesta de ${rActivo.nombre}?`)) return;
                vaciarCesta();
            }
            precioBasePlato = parseFloat(p.PRECIO);
            subtotalActual = precioBasePlato;
            
            document.getElementById('modal-titulo').innerText = p.PLATO;
            document.getElementById('modal-desc').innerText = p.DESCRIPCION || "";
            document.getElementById('modal-img').src = p.FOTO_PLATO;
            document.getElementById('modal-precio-base').innerText = precioBasePlato.toFixed(2) + "€";
            actualizarTotalBtn();

            let html = "";
            const renderSeccion = (titulo, datos, tipo) => {
                if(!datos) return "";
                let res = `<div class="text-left"><span class="text-[10px] font-black text-cyan-400 uppercase tracking-widest block mb-4">${titulo}</span>`;
                if(tipo === 'grid') {
                    res += `<div class="grid grid-cols-2 gap-2">`;
                    datos.split(',').forEach((d, i) => {
                        res += `<div class="border-2 border-white/10 p-4 rounded-xl text-center text-[10px] font-bold uppercase ${i===0?'border-cyan-400 bg-cyan-400/10 text-cyan-400':''}" onclick="selectUnica(this)">${d.trim()}</div>`;
                    });
                    res += `</div>`;
                } else {
                    res += `<div class="space-y-2">`;
                    datos.split(',').forEach(d => {
                        const [nombre, precio] = d.split(':');
                        const pReal = parseFloat(precio || 0);
                        res += `
                        <div class="extra-row">
                            <div class="flex flex-col">
                                <span class="text-[11px] font-bold uppercase">${nombre.trim()}</span>
                                <span class="text-[10px] font-bold text-[#ef4444]">+${pReal.toFixed(2)}€</span>
                            </div>
                            <div class="flex items-center gap-4 bg-white/5 p-1 rounded-xl">
                                <div class="qty-btn" onclick="updateQty(this, -1, ${pReal})">−</div>
                                <span class="text-sm font-black qty">0</span>
                                <div class="qty-btn" onclick="updateQty(this, 1, ${pReal})">+</div>
                            </div>
                        </div>`;
                    });
                    res += `</div>`;
                }
                return res + `</div>`;
            };

            html += renderSeccion("Selección Obligatoria", p.SELECCION_OBLIGATORIA, 'grid');
            html += renderSeccion("Extras Disponibles", p.EXTRAS, 'lista');
            
            document.getElementById('contenedor-pasos').innerHTML = html;
            document.getElementById('modal-plato').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function updateQty(el, change, precio) {
            const qtySpan = el.parentElement.querySelector('.qty');
            let current = parseInt(qtySpan.innerText);
            if(current + change >= 0) {
                qtySpan.innerText = current + change;
                subtotalActual += (change * precio);
                actualizarTotalBtn();
            }
        }

        function actualizarTotalBtn() {
            document.getElementById('total-modal-btn').innerText = subtotalActual.toFixed(2) + "€";
        }

        function selectUnica(el) {
            el.parentElement.querySelectorAll('div').forEach(d => {
                d.classList.remove('border-cyan-400', 'bg-cyan-400/10', 'text-cyan-400');
            });
            el.classList.add('border-cyan-400', 'bg-cyan-400/10', 'text-cyan-400');
        }

        function cerrarModal() { 
            document.getElementById('modal-plato').style.display = 'none'; 
            document.body.style.overflow = 'auto'; 
        }

        init();
    </script>
</body>
</html>
