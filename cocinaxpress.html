<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Cocina Aguadulce</title>
</head>
<body class="bg-[#0b1120] text-slate-100 p-4 font-sans">

    <audio id="alerta" loop src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <div class="max-w-xl mx-auto">
        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-slate-900 border border-emerald-500/30 p-4 rounded-3xl shadow-lg">
                <p class="text-[10px] text-emerald-400 font-bold uppercase tracking-widest text-center">Venta Hoy</p>
                <h2 id="ventaHoy" class="text-2xl font-black italic text-center">0.00€</h2>
            </div>
            <div class="bg-slate-900 border border-cyan-500/30 p-4 rounded-3xl shadow-lg">
                <p class="text-[10px] text-cyan-400 font-bold uppercase tracking-widest text-center">Venta Semana</p>
                <h2 id="ventaSemana" class="text-2xl font-black italic text-center">0.00€</h2>
            </div>
        </div>

        <div id="lista" class="space-y-4">
            <p class="text-center text-slate-500 mt-10">Conectando con el servidor...</p>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/95 hidden items-center justify-center p-6 z-50 backdrop-blur-md">
        <div class="bg-slate-900 w-full rounded-[2.5rem] border border-white/10 p-8 shadow-2xl">
            <h2 id="m-id" class="text-cyan-400 font-black text-2xl mb-2"></h2>
            <p id="m-cliente" class="text-white font-bold text-lg mb-1"></p>
            <a id="m-telf" href="#" class="text-cyan-500 font-bold underline block mb-6"></a>
            
            <div class="bg-white/5 p-4 rounded-2xl border border-white/5 mb-8">
                <p class="text-[10px] text-slate-500 font-bold uppercase mb-2">Detalles del Pedido</p>
                <p id="m-detalle" class="text-sm text-slate-300 leading-relaxed"></p>
            </div>
            <button onclick="cerrarModal()" class="w-full bg-slate-800 py-4 rounded-2xl font-bold">CERRAR DETALLES</button>
        </div>
    </div>

    <script>
        // Pega AQUÍ tu URL de la imagen
        const scriptURL = "https://script.google.com/macros/s/AKfycbzmIW4rvilG6rCN7NbT-sQw-VniY0PDyi7wxQuBYbmDXOGbMup8J4tMEu99uqwzMHuq/exec"; 
        const MI_ID_REST = "RT33M5";
        let pedidosActivos = [];
        let aceptados = new Set();

        async function cargar() {
            try {
                const urlCompleta = `${scriptURL}?action=leerCocina&idRest=${MI_ID_REST}`;
                const r = await fetch(urlCompleta);
                const data = await r.json();
                
                if(data.error) throw new Error(data.error);

                pedidosActivos = data.pedidos;
                document.getElementById('ventaHoy').innerText = data.stats.diaria + "€";
                document.getElementById('ventaSemana').innerText = data.stats.semanal + "€";

                // Alerta sonora (punto 4)
                const nuevos = pedidosActivos.some(p => !aceptados.has(p.ID_PEDIDO));
                if(nuevos && pedidosActivos.length > 0) {
                    document.getElementById('alerta').play().catch(()=>{});
                } else {
                    document.getElementById('alerta').pause();
                }

                render();
            } catch (e) {
                document.getElementById('lista').innerHTML = `<p class="text-center text-red-500 italic">Error de conexión: ${e.message}</p>`;
            }
        }

        function render() {
            const cont = document.getElementById('lista');
            if (pedidosActivos.length === 0) {
                cont.innerHTML = '<p class="text-center text-slate-500 mt-10 italic">No hay pedidos pendientes...</p>';
                return;
            }
            cont.innerHTML = pedidosActivos.map(p => `
                <div class="bg-slate-900 p-5 rounded-[2rem] border border-white/5 shadow-xl">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="text-cyan-400 font-black text-xl">#${p.ID_PEDIDO}</span>
                            <h2 class="font-bold text-white uppercase text-sm">${p.CLIENTE}</h2>
                        </div>
                        <div class="text-right">
                            <p class="text-xl font-black text-white">${parseFloat(p.TOTAL || 0).toFixed(2)}€</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="aceptar('${p.ID_PEDIDO}')" class="py-3 rounded-xl text-[10px] font-bold uppercase ${aceptados.has(p.ID_PEDIDO) ? 'bg-slate-800 text-slate-500' : 'bg-white text-black'}">
                            ${aceptados.has(p.ID_PEDIDO) ? 'ACEPTADO' : 'ACEPTAR'}
                        </button>
                        <button onclick="ver('${p.ID_PEDIDO}')" class="bg-slate-800 text-cyan-400 py-3 rounded-xl text-[10px] font-bold uppercase border border-cyan-400/20 text-center">DETALLES</button>
                        <button onclick="listo('${p.ID_PEDIDO}')" class="bg-cyan-500 text-black py-3 rounded-xl text-[10px] font-bold uppercase">LISTO</button>
                    </div>
                </div>
            `).join('');
        }

        function aceptar(id) {
            aceptados.add(id);
            document.getElementById('alerta').pause();
            render();
        }

        function ver(id) {
            const p = pedidosActivos.find(x => x.ID_PEDIDO === id);
            document.getElementById('m-id').innerText = "#" + p.ID_PEDIDO;
            document.getElementById('m-cliente').innerText = p.CLIENTE;
            // Usamos WHATSAPP tal como sale en tu JSON de la imagen
            document.getElementById('m-telf').innerText = p.WHATSAPP || "Sin Teléfono";
            document.getElementById('m-telf').href = "tel:" + p.WHATSAPP;
            document.getElementById('m-detalle').innerText = p.PEDIDO_DETALLE;
            document.getElementById('modal').style.display = 'flex';
        }

        function cerrarModal() {
            document.getElementById('modal').style.display = 'none';
        }

        async function listo(id) {
            if(!confirm("¿Pedido terminado?")) return;
            pedidosActivos = pedidosActivos.filter(p => p.ID_PEDIDO !== id);
            render();
            fetch(`${scriptURL}?action=marcarListo&idPedido=${id}`);
        }

        setInterval(cargar, 8000);
        cargar();
    </script>
</body>
</html>
