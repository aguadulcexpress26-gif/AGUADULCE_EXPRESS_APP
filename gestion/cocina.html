<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Cocina App</title>
</head>
<body class="bg-[#0a0f1a] text-white p-4">
    <div class="bg-[#1a2235] p-5 rounded-3xl mb-6 flex justify-between items-center shadow-2xl">
        <div>
            <h1 class="text-cyan-400 font-black italic text-xl">COCINA APP</h1>
            <p id="local-info" class="text-[10px] text-slate-400 font-bold uppercase"></p>
        </div>
        <button onclick="localStorage.clear(); location.href='index.html'" class="bg-rose-500/20 text-rose-500 p-3 rounded-2xl text-xs font-bold uppercase">Salir</button>
    </div>

    <div id="lista-pedidos" class="grid gap-6"></div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbzmIW4rvilG6rCN7NbT-sQw-VniY0PDyi7wxQuBYbmDXOGbMup8J4tMEu99uqwzMHuq/exec";
        const auth = localStorage.getItem('ag_auth');
        const rol = localStorage.getItem('ag_rol');

        if(!auth || rol !== "PARTNER") window.location.href="index.html";
        document.getElementById('local-info').innerText = localStorage.getItem('ag_nombre') + " | ID: " + localStorage.getItem('ag_idRest');

        async function cargar() {
            try {
                const res = await fetch(`${scriptURL}?action=leerRestaurante&auth=${auth}`);
                const pedidos = await res.json();
                const cont = document.getElementById('lista-pedidos');
                
                cont.innerHTML = pedidos.map(p => `
                    <div class="bg-[#1a2235] rounded-[2.5rem] p-6 border border-white/5 relative overflow-hidden">
                        <div class="flex justify-between items-center mb-4">
                            <span class="bg-cyan-500 text-slate-900 px-4 py-1 rounded-full font-black text-sm">#${p.ID_PEDIDO}</span>
                            <span class="text-xs text-slate-400 font-bold">${p.FECHA}</span>
                        </div>
                        <div class="mb-4">
                            <h2 class="text-xl font-black">${p.CLIENTE}</h2>
                            <p class="text-cyan-400 font-bold text-xs">${p.DIRECCION}</p>
                        </div>
                        <div class="bg-black/20 p-4 rounded-2xl mb-4 text-sm italic text-slate-300 border-l-4 border-cyan-500">
                            ${p.PEDIDO_DETALLE}
                        </div>
                        <div class="flex justify-between items-center mb-6">
                            <span class="text-2xl font-black">${p.TOTAL}€</span>
                            <span class="text-xs font-bold text-emerald-400 uppercase">${p.REPARTIDOR || 'Buscando repartidor...'}</span>
                        </div>
                        ${p.ESTADO === 'en proceso' ? 
                            `<button onclick="cambiar('${p.ID_PEDIDO}','LISTO')" class="w-full bg-white text-slate-900 font-black py-4 rounded-2xl active:scale-95 transition-all uppercase italic">Marcar Pedido Listo</button>` : 
                            `<div class="text-center p-4 bg-emerald-500/10 text-emerald-500 rounded-2xl font-black uppercase italic">${p.ESTADO}</div>`
                        }
                    </div>
                `).join('') || "<div class='text-center py-20 opacity-20 font-black'>ESPERANDO PEDIDOS...</div>";
            } catch (e) { console.error(e); }
        }

        async function cambiar(id, estado) {
            await fetch(scriptURL, { method: 'POST', body: JSON.stringify({action:"actualizarEstado", idPedido:id, nuevoEstado:estado}) });
            cargar();
        }
        setInterval(cargar, 15000); cargar();
    </script>
</body>
</html>
