<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express v73</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark: #020617; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: white; margin: 0; -webkit-tap-highlight-color: transparent; }
        
        header { background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.08); }
        .logo-circle { width: 42px; height: 42px; background: white; border-radius: 12px; padding: 2px; border: 2px solid var(--cyan); box-shadow: 0 0 15px rgba(6, 182, 212, 0.3); }

        .card-rest { position: relative; overflow: hidden; border-radius: 2.2rem; height: 180px; border: 1px solid rgba(255,255,255,0.06); transition: all 0.3s ease; }
        .card-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.85; }
        .card-gradient { position: absolute; inset: 0; background: linear-gradient(to top, rgba(2,6,23,1) 0%, rgba(2,6,23,0.3) 70%, transparent 100%); }

        #modal-plato { position: fixed; inset: 0; background: var(--dark); z-index: 1000; display: none; flex-direction: column; overflow-y: auto; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .extra-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 1.5rem; padding: 16px; transition: 0.2s; }
        .extra-card.selected { border-color: var(--cyan); background: rgba(6, 182, 212, 0.1); }
        
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <header class="sticky top-0 z-50 px-6 py-5 flex items-center gap-4">
        <img src="apple-touch-icon.png" class="logo-circle" onerror="this.src='https://via.placeholder.com/100?text=A'">
        <div class="flex flex-col text-left">
            <span class="font-black text-2xl tracking-tighter text-white leading-none uppercase">Aguadulce</span>
            <span class="text-[9px] font-bold tracking-[0.4em] text-cyan-400 uppercase">Express</span>
        </div>
    </header>

    <main id="app-container" class="px-5 py-6 pb-24 text-center">
        <div class="py-32">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-cyan-400"></div>
        </div>
    </main>

    <div id="modal-plato">
        <button onclick="cerrarModal()" class="absolute top-6 left-6 z-[1010] bg-black/50 backdrop-blur-md w-11 h-11 rounded-2xl flex items-center justify-center text-white border border-white/10">✕</button>
        <img id="modal-img" src="" class="w-full h-[35vh] object-cover">
        
        <div class="px-7 py-8 pb-40">
            <div id="modal-info" class="text-left"></div>
            <div id="modal-extras" class="mt-8 space-y-4"></div>
            
            <div class="mt-10 flex items-center justify-between bg-white/5 p-5 rounded-[2rem] border border-white/10">
                <span class="font-black text-[10px] uppercase tracking-widest text-slate-500 ml-2">Unidades</span>
                <div class="flex items-center gap-6">
                    <button onclick="updateQty(-1)" class="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center text-xl font-bold border border-white/10">-</button>
                    <span id="qty-display" class="text-2xl font-black text-cyan-400">1</span>
                    <button onclick="updateQty(1)" class="w-12 h-12 rounded-2xl bg-cyan-500 text-dark flex items-center justify-center text-xl font-black">+</button>
                </div>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 p-7 bg-gradient-to-t from-dark via-dark to-transparent">
            <button class="w-full bg-cyan-500 text-dark font-black py-6 rounded-[2.2rem] uppercase text-xs tracking-widest shadow-xl active:scale-95 transition-all">
                Añadir • <span id="total-val">0.00</span>€
            </button>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyutzaHTfEwHGnoWVy_ptlNg5vTU1GvwflEwU4-KIRt2q7CvU0tr_SacmnhakPTTJ_l/exec';
        let db = { rest: [], menu: [] };
        let activeItem = null, qty = 1, extras = [];

        async function init() {
            try {
                const res = await fetch(scriptURL);
                const data = await res.json();
                const getSheet = (n) => data[Object.keys(data).find(k => k.toLowerCase().trim() === n.toLowerCase())] || [];
                db.rest = getSheet('RESTAURANTES');
                db.menu = getSheet('MENU_GENERAL');
                renderHome();
            } catch (e) {
                document.getElementById('app-container').innerHTML = `<p class="py-20 text-red-400 uppercase text-[10px] font-black">Error de conexión</p>`;
            }
        }

        function renderHome() {
            const container = document.getElementById('app-container');
            let html = `<div class="mb-7 ml-1 text-left"><h2 class="text-[10px] tracking-[0.2em] text-slate-500 uppercase font-black">Restaurantes Disponibles</h2></div>`;
            db.rest.forEach(r => {
                html += `
                <div class="card-rest mb-6 shadow-2xl" onclick="showMenu('${r.NOMBRE_RESTAURANTE}', '${r.ID_RESTAURANTE}')">
                    <img src="${r.FOTO || 'https://via.placeholder.com/800x400'}" class="card-img">
                    <div class="card-gradient"></div>
                    <div class="absolute bottom-6 left-7 right-7 text-left">
                        <p class="text-[8px] text-cyan-400 font-black uppercase tracking-[0.2em] mb-1">${r.CATEGORIA || 'DELI'}</p>
                        <h3 class="text-2xl font-black text-white uppercase tracking-tighter leading-none">${r.NOMBRE_RESTAURANTE}</h3>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        function showMenu(name, id) {
            const container = document.getElementById('app-container');
            // Limpiamos los IDs para asegurar que coincidan (ej: "6G4L1V" === "6G4L1V ")
            const items = db.menu.filter(m => String(m.ID_RESTAURANTE).trim() === String(id).trim());

            let html = `
                <div class="flex items-center gap-5 mb-8 text-left">
                    <button onclick="renderHome()" class="bg-white/5 w-12 h-12 rounded-2xl border border-white/10 text-cyan-400 flex items-center justify-center">←</button>
                    <div><h2 class="text-2xl font-black text-white uppercase tracking-tighter leading-none">${name}</h2><p class="text-[9px] text-cyan-400 font-black uppercase tracking-widest mt-1">Nuestra Carta</p></div>
                </div>
                <div class="grid gap-4">`;

            if(items.length === 0) {
                html += `<p class="py-10 text-slate-500 uppercase text-[10px] font-bold">Próximamente disponible...</p>`;
            }

            items.forEach(item => {
                html += `
                <div class="bg-gradient-to-r from-white/5 to-transparent p-4 rounded-[1.8rem] flex justify-between items-center border border-white/5 active:scale-95 transition-all shadow-xl" 
                     onclick='openItem(${JSON.stringify(item).replace(/'/g, "&apos;")})'>
                    <div class="text-left flex-1 pr-4">
                        <div class="font-bold text-white text-xs uppercase mb-1.5 leading-snug">${item.PLATO}</div>
                        <div class="text-cyan-400 font-black text-lg">${parseFloat(item.PRECIO || 0).toFixed(2)}€</div>
                    </div>
                    <img src="${item.FOTO_PLATO || 'https://via.placeholder.com/200'}" class="w-16 h-16 rounded-2xl object-cover shadow-lg border border-white/10">
                </div>`;
            });
            container.innerHTML = html + `</div>`;
            window.scrollTo(0,0);
        }

        function openItem(item) {
            activeItem = item; qty = 1; extras = [];
            const modal = document.getElementById('modal-plato');
            document.getElementById('modal-img').src = item.FOTO_PLATO || 'https://via.placeholder.com/600x400';
            document.getElementById('modal-info').innerHTML = `
                <h2 class="text-2xl font-black text-white uppercase tracking-tighter mb-2 leading-none">${item.PLATO}</h2>
                <p class="text-slate-400 text-xs leading-relaxed mb-6">${item.DESCRIPCION || 'Calidad premium garantizada.'}</p>
                <div class="text-2xl font-black text-cyan-400">${parseFloat(item.PRECIO || 0).toFixed(2)}€</div>
            `;

            let exHtml = '';
            if(item.EXTRAS) {
                exHtml = `<h4 class="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-4">Añadir extras</h4><div class="grid gap-3">`;
                item.EXTRAS.split(',').forEach((ex, i) => {
                    const [n, p] = ex.split(':');
                    if(n && p) {
                        exHtml += `<div id="ex-${i}" onclick="toggleEx('${n.trim()}', ${p}, ${i})" class="extra-card flex justify-between items-center">
                            <span class="text-xs font-bold text-white uppercase">${n.trim()}</span>
                            <span class="text-xs font-black text-cyan-400">+${parseFloat(p).toFixed(2)}€</span>
                        </div>`;
                    }
                });
                exHtml += `</div>`;
            }
            document.getElementById('modal-extras').innerHTML = exHtml;
            
            calc();
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function toggleEx(n, p, i) {
            const idx = extras.findIndex(e => e.n === n);
            const el = document.getElementById(`ex-${i}`);
            if(idx > -1) { extras.splice(idx, 1); el.classList.remove('selected'); }
            else { extras.push({n, p}); el.classList.add('selected'); }
            calc();
        }

        function updateQty(v) { qty = Math.max(1, qty + v); document.getElementById('qty-display').innerText = qty; calc(); }

        function calc() {
            let total = (parseFloat(activeItem.PRECIO || 0) + extras.reduce((a, b) => a + b.p, 0)) * qty;
            document.getElementById('total-val').innerText = total.toFixed(2);
        }

        function cerrarModal() { document.getElementById('modal-plato').style.display = 'none'; document.body.style.overflow = 'auto'; }

        init();
    </script>
</body>
</html>
