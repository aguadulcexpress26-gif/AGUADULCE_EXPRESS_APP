<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express v106 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark: #020617; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark); color: white; margin: 0; -webkit-tap-highlight-color: transparent; }
        #loader { position: fixed; inset: 0; background: var(--dark); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(6,182,212,0.1); border-top-color: var(--cyan); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .brand-header { position: relative; height: 160px; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; }
        #header-bg { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0.8; }
        .brand-overlay { position: absolute; inset: 0; background: linear-gradient(to top, var(--dark), transparent); }
        .plato-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.5rem; padding: 15px; display: flex; align-items: center; gap: 15px; margin-bottom: 12px; }
        #modal-plato, #panel-checkout, #modal-legal, #modal-alerta-pro { position: fixed; inset: 0; background: var(--dark); z-index: 1000; display: none; flex-direction: column; overflow-y: auto; }
        .step-tag { font-weight: 800; font-size: 10px; text-transform: uppercase; color: var(--cyan); letter-spacing: 1px; margin-bottom: 10px; display: block; }
        .grid-option { border: 1px solid rgba(255,255,255,0.1); padding: 12px; text-align: center; font-size: 11px; font-weight: 600; border-radius: 12px; cursor: pointer; }
        .grid-option.selected { border-color: var(--cyan); background: rgba(6,182,212,0.1); color: var(--cyan); }
        input, select { background: rgba(255,255,255,0.05)!important; border: 1px solid rgba(255,255,255,0.1)!important; padding: 14px!important; border-radius: 12px!important; color: white!important; width: 100%; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner mb-4"></div>
        <p class="text-cyan-400 text-[10px] font-black uppercase">Sincronizando Aguadulce Express...</p>
    </div>

    <header class="brand-header">
        <div id="header-bg"></div>
        <div class="brand-overlay"></div>
        <div class="relative z-10 flex items-center gap-4">
            <img id="app-logo" src="" class="w-12 h-12 rounded-full border-2 border-cyan-400 bg-white">
            <div>
                <h1 class="text-xl font-black italic uppercase leading-none">Aguadulce</h1>
                <p class="text-cyan-400 text-[8px] font-black uppercase tracking-widest">Express</p>
            </div>
        </div>
    </header>

    <main id="app-container" class="px-5 py-6 pb-32"></main>

    <div id="cesta-flotante" class="fixed bottom-6 left-4 right-4 bg-cyan-400 text-black p-4 rounded-2xl hidden justify-between items-center z-[100] shadow-xl">
        <div class="flex-1" onclick="abrirCheckout()">
            <span id="cesta-info" class="font-black text-sm italic uppercase">🛒 0 PRODUCTOS</span>
            <span id="cesta-total" class="block text-[10px] font-bold uppercase">0.00€ TOTAL</span>
        </div>
        <div class="text-black/40 font-black text-xl pl-4 border-l border-black/10 cursor-pointer" onclick="confirmarVaciar()">✕</div>
    </div>

    <div id="modal-plato">
        <button onclick="cerrarModal()" class="absolute top-5 left-5 z-[1001] bg-black/60 w-10 h-10 rounded-full text-white">✕</button>
        <img id="modal-img" src="" class="w-full h-[220px] object-cover">
        <div class="p-6 pb-40 text-left">
            <div class="flex justify-between items-start mb-6">
                <div class="flex-1 pr-4">
                    <h2 id="modal-titulo" class="text-2xl font-black italic uppercase leading-tight"></h2>
                    <p id="modal-desc" class="text-white/50 text-xs mt-2"></p>
                </div>
                <div id="modal-precio-base" class="bg-cyan-400 text-black px-4 py-2 rounded-xl font-black text-lg">0€</div>
            </div>
            <div id="contenedor-pasos" class="space-y-8"></div>
        </div>
        <div class="fixed bottom-0 left-0 right-0 p-5 bg-gradient-to-t from-dark via-dark">
            <button id="btn-anadir-modal" onclick="confirmarAnadir()" class="w-full bg-cyan-400 text-black font-black py-5 rounded-2xl flex justify-between px-8">
                <span id="txt-anadir">Añadir al Carrito</span>
                <span id="total-modal-btn">0.00€</span>
            </button>
        </div>
    </div>

    <div id="modal-alerta-pro" class="fixed inset-0 z-[9000] hidden items-center justify-center p-6 bg-black/80 backdrop-blur-md">
        <div class="bg-[#020617] border border-white/10 p-8 rounded-[2.5rem] w-full max-w-sm text-center">
            <div class="w-16 h-16 bg-cyan-400/20 rounded-full flex items-center justify-center mx-auto mb-4">
                <span class="text-cyan-400 text-2xl">⚠️</span>
            </div>
            <h3 id="titulo-alerta" class="text-white font-black uppercase italic mb-2">Atención</h3>
            <p id="texto-alerta" class="text-[11px] text-white/60 mb-8 uppercase font-bold leading-relaxed"></p>
            <div id="contenedor-botones-alerta" class="flex flex-col gap-3"></div>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzmIW4rvilG6rCN7NbT-sQw-VniY0PDyi7wxQuBYbmDXOGbMup8J4tMEu99uqwzMHuq/exec';
        let db = { menu: [], restaurantes: [], config: {}, anuncios: [] };
        let cesta = [];
        let rActivo = { id: null, nombre: "" };
        let itemActual = { pBase: 0, pOpciones: 0, pExtras: 0, cantidad: 1, obligatorioOk: false, data: null };

        async function init() {
            try {
                const res = await fetch(scriptURL);
                const data = await res.json();
                // Filtro para evitar el cuadro negro de ADMIN o filas vacías
                db.restaurantes = data.RESTAURANTES.filter(r => r.NOMBRE_RESTAURANTE && r.NOMBRE_RESTAURANTE !== "ADMIN");
                db.menu = data.MENU_GENERAL;
                if(data.CONFIG && data.CONFIG[0]) {
                    document.getElementById('app-logo').src = data.CONFIG[0].LOGO_URL;
                    document.getElementById('header-bg').style.backgroundImage = `url('${data.CONFIG[0].FONDO_URL}')`;
                }
                document.getElementById('loader').style.display = 'none';
                renderHome();
            } catch (e) { console.error(e); }
        }

        function renderHome() {
            let html = `<p class="step-tag mb-6 ml-2 italic">Selecciona un restaurante</p>`;
            const ahora = new Date();
            const horaActual = ahora.getHours() * 100 + ahora.getMinutes();

            db.restaurantes.forEach(r => {
                const ape1 = parseInt((r.HORA_APERTURA_1 || "00:00").replace(':', ''));
                const cie1 = parseInt((r.HORA_CIERRE_1 || "00:00").replace(':', ''));
                const ape2 = parseInt((r.HORA_APERTURA_2 || "00:00").replace(':', ''));
                const cie2 = parseInt((r.HORA_CIERRE_2 || "00:00").replace(':', ''));
                const enHorario = ((horaActual >= ape1 && horaActual <= cie1) || (horaActual >= ape2 && horaActual <= cie2));
                const abierto = (r.ESTADO && r.ESTADO.toLowerCase().trim() === "abierto");

                if (enHorario && abierto) {
                    html += `
                    <div class="relative rounded-[2.5rem] overflow-hidden h-[160px] mb-5 border border-white/5 active:scale-95 transition-all" onclick="abrirTienda('${r.NOMBRE_RESTAURANTE}', '${r.ID_RESTAURANTE}')">
                        <img src="${r.FOTO}" class="absolute inset-0 w-full h-full object-cover opacity-70">
                        <div class="absolute inset-0 bg-gradient-to-t from-dark via-transparent"></div>
                        <div class="absolute bottom-6 left-8 text-left"><h2 class="text-2xl font-black italic uppercase">${r.NOMBRE_RESTAURANTE}</h2></div>
                    </div>`;
                } else {
                    html += `
                    <div class="relative rounded-[2.5rem] overflow-hidden h-[160px] mb-5 border border-white/5 grayscale opacity-40">
                        <img src="${r.FOTO}" class="absolute inset-0 w-full h-full object-cover">
                        <div class="absolute inset-0 bg-black/60 flex items-center justify-center"><p class="border-2 border-white px-4 py-1 text-[10px] font-black uppercase italic">Cerrado</p></div>
                    </div>`;
                }
            });
            document.getElementById('app-container').innerHTML = html;
        }

        function mostrarAviso(titulo, mensaje, esConfirmacion = false, callback = null) {
            const modal = document.getElementById('modal-alerta-pro');
            document.getElementById('titulo-alerta').innerText = titulo;
            document.getElementById('texto-alerta').innerText = mensaje;
            const btnCont = document.getElementById('contenedor-botones-alerta');
            
            if (esConfirmacion) {
                btnCont.innerHTML = `
                    <button onclick="${callback}()" class="w-full bg-cyan-400 text-black py-4 rounded-2xl font-black uppercase italic text-xs">Confirmar</button>
                    <button onclick="cerrarAvisoPro()" class="w-full bg-white/5 text-white py-4 rounded-2xl font-black uppercase italic text-xs">Cancelar</button>
                `;
            } else {
                btnCont.innerHTML = `<button onclick="cerrarAvisoPro()" class="w-full bg-cyan-400 text-black py-4 rounded-2xl font-black uppercase italic text-xs">Entendido</button>`;
            }
            modal.style.display = 'flex';
        }
        function cerrarAvisoPro() { document.getElementById('modal-alerta-pro').style.display = 'none'; }

        function abrirTienda(nombre, id) {
            if (cesta.length > 0 && String(rActivo.id) !== String(id)) {
                mostrarAviso("PEDIDO EN CURSO", `Tienes productos de "${rActivo.nombre}" en la cesta. Finaliza ese pedido o vacíalo para cambiar.`);
                return;
            }
            rActivo.id = id; rActivo.nombre = nombre; verMenu();
        }

        function verMenu() {
            const platos = db.menu.filter(p => String(p.ID_RESTAURANTE) === String(rActivo.id));
            let html = `<div class="flex items-center gap-4 mb-6"><button onclick="renderHome()" class="w-10 h-10 rounded-xl bg-white/5 text-cyan-400">←</button><h2 class="text-xl font-black uppercase italic">${rActivo.nombre}</h2></div><div class="space-y-4">`;
            platos.forEach(p => {
                html += `<div class="plato-card" onclick='abrirDetalle(${JSON.stringify(p).replace(/'/g, "&apos;")})'><div class="flex-1 text-left"><h4 class="font-black text-sm uppercase">${p.PLATO}</h4><p class="text-cyan-400 font-black text-xs">${parseFloat(p.PRECIO).toFixed(2)}€</p></div><img src="${p.FOTO_PLATO}" class="w-16 h-16 rounded-xl object-cover"></div>`;
            });
            document.getElementById('app-container').innerHTML = html + "</div>";
        }

        function abrirDetalle(p) {
            itemActual = { pBase: parseFloat(p.PRECIO), pOpciones: 0, pExtras: 0, cantidad: 1, obligatorioOk: !p.SELECCION_OBLIGATORIA, data: p };
            document.getElementById('modal-titulo').innerText = p.PLATO;
            document.getElementById('modal-desc').innerText = p.DESCRIPCION || "";
            document.getElementById('modal-img').src = p.FOTO_PLATO;
            document.getElementById('modal-precio-base').innerText = itemActual.pBase.toFixed(2) + "€";
            
            let html = "";
            const renderGrid = (titulo, datos, tipo) => {
                if(!datos) return "";
                let res = `<div class="text-left"><span class="step-tag">${titulo}</span><div class="grid grid-cols-2 gap-2">`;
                datos.split(',').forEach(d => {
                    const partes = d.split(':');
                    const nombre = partes[0].trim();
                    const precio = parseFloat(partes[1]) || 0;
                    res += `<div class="grid-option" onclick="toggleSel(this, ${precio}, '${tipo}')">${nombre}${precio > 0 ? ' +'+precio.toFixed(2)+'€' : ''}</div>`;
                });
                return res + `</div></div>`;
            };

            html += renderGrid("Obligatorio (Hasta 5)", p.SELECCION_OBLIGATORIA, 'oblig');
            html += renderGrid("Personalizar", p.SELECCION_UNICA, 'unica');

            if(p.EXTRAS) {
                html += `<div class="text-left"><span class="step-tag">Extras adicionales</span><div class="space-y-2">`;
                p.EXTRAS.split(',').forEach(d => {
                    const partes = d.split(':');
                    const nombre = partes[0].trim();
                    const precio = parseFloat(partes[1]) || 0;
                    html += `<div class="flex justify-between items-center py-3 border-b border-white/5"><span class="text-[11px] font-bold uppercase text-white/80">${nombre}</span><div class="flex items-center gap-4"><span class="text-cyan-400 font-black text-[10px]">+${precio.toFixed(2)}€</span><div class="flex items-center gap-3 bg-white/5 p-1 rounded-xl"><button onclick="updEx(this, -1, ${precio})" class="w-8 h-8 rounded-lg bg-white/5 text-white">-</button><span class="qty text-xs font-black">0</span><button onclick="updEx(this, 1, ${precio})" class="w-8 h-8 rounded-lg bg-cyan-400 text-black font-bold">+</button></div></div></div>`;
                });
                html += `</div></div>`;
            }
            document.getElementById('contenedor-pasos').innerHTML = html;
            document.getElementById('modal-plato').style.display = 'flex';
            actualizarBarraModal();
        }

        function toggleSel(el, pr, tipo) {
            if (tipo === 'oblig') {
                const seleccionados = el.parentElement.querySelectorAll('.selected').length;
                if (el.classList.contains('selected')) el.classList.remove('selected');
                else if (seleccionados < 5) el.classList.add('selected');
                else mostrarAviso("LÍMITE", "Máximo 5 opciones.");
            } else {
                el.parentElement.querySelectorAll('.grid-option').forEach(o => o.classList.remove('selected'));
                el.classList.add('selected');
            }
            
            let extraGrids = 0;
            document.querySelectorAll('.grid-option.selected').forEach(sel => {
                const text = sel.innerText;
                if(text.includes('+')) extraGrids += parseFloat(text.split('+')[1]) || 0;
            });
            itemActual.pOpciones = extraGrids;
            itemActual.obligatorioOk = !itemActual.data.SELECCION_OBLIGATORIA || document.querySelectorAll('#contenedor-pasos .grid-option.selected').length > 0;
            actualizarBarraModal();
        }

        function updEx(btn, mod, pr) {
            const span = btn.parentElement.querySelector('.qty');
            let val = parseInt(span.innerText) + mod;
            if(val >= 0) {
                span.innerText = val;
                itemActual.pExtras += (mod * pr);
                actualizarBarraModal();
            }
        }

        function actualizarBarraModal() {
            const total = (itemActual.pBase + itemActual.pOpciones + itemActual.pExtras) * itemActual.cantidad;
            document.getElementById('total-modal-btn').innerText = total.toFixed(2) + "€";
            const btn = document.getElementById('btn-anadir-modal');
            btn.disabled = !itemActual.obligatorioOk;
            btn.style.opacity = itemActual.obligatorioOk ? "1" : "0.3";
        }

        function confirmarAnadir() {
            let sel = [];
            document.querySelectorAll('.grid-option.selected').forEach(el => sel.push(el.innerText.split('+')[0].trim()));
            document.querySelectorAll('.qty').forEach(el => {
                const cant = parseInt(el.innerText);
                if(cant > 0) sel.push(`${cant}x ${el.closest('.flex').parentElement.querySelector('span').innerText}`);
            });
            const detalle = sel.length > 0 ? ` [${sel.join(', ')}]` : "";
            cesta.push({ nombre: `${itemActual.cantidad}x ${itemActual.data.PLATO}${detalle}`, total: (itemActual.pBase + itemActual.pOpciones + itemActual.pExtras) * itemActual.cantidad });
            actualizarCestaBar(); cerrarModal();
        }

        function actualizarCestaBar() {
            const total = cesta.reduce((acc, i) => acc + i.total, 0);
            document.getElementById('cesta-flotante').classList.toggle('hidden', cesta.length === 0);
            document.getElementById('cesta-info').innerText = `🛒 ${cesta.length} PRODUCTOS`;
            document.getElementById('cesta-total').innerText = `${total.toFixed(2)}€ TOTAL`;
        }
        function confirmarVaciar() { mostrarAviso("VACIAR", "¿Borrar cesta?", true, 'vaciarCesta'); }
        function vaciarCesta() { cesta = []; actualizarCestaBar(); cerrarAvisoPro(); }
        function cerrarModal() { document.getElementById('modal-plato').style.display = 'none'; }
        init();
    </script>
</body>
</html>
