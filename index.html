<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express Pro v66</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark: #020617; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: white; margin: 0; -webkit-tap-highlight-color: transparent; }
        .brand { font-family: 'Orbitron', sans-serif; }
        
        /* Tarjetas Optimizadas: Altura 185px para ver ~3 en pantalla */
        .card-rest {
            position: relative; overflow: hidden; border-radius: 1.8rem;
            height: 185px; 
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.3s ease;
        }
        .card-rest:active { transform: scale(0.97); border-color: var(--cyan); }
        
        .card-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .card-gradient {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(2,6,23,1) 5%, rgba(2,6,23,0.7) 45%, transparent 100%);
        }
        .card-content { position: absolute; bottom: 0; left: 0; right: 0; padding: 16px 20px; }
    </style>
</head>
<body>

    <header class="sticky top-0 z-50 bg-[#020617]/95 backdrop-blur-xl px-6 py-4 flex items-center justify-between border-b border-white/10 shadow-lg">
        <div class="brand">
            <div class="text-xl text-cyan-400 leading-none">AGUADULCE</div>
            <div class="text-[8px] tracking-[0.4em] text-white/50 text-right uppercase">Express</div>
        </div>
        <img src="apple-touch-icon.png" class="w-9 h-9 bg-white rounded-full p-1 border border-cyan-400">
    </header>

    <main id="app-container" class="px-5 py-6">
        <div class="text-center p-10">
            <div class="inline-block animate-spin rounded-full h-6 w-6 border-t-2 border-cyan-400 mb-4"></div>
            <p class="brand text-[8px] text-cyan-400 uppercase tracking-widest">Sincronizando Bóveda...</p>
        </div>
    </main>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyutzaHTfEwHGnoWVy_ptlNg5vTU1GvwflEwU4-KIRt2q7CvU0tr_SacmnhakPTTJ_l/exec';
        let db = { restaurantes: [], menu: [] };

        async function cargarDatos() {
            try {
                const respuesta = await fetch(scriptURL);
                const data = await respuesta.json();
                const findSheet = (n) => data[Object.keys(data).find(k => k.toLowerCase().trim() === n.toLowerCase())] || [];
                db.restaurantes = findSheet('RESTAURANTES');
                db.menu = findSheet('MENU_GENERAL');
                renderizarRestaurantes();
            } catch (e) {
                document.getElementById('app-container').innerHTML = `<p class="text-red-500 text-center brand text-[10px] p-10 uppercase">Error de conexión</p>`;
            }
        }

        function renderizarRestaurantes() {
            const contenedor = document.getElementById('app-container');
            let html = `<div class="mb-6 ml-1"><h2 class="brand text-[9px] tracking-[0.3em] text-slate-500 uppercase font-bold">Explorar Restaurantes</h2></div>`;
            
            db.restaurantes.forEach(rest => {
                const esAbierto = rest.ESTADO?.toLowerCase() === 'abierto';
                const calif = rest.CALIFICACION || '4.0'; 
                // Usará el horario de tu columna D (ej: 12:00-16:00 / 20:00-23:45)
                const horario = rest.HORARIO || 'Consultar Horario';

                html += `
                <div class="card-rest mb-5 shadow-2xl" onclick="verMenuRestaurante('${rest.NOMBRE_RESTAURANTE}', '${rest.ID_RESTAURANTE}')">
                    <img src="${rest.FOTO || 'https://via.placeholder.com/600x400'}" class="card-img">
                    <div class="card-gradient"></div>

                    <div class="absolute top-4 left-4">
                        <div class="bg-black/60 backdrop-blur-md px-2 py-1 rounded-lg border border-white/10 flex items-center gap-1">
                            <span class="text-amber-400 text-[10px]">⭐</span>
                            <span class="text-white font-bold text-[11px]">${calif}</span>
                        </div>
                    </div>

                    ${esAbierto ? `
                    <div class="absolute top-4 right-4 bg-cyan-500/20 text-cyan-400 px-3 py-1 rounded-full border border-cyan-400/20 backdrop-blur-md">
                        <div class="flex items-center gap-1.5">
                            <span class="relative flex h-1.5 w-1.5">
                                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-1.5 w-1.5 bg-cyan-500"></span>
                            </span>
                            <p class="text-[8px] font-bold uppercase tracking-[0.1em]">ABIERTO</p>
                        </div>
                    </div>` : ''}

                    <div class="card-content">
                        <p class="text-[8px] text-cyan-400/80 font-bold uppercase tracking-[0.2em] mb-0.5">${rest.CATEGORIA || 'GASTRONOMÍA'}</p>
                        <h3 class="brand text-lg uppercase tracking-tight text-white mb-1 leading-tight">${rest.NOMBRE_RESTAURANTE}</h3>
                        
                        <div class="flex items-center gap-1.5 text-slate-300">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-3 h-3 text-cyan-400/70">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                            <span class="text-[9px] font-medium tracking-wider text-white/70 uppercase">ABIERTOS: ${horario}</span>
                        </div>
                    </div>
                </div>`;
            });
            contenedor.innerHTML = html;
        }

        function verMenuRestaurante(nombreRest, idRest) {
            const contenedor = document.getElementById('app-container');
            const platos = db.menu.filter(p => String(p.ID_RESTAURANTE) === String(idRest));
            let html = `
                <div class="flex items-center gap-4 mb-8">
                    <button onclick="renderizarRestaurantes()" class="bg-white/5 p-3 rounded-2xl border border-white/10 text-cyan-400 shadow-lg active:scale-90 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">
                          <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
                        </svg>
                    </button>
                    <div>
                        <h2 class="brand text-xl text-white uppercase tracking-tight">${nombreRest}</h2>
                        <p class="text-[9px] text-cyan-400/60 font-bold tracking-[0.2em] uppercase">Menú Principal</p>
                    </div>
                </div>
                <div class="grid gap-4">`;

            platos.forEach(plato => {
                html += `
                <div class="bg-gradient-to-br from-white/10 to-transparent p-3 rounded-[1.5rem] flex justify-between items-center border border-white/5 active:scale-95 transition-all shadow-md" onclick="alert('Iniciando Punto 3 para: ${plato.PLATO}')">
                    <div class="flex-1 pr-4 text-left">
                        <div class="font-bold text-white text-xs uppercase leading-tight tracking-wide">${plato.PLATO}</div>
                        <div class="text-cyan-400 font-black mt-1.5 text-lg tracking-tighter">$${parseFloat(plato.PRECIO || 0).toFixed(2)}</div>
                    </div>
                    <img src="${plato.FOTO_PLATO || 'https://via.placeholder.com/150'}" class="w-16 h-16 rounded-[1.2rem] object-cover border border-white/10 shadow-lg">
                </div>`;
            });
            contenedor.innerHTML = html + `</div>`;
        }

        cargarDatos();
    </script>
</body>
</html>
