<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express v82</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark: #020617; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: white; margin: 0; -webkit-tap-highlight-color: transparent; }
        header { background: rgba(2, 6, 23, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .card-rest { position: relative; overflow: hidden; border-radius: 2rem; height: 160px; border: 1px solid rgba(255,255,255,0.08); transition: 0.3s; }
        .card-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .card-grad { position: absolute; inset: 0; background: linear-gradient(to top, var(--dark) 20%, transparent 100%); }
        #modal-plato { position: fixed; inset: 0; background: var(--dark); z-index: 1000; display: none; flex-direction: column; overflow-y: auto; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <header class="sticky top-0 z-50 px-6 py-4 flex items-center gap-4">
        <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center font-black text-dark text-xl shadow-[0_0_15px_rgba(6,182,212,0.3)]">A</div>
        <div class="text-left">
            <h1 class="text-xl font-black uppercase leading-none tracking-tighter">Aguadulce</h1>
            <span class="text-[8px] font-bold tracking-[0.4em] text-cyan-400 uppercase">Express</span>
        </div>
    </header>

    <main id="app-container" class="px-5 py-6 pb-24 text-center">
        <div class="py-32">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-cyan-400"></div>
            <p class="text-[9px] text-cyan-400/50 font-black uppercase tracking-widest mt-4">Sincronizando Nueva Cuenta...</p>
        </div>
    </main>

    <div id="modal-plato">
        <button onclick="cerrarModal()" class="absolute top-6 left-6 z-[1010] bg-black/50 backdrop-blur-md w-10 h-10 rounded-xl text-white border border-white/10">✕</button>
        <img id="modal-img" src="" class="w-full h-[35vh] object-cover">
        <div class="px-7 py-8 pb-40 text-left">
            <div id="modal-info"></div>
        </div>
        <div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-dark via-dark to-transparent">
            <button class="w-full bg-cyan-500 text-dark font-black py-5 rounded-2xl uppercase text-xs tracking-widest shadow-xl">
                Añadir al carrito • <span id="total-price">0.00</span>€
            </button>
        </div>
    </div>

    <script>
        // TU NUEVO ENLACE YA CONFIGURADO
        const scriptURL = 'https://script.google.com/macros/s/AKfycbysDVL_3M-2AfW5eGS8chw3KB3uFIXJU9kVltWHOQF0Lo9mzcBBn6nQwVy1mrkaH2tZ/exec';
        
        let db = { RESTAURANTES: [], MENU_GENERAL: [] };

        async function init() {
            try {
                const res = await fetch(scriptURL);
                const data = await res.json();
                // Adaptamos a la estructura de tu doGet
                db.RESTAURANTES = data.RESTAURANTES || [];
                db.MENU_GENERAL = data.MENU_GENERAL || [];
                renderHome();
            } catch (e) {
                document.getElementById('app-container').innerHTML = `<p class="py-20 text-red-400 text-[10px] font-black uppercase">Error de Conexión. Revisa la implementación.</p>`;
            }
        }

        function renderHome() {
            const container = document.getElementById('app-container');
            let html = `<h2 class="text-left text-[9px] tracking-[0.3em] text-slate-500 uppercase font-black mb-6">Establecimientos</h2>`;
