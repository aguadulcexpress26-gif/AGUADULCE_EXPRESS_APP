<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express v106 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark: #020617; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark); color: white; margin: 0; -webkit-tap-highlight-color: transparent; }
        #loader { position: fixed; inset: 0; background: var(--dark); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(6,182,212,0.1); border-top-color: var(--cyan); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .brand-header { position: relative; height: 160px; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; }
        #header-bg { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0.8; }
        .brand-overlay { position: absolute; inset: 0; background: linear-gradient(to top, var(--dark), transparent); }
        .plato-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.5rem; padding: 15px; display: flex; align-items: center; gap: 15px; margin-bottom: 12px; }
        #modal-plato, #panel-checkout, #modal-legal { position: fixed; inset: 0; background: var(--dark); z-index: 1000; display: none; flex-direction: column; overflow-y: auto; }
        .step-tag { font-weight: 800; font-size: 10px; text-transform: uppercase; color: var(--cyan); letter-spacing: 1px; margin-bottom: 10px; display: block; }
        .grid-option { border: 1px solid rgba(255,255,255,0.1); padding: 12px; text-align: center; font-size: 11px; font-weight: 600; border-radius: 12px; cursor: pointer; }
        .grid-option.selected { border-color: var(--cyan); background: rgba(6,182,212,0.1); color: var(--cyan); }
        .cat-chip { padding: 8px 16px; background: rgba(255,255,255,0.05); border-radius: 10px; font-size: 11px; font-weight: 700; white-space: nowrap; border: 1px solid rgba(255,255,255,0.1); }
        .cat-chip.active { background: var(--cyan); color: var(--dark); }
        input, select { background: rgba(255,255,255,0.05)!important; border: 1px solid rgba(255,255,255,0.1)!important; padding: 14px!important; border-radius: 12px!important; color: white!important; width: 100%; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner mb-4"></div>
        <p class="text-cyan-400 text-[10px] font-black uppercase">Sincronizando Aguadulce Express...</p>
    </div>

    <header class="brand-header">
        <div id="header-bg"></div>
        <div class="brand-overlay"></div>
        <div class="relative z-10 flex items-center gap-4">
            <img id="app-logo" src="" class="w-12 h-12 rounded-full border-2 border-cyan-400 bg-white">
            <div>
                <h1 class="text-xl font-black italic uppercase leading-none">Aguadulce</h1>
                <p class="text-cyan-400 text-[8px] font-black uppercase tracking-widest">Express</p>
            </div>
        </div>
    </header>

    <main id="app-container" class="px-5 py-6 pb-32"></main>

    <div id="cesta-flotante" class="fixed bottom-6 left-4 right-4 bg-cyan-400 text-black p-4 rounded-2xl hidden justify-between items-center z-[100] shadow-xl">
        <div class="flex-1" onclick="abrirCheckout()">
            <span id="cesta-info" class="font-black text-sm italic uppercase">🛒 0 PRODUCTOS</span>
            <span id="cesta-total" class="block text-[10px] font-bold uppercase">0.00€ TOTAL</span>
        </div>
        <div class="text-black/40 font-black text-xl pl-4 border-l border-black/10 cursor-pointer" onclick="confirmarVaciar()">✕</div>
    </div>

    <div id="modal-plato">
        <button onclick="cerrarModal()" class="absolute top-5 left-5 z-[1001] bg-black/60 w-10 h-10 rounded-full text-white">✕</button>
        <img id="modal-img" src="" class="w-full h-[220px] object-cover">
        <div class="p-6 pb-40 text-left">
            <div class="flex justify-between items-start mb-6">
                <div class="flex-1 pr-4">
                    <h2 id="modal-titulo" class="text-2xl font-black italic uppercase leading-tight"></h2>
                    <p id="modal-desc" class="text-white/50 text-xs mt-2"></p>
                </div>
                <div id="modal-precio-base" class="bg-cyan-400 text-black px-4 py-2 rounded-xl font-black text-lg">0€</div>
            </div>
            <div id="contenedor-pasos" class="space-y-8"></div>
        </div>
        <div class="fixed bottom-0 left-0 right-0 p-5 bg-gradient-to-t from-dark via-dark">
            <button id="btn-anadir-modal" onclick="confirmarAnadir()" class="w-full bg-cyan-400 text-black font-black py-5 rounded-2xl flex justify-between px-8">
                <span id="txt-anadir">Añadir</span>
                <span id="total-modal-btn">0.00€</span>
            </button>
        </div>
    </div>

    <div id="panel-checkout" class="p-6">
        <div class="flex items-center gap-4 mb-8">
            <button onclick="cerrarCheckout()" class="w-10 h-10 rounded-xl bg-white/5 text-cyan-400">←</button>
            <h2 class="text-xl font-black italic uppercase">Tu Pedido</h2>
        </div>
        <div class="space-y-4 text-left">
            <p class="step-tag">Datos de Entrega</p>
            <input type="text" id="cliente-nombre" placeholder="TU NOMBRE">
            <input type="tel" id="cliente-telf" value="+34">
            <input type="text" id="cliente-dir" placeholder="DIRECCIÓN DE ENTREGA">
            <select id="metodo-pago">
                <option value="EFECTIVO">EFECTIVO</option>
                <option value="BIZUM">BIZUM</option>
                <option value="TARJETA">TARJETA AL REPARTIDOR</option>
            </select>
        </div>
        
        <div id="desglose-pago" class="mt-8 p-6 bg-white/5 rounded-[2rem] space-y-2 text-sm">
            </div>

        <div class="mt-4 text-left" id="legal-container"></div>

        <button id="btn-final" onclick="enviarPedidoFinal()" class="w-full bg-cyan-400 text-black py-6 rounded-2xl font-black uppercase mt-6 shadow-lg shadow-cyan-400/20">Efectuar Pedido</button>
    </div>

    <div id="modal-legal">
        <div class="p-8 text-left">
            <h2 class="text-xl font-black italic uppercase text-cyan-400 mb-6">Términos y Privacidad</h2>
            <div id="texto-legal-completo" class="text-[11px] leading-relaxed text-white/70 space-y-4">
                Cargando política de privacidad...
            </div>
            <button onclick="cerrarLegal()" class="w-full bg-white/10 text-white font-black py-5 rounded-2xl uppercase mt-8">He leído y acepto</button>
        </div>
    </div>

    <div id="modal-exito" class="fixed inset-0 z-[6000] hidden items-center justify-center p-6 bg-black/90 backdrop-blur-sm">
        <div class="bg-white/10 border border-cyan-400/30 p-8 rounded-[2.5rem] w-full max-w-sm text-center">
            <div class="w-20 h-20 bg-cyan-400 rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg shadow-cyan-400/40">
                <svg class="w-10 h-10 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h2 class="text-2xl font-black italic uppercase mb-2">¡Pedido Recibido!</h2>
            <p class="text-xs text-white/50 mb-6 uppercase font-bold tracking-widest">Lo estamos preparando...</p>
            <button onclick="location.reload()" class="w-full bg-cyan-400 text-black py-5 rounded-2xl font-black uppercase italic">Genial, Gracias</button>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzmIW4rvilG6rCN7NbT-sQw-VniY0PDyi7wxQuBYbmDXOGbMup8J4tMEu99uqwzMHuq/exec';
        let db = { menu: [], restaurantes: [], config: {}, anuncios: [], legal: "" };
        let cesta = [];
        let rActivo = { id: null, nombre: "" };
        let itemActual = { pBase: 0, pOpciones: 0, pExtras: 0, cantidad: 1, obligatorioOk: false, data: null };

        async function init() {
            try {
                const res = await fetch(scriptURL);
                const data = await res.json();
                db.restaurantes = data.RESTAURANTES.filter(r => r.NOMBRE_RESTAURANTE);
                db.menu = data.MENU_GENERAL;
                db.anuncios = data.ANUNCIOS;
                db.legal = data.LEGAL_TEXT || "Política de privacidad estándar...";
                
                if(data.CONFIG && data.CONFIG[0]) {
                    document.getElementById('app-logo').src = data.CONFIG[0].LOGO_URL;
                    document.getElementById('header-bg').style.backgroundImage = `url('${data.CONFIG[0].FONDO_URL}')`;
                }
                
                document.getElementById('loader').style.display = 'none';
                renderHome();
            } catch (e) { console.error("Error inicializando:", e); }
        }

        function renderHome() {
            let html = `<p class="step-tag ml-2 italic">Selecciona un restaurante</p>`;
            const ahora = new Date();
            const horaActual = ahora.getHours() * 100 + ahora.getMinutes();

            db.restaurantes.forEach(r => {
                const ape1 = parseInt((r.HORA_APERTURA_1 || "00:00").replace(':', ''));
                const cie1 = parseInt((r.HORA_CIERRE_1 || "00:00").replace(':', ''));
                const ape2 = parseInt((r.HORA_APERTURA_2 || "00:00").replace(':', ''));
                const cie2 = parseInt((r.HORA_CIERRE_2 || "00:00").replace(':', ''));
                
                const enHorario = ((horaActual >= ape1 && horaActual <= cie1) || (horaActual >= ape2 && horaActual <= cie2));
                const abierto = (r.ESTADO && r.ESTADO.toLowerCase() === "abierto");

                if (enHorario && abierto) {
                    html += `
                    <div class="relative rounded-[2rem] overflow-hidden h-[160px] mb-4 border border-white/5 active:scale-95 transition-all" onclick="abrirTienda('${r.NOMBRE_RESTAURANTE}', '${r.ID_RESTAURANTE}')">
                        <img src="${r.FOTO}" class="absolute inset-0 w-full h-full object-cover opacity-70">
                        <div class="absolute inset-0 bg-gradient-to-t from-dark via-transparent"></div>
                        <div class="absolute bottom-6 left-6 text-left">
                            <h2 class="text-xl font-black italic uppercase">${r.NOMBRE_RESTAURANTE}</h2>
                        </div>
                    </div>`;
                } else {
                    html += `
                    <div class="relative rounded-[2rem] overflow-hidden h-[160px] mb-4 border border-white/5 grayscale opacity-40">
                        <img src="${r.FOTO}" class="absolute inset-0 w-full h-full object-cover">
                        <div class="absolute inset-0 bg-black/60 flex items-center justify-center">
                            <p class="border-2 border-white px-4 py-1 text-[10px] font-black uppercase italic">Cerrado</p>
                        </div>
                    </div>`;
                }
            });
            document.getElementById('app-container').innerHTML = html;
        }

        // BLOQUEO DE COMPRA CRUZADA
        function abrirTienda(nombre, id) {
            if (cesta.length > 0 && String(rActivo.id) !== String(id)) {
                alert(`⚠️ Tienes productos de "${rActivo.nombre}" en la cesta. Finaliza ese pedido o vacía la cesta antes de cambiar de restaurante.`);
                return;
            }
            rActivo.id = id;
            rActivo.nombre = nombre;
            verMenu();
        }

        function verMenu() {
            const platos = db.menu.filter(p => String(p.ID_RESTAURANTE) === String(rActivo.id));
            const cats = [...new Set(platos.map(p => p.CATEGORIA || "General"))];
            
            let html = `
                <div class="flex items-center gap-4 mb-6">
                    <button onclick="renderHome()" class="w-10 h-10 rounded-xl bg-white/5 text-cyan-400">←</button>
                    <h2 class="text-lg font-black uppercase italic truncate">${rActivo.nombre}</h2>
                </div>
                <div class="flex overflow-x-auto gap-2 mb-6 no-scrollbar">
                    <div class="cat-chip active" onclick="filtrarCat('TODOS', this)">Todos</div>
                    ${cats.map(c => `<div class="cat-chip" onclick="filtrarCat('${c}', this)">${c}</div>`).join('')}
                </div>
                <div id="lista-platos" class="space-y-3">`;

            platos.forEach(p => {
                html += `
                <div class="plato-card" data-cat="${p.CATEGORIA}" onclick='abrirDetalle(${JSON.stringify(p).replace(/'/g, "&apos;")})'>
                    <div class="flex-1 text-left">
                        <h4 class="font-black text-sm uppercase leading-none mb-1">${p.PLATO}</h4>
                        <p class="text-cyan-400 font-black text-xs">${parseFloat(p.PRECIO).toFixed(2)}€</p>
                    </div>
                    <img src="${p.FOTO_PLATO}" class="w-16 h-16 rounded-xl object-cover shadow-lg">
                </div>`;
            });
            document.getElementById('app-container').innerHTML = html + `</div>`;
        }

        function abrirDetalle(p) {
            itemActual = { pBase: parseFloat(p.PRECIO), pOpciones: 0, pExtras: 0, cantidad: 1, obligatorioOk: !p.SELECCION_OBLIGATORIA, data: p };
            document.getElementById('modal-titulo').innerText = p.PLATO;
            document.getElementById('modal-desc').innerText = p.DESCRIPCION || "";
            document.getElementById('modal-img').src = p.FOTO_PLATO;
            document.getElementById('modal-precio-base').innerText = itemActual.pBase.toFixed(2) + "€";
            
            let html = "";
            // COLUMNA G: OBLIGATORIA (Grid)
            if(p.SELECCION_OBLIGATORIA) {
                html += `<div class="text-left"><span class="step-tag">Obligatorio</span><div class="grid grid-cols-2 gap-2">` + 
                p.SELECCION_OBLIGATORIA.split(',').map(d => `<div class="grid-option" onclick="toggleSel(this, 0, 'oblig')">${d.trim()}</div>`).join('') + `</div></div>`;
            }
            // COLUMNA I: UNICA (Grid)
            if(p.SELECCION_UNICA) {
                html += `<div class="text-left"><span class="step-tag">Personalizar</span><div class="grid grid-cols-2 gap-2">` + 
                p.SELECCION_UNICA.split(',').map(d => {
                    const parts = d.split(':+');
                    const n = parts[0].trim();
                    const pr = parseFloat(parts[1]) || 0;
                    return `<div class="grid-option" onclick="toggleSel(this, ${pr}, 'unica')">${n} ${pr > 0 ? '+'+pr+'€' : ''}</div>`;
                }).join('') + `</div></div>`;
            }
            // COLUMNA H: EXTRAS (Lista con +- )
            if(p.EXTRAS) {
                html += `<div class="text-left"><span class="step-tag">Extras</span><div class="space-y-2">` + 
                p.EXTRAS.split(',').map(d => {
                    const parts = d.split(':+');
                    const n = parts[0].trim();
                    const pr = parseFloat(parts[1]) || 0;
                    return `
                        <div class="flex justify-between items-center py-2 border-b border-white/5">
                            <span class="text-xs font-bold uppercase">${n} <small class="text-cyan-400">+${pr}€</small></span>
                            <div class="flex items-center gap-3">
                                <button onclick="updEx(this, -1, ${pr})" class="w-7 h-7 rounded bg-white/5">-</button>
                                <span class="qty text-xs font-black">0</span>
                                <button onclick="updEx(this, 1, ${pr})" class="w-7 h-7 rounded bg-cyan-400 text-black">+</button>
                            </div>
                        </div>`;
                }).join('') + `</div></div>`;
            }

            document.getElementById('contenedor-pasos').innerHTML = html;
            document.getElementById('modal-plato').style.display = 'flex';
            actualizarBarraModal();
        }

        function toggleSel(el, pr, tipo) {
            el.parentElement.querySelectorAll('.grid-option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            if(tipo === 'oblig') itemActual.obligatorioOk = true;
            if(tipo === 'unica') itemActual.pOpciones = pr;
            actualizarBarraModal();
        }

        function updEx(btn, mod, pr) {
            const span = btn.parentElement.querySelector('.qty');
            let val = parseInt(span.innerText) + mod;
            if(val >= 0) {
                span.innerText = val;
                itemActual.pExtras += (mod * pr);
                actualizarBarraModal();
            }
        }

        function actualizarBarraModal() {
            const total = (itemActual.pBase + itemActual.pOpciones + itemActual.pExtras) * itemActual.cantidad;
            document.getElementById('total-modal-btn').innerText = total.toFixed(2) + "€";
            const btn = document.getElementById('btn-anadir-modal');
            btn.disabled = !itemActual.obligatorioOk;
            btn.style.opacity = itemActual.obligatorioOk ? "1" : "0.3";
            document.getElementById('txt-anadir').innerText = itemActual.obligatorioOk ? "Añadir al Carrito" : "Elige opción obligatoria";
        }

        function confirmarAnadir() {
            let sel = [];
            document.querySelectorAll('.grid-option.selected').forEach(el => sel.push(el.innerText));
            document.querySelectorAll('.qty').forEach(el => {
                if(parseInt(el.innerText) > 0) sel.push(`${el.innerText}x ${el.closest('.flex').parentElement.querySelector('span').innerText}`);
            });
            const detalle = sel.length > 0 ? ` [${sel.join(', ')}]` : "";
            cesta.push({
                nombre: `${itemActual.cantidad}x ${itemActual.data.PLATO}${detalle}`,
                total: (itemActual.pBase + itemActual.pOpciones + itemActual.pExtras) * itemActual.cantidad
            });
            actualizarCestaBar();
            cerrarModal();
        }

        function abrirCheckout() {
            const modal = document.getElementById('panel-checkout');
            modal.style.display = 'flex';
            
            const subtotal = cesta.reduce((acc, i) => acc + i.total, 0);
            const envio = 2.50;
            const app = 1.00;
            const totalFinal = subtotal + envio + app;

            document.getElementById('desglose-pago').innerHTML = `
                <div class="flex justify-between"><span>Subtotal</span><span>${subtotal.toFixed(2)}€</span></div>
                <div class="flex justify-between"><span>Envío</span><span>${envio.toFixed(2)}€</span></div>
                <div class="flex justify-between"><span>Gestión App</span><span>${app.toFixed(2)}€</span></div>
                <div class="flex justify-between font-black text-cyan-400 text-lg border-t border-white/10 pt-2 mt-2 italic uppercase">
                    <span>Total a Pagar</span><span>${totalFinal.toFixed(2)}€</span>
                </div>`;

            // MEMORIA Y LEGAL
            document.getElementById('cliente-nombre').value = localStorage.getItem('ae_nombre') || "";
            document.getElementById('cliente-telf').value = localStorage.getItem('ae_telf') || "+34";
            document.getElementById('cliente-dir').value = localStorage.getItem('ae_dir') || "";
            
            const acepto = localStorage.getItem('ae_legal') === "true";
            document.getElementById('legal-container').innerHTML = `
                <label class="flex items-start gap-3 cursor-pointer">
                    <input type="checkbox" id="check-legal" ${acepto ? 'checked' : ''} onchange="document.getElementById('btn-final').disabled = !this.checked" class="mt-1 w-4 h-4 accent-cyan-400">
                    <span class="text-[9px] text-white/50 leading-tight">Acepto los <span onclick="abrirLegal()" class="text-cyan-400 underline">Términos y Condiciones</span>.</span>
                </label>`;
            document.getElementById('btn-final').disabled = !acepto;
        }

        async function enviarPedidoFinal() {
            const nom = document.getElementById('cliente-nombre').value;
            const tel = document.getElementById('cliente-telf').value;
            const dir = document.getElementById('cliente-dir').value;
            const pag = document.getElementById('metodo-pago').value;
            
            if(!nom || !dir || tel.length < 9) return alert("⚠️ Completa los datos");

            localStorage.setItem('ae_nombre', nom);
            localStorage.setItem('ae_telf', tel);
            localStorage.setItem('ae_dir', dir);
            localStorage.setItem('ae_legal', "true");

            const btn = document.getElementById('btn-final');
            btn.innerText = "⏳ PROCESANDO...";
            btn.disabled = true;

            const totalFinal = (cesta.reduce((a,b)=>a+b.total,0) + 3.5).toFixed(2);
            const paquete = {
                cliente_info: nom,
                telf_info: tel,
                dir_info: dir,
                pedido_info: cesta.map(i => i.nombre).join(" | "),
                total_info: totalFinal + "€",
                pago_info: pag,
                id_res_info: rActivo.id
            };

            await fetch(scriptURL, { method: "POST", mode: "no-cors", body: JSON.stringify(paquete) });
            document.getElementById('modal-exito').style.display = 'flex';
        }

        function abrirLegal() {
            document.getElementById('texto-legal-completo').innerText = db.legal;
            document.getElementById('modal-legal').style.display = 'flex';
        }
        function cerrarLegal() { document.getElementById('modal-legal').style.display = 'none'; }
        function cerrarModal() { document.getElementById('modal-plato').style.display = 'none'; }
        function cerrarCheckout() { document.getElementById('panel-checkout').style.display = 'none'; }
        function confirmarVaciar() { if(confirm("¿Vaciar cesta?")) { cesta = []; actualizarCestaBar(); } }
        function actualizarCestaBar() {
            const total = cesta.reduce((acc, i) => acc + i.total, 0);
            document.getElementById('cesta-flotante').classList.toggle('hidden', cesta.length === 0);
            document.getElementById('cesta-info').innerText = `🛒 ${cesta.length} PRODUCTOS`;
            document.getElementById('cesta-total').innerText = `${total.toFixed(2)}€ TOTAL`;
        }
        function filtrarCat(cat, el) {
            document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.plato-card').forEach(p => {
                p.style.display = (cat === 'TODOS' || p.dataset.cat === cat) ? 'flex' : 'none';
            });
        }
        init();
    </script>
</body>
</html>
