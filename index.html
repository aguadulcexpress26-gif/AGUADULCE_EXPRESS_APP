<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express Pro v95</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark: #020617; --red: #ef4444; }
        
        /* FUENTE ESTILO APTOS */
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--dark) !important; color: white; margin: 0; 
            -webkit-tap-highlight-color: transparent; letter-spacing: -0.015em; 
        }
        
        .plato-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 1.8rem; padding: 18px; display: flex; align-items: center;
            justify-content: space-between; margin-bottom: 14px;
        }

        .precio-badge {
            background: var(--cyan); color: var(--dark); padding: 6px 14px;
            border-radius: 12px; font-weight: 800; font-size: 1.05rem;
        }

        /* TITULOS DE SECCIÓN SIN NÚMEROS */
        .step-title { 
            font-size: 0.75rem; font-weight: 800; color: var(--cyan); 
            letter-spacing: 0.1em; text-transform: uppercase; 
            margin-bottom: 1.2rem; display: block; text-align: left;
        }

        /* DISEÑO DE EXTRAS CORREGIDO */
        .extra-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .extra-info { display: flex; flex-direction: column; text-align: left; }
        .extra-nombre { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; }
        .extra-precio-label { font-size: 0.8rem; font-weight: 800; color: var(--red); margin-top: 2px; }

        .contador-box { display: flex; align-items: center; gap: 16px; background: rgba(255,255,255,0.06); padding: 8px 14px; border-radius: 14px; }
        .btn-control { color: var(--cyan); font-size: 1.4rem; font-weight: bold; cursor: pointer; width: 25px; text-align: center; }

        /* MODAL Y CESTA */
        #modal-plato { position: fixed; inset: 0; background: var(--dark); z-index: 1000; display: none; flex-direction: column; overflow-y: auto; }
        .foto-header-modal { width: 100%; height: 310px; object-fit: cover; border-bottom-left-radius: 35px; border-bottom-right-radius: 35px; }

        #cesta-flotante { 
            position: fixed; bottom: 25px; right: 20px; left: 20px; 
            background: var(--cyan); color: var(--dark); 
            padding: 18px 25px; border-radius: 22px; 
            display: none; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 30px rgba(6,182,212,0.3); z-index: 500;
        }
        .btn-vaciar-x { color: var(--red); font-size: 1.6rem; font-weight: 900; cursor: pointer; padding-left: 15px; border-left: 2px solid rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <header class="p-6 flex items-center gap-4 bg-[#020617]/90 backdrop-blur-xl sticky top-0 z-50 border-b border-white/5">
        <div class="w-11 h-11 bg-white rounded-xl flex items-center justify-center border-2 border-cyan-400 font-black text-dark text-xl">A</div>
        <div class="text-left">
            <h1 class="text-xl leading-none text-white font-bold italic">AGUADULCE</h1>
            <p class="text-[9px] tracking-[0.4em] text-cyan-400 uppercase font-bold mt-1">Express Pro</p>
        </div>
    </header>

    <main id="app-container" class="px-6 py-6"></main>

    <div id="cesta-flotante">
        <div class="flex flex-col text-left" onclick="verResumen()">
            <span class="text-[10px] uppercase font-black opacity-70">Tu Pedido</span>
            <span id="cesta-info" class="font-black text-lg uppercase italic">0 Artículos</span>
        </div>
        <div class="btn-vaciar-x" onclick="vaciarCesta()">✕</div>
    </div>

    <div id="modal-plato">
        <button onclick="cerrarModal()" class="absolute top-6 left-6 z-50 bg-black/60 backdrop-blur-md w-11 h-11 rounded-xl text-white">✕</button>
        <img id="modal-img" src="" class="foto-header-modal">
        <div class="px-7 py-8 pb-32">
            <div class="flex justify-between items-start mb-8 text-left">
                <div>
                    <h2 id="modal-titulo" class="text-2xl uppercase font-black italic text-white"></h2>
                    <p id="modal-desc" class="opacity-70 text-xs mt-3 leading-relaxed"></p>
                </div>
                <div id="modal-precio-float" class="precio-badge">0.00€</div>
            </div>
            <div id="contenedor-pasos" class="space-y-10"></div>
            <div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-dark via-dark to-transparent">
                <button onclick="agregarACesta()" class="w-full bg-cyan-500 text-dark font-black py-5 rounded-3xl uppercase tracking-widest text-sm shadow-xl shadow-cyan-500/20">Añadir a la Cesta</button>
            </div>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbysDVL_3M-2AfW5eGS8chw3KB3uFIXJU9kVltWHOQF0Lo9mzcBBn6nQwVy1mrkaH2tZ/exec';
        let db = { menu: [], restaurantes: [] };
        let cesta = [];
        let rActivo = { id: null, nombre: "" };

        async function init() {
            try {
                const res = await fetch(scriptURL);
                const data = await res.json();
                db.restaurantes = data.RESTAURANTES || [];
                db.menu = data.MENU_GENERAL || [];
                renderHome();
            } catch (e) { console.error("Error"); }
        }

        function renderHome() {
            let html = `<div class="mb-6 text-left text-slate-500 text-[10px] uppercase font-bold tracking-widest">Selecciona un Restaurante</div>`;
            db.restaurantes.forEach(r => {
                html += `
                <div class="relative rounded-[2.2rem] overflow-hidden h-[180px] mb-5 border border-white/5" onclick="verMenu('${r.NOMBRE_RESTAURANTE}', '${r.ID_RESTAURANTE}')">
                    <img src="${r.FOTO}" class="absolute inset-0 w-full h-full object-cover opacity-85">
                    <div class="absolute inset-0 bg-gradient-to-t from-dark to-transparent"></div>
                    <div class="absolute bottom-6 left-7 text-left">
                        <p class="text-cyan-400 text-[8px] font-black uppercase mb-1 tracking-widest">${r.CATEGORIA || 'Premium'}</p>
                        <h3 class="text-xl italic font-black uppercase text-white">${r.NOMBRE_RESTAURANTE}</h3>
                    </div>
                </div>`;
            });
            document.getElementById('app-container').innerHTML = html;
        }

        function verMenu(nombre, id) {
            const platos = db.menu.filter(p => String(p.ID_RESTAURANTE) === String(id));
            let html = `<div class="flex items-center gap-4 mb-8 text-left"><button onclick="renderHome()" class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 text-cyan-400">←</button><h2 class="text-lg text-white font-bold uppercase italic">${nombre}</h2></div>`;
            platos.forEach(p => {
                html += `
                <div class="plato-card" onclick='abrirDetalle(${JSON.stringify(p).replace(/'/g, "&apos;")})'>
                    <div class="text-left flex-1 pr-4">
                        <h4 class="font-bold text-white text-[14px] uppercase mb-3 leading-tight">${p.PLATO}</h4>
                        <span class="precio-badge">${parseFloat(p.PRECIO).toFixed(2)}€</span>
                    </div>
                    <img src="${p.FOTO_PLATO}" class="w-20 h-20 rounded-2xl object-cover border border-cyan-400/10">
                </div>`;
            });
            document.getElementById('app-container').innerHTML = html;
        }

        function abrirDetalle(p) {
            if (rActivo.id && rActivo.id !== String(p.ID_RESTAURANTE)) {
                if(!confirm(`¿Deseas vaciar tu cesta de ${rActivo.nombre} para pedir en este restaurante?`)) return;
                vaciarCesta(false);
            }
            
            document.getElementById('modal-titulo').innerText = p.PLATO;
            document.getElementById('modal-desc').innerText = p.DESCRIPCION || "Ingredientes seleccionados de alta calidad.";
            document.getElementById('modal-img').src = p.FOTO_PLATO;
            document.getElementById('modal-precio-float').innerText = parseFloat(p.PRECIO).toFixed(2) + "€";
            
            let htmlPasos = "";
            const agregarPaso = (titulo, datos, tipo) => {
                if(!datos || datos === "") return "";
                let res = `<div class="text-left"><span class="step-title">${titulo}</span>`;
                
                if(tipo === 'grid') {
                    res += `<div class="grid grid-cols-2 gap-3">`;
                    datos.split(',').forEach((d, i) => {
                        res += `<div class="opcion-unica border-2 border-white/10 p-4 rounded-2xl text-center text-xs font-bold uppercase ${i===0?'border-cyan-400 bg-cyan-400/10 text-cyan-400':''}" onclick="selectUnica(this)">${d.trim()}</div>`;
                    });
                    res += `</div>`;
                } else {
                    res += `<div class="space-y-3">`;
                    datos.split(',').forEach(d => {
                        // CORRECCIÓN DE FORMATO NOMBRE:PRECIO
                        const partes = d.split(':');
                        const nombre = partes[0].trim();
                        const precio = partes[1] ? partes[1].trim() : "0.00";
                        res += `
                        <div class="extra-row">
                            <div class="extra-info">
                                <span class="extra-nombre">${nombre}</span>
                                <span class="extra-precio-label">+${precio}€</span>
                            </div>
                            <div class="contador-box"><span class="btn-control">−</span><span class="font-bold">0</span><span class="btn-control">+</span></div>
                        </div>`;
                    });
                    res += `</div>`;
                }
                return res + `</div>`;
            };

            htmlPasos += agregarPaso("Selección Obligatoria", p.SELECCION_OBLIGATORIA, 'grid');
            htmlPasos += agregarPaso("Personaliza tu plato", p.SELECCION_UNICA, 'grid');
            htmlPasos += agregarPaso("Extras Adicionales", p.EXTRAS, 'lista');
            htmlPasos += agregarPaso("Elige tu Bebida", p.SELECCION_DE_BEBIDAS, 'lista');

            document.getElementById('contenedor-pasos').innerHTML = htmlPasos;
            document.getElementById('modal-plato').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function vaciarCesta(conAviso = true) {
            if (conAviso && !confirm("¿Vaciar toda la cesta?")) return;
            cesta = [];
            rActivo = { id: null, nombre: "" };
            document.getElementById('cesta-flotante').style.display = 'none';
        }

        function selectUnica(el) {
            el.parentElement.querySelectorAll('.opcion-unica').forEach(o => o.classList.remove('border-cyan-400', 'bg-cyan-400/10', 'text-cyan-400'));
            el.classList.add('border-cyan-400', 'bg-cyan-400/10', 'text-cyan-400');
        }

        function cerrarModal() { 
            document.getElementById('modal-plato').style.display = 'none'; 
            document.body.style.overflow = 'auto'; 
        }

        init();
    </script>
</body>
</html>
