<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express Pro v92 - PRUEBA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark: #020617; }
        /* BLINDAJE DE COLOR: Evita el fondo blanco accidental */
        body { font-family: 'Inter', sans-serif; background: var(--dark) !important; color: white; margin: 0; -webkit-tap-highlight-color: transparent; }
        .brand { font-family: 'Orbitron', sans-serif; }
        
        /* TARJETAS DE PLATO (DISEÑO v61) */
        .plato-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 1.8rem;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            transition: transform 0.2s;
        }
        .plato-card:active { transform: scale(0.97); }
        .plato-img { width: 75px; height: 75px; border-radius: 1.2rem; object-fit: cover; border: 1px solid rgba(6,182,212,0.3); }
        
        /* BURBUJA DE PRECIO CIAN (DISEÑO v61) */
        .precio-badge {
            background: var(--cyan);
            color: var(--dark);
            padding: 4px 12px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 1rem;
            box-shadow: 0 4px 10px rgba(6,182,212,0.3);
            font-family: 'Orbitron', sans-serif;
        }

        /* MODAL PREMIUM (v61) */
        #modal-plato { position: fixed; inset: 0; background: var(--dark); z-index: 1000; display: none; flex-direction: column; overflow-y: auto; }
        .foto-header-modal { width: 100%; height: 300px; object-fit: cover; border-bottom-left-radius: 35px; border-bottom-right-radius: 35px; }
        .precio-float-modal { background: var(--cyan); padding: 12px 20px; border-radius: 15px; font-weight: 800; color: var(--dark); font-size: 1.2rem; box-shadow: 0 4px 15px rgba(6,182,212,0.4); }

        /* PASOS DE PERSONALIZACIÓN */
        .step-title { font-size: 0.7rem; font-weight: bold; color: var(--cyan); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 1rem; display: block; }
        .opcion-unica { border: 2px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 15px; text-align: center; font-size: 0.8rem; font-weight: 600; color: white; cursor: pointer; }
        .opcion-unica.active { border-color: var(--cyan); background: rgba(6,182,212,0.1); color: var(--cyan); }
    </style>
</head>
<body>

    <header class="p-6 flex items-center gap-4 bg-[#020617]/80 backdrop-blur-md sticky top-0 z-50">
        <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center border-2 border-cyan-400 font-black text-dark brand text-xl">A</div>
        <div class="text-left">
            <h1 class="brand text-xl leading-none">AGUADULCE</h1>
            <p class="text-[9px] tracking-[0.4em] text-cyan-400 uppercase font-bold">Express Pro</p>
        </div>
    </header>

    <main id="app-container" class="px-5 py-4">
        <div class="text-center py-20 text-cyan-400 animate-pulse font-black text-xs uppercase tracking-[0.3em]">Cargando Identidad...</div>
    </main>

    <div id="modal-plato">
        <button onclick="cerrarModal()" class="absolute top-6 left-6 z-50 bg-black/50 backdrop-blur-md w-11 h-11 rounded-xl text-white">✕</button>
        <img id="modal-img" src="" class="foto-header-modal">
        <div class="px-7 py-8">
            <div class="flex justify-between items-start mb-6">
                <div class="max-w-[65%] text-left">
                    <h2 id="modal-titulo" class="brand text-2xl uppercase leading-tight text-white"></h2>
                    <p id="modal-desc" class="text-slate-400 text-xs mt-2 italic"></p>
                </div>
                <div id="modal-precio-float" class="precio-float-modal brand text-center">0.00€</div>
            </div>
            <div id="contenedor-pasos" class="space-y-8"></div>
            <button class="w-full bg-cyan-500 text-dark font-black py-5 rounded-3xl mt-10 shadow-lg shadow-cyan-500/20 brand">AÑADIR AL PEDIDO</button>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbysDVL_3M-2AfW5eGS8chw3KB3uFIXJU9kVltWHOQF0Lo9mzcBBn6nQwVy1mrkaH2tZ/exec';
        let db = { restaurantes: [], menu: [] };

        async function cargarPrueba() {
            try {
                const res = await fetch(scriptURL);
                const data = await res.json();
                db.restaurantes = data.RESTAURANTES || [];
                db.menu = data.MENU_GENERAL || [];
                renderHome();
            } catch (e) { document.getElementById('app-container').innerText = "Error de enlace."; }
        }

        function renderHome() {
            let html = `<div class="mb-6 text-left text-slate-500 text-[10px] uppercase font-bold tracking-widest">Restaurantes Disponibles</div>`;
            db.restaurantes.forEach(r => {
                html += `
                <div class="relative rounded-[2rem] overflow-hidden h-[180px] mb-4 border border-white/10" onclick="verMenu('${r.NOMBRE_RESTAURANTE}', '${r.ID_RESTAURANTE}')">
                    <img src="${r.FOTO}" class="absolute inset-0 w-full h-full object-cover opacity-80">
                    <div class="absolute inset-0 bg-gradient-to-t from-[#020617] via-transparent to-transparent"></div>
                    <div class="absolute bottom-6 left-7 text-left">
                        <p class="text-cyan-400 text-[8px] font-black uppercase mb-1">${r.CATEGORIA || 'Gourmet'}</p>
                        <h3 class="brand text-xl italic uppercase text-white">${r.NOMBRE_RESTAURANTE}</h3>
                    </div>
                </div>`;
            });
            document.getElementById('app-container').innerHTML = html;
        }

        function verMenu(nombre, id) {
            const platos = db.menu.filter(p => String(p.ID_RESTAURANTE) === String(id));
            let html = `
                <div class="flex items-center gap-4 mb-8">
                    <button onclick="renderHome()" class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 text-cyan-400">←</button>
                    <div class="text-left"><h2 class="brand text-lg text-white uppercase">${nombre}</h2></div>
                </div>`;
            
            platos.forEach(p => {
                html += `
                <div class="plato-card shadow-lg shadow-black/40" onclick='abrirDetalle(${JSON.stringify(p).replace(/'/g, "&apos;")})'>
                    <div class="text-left flex-1 pr-4">
                        <h4 class="font-bold text-white text-[13px] uppercase tracking-tight mb-2">${p.PLATO}</h4>
                        <span class="precio-badge">${parseFloat(p.PRECIO).toFixed(2)}€</span>
                    </div>
                    <img src="${p.FOTO_PLATO}" class="plato-img">
                </div>`;
            });
            document.getElementById('app-container').innerHTML = html;
            window.scrollTo(0,0);
        }

        function abrirDetalle(p) {
            document.getElementById('modal-titulo').innerText = p.PLATO;
            document.getElementById('modal-desc').innerText = p.DESCRIPCION || "Sabor premium garantizado.";
            document.getElementById('modal-img').src = p.FOTO_PLATO;
            document.getElementById('modal-precio-float').innerText = parseFloat(p.PRECIO).toFixed(2) + "€";
            
            let htmlPasos = `<div class="text-left"><span class="step-title">1. Selección para la prueba</span><div class="grid grid-cols-2 gap-3"><div class="opcion-unica active">Con Todo</div><div class="opcion-unica">Sin Picante</div></div></div>`;
            document.getElementById('contenedor-pasos').innerHTML = htmlPasos;
            
            document.getElementById('modal-plato').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function cerrarModal() { document.getElementById('modal-plato').style.display = 'none'; document.body.style.overflow = 'auto'; }

        cargarPrueba();
    </script>
</body>
</html>
