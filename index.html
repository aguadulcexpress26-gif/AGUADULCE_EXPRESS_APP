<!DOCTYPE html>
<html lang="es">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
   <meta name="mobile-web-app-capable" content="yes">
   <meta name="apple-mobile-web-app-capable" content="yes">
   <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
   <meta name="apple-mobile-web-app-title" content="Aguadulce Express">
   
   <link rel="manifest" href="./manifest.json">
   
   <link rel="apple-touch-icon" href="./apple-touch-icon.png.jpeg">

   <title>Aguadulce Express v106 PWA</title>
   <script src="https://cdn.tailwindcss.com"></script>
   <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
   <style>
       :root { --cyan: #06b6d4; --dark: #020617; }
       body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark) !important; color: white; margin: 0; -webkit-tap-highlight-color: transparent; }
       
       #loader { position: fixed; inset: 0; background: var(--dark); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
       .spinner { width: 40px; height: 40px; border: 4px solid rgba(6,182,212,0.1); border-top-color: var(--cyan); border-radius: 50%; animation: spin 1s linear infinite; }
       @keyframes spin { to { transform: rotate(360deg); } }
 
       /* HEADER DINÁMICO */
       .brand-header { position: relative; height: 160px; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; border-bottom: 1px solid rgba(6,182,212,0.1); }
       #header-bg { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0.5; filter: blur(1px); transition: background 1s; }
       .brand-overlay { position: absolute; inset: 0; background: linear-gradient(to top, var(--dark), transparent); }
       .brand-content { position: relative; z-index: 10; display: flex; align-items: center; gap: 15px; }
       .brand-logo { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--cyan); object-fit: cover; background: white; }
 
       /* BANNER DE ANUNCIOS */
       .promo-banner { background: rgba(6,182,212,0.05); border-y: 1px solid rgba(6,182,212,0.1); padding: 8px 0; overflow: hidden; display: flex; }
       .promo-scroll { white-space: nowrap; animation: scroll-text 20s linear infinite; display: flex; gap: 50px; font-size: 10px; font-weight: 800; color: var(--cyan); text-transform: uppercase; letter-spacing: 1px; }
       @keyframes scroll-text { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
 
       .category-bar { display: flex; gap: 10px; overflow-x: auto; padding: 15px 20px; scrollbar-width: none; }
       .cat-chip { padding: 10px 18px; background: rgba(255,255,255,0.05); border-radius: 12px; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; white-space: nowrap; border: 1px solid rgba(255,255,255,0.1); }
       .cat-chip.active { background: var(--cyan); color: var(--dark); border-color: var(--cyan); }
       
     .plato-card { 
    width: 100% !important; 
    background: rgba(255,255,255,0.05); 
    border: 1px solid rgba(255,255,255,0.1); 
    border-radius: 2rem; 
    padding: 16px; 
    display: flex; 
    align-items: center; 
    margin-bottom: 16px; 
    box-sizing: border-box;
       } 
       #modal-plato, #panel-checkout { position: fixed; inset: 0; background: var(--dark); z-index: 1000; display: none; flex-direction: column; overflow-y: auto; }
       .step-tag { font-weight: 800; font-size: 9px; text-transform: uppercase; letter-spacing: 0.2em; color: #22d3ee; margin-bottom: 1rem; display: block; text-align: left; }
       .grid-option { border: 2px solid rgba(255,255,255,0.05); padding: 14px; text-align: center; font-size: 10px; font-weight: 800; text-transform: uppercase; border-radius: 15px; }
       .grid-option.selected { border-color: var(--cyan); background: rgba(6,182,212,0.1); color: var(--cyan); }
       input, select { background: rgba(255,255,255,0.03) !important; border: 1px solid rgba(255,255,255,0.08) !important; padding: 16px !important; border-radius: 18px !important; color: white !important; width: 100%; margin-bottom: 12px; }
   </style>
</head>
<body>
 
   <div id="loader">
       <div class="spinner mb-4"></div>
       <p class="text-cyan-400 text-[10px] font-black uppercase tracking-[0.3em] animate-pulse">Sincronizando Aguadulce Express...</p>
   </div>
 
   <header class="brand-header">
       <div id="header-bg"></div>
       <div class="brand-overlay"></div>
       <div class="brand-content">
           <img id="app-logo" src="" class="brand-logo shadow-lg shadow-cyan-500/20">
           <div class="text-left">
                <h1 class="text-2xl font-black italic uppercase leading-none tracking-tighter">Aguadulce</h1>
                <p class="text-cyan-400 text-[9px] font-black uppercase tracking-[0.4em] mt-1">Express</p>
           </div>
       </div>
   </header>
 
   <div class="promo-banner" id="banner-container">
       <div class="promo-scroll" id="texto-anuncio">Cargando ofertas del día...</div>
   </div>
 
   <main id="app-container" class="px-5 py-5 pb-32"></main>
 
   <div id="cesta-flotante" class="fixed bottom-5 left-4 right-4 bg-cyan-400 text-dark p-4 rounded-2xl hidden justify-between items-center z-[100] shadow-2xl">
       <div class="flex-1" onclick="abrirCheckout()">
           <span id="cesta-info" class="font-black text-sm italic uppercase">🛒 0 PRODUCTOS</span>
           <span id="cesta-total" class="block text-[10px] font-bold uppercase tracking-widest">0.00€ TOTAL</span>
       </div>
       <div class="text-red-600 font-black text-2xl pl-4 border-l border-black/10 px-2 cursor-pointer" onclick="vaciarCesta()">✕</div>
   </div>
 
   <div id="modal-plato">
       <button onclick="cerrarModal()" class="absolute top-5 left-5 z-[1001] bg-black/50 w-10 h-10 rounded-full text-white backdrop-blur-md border border-white/10">✕</button>
       <img id="modal-img" src="" class="w-full h-[250px] object-cover">
       <div class="px-6 py-8 pb-40">
           <div class="flex justify-between items-start mb-8 text-left">
                <div class="flex-1 pr-4">
                    <h2 id="modal-titulo" class="text-2xl font-black italic uppercase text-white leading-tight"></h2>
                    <p id="modal-desc" class="opacity-50 text-[11px] mt-2"></p>
                </div>
                <div id="modal-precio-base" class="bg-cyan-400 text-dark px-4 py-2 rounded-xl font-black text-lg">0€</div>
           </div>
           <div id="contenedor-pasos" class="space-y-10"></div>
       </div>
       <div class="fixed bottom-0 left-0 right-0 p-5 bg-gradient-to-t from-dark via-dark to-transparent">
           <button id="btn-anadir-modal" onclick="confirmarAnadir()" class="w-full bg-white/10 text-white/20 font-black py-5 rounded-2xl uppercase text-xs flex justify-between px-8 items-center">
                <span id="txt-anadir">Cargando...</span>
                <span id="total-modal-btn">0.00€</span>
           </button>
       </div>
   </div>
 
   <div id="panel-checkout" class="p-6">
       <div class="flex items-center gap-4 mb-8">
           <button onclick="cerrarCheckout()" class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 text-cyan-400">←</button>
           <h2 class="text-xl font-black italic uppercase">Tu Pedido</h2>
       </div>
       <div class="space-y-4 text-left">
           <p class="step-tag">Datos de Entrega</p>
           <input type="text" id="nombre-cli" placeholder="Nombre completo">
           <input type="tel" id="telefono" value="+34" oninput="if(!this.value.startsWith('+34')) this.value = '+34';">
           <input type="text" id="dir-cli" placeholder="Dirección / Ubicación">
           <select id="pago-cli">
                <option value="Efectivo">Efectivo</option>
                <option value="Bizum">Bizum</option>
                <option value="Tarjeta">Tarjeta / TPV</option>
           </select>
       </div>
       <div id="lista-resumen" class="mt-8 p-6 bg-white/5 rounded-[2rem] space-y-3"></div>
       <button id="btn-final" onclick="enviarPedidoFinal()" class="w-full bg-cyan-400 text-dark py-6 rounded-2xl font-black uppercase text-sm mt-6">Efectuar Pedido</button>
   </div>
 
   <script>
       const scriptURL = 'https://script.google.com/macros/s/AKfycbzmIW4rvilG6rCN7NbT-sQw-VniY0PDyi7wxQuBYbmDXOGbMup8J4tMEu99uqwzMHuq/exec';
       let db = { menu: [], restaurantes: [], config: {}, anuncios: "" };
       let cesta = [];
       let rActivo = { id: null, nombre: "" };
       let itemActual = { pBase: 0, pOpciones: 0, pExtras: 0, cantidad: 1, obligatorioOk: false, data: null };
       const COSTO_DOMICILIO = 3.50;
 
       // --- REGISTRO DEL SERVICE WORKER (Para que sea App) ---
       if ('serviceWorker' in navigator) {
         window.addEventListener('load', function() {
           navigator.serviceWorker.register('./sw.js').then(function(registration) {
             console.log('ServiceWorker registrado con éxito: ', registration.scope);
           }, function(err) {
             console.log('Falló el registro del ServiceWorker: ', err);
           });
         });
       }

       async function init() {
           try {
                const res = await fetch(scriptURL);
                const data = await res.json();
                
                db.restaurantes = data.RESTAURANTES || [];
                db.menu = data.MENU_GENERAL || [];
                
                if(data.CONFIG && data.CONFIG[0]) {
                   document.getElementById('app-logo').src = data.CONFIG[0].LOGO_URL;
                   document.getElementById('header-bg').style.backgroundImage = `url('${data.CONFIG[0].FONDO_URL}')`;
                }
 
                if(data.ANUNCIOS && data.ANUNCIOS.length > 0) {
                    const frases = data.ANUNCIOS.map(a => a.TEXTO).join(" • ");
                    document.getElementById('texto-anuncio').innerText = frases + " • " + frases;
                }
 
                document.getElementById('loader').style.display = 'none';
                renderHome();
           } catch (e) { console.error("Error en Bóveda v106"); }
       }
 
       function renderHome() {
           let html = `<p class="step-tag mb-6 ml-2 italic">Selecciona un restaurante</p>`;
           db.restaurantes.forEach(r => {
                html += `
                <div class="relative rounded-[2.5rem] overflow-hidden h-[170px] mb-5 border border-white/5 shadow-2xl" onclick="verMenu('${r.NOMBRE_RESTAURANTE}', '${r.ID_RESTAURANTE}')">
                    <img src="${r.FOTO}" class="absolute inset-0 w-full h-full object-cover opacity-60">
                    <div class="absolute inset-0 bg-gradient-to-t from-dark via-transparent"></div>
                    <div class="absolute bottom-6 left-8 text-left">
                        <p class="text-cyan-400 text-[8px] font-black uppercase mb-1 tracking-widest">${r.CATEGORIA || 'Gourmet'}</p>
                        <h2 class="text-2xl font-black italic uppercase text-white">${r.NOMBRE_RESTAURANTE}</h2>
                    </div>
                </div>`;
           });
           document.getElementById('app-container').innerHTML = html;
       }
 
     function verMenu(nombre, id) {
    const resData = db.restaurantes.find(r => String(r.ID_RESTAURANTE) === String(id));
    const platos = db.menu.filter(p => String(p.ID_RESTAURANTE) === String(id));
    const cats = [...new Set(platos.map(p => p.CATEGORIA || "General"))];
    
    // 1. CABECERA DEL RESTAURANTE
    let html = `
        <div class="relative -mx-5 -mt-5 mb-6 h-[200px] overflow-hidden border-b border-cyan-400/20">
            <img src="${resData.FOTO}" class="absolute inset-0 w-full h-full object-cover opacity-70">
            <div class="absolute inset-0 bg-gradient-to-t from-dark via-dark/60 to-transparent"></div>
            
            <button onclick="renderHome()" class="absolute top-6 left-6 w-12 h-12 rounded-2xl bg-dark/80 backdrop-blur-lg border-2 border-cyan-400/30 text-cyan-400 z-50 flex items-center justify-center shadow-lg active:scale-90 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
                </svg>
            </button>

            <div class="absolute bottom-6 left-8 text-left">
                <h2 class="text-3xl font-black italic uppercase text-white leading-tight">${nombre}</h2>
            </div>
        </div>

        <div class="flex overflow-x-auto gap-2 px-5 mb-6 no-scrollbar">
            <div class="cat-chip active bg-cyan-400 text-dark px-4 py-2 rounded-full text-xs font-black uppercase whitespace-nowrap" onclick="filtrarCat('TODOS', this)">Todos</div>
            ${cats.map(c => `<div class="cat-chip bg-white/5 border border-white/10 text-white/60 px-4 py-2 rounded-full text-xs font-black uppercase whitespace-nowrap" onclick="filtrarCat('${c}', this)">${c}</div>`).join('')}
        </div>

        <div id="lista-platos" class="space-y-4 w-full px-4 mb-20">`;

    platos.forEach(p => {
        html += `
            <div class="plato-card w-full flex items-center bg-white/5 border border-white/10 rounded-[2rem] p-4 active:scale-[0.98] transition-all" 
                 data-cat="${p.CATEGORIA}" 
                 onclick='abrirDetalle(${JSON.stringify(p).replace(/'/g, "&apos;")})'>
                
                <div class="flex-1 pr-4 text-left">
                    <h4 class="font-black text-[14px] uppercase text-white leading-tight mb-1">${p.PLATO}</h4>
                    <div class="flex items-center gap-2">
                        <span class="text-cyan-400 font-black text-sm">${parseFloat(p.PRECIO).toFixed(2)}€</span>
                        ${p.SELECCION_OBLIGATORIA ? '<span class="bg-cyan-400/10 text-cyan-400 text-[7px] px-2 py-0.5 rounded-full font-black uppercase tracking-widest">Personalizable</span>' : ''}
                    </div>
                </div>

                <div class="relative w-20 h-20 flex-shrink-0">
                    <img src="${p.FOTO_PLATO}" class="w-full h-full rounded-2xl object-cover shadow-lg shadow-black/40">
                </div>
            </div>`;
    });

    html += `</div>`; // Cerramos el div de lista-platos

    // 4. INYECCIÓN FINAL
    document.getElementById('app-container').innerHTML = html;
}
 
       function abrirDetalle(p) {
           rActivo.nombre = p.NOMBRE_RESTAURANTE;
           rActivo.id = String(p.ID_RESTAURANTE);
           itemActual.data = p;
           itemActual.pBase = parseFloat(p.PRECIO);
           itemActual.pOpciones = 0; itemActual.pExtras = 0; itemActual.cantidad = 1;
           itemActual.obligatorioOk = !p.SELECCION_OBLIGATORIA;
 
           document.getElementById('modal-titulo').innerText = p.PLATO;
           document.getElementById('modal-desc').innerText = p.DESCRIPCION || "";
           document.getElementById('modal-img').src = p.FOTO_PLATO;
           document.getElementById('modal-precio-base').innerText = itemActual.pBase.toFixed(2) + "€";
           
           let html = "";
           const renderSeccion = (titulo, datos, tipo, idCheck) => {
                if(!datos) return "";
                let res = `<div class="text-left"><span class="step-tag">${titulo}</span>`;
                if(tipo === 'grid') {
                    res += `<div class="grid grid-cols-2 gap-2">`;
                    datos.split(',').forEach(d => {
                        let n = d.trim(), pr = 0;
                        if(d.includes(':+')) { n = d.split(':+')[0].trim(); pr = parseFloat(d.split(':+')[1]) || 0; }
                        res += `<div class="grid-option" onclick="toggleSeleccion(this, ${pr}, '${idCheck}')">${n} ${pr > 0 ? `<span class="block text-red-400 text-[8px] mt-1">+${pr.toFixed(2)}€</span>` : ''}</div>`;
                    });
                    res += `</div>`;
                } else {
                    res += `<div class="space-y-2">`;
                    datos.split(',').forEach(d => {
                        const parts = d.split(':');
                        const n = parts[0];
                        const price = parseFloat(parts[1] || 0);
                        res += `
                        <div class="flex justify-between items-center py-3 border-b border-white/5">
                            <div class="flex flex-col"><span class="text-[11px] font-bold uppercase">${n.trim()}</span><span class="text-[9px] text-red-500">+${price.toFixed(2)}€</span></div>
                            <div class="flex items-center gap-4 bg-white/5 p-1 rounded-xl">
                                <div class="w-8 h-8 flex items-center justify-center bg-white/5 rounded-lg text-cyan-400" onclick="updExtra(this, -1, ${price})">−</div>
                                <span class="text-xs font-black qty">0</span>
                                <div class="w-8 h-8 flex items-center justify-center bg-white/5 rounded-lg text-cyan-400" onclick="updExtra(this, 1, ${price})">+</div>
                            </div>
                        </div>`;
                    });
                    res += `</div>`;
                }
                return res + `</div>`;
           };
 
           html += renderSeccion("Obligatorio", p.SELECCION_OBLIGATORIA, 'grid', 'oblig');
           html += renderSeccion("Personalizar", p.SELECCION_UNICA, 'grid', 'unica');
           html += renderSeccion("Extras", p.EXTRAS, 'lista', 'extras');
 
           html += `
                <div class="pt-8 mb-10 border-t border-white/10 text-left">
                    <span class="step-tag">Unidades</span>
                    <div class="flex items-center justify-between bg-white/5 p-4 rounded-2xl">
                        <span class="text-[10px] font-black uppercase opacity-60">Cantidad</span>
                        <div class="flex items-center gap-6">
                            <button onclick="updCantPlato(-1)" class="w-10 h-10 bg-white/10 rounded-xl font-bold">−</button>
                            <span id="cant-plato-master" class="text-xl font-black">1</span>
                            <button onclick="updCantPlato(1)" class="w-10 h-10 bg-cyan-400 rounded-xl text-dark font-bold">+</button>
                        </div>
                    </div>
                </div>`;
 
           document.getElementById('contenedor-pasos').innerHTML = html;
           document.getElementById('modal-plato').style.display = 'flex';
           actualizarBarraModal();
       }
 
       function updCantPlato(c) {
           itemActual.cantidad = Math.max(1, itemActual.cantidad + c);
           document.getElementById('cant-plato-master').innerText = itemActual.cantidad;
           actualizarBarraModal();
       }
 
       function toggleSeleccion(el, precio, idCheck) {
           el.parentElement.querySelectorAll('.grid-option').forEach(o => o.classList.remove('selected'));
           el.classList.add('selected');
           if(idCheck === 'oblig') itemActual.obligatorioOk = true;
           itemActual.pOpciones = precio;
           actualizarBarraModal();
       }
 
       function updExtra(el, change, price) {
           const qtySpan = el.parentElement.querySelector('.qty');
           let val = parseInt(qtySpan.innerText) + change;
           if(val >= 0) {
                qtySpan.innerText = val;
                itemActual.pExtras += (change * price);
                actualizarBarraModal();
           }
       }
 
       function actualizarBarraModal() {
           const btn = document.getElementById('btn-anadir-modal');
           const total = (itemActual.pBase + itemActual.pOpciones + itemActual.pExtras) * itemActual.cantidad;
           document.getElementById('total-modal-btn').innerText = total.toFixed(2) + "€";
           btn.disabled = !itemActual.obligatorioOk;
           btn.className = itemActual.obligatorioOk ? "w-full bg-cyan-400 text-dark font-black py-5 rounded-2xl uppercase text-xs flex justify-between px-8 items-center" : "w-full bg-white/10 text-white/20 font-black py-5 rounded-2xl uppercase text-xs flex justify-between px-8 items-center";
           document.getElementById('txt-anadir').innerText = itemActual.obligatorioOk ? `Añadir ${itemActual.cantidad} al carrito` : "Selecciona opción obligatoria";
       }
 
       function confirmarAnadir() {
           const totalUnitario = itemActual.pBase + itemActual.pOpciones + itemActual.pExtras;
           cesta.push({ nombre: `${itemActual.cantidad}x ${itemActual.data.PLATO}`, total: totalUnitario * itemActual.cantidad });
           actualizarCestaBar();
           cerrarModal();
       }
 
       function actualizarCestaBar() {
           const bar = document.getElementById('cesta-flotante');
           if(cesta.length > 0) {
                bar.classList.replace('hidden', 'flex');
                const total = cesta.reduce((acc, i) => acc + i.total, 0);
                document.getElementById('cesta-info').innerText = `🛒 ${cesta.length} PRODUCTOS`;
                document.getElementById('cesta-total').innerText = `${total.toFixed(2)}€ TOTAL`;
           } else { bar.classList.replace('flex', 'hidden'); }
       }
function abrirCheckout() {
    const modal = document.getElementById('panel-checkout');
    modal.style.display = 'flex';

    let subtotal = 0;
    cesta.forEach(i => { subtotal += parseFloat(i.total || 0); });
    
    const envio = 2.50;
    const plataforma = 1.00;
    const totalFinal = subtotal + envio + plataforma;

    let html = `
        <div class="p-6 max-w-md mx-auto">
            <button onclick="cerrarCheckout()" class="mb-4 text-cyan-400 font-black uppercase text-[9px] flex items-center gap-2 border border-cyan-400/20 px-3 py-1.5 rounded-xl bg-white/5">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"></path></svg>
                VOLVER
            </button>

            <h3 class="text-xl font-black italic uppercase mb-4 text-white">Finalizar Pedido</h3>

            <div class="bg-white/5 border border-white/10 rounded-[1.5rem] p-5 mb-6 shadow-xl text-white/40 font-black uppercase text-[10px] tracking-widest">
                <div class="flex justify-between mb-2"><span>Sub-total</span><span class="text-white">${subtotal.toFixed(2)}€</span></div>
                <div class="flex justify-between mb-2"><span>Envío</span><span class="text-white">${envio.toFixed(2)}€</span></div>
                <div class="flex justify-between mb-3"><span>Plataforma</span><span class="text-white">${plataforma.toFixed(2)}€</span></div>
                <div class="border-t border-white/10 pt-3 flex justify-between items-center text-cyan-400 text-base italic">
                    <span>TOTAL</span><span class="text-xl font-black">${totalFinal.toFixed(2)}€</span>
                </div>
            </div>

            <div class="space-y-3">
                <input type="text" id="cliente-nombre" placeholder="NOMBRE COMPLETO" class="w-full text-sm p-3 rounded-xl bg-white/5 border border-white/10 text-white">
                <input type="tel" id="cliente-telf" placeholder="TELÉFONO" class="w-full text-sm p-3 rounded-xl bg-white/5 border border-white/10 text-white">
                <input type="text" id="cliente-dir" placeholder="DIRECCIÓN DE ENTREGA" class="w-full text-sm p-3 rounded-xl bg-white/5 border border-white/10 text-white">
                <select id="metodo-pago" class="w-full text-sm p-3 rounded-xl bg-white/5 border border-white/10 text-white">
                    <option value="EFECTIVO">EFECTIVO</option>
                    <option value="BIZUM">BIZUM</option>
                    <option value="TARJETA">TARJETA AL REPARTIDOR</option>
                </select>

                <div class="p-3 bg-white/5 border border-white/5 rounded-xl mt-4">
                    <label class="flex items-start gap-3 cursor-pointer">
                        <input type="checkbox" id="check-legal" onchange="document.getElementById('btn-enviar').disabled = !this.checked" class="mt-1 w-4 h-4 accent-cyan-400">
                        <span class="text-[9px] text-white/50 leading-tight font-medium">
                            Acepto los <a href="#" class="text-cyan-400 underline">términos y condiciones</a> y el tratamiento de mis datos según la política de privacidad (Ley 3/2018 RGPD).
                        </span>
                    </label>
                </div>
            </div>

           <button id="btn-enviar" disabled onclick="enviarPedidoFinal()" class="w-full bg-cyan-400 text-black h-14 rounded-2xl font-black uppercase italic mt-6 shadow-lg shadow-cyan-400/20 active:scale-95 transition-all text-sm disabled:opacity-30 disabled:grayscale disabled:pointer-events-none">
                Efectuar Pedido »
            </button>
        </div>
    `;

    modal.innerHTML = html;
}

function vaciarCesta() { 
    cesta = []; 
    actualizarCestaBar(); 
    cerrarCheckout(); 
}

function cerrarModal() { document.getElementById('modal-plato').style.display = 'none'; }

function cerrarCheckout() { document.getElementById('panel-checkout').style.display = 'none'; }

function filtrarCat(cat, el) {
    // 1. Estética de los chips
    document.querySelectorAll('.cat-chip').forEach(c => {
        c.classList.remove('active', 'bg-cyan-400', 'text-dark');
        c.classList.add('bg-white/5', 'text-white/60');
    });
    el.classList.add('active', 'bg-cyan-400', 'text-dark');
    el.classList.remove('bg-white/5', 'text-white/60');
    
    // 2. Lógica de filtrado de platos
    document.querySelectorAll('.plato-card').forEach(p => {
        if (cat === 'TODOS') {
            p.classList.remove('hidden');
        } else {
            p.classList.toggle('hidden', p.getAttribute('data-cat') !== cat);
        }
    });
}
 
async function enviarPedidoFinal() {
    // 1. OBTENER DATOS (IDs sincronizados con el diseño nuevo)
    const nomCli = document.getElementById('cliente-nombre').value;
    const telCli = document.getElementById('cliente-telf').value;
    const dirCli = document.getElementById('cliente-dir').value;
    const pagoCli = document.getElementById('metodo-pago').value;

    // 2. VALIDACIÓN
    if (!nomCli || !telCli || !dirCli) { 
        alert("⚠️ Completa tus datos de entrega"); 
        return; 
    }

    // 3. CÁLCULO (Subtotal + 3.50€ de cargos)
    const subtotal = cesta.reduce((acc, i) => acc + (parseFloat(i.total) || 0), 0);
    const cargosExtra = 3.50; 
    const totalConCargos = (subtotal + cargosExtra).toFixed(2);

    // 4. PREPARACIÓN DEL PAQUETE
    const paquete = {
        cliente_info: nomCli.toUpperCase(),
        telf_info: telCli,
        dir_info: dirCli.toUpperCase(),
        pedido_info: cesta.map(i => `${i.cantidad}x ${i.nombre}`).join(" | "),
        total_info: totalConCargos + "€",
        pago_info: pagoCli,
        id_res_info: rActivo.id 
    };

    // 5. DISPARO
    const btn = document.getElementById('btn-enviar');
    btn.innerText = "⏳ PROCESANDO...";
    btn.disabled = true;

    try {
        await fetch(scriptURL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify(paquete)
        });
        
        alert("✅ ¡Pedido enviado con éxito!");
        cesta = []; 
        if (typeof actualizarCestaBar === 'function') actualizarCestaBar();
        cerrarCheckout();
        
    } catch (error) {
        alert("❌ Error al conectar. Reintenta.");
        btn.innerText = "EFECTUAR PEDIDO »";
        btn.disabled = false;
    }
}
    init();

</script>
