<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express v77</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark: #020617; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: white; margin: 0; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        
        /* HEADER */
        header { background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.08); }
        .logo-box { width: 40px; height: 40px; background: white; border-radius: 10px; border: 2px solid var(--cyan); }

        /* CARDS */
        .card-rest { position: relative; overflow: hidden; border-radius: 2rem; height: 160px; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s ease; }
        .card-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.65; }
        .card-grad { position: absolute; inset: 0; background: linear-gradient(to top, var(--dark) 15%, transparent 100%); }

        /* MODAL */
        #modal-plato { position: fixed; inset: 0; background: var(--dark); z-index: 1000; display: none; flex-direction: column; overflow-y: auto; }
        
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <header class="sticky top-0 z-50 px-6 py-4 flex items-center gap-4">
        <div class="logo-box flex items-center justify-center font-black text-dark text-xl shadow-[0_0_15px_rgba(6,182,212,0.4)]">A</div>
        <div class="flex flex-col text-left">
            <span class="font-black text-xl tracking-tighter text-white uppercase leading-none">Aguadulce</span>
            <span class="text-[8px] font-bold tracking-[0.5em] text-cyan-400 uppercase">Express</span>
        </div>
    </header>

    <main id="app-container" class="px-5 py-6 pb-24 text-center">
        <div class="py-32">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-cyan-400"></div>
            <p class="text-[9px] text-cyan-400/50 font-black uppercase tracking-[0.3em] mt-4">Conectando Bóveda...</p>
        </div>
    </main>

    <div id="modal-plato">
        <button onclick="cerrarModal()" class="absolute top-6 left-6 z-[1010] bg-black/50 backdrop-blur-md w-11 h-11 rounded-2xl flex items-center justify-center text-white border border-white/10">✕</button>
        <img id="modal-img" src="" class="w-full h-[38vh] object-cover">
        
        <div class="px-7 py-8 pb-40">
            <div id="modal-info" class="text-left"></div>
            <div class="mt-10 flex items-center justify-between bg-white/5 p-5 rounded-[2rem] border border-white/10">
                <span class="text-[10px] font-black uppercase tracking-widest text-slate-500 ml-2">Unidades</span>
                <div class="flex items-center gap-6">
                    <button onclick="updateQty(-1)" class="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center text-xl font-bold border border-white/10">-</button>
                    <span id="qty-num" class="text-2xl font-black text-cyan-400">1</span>
                    <button onclick="updateQty(1)" class="w-12 h-12 rounded-2xl bg-cyan-500 text-dark flex items-center justify-center text-xl font-black shadow-lg shadow-cyan-500/30">+</button>
                </div>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 p-7 bg-gradient-to-t from-dark via-dark to-transparent">
            <button class="w-full bg-cyan-500 text-dark font-black py-6 rounded-[2.2rem] uppercase text-xs tracking-widest shadow-2xl">
                Añadir • <span id="total-price">0.00</span>€
            </button>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyutzaHTfEwHGnoWVy_ptlNg5vTU1GvwflEwU4-KIRt2q7CvU0tr_SacmnhakPTTJ_l/exec';
        let db = { rest: [], menu: [] };
        let activeP = null, qty = 1;

        // FUNCIÓN DE LIMPIEZA AGRESIVA
        const clean = (str) => String(str || '').trim().toUpperCase();

        async function init() {
            try {
                const res = await fetch(scriptURL);
                const data = await res.json();
                const getS = (n) => data[Object.keys(data).find(k => clean(k) === clean(n))] || [];
                db.rest = getS('RESTAURANTES');
                db.menu = getS('MENU_GENERAL');
                renderHome();
            } catch (e) {
                document.getElementById('app-container').innerHTML = `<p class="py-20 text-red-400 text-[10px] font-black uppercase tracking-widest">Error de Sincronización</p>`;
            }
        }

        function renderHome() {
            const container = document.getElementById('app-container');
            let html = `<div class="mb-7 text-left"><h2 class="text-[10px] tracking-[0.3em] text-slate-500 uppercase font-black ml-1 text-center">Locales Disponibles</h2></div>`;
            db.rest.forEach(r => {
                const restID = clean(r.ID_RESTAURANTE);
                html += `
                <div class="card-rest mb-5 shadow-2xl" onclick="verMenu('${r.NOMBRE_RESTAURANTE.replace(/'/g, "")}', '${restID}')">
                    <img src="${r.FOTO || 'https://via.placeholder.com/600x400'}" class="card-img">
                    <div class="card-grad"></div>
                    <div class="absolute bottom-6 left-7 text-left">
                        <p class="text-[8px] text-cyan-400 font-black uppercase tracking-[0.2em] mb-1">AGUADULCE • ${r.CATEGORIA || 'DELI'}</p>
                        <h3 class="text-2xl font-black text-white uppercase tracking-tighter leading-none">${r.NOMBRE_RESTAURANTE}</h3>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        function verMenu(nombre, id) {
            const container = document.getElementById('app-container');
            
            // FILTRADO CON LIMPIEZA AGRESIVA (ID vs ID)
            const platos = db.menu.filter(m => clean(m.ID_RESTAURANTE) === clean(id));

            let html = `
                <div class="flex items-center gap-4 mb-8 text-left">
                    <button onclick="renderHome()" class="bg-white/5 w-11 h-11 rounded-2xl border border-white/10 text-cyan-400 flex items-center justify-center">←</button>
                    <div><h2 class="text-xl font-black text-white uppercase tracking-tighter leading-none">${nombre}</h2><p class="text-[9px] text-cyan-400 font-black uppercase mt-1">Carta en Euros (€)</p></div>
                </div>
                <div class="grid gap-3">`;

            if(platos.length === 0) {
                html += `<div class="py-20 text-slate-600 uppercase text-[10px] font-black tracking-widest">No hay platos vinculados al ID: ${id}</div>`;
            }

            platos.forEach(p => {
                html += `
                <div class="bg-white/5 p-4 rounded-[1.8rem] flex justify-between items-center border border-white/5 shadow-xl active:scale-95 transition-all" onclick='abrirPlato(${JSON.stringify(p).replace(/'/g, "&apos;")})'>
                    <div class="text-left flex-1 pr-4">
                        <div class="font-bold text-white text-[11px] uppercase mb-1 leading-snug">${p.PLATO}</div>
                        <div class="text-cyan-400 font-black text-lg tracking-tighter">${parseFloat(p.PRECIO || 0).toFixed(2)}€</div>
                    </div>
                    <img src="${p.FOTO_PLATO || 'https://via.placeholder.com/150'}" class="w-16 h-16 rounded-2xl object-cover border border-white/10">
                </div>`;
            });
            container.innerHTML = html + `</div>`;
            window.scrollTo(0,0);
        }

        function abrirPlato(p) {
            activeP = p; qty = 1;
            const modal = document.getElementById('modal-plato');
            document.getElementById('modal-img').src = p.FOTO_PLATO || 'https://via.placeholder.com/800x600';
            document.getElementById('modal-info').innerHTML = `
                <h2 class="text-2xl font-black text-white uppercase tracking-tighter mb-2 leading-none">${p.PLATO}</h2>
                <p class="text-slate-400 text-xs leading-relaxed mb-6">${p.DESCRIPCION || 'Calidad Aguadulce Express.'}</p>
                <div class="text-2xl font-black text-cyan-400">${parseFloat(p.PRECIO || 0).toFixed(2)}€</div>
            `;
            recalc();
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function updateQty(v) { qty = Math.max(1, qty + v); document.getElementById('qty-num').innerText = qty; recalc(); }
        function recalc() { document.getElementById('total-price').innerText = (parseFloat(activeP.PRECIO || 0) * qty).toFixed(2); }
        function cerrarModal() { document.getElementById('modal-plato').style.display = 'none'; document.body.style.overflow = 'auto'; }

        init();
    </script>
</body>
</html>
