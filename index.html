<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express Pro v67</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark: #020617; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: white; margin: 0; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .brand { font-family: 'Orbitron', sans-serif; }
        
        /* Tarjetas de Restaurante */
        .card-rest {
            position: relative; overflow: hidden; border-radius: 2rem;
            height: 185px; border: 1px solid rgba(255,255,255,0.06);
            transition: all 0.3s ease;
        }
        .card-rest:active { transform: scale(0.97); border-color: var(--cyan); }
        .card-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .card-gradient {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(2,6,23,1) 5%, rgba(2,6,23,0.7) 50%, transparent 100%);
        }

        /* MODAL PUNTO 3 */
        #modal-plato { 
            position: fixed; inset: 0; background: var(--dark); 
            z-index: 1000; display: none; flex-direction: column; 
            overflow-y: auto; animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .foto-header { width: 100%; height: 35vh; object-fit: cover; }
        .btn-cerrar { 
            position: absolute; top: 20px; left: 20px; z-index: 1010;
            background: rgba(0,0,0,0.5); backdrop-blur(10px);
            width: 45px; height: 45px; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <header class="sticky top-0 z-50 bg-[#020617]/95 backdrop-blur-xl px-6 py-5 flex items-center justify-between border-b border-white/10">
        <div class="brand">
            <div class="text-xl text-cyan-400 leading-none">AGUADULCE</div>
            <div class="text-[8px] tracking-[0.4em] text-white/40 text-right uppercase">Express</div>
        </div>
        <img src="apple-touch-icon.png" class="w-9 h-9 bg-white rounded-full p-1 border border-cyan-400">
    </header>

    <main id="app-container" class="px-5 py-6">
        <div class="text-center p-10 mt-10">
            <div class="inline-block animate-spin rounded-full h-6 w-6 border-t-2 border-cyan-400 mb-4"></div>
            <p class="text-[9px] text-cyan-400/60 uppercase tracking-[0.3em]">Cargando Experiencia...</p>
        </div>
    </main>

    <div id="modal-plato">
        <button onclick="cerrarModal()" class="btn-cerrar text-white">✕</button>
        <img id="modal-img" src="" class="foto-header">
        <div class="px-6 py-8">
            <div id="modal-header-info"></div>
            <div id="modal-opciones" class="mt-8 space-y-8"></div>
            
            <button class="w-full bg-cyan-500 text-dark font-black py-5 rounded-3xl mt-10 uppercase tracking-widest shadow-lg shadow-cyan-500/20 active:scale-95 transition-all">
                Añadir al Carrito
            </button>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyutzaHTfEwHGnoWVy_ptlNg5vTU1GvwflEwU4-KIRt2q7CvU0tr_SacmnhakPTTJ_l/exec';
        let db = { restaurantes: [], menu: [] };

        async function cargarDatos() {
            try {
                const respuesta = await fetch(scriptURL);
                const data = await respuesta.json();
                const findSheet = (n) => data[Object.keys(data).find(k => k.toLowerCase().trim() === n.toLowerCase())] || [];
                db.restaurantes = findSheet('RESTAURANTES');
                db.menu = findSheet('MENU_GENERAL');
                renderizarRestaurantes();
            } catch (e) {
                document.getElementById('app-container').innerHTML = `<p class="text-center text-[10px] text-red-400 uppercase p-20">Error de conexión</p>`;
            }
        }

        function renderizarRestaurantes() {
            const contenedor = document.getElementById('app-container');
            let html = `<div class="mb-6 ml-1"><h2 class="text-[10px] tracking-[0.2em] text-slate-500 uppercase font-extrabold">Descubre tu sabor</h2></div>`;
            
            db.restaurantes.forEach(rest => {
                const esAbierto = rest.ESTADO?.toLowerCase() === 'abierto';
                html += `
                <div class="card-rest mb-5" onclick="verMenuRestaurante('${rest.NOMBRE_RESTAURANTE}', '${rest.ID_RESTAURANTE}')">
                    <img src="${rest.FOTO || 'https://via.placeholder.com/600x400'}" class="card-img">
                    <div class="card-gradient"></div>
                    <div class="absolute top-4 left-4 flex gap-2">
                        <div class="bg-black/60 backdrop-blur-md px-2.5 py-1 rounded-xl border border-white/10 flex items-center gap-1.5 text-[11px] font-bold">
                            <span class="text-amber-400">⭐</span> ${rest.CALIFICACION || '4.0'}
                        </div>
                    </div>
                    <div class="absolute bottom-5 left-6 right-6 text-left">
                        <p class="text-[9px] text-cyan-400 font-bold uppercase tracking-[0.2em] mb-1">${rest.CATEGORIA || 'General'}</p>
                        <h3 class="text-2xl font-extrabold text-white tracking-tight mb-1 leading-none">${rest.NOMBRE_RESTAURANTE}</h3>
                        <div class="flex items-center gap-2 text-white/50 text-[10px] font-medium tracking-wide">
                            <svg class="w-3 h-3 text-cyan-400/70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            ABIERTOS: ${rest.HORARIO || 'Consultar'}
                        </div>
                    </div>
                </div>`;
            });
            contenedor.innerHTML = html;
        }

        function verMenuRestaurante(nombreRest, idRest) {
            const contenedor = document.getElementById('app-container');
            const platos = db.menu.filter(p => String(p.ID_RESTAURANTE) === String(idRest));
            let html = `
                <div class="flex items-center gap-4 mb-8">
                    <button onclick="renderizarRestaurantes()" class="bg-white/5 p-4 rounded-2xl border border-white/10 text-cyan-400 active:scale-90 transition-all">←</button>
                    <div><h2 class="text-2xl font-extrabold text-white tracking-tight">${nombreRest}</h2><p class="text-[10px] text-cyan-400/60 font-bold tracking-widest uppercase">Menú</p></div>
                </div>
                <div class="grid gap-4">`;

            platos.forEach(plato => {
                html += `
                <div class="bg-gradient-to-br from-white/10 to-transparent p-4 rounded-[1.8rem] flex justify-between items-center border border-white/5 active:scale-95 transition-all" 
                     onclick="abrirDetallePlato(${JSON.stringify(plato).replace(/"/g, '&quot;')})">
                    <div class="text-left"><div class="font-bold text-white text-sm uppercase tracking-wide mb-2">${plato.PLATO}</div>
                    <div class="text-cyan-400 font-black text-xl">$${parseFloat(plato.PRECIO || 0).toFixed(2)}</div></div>
                    <img src="${plato.FOTO_PLATO || 'https://via.placeholder.com/150'}" class="w-16 h-16 rounded-2xl object-cover shadow-lg">
                </div>`;
            });
            contenedor.innerHTML = html + `</div>`;
        }

        function abrirDetallePlato(plato) {
            const modal = document.getElementById('modal-plato');
            document.getElementById('modal-img').src = plato.FOTO_PLATO || 'https://via.placeholder.com/600x400';
            
            document.getElementById('modal-header-info').innerHTML = `
                <h2 class="text-3xl font-extrabold text-white tracking-tighter mb-2 uppercase">${plato.PLATO}</h2>
                <p class="text-slate-400 text-sm leading-relaxed mb-4">${plato.DESCRIPCION || 'Sin descripción disponible.'}</p>
                <div class="text-3xl font-black text-cyan-400">$${parseFloat(plato.PRECIO || 0).toFixed(2)}</div>
            `;

            // Aquí procesaremos SELECCION_UNIC, EXTRAS e INGREDIENTES próximamente
            document.getElementById('modal-opciones').innerHTML = `
                <div class="bg-white/5 p-6 rounded-3xl border border-dashed border-white/10 text-center">
                    <p class="text-slate-500 text-[10px] uppercase font-bold tracking-widest">Configurando opciones dinámicas...</p>
                </div>
            `;

            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function cerrarModal() {
            document.getElementById('modal-plato').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        cargarDatos();
    </script>
</body>
</html>
