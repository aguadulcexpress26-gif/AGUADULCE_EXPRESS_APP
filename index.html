<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express Pro v64</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark: #020617; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: white; margin: 0; -webkit-tap-highlight-color: transparent; }
        .brand { font-family: 'Orbitron', sans-serif; }
        
        .card-rest {
            position: relative; overflow: hidden; border-radius: 2.5rem;
            height: 320px; border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }
        .card-rest:active { transform: scale(0.97); border-color: var(--cyan); box-shadow: 0 0 30px rgba(6,182,212,0.3); }
        
        .card-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
        .card-gradient {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(2,6,23,1) 0%, rgba(2,6,23,0.8) 35%, transparent 70%);
        }
        .card-content { position: absolute; bottom: 0; left: 0; right: 0; padding: 24px; }
    </style>
</head>
<body>

    <header class="sticky top-0 z-50 bg-[#020617]/90 backdrop-blur-xl px-6 py-5 flex items-center justify-between border-b border-white/10">
        <div class="brand">
            <div class="text-2xl text-cyan-400 leading-none">AGUADULCE</div>
            <div class="text-[10px] tracking-[0.4em] text-white/70 text-right">EXPRESS</div>
        </div>
        <img src="apple-touch-icon.png" class="w-11 h-11 bg-white rounded-full p-1 border-2 border-cyan-400 shadow-[0_0_10px_rgba(6,182,212,0.5)]">
    </header>

    <main id="app-container" class="px-6 py-8">
        <div class="text-center p-20">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-cyan-400 mb-4"></div>
            <p class="brand text-[10px] text-cyan-400 uppercase tracking-widest">Cargando Escaparate...</p>
        </div>
    </main>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyutzaHTfEwHGnoWVy_ptlNg5vTU1GvwflEwU4-KIRt2q7CvU0tr_SacmnhakPTTJ_l/exec';
        let db = { restaurantes: [], menu: [] };

        async function cargarDatos() {
            try {
                const respuesta = await fetch(scriptURL);
                const data = await respuesta.json();
                const findSheet = (n) => data[Object.keys(data).find(k => k.toLowerCase().trim() === n.toLowerCase())] || [];
                
                db.restaurantes = findSheet('RESTAURANTES');
                db.menu = findSheet('MENU_GENERAL');
                renderizarRestaurantes();
            } catch (e) {
                document.getElementById('app-container').innerHTML = `<p class="text-red-500 text-center brand text-[10px]">ERROR DE ENLACE</p>`;
            }
        }

        function renderizarRestaurantes() {
            const contenedor = document.getElementById('app-container');
            let html = `<div class="mb-10 text-center"><h2 class="brand text-[10px] tracking-[0.5em] text-cyan-400/50 uppercase">Restaurantes Destacados</h2></div>`;
            
            db.restaurantes.forEach(rest => {
                const esAbierto = rest.ESTADO?.toLowerCase() === 'abierto';
                // DATOS FUNCIONALES DEL EXCEL
                const calif = rest.CALIFICACION || '4.0'; 
                const horario = rest.HORARIO || 'Consultar local';

                html += `
                <div class="card-rest mb-8 shadow-2xl" onclick="verMenuRestaurante('${rest.NOMBRE_RESTAURANTE}', '${rest.ID_RESTAURANTE}')">
                    <img src="${rest.FOTO || 'https://via.placeholder.com/600x400'}" class="card-img">
                    <div class="card-gradient"></div>

                    ${esAbierto ? `
                    <div class="absolute top-6 right-6 inline-flex items-center gap-2 bg-cyan-500/20 text-cyan-400 px-4 py-1.5 rounded-full border border-cyan-400/20 backdrop-blur-md">
                        <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-cyan-500"></span></span>
                        <p class="text-[9px] font-bold uppercase tracking-widest">Abierto</p>
                    </div>` : ''}

                    <div class="card-content text-left">
                        <div class="flex items-center justify-between mb-2">
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em]">${rest.CATEGORIA || 'GASTRONOMÍA'}</p>
                            <div class="flex items-center gap-1.5 bg-black/40 px-3 py-1 rounded-full border border-white/10">
                                <span class="text-amber-400 text-xs">⭐</span>
                                <span class="text-white font-black text-sm">${calif}</span>
                            </div>
                        </div>

                        <h3 class="brand text-3xl uppercase tracking-tighter text-white mb-3 border-l-4 border-cyan-400 pl-4">${rest.NOMBRE_RESTAURANTE}</h3>
                        
                        <div class="text-slate-300 text-[10px] flex items-center gap-4 border-t border-white/10 pt-3">
                            <div class="flex items-center gap-1.5">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-3.5 h-3.5 text-cyan-400">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                                <span class="font-semibold uppercase tracking-wider">${horario}</span>
                            </div>
                        </div>
                    </div>
                </div>`;
            });
            contenedor.innerHTML = html;
        }

        function verMenuRestaurante(nombreRest, idRest) {
            const contenedor = document.getElementById('app-container');
            const platos = db.menu.filter(p => String(p.ID_RESTAURANTE) === String(idRest));
            let html = `
                <button onclick="renderizarRestaurantes()" class="text-cyan-400 text-[10px] brand mb-8 tracking-widest flex items-center gap-2 bg-white/5 px-5 py-2 rounded-full border border-white/10 uppercase"><span>←</span> Volver</button>
                <h2 class="brand text-2xl text-white mb-8 uppercase tracking-tight text-left border-b-2 border-cyan-400 pb-2">${nombreRest}</h2>
                <div class="grid gap-5">`;

            platos.forEach(plato => {
                html += `
                <div class="bg-gradient-to-r from-white/5 to-transparent p-4 rounded-[2rem] flex justify-between items-center border border-white/5 active:scale-95 transition-all" onclick="alert('Cargando ${plato.PLATO}...')">
                    <div class="flex-1 pr-4 text-left">
                        <div class="font-bold text-white text-md uppercase leading-tight">${plato.PLATO}</div>
                        <div class="text-cyan-400 font-black mt-2 text-xl tracking-tighter">$${parseFloat(plato.PRECIO || 0).toFixed(2)}</div>
                    </div>
                    <img src="${plato.FOTO_PLATO || 'https://via.placeholder.com/150'}" class="w-24 h-24 rounded-[1.8rem] object-cover border border-white/10">
                </div>`;
            });
            contenedor.innerHTML = html + `</div>`;
        }

        cargarDatos();
    </script>
</body>
</html>
