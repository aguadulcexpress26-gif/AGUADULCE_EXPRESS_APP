<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express v61</title>
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark: #020617; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: white; margin: 0; }
        .brand { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .card { background: linear-gradient(135deg, rgba(30,41,59,0.5) 0%, rgba(15,23,42,0.8) 100%); border: 1px solid rgba(255,255,255,0.05); }
        #loader { position: fixed; inset: 0; background: var(--dark); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="loader">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-cyan-400 mb-4"></div>
        <p class="brand text-cyan-400 tracking-widest text-xs">AGUADULCE EXPRESS</p>
    </div>
    <header class="glass sticky top-0 z-50 px-6 py-4 flex items-center justify-between">
        <div class="brand">
            <div class="text-xl text-cyan-400">AGUADULCE</div>
            <div class="text-[10px] tracking-[0.4em]">EXPRESS</div>
        </div>
        <img src="apple-touch-icon.png" class="w-10 h-10 bg-white rounded-full p-1 border border-cyan-400">
    </header>
    <main id="app" class="px-6 pt-6 pb-24"></main>
    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyutzaHTfEwHGnoWVy_ptlNg5vTU1GvwflEwU4-KIRt2q7CvU0tr_SacmnhakPTTJ_l/exec';
        let dataCache = {};
        let carrito = [];

        async function fetchData() {
            try {
                const res = await fetch(scriptURL);
                dataCache = await res.json();
                document.getElementById('loader').classList.add('hidden');
                renderHome();
            } catch (e) {
                alert("Error de conexión con la base de datos");
            }
        }

        function renderHome() {
            const app = document.getElementById('app');
            let h = `<h2 class="brand text-sm mb-6 tracking-widest text-slate-400">RESTAURANTES</h2><div class="grid gap-4">`;
            Object.keys(dataCache).forEach(r => {
                h += `<div onclick="verR('${r}')" class="card p-5 rounded-3xl flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-cyan-500/10 rounded-2xl flex items-center justify-center text-xl">🍴</div>
                        <div class="font-bold uppercase tracking-tight">${r}</div>
                    </div>
                    <span class="text-cyan-400">→</span>
                </div>`;
            });
            app.innerHTML = h + `</div>`;
        }
        function verR(n) {
            const app = document.getElementById('app');
            let h = `<button onclick="renderHome()" class="text-cyan-400 text-sm mb-4">← VOLVER</button>
                     <h2 class="brand text-xl text-white mb-6 uppercase">${n}</h2><div class="grid gap-4">`;
            dataCache[n].forEach((p, i) => {
                h += `<div class="card p-4 rounded-3xl flex justify-between items-center">
                    <div>
                        <div class="font-bold text-white">${p.nombre}</div>
                        <div class="text-cyan-400 font-bold mt-1">$${p.precio}</div>
                    </div>
                    <button onclick="add('${n}',${i})" class="bg-cyan-500 w-10 h-10 rounded-2xl font-bold">+</button>
                </div>`;
            });
            app.innerHTML = h + `</div>`;
        }

        function add(r, i) {
            carrito.push(dataCache[r][i]);
            alert("Añadido al carrito");
        }

        fetchData();
    </script>
</body>
</html>
