<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express Pro v71</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark: #020617; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: white; margin: 0; -webkit-tap-highlight-color: transparent; }
        
        header { background: rgba(2, 6, 23, 0.75); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.08); }
        .logo-circle { width: 44px; height: 44px; background: white; border-radius: 14px; padding: 2px; border: 2px solid var(--cyan); box-shadow: 0 0 15px rgba(6, 182, 212, 0.4); }

        .card-rest { position: relative; overflow: hidden; border-radius: 2.2rem; height: 180px; border: 1px solid rgba(255,255,255,0.06); transition: all 0.3s ease; }
        .card-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.85; }
        .card-gradient { position: absolute; inset: 0; background: linear-gradient(to top, rgba(2,6,23,0.98) 0%, rgba(2,6,23,0.4) 60%, transparent 100%); }

        #modal-plato { position: fixed; inset: 0; background: var(--dark); z-index: 1000; display: none; flex-direction: column; overflow-y: auto; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .extra-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 1.2rem; padding: 12px 18px; transition: 0.2s; }
        .extra-item.active { border-color: var(--cyan); background: rgba(6, 182, 212, 0.1); }
    </style>
</head>
<body>

    <header class="sticky top-0 z-50 px-6 py-5 flex items-center gap-4">
        <img src="apple-touch-icon.png" class="logo-circle" onerror="this.src='https://via.placeholder.com/100?text=A'">
        <div class="flex flex-col text-left">
            <span class="font-black text-2xl tracking-tight text-white leading-none uppercase">Aguadulce</span>
            <span class="text-[9px] font-bold tracking-[0.4em] text-cyan-400 uppercase">Express</span>
        </div>
    </header>

    <main id="app-container" class="px-5 py-6">
        <div class="text-center py-24"><div class="inline-block animate-spin rounded-full h-6 w-6 border-t-2 border-cyan-400"></div></div>
    </main>

    <div id="modal-plato">
        <button onclick="cerrarModal()" class="absolute top-5 left-5 z-[1010] bg-black/40 backdrop-blur-md w-10 h-10 rounded-xl flex items-center justify-center text-white border border-white/10">✕</button>
        <img id="modal-img" src="" class="w-full h-[35vh] object-cover">
        
        <div class="px-7 py-8 pb-32">
            <div id="modal-header-info" class="text-left"></div>
            
            <div id="modal-opciones" class="mt-8 space-y-6"></div>
            
            <div class="mt-10 flex items-center justify-between bg-white/5 p-4 rounded-3xl border border-white/10">
                <span class="font-bold text-sm uppercase tracking-widest ml-2">Cantidad</span>
                <div class="flex items-center gap-6">
                    <button onclick="cambiarCant(-1)" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center text-xl font-bold">-</button>
                    <span id="cant-num" class="text-xl font-black text-cyan-400">1</span>
                    <button onclick="cambiarCant(1)" class="w-10 h-10 rounded-full bg-cyan-500 text-dark flex items-center justify-center text-xl font-bold">+</button>
                </div>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-dark via-dark to-transparent">
            <button id="btn-add-main" class="w-full bg-cyan-500 text-dark font-black py-5 rounded-[2rem] uppercase text-sm tracking-widest shadow-xl shadow-cyan-500/20 active:scale-95 transition-all">
                Añadir al Pedido • $<span id="total-plato">0.00</span>
            </button>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyutzaHTfEwHGnoWVy_ptlNg5vTU1GvwflEwU4-KIRt2q7CvU0tr_SacmnhakPTTJ_l/exec';
        let db = { restaurantes: [], menu: [] };
        let currentPlato = null;
        let cantidad = 1;
        let extrasSeleccionados = [];

        async function cargarDatos() {
            try {
                const respuesta = await fetch(scriptURL);
                const data = await respuesta.json();
                const findSheet = (n) => data[Object.keys(data).find(k => k.toLowerCase().trim() === n.toLowerCase())] || [];
                db.restaurantes = findSheet('RESTAURANTES');
                db.menu = findSheet('MENU_GENERAL');
                renderizarRestaurantes();
            } catch (e) {
                document.getElementById('app-container').innerHTML = `<p class="text-center text-[10px] text-red-400 p-20">Error de conexión</p>`;
            }
        }

        function renderizarRestaurantes() {
            const contenedor = document.getElementById('app-container');
            let html = `<div class="mb-6 ml-1 text-left"><h2 class="text-[10px] tracking-[0.2em] text-slate-500 uppercase font-black">Restaurantes Disponibles</h2></div>`;
            db.restaurantes.forEach(rest => {
                html += `
                <div class="card-rest mb-5 shadow-2xl" onclick="verMenuRestaurante('${rest.NOMBRE_RESTAURANTE}', '${rest.ID_RESTAURANTE}')">
                    <img src="${rest.FOTO || 'https://via.placeholder.com/600x400'}" class="card-img">
                    <div class="card-gradient"></div>
                    <div class="absolute top-4 left-5 bg-black/50 backdrop-blur-md px-2.5 py-1 rounded-xl border border-white/5 text-[11px] font-bold">⭐ ${rest.CALIFICACION || '4.0'}</div>
                    <div class="absolute bottom-5 left-6 right-6 text-left">
                        <p class="text-[8px] text-cyan-400 font-extrabold uppercase tracking-[0.2em] mb-1">${rest.CATEGORIA || 'DELI'}</p>
                        <h3 class="text-xl font-bold text-white uppercase leading-tight">${rest.NOMBRE_RESTAURANTE}</h3>
                        <p class="text-[9px] text-white/50 uppercase font-semibold mt-1 tracking-wider">Abiertos: ${rest.HORARIO || '12:00-23:00'}</p>
                    </div>
                </div>`;
            });
            contenedor.innerHTML = html;
        }

        function verMenuRestaurante(nombreRest, idRest) {
            const contenedor = document.getElementById('app-container');
            const platos = db.menu.filter(p => String(p.ID_RESTAURANTE) === String(idRest));
            let html = `
                <div class="flex items-center gap-4 mb-8">
                    <button onclick="renderizarRestaurantes()" class="bg-white/5 w-12 h-12 rounded-2xl border border-white/10 text-cyan-400 flex items-center justify-center">←</button>
                    <div class="text-left"><h2 class="text-xl font-bold text-white uppercase">${nombreRest}</h2><p class="text-[9px] text-cyan-400 font-black uppercase tracking-widest">Menú</p></div>
                </div>
                <div class="grid gap-4">`;
            platos.forEach(plato => {
                html += `
                <div class="bg-gradient-to-br from-white/10 to-transparent p-4 rounded-[1.8rem] flex justify-between items-center border border-white/5 active:scale-95 transition-all shadow-xl" 
                     onclick='abrirDetallePlato(${JSON.stringify(plato).replace(/'/g, "&apos;")})'>
                    <div class="text-left flex-1 pr-4">
                        <div class="font-bold text-white text-xs uppercase mb-1.5 leading-tight">${plato.PLATO}</div>
                        <div class="text-cyan-400 font-black text-xl">$${parseFloat(plato.PRECIO || 0).toFixed(2)}</div>
                    </div>
                    <img src="${plato.FOTO_PLATO || 'https://via.placeholder.com/150'}" class="w-16 h-16 rounded-2xl object-cover shadow-lg border border-white/5">
                </div>`;
            });
            contenedor.innerHTML = html;
        }

        function abrirDetallePlato(plato) {
            currentPlato = plato;
            cantidad = 1;
            extrasSeleccionados = [];
            const modal = document.getElementById('modal-plato');
            document.getElementById('modal-img').src = plato.FOTO_PLATO || 'https://via.placeholder.com/600x400';
            
            document.getElementById('modal-header-info').innerHTML = `
                <h2 class="text-2xl font-black text-white uppercase tracking-tighter mb-2">${plato.PLATO}</h2>
                <p class="text-slate-400 text-xs leading-relaxed mb-6">${plato.DESCRIPCION || 'Ingredientes frescos de alta calidad.'}</p>
                <div class="flex flex-wrap gap-2 mb-2">${(plato.INGREDIENTES || '').split(',').map(i => i ? `<span class="bg-white/5 border border-white/10 px-3 py-1 rounded-full text-[9px] text-slate-400 uppercase font-bold">${i.trim()}</span>` : '').join('')}</div>
            `;

            // Procesar Extras (Formato: Queso:1.50, Bacon:2.00)
            let extrasHtml = '';
            if (plato.EXTRAS) {
                extrasHtml = `<div class="text-left"><h4 class="text-[10px] font-black uppercase tracking-[0.2em] text-cyan-400 mb-4">Añade Extras</h4><div class="grid gap-3">`;
                plato.EXTRAS.split(',').forEach((ex, idx) => {
                    const [nombre, precio] = ex.split(':');
                    if(nombre && precio) {
                        extrasHtml += `
                        <div id="extra-${idx}" onclick="toggleExtra('${nombre.trim()}', ${precio.trim()}, ${idx})" class="extra-item flex justify-between items-center">
                            <span class="text-xs font-bold text-white uppercase">${nombre.trim()}</span>
                            <span class="text-xs font-black text-cyan-400">+$${parseFloat(precio).toFixed(2)}</span>
                        </div>`;
                    }
                });
                extrasHtml += `</div></div>`;
            }
            document.getElementById('modal-opciones').innerHTML = extrasHtml;
            
            actualizarTotal();
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function toggleExtra(nombre, precio, idx) {
            const index = extrasSeleccionados.findIndex(e => e.nombre === nombre);
            const el = document.getElementById(`extra-${idx}`);
            if (index > -1) {
                extrasSeleccionados.splice(index, 1);
                el.classList.remove('active');
            } else {
                extrasSeleccionados.push({ nombre, precio });
                el.classList.add('active');
            }
            actualizarTotal();
        }

        function cambiarCant(val) {
            cantidad = Math.max(1, cantidad + val);
            document.getElementById('cant-num').innerText = cantidad;
            actualizarTotal();
        }

        function actualizarTotal() {
            let base = parseFloat(currentPlato.PRECIO || 0);
            let extrasSuma = extrasSeleccionados.reduce((acc, curr) => acc + curr.precio, 0);
            let total = (base + extrasSuma) * cantidad;
            document.getElementById('total-plato').innerText = total.toFixed(2);
        }

        function cerrarModal() {
            document.getElementById('modal-plato').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        cargarDatos();
    </script>
</body>
</html>
