<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#06b6d4">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/mZwjLXxw/Logo-Aguadulce-Express.jpg">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark: #020617; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark) !important; color: white; margin: 0; -webkit-tap-highlight-color: transparent; }
        
        #loader { position: fixed; inset: 0; background: var(--dark); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(6,182,212,0.1); border-top-color: var(--cyan); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* HEADER DINÁMICO */
        .brand-header { position: relative; height: 160px; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; border-bottom: 1px solid rgba(6,182,212,0.1); }
        #header-bg { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0.5; filter: blur(1px); transition: background 1s; }
        .brand-overlay { position: absolute; inset: 0; background: linear-gradient(to top, var(--dark), transparent); }
        .brand-content { position: relative; z-index: 10; display: flex; align-items: center; gap: 15px; }
        .brand-logo { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--cyan); object-fit: cover; background: white; }

        /* BANNER DE ANUNCIOS */
        .promo-banner { background: rgba(6,182,212,0.05); border-y: 1px solid rgba(6,182,212,0.1); padding: 8px 0; overflow: hidden; display: flex; }
        .promo-scroll { white-space: nowrap; animation: scroll-text 20s linear infinite; display: flex; gap: 50px; font-size: 10px; font-weight: 800; color: var(--cyan); text-transform: uppercase; letter-spacing: 1px; }
        @keyframes scroll-text { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        /* CARTAS Y MODALES */
        .plato-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 1.5rem; padding: 15px; display: flex; align-items: center; margin-bottom: 12px; }
        #modal-plato, #panel-checkout, #modal-legal { position: fixed; inset: 0; background: var(--dark); z-index: 1000; display: none; flex-direction: column; overflow-y: auto; }
        
        .step-tag { font-weight: 800; font-size: 9px; text-transform: uppercase; letter-spacing: 0.2em; color: #22d3ee; margin-bottom: 1rem; display: block; text-align: left; }
        input, select { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); padding: 16px; border-radius: 18px; color: white; width: 100%; margin-bottom: 12px; }

        /* PROMPT INSTALACIÓN */
        #install-prompt { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #fff; color: #000; padding: 20px; border-radius: 24px; z-index: 9999; display: none; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner mb-4"></div>
        <p class="text-cyan-400 text-[10px] font-black uppercase tracking-[0.3em]">Aguadulce Express v107...</p>
    </div>

    <header class="brand-header">
        <div id="header-bg"></div>
        <div class="brand-overlay"></div>
        <div class="brand-content">
            <img id="app-logo" src="https://i.postimg.cc/mZwjLXxw/Logo-Aguadulce-Express.jpg" class="brand-logo shadow-lg shadow-cyan-500/20">
            <div class="text-left">
                <h1 class="text-2xl font-black italic uppercase leading-none tracking-tighter">Aguadulce</h1>
                <p class="text-cyan-400 text-[9px] font-black uppercase tracking-[0.4em] mt-1">Express</p>
            </div>
        </div>
    </header>

    <div class="promo-banner">
        <div class="promo-scroll" id="texto-anuncio">Cargando anuncios...</div>
    </div>

    <main id="app-container" class="px-5 py-5 pb-32"></main>

    <div id="cesta-flotante" class="fixed bottom-5 left-4 right-4 bg-cyan-400 text-dark p-4 rounded-2xl hidden justify-between items-center z-[100] shadow-2xl">
        <div class="flex-1" onclick="abrirCheckout()">
            <span id="cesta-info" class="font-black text-sm uppercase">🛒 0 PRODUCTOS</span>
            <span id="cesta-total" class="block text-[10px] font-bold uppercase tracking-widest">0.00€ TOTAL</span>
        </div>
        <div class="text-red-600 font-black text-2xl px-2" onclick="vaciarCesta()">✕</div>
    </div>

    <div id="modal-plato">
        <button onclick="cerrarModal()" class="absolute top-5 left-5 z-[1001] bg-black/50 w-10 h-10 rounded-full text-white">✕</button>
        <img id="modal-img" src="" class="w-full h-[250px] object-cover">
        <div class="px-6 py-8 pb-40" id="contenedor-pasos"></div>
        <div class="fixed bottom-0 left-0 right-0 p-5 bg-gradient-to-t from-dark">
            <button id="btn-anadir-modal" onclick="confirmarAnadir()" class="w-full bg-cyan-400 text-dark font-black py-5 rounded-2xl uppercase text-xs flex justify-between px-8 items-center">
                <span>Añadir al pedido</span>
                <span id="total-modal-btn">0.00€</span>
            </button>
        </div>
    </div>

    <div id="panel-checkout" class="p-6">
        <h2 class="text-xl font-black italic uppercase mb-6">Tu Pedido</h2>
        <input type="text" id="nombre-cli" placeholder="Tu nombre">
        <input type="tel" id="telefono" value="+34">
        <input type="text" id="dir-cli" placeholder="Dirección exacta">
        <select id="pago-cli">
            <option value="Efectivo">Efectivo</option>
            <option value="Bizum">Bizum</option>
        </select>
        <div id="lista-resumen" class="bg-white/5 p-4 rounded-2xl mt-4 space-y-2"></div>
        
        <div class="mt-6 flex items-start gap-3 p-4 bg-white/5 rounded-xl border border-white/5">
            <input type="checkbox" id="check-legal" style="width:22px; height:22px;" class="accent-cyan-400">
            <label for="check-legal" class="text-[10px] opacity-70 leading-snug">
                He leído y acepto los <span class="text-cyan-400 font-bold underline" onclick="abrirLegal()">Términos y Política de Privacidad</span> de Aguadulce Express.
            </label>
        </div>

        <button onclick="enviarPedidoFinal()" class="w-full bg-cyan-400 text-dark py-6 rounded-2xl font-black mt-6 uppercase text-sm">Efectuar Pedido</button>
    </div>

    <div id="modal-legal" class="p-8">
        <button onclick="document.getElementById('modal-legal').style.display='none'" class="text-cyan-400 font-bold mb-6 flex items-center gap-2">← VOLVER</button>
        <h2 id="legal-titulo" class="text-2xl font-black uppercase mb-4"></h2>
        <div id="legal-contenido" class="text-[11px] opacity-60 leading-relaxed text-left whitespace-pre-line"></div>
    </div>

    <div id="install-prompt">
        <div class="flex items-center gap-4 mb-4">
            <img src="https://i.postimg.cc/mZwjLXxw/Logo-Aguadulce-Express.jpg" class="w-14 h-14 rounded-2xl shadow-xl">
            <div class="text-left">
                <p class="font-black text-sm">Instalar Aguadulce Express</p>
                <p class="text-[10px] opacity-60">Añádela a tu pantalla para pedir más rápido y sin publicidad.</p>
            </div>
        </div>
        <button onclick="cerrarInstall()" class="w-full bg-dark text-white py-4 rounded-xl font-black text-xs uppercase tracking-widest">Entendido</button>
    </div>

    <script>
        // Registro de Service Worker para PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log("SW error", err));
        }

        const scriptURL = 'https://script.google.com/macros/s/AKfycbzmIW4rvilG6rCN7NbT-sQw-VniY0PDyi7wxQuBYbmDXOGbMup8J4tMEu99uqwzMHuq/exec';
        let db = { MENU_GENERAL: [], RESTAURANTES: [], CONFIG: [], ANUNCIOS: [], LEGAL: [] };
        let cesta = [];
        let rActivo = { id: null, nombre: "" };
        let itemActual = { pBase: 0, cantidad: 1, data: null };

        async function init() {
            try {
                const res = await fetch(scriptURL);
                db = await res.json();
                
                // Aplicar Configuración de Excel
                if(db.CONFIG && db.CONFIG[0]) {
                    if(db.CONFIG[0].LOGO_URL) document.getElementById('app-logo').src = db.CONFIG[0].LOGO_URL;
                    if(db.CONFIG[0].FONDO_URL) document.getElementById('header-bg').style.backgroundImage = `url('${db.CONFIG[0].FONDO_URL}')`;
                }
                
                if(db.ANUNCIOS && db.ANUNCIOS.length > 0) {
                    const frases = db.ANUNCIOS.map(a => a.TEXTO).join(" • ");
                    document.getElementById('texto-anuncio').innerText = frases + " • " + frases;
                }

                document.getElementById('loader').style.display = 'none';
                renderHome();
            } catch (e) { console.error("Error cargando Bóveda v107"); }
        }

        function renderHome() {
            let html = `<p class="step-tag ml-2 italic">Selecciona un local</p>`;
            db.RESTAURANTES.forEach(r => {
                html += `
                <div class="relative rounded-[2.5rem] overflow-hidden h-[170px] mb-5 border border-white/5 shadow-2xl" onclick="verMenu('${r.NOMBRE_RESTAURANTE}', '${r.ID_RESTAURANTE}')">
                    <img src="${r.FOTO}" class="absolute inset-0 w-full h-full object-cover opacity-60">
                    <div class="absolute inset-0 bg-gradient-to-t from-dark via-transparent"></div>
                    <div class="absolute bottom-6 left-8 text-left">
                        <p class="text-cyan-400 text-[8px] font-black uppercase mb-1 tracking-widest">${r.CATEGORIA || 'Aguadulce'}</p>
                        <h2 class="text-2xl font-black italic uppercase text-white">${r.NOMBRE_RESTAURANTE}</h2>
                    </div>
                </div>`;
            });
            document.getElementById('app-container').innerHTML = html;
        }

        function verMenu(nombre, id) {
            const resData = db.RESTAURANTES.find(r => String(r.ID_RESTAURANTE) === String(id));
            const platos = db.MENU_GENERAL.filter(p => String(p.ID_RESTAURANTE) === String(id));
            
            let html = `
                <div class="relative -mx-5 -mt-5 mb-6 h-[200px] overflow-hidden border-b border-cyan-400/20">
                    <img src="${resData.FOTO}" class="absolute inset-0 w-full h-full object-cover opacity-70">
                    <div class="absolute inset-0 bg-gradient-to-t from-dark via-dark/60 to-transparent"></div>
                    <button onclick="location.reload()" class="absolute top-6 left-6 w-10 h-10 rounded-xl bg-dark/60 backdrop-blur-md border border-white/10 text-cyan-400 z-10">←</button>
                    <div class="absolute bottom-6 left-8 text-left">
                        <h2 class="text-3xl font-black italic uppercase text-white leading-tight">${nombre}</h2>
                    </div>
                </div>
                <div id="lista-platos" class="mt-4 px-5">`;
            
            platos.forEach(p => {
                html += `
                <div class="plato-card" onclick='abrirDetalle(${JSON.stringify(p).replace(/'/g, "&apos;")})'>
                    <div class="text-left flex-1 pr-4">
                        <h4 class="font-bold text-[13px] uppercase mb-1">${p.PLATO}</h4>
                        <span class="text-cyan-400 font-black text-[11px]">${parseFloat(p.PRECIO).toFixed(2)}€</span>
                    </div>
                    <img src="${p.FOTO_PLATO}" class="w-16 h-16 rounded-2xl object-cover shadow-lg">
                </div>`;
            });
            document.getElementById('app-container').innerHTML = html + `</div>`;
        }

        function abrirDetalle(p) {
            rActivo.id = p.ID_RESTAURANTE;
            itemActual.data = p;
            itemActual.pBase = parseFloat(p.PRECIO);
            itemActual.cantidad = 1;
            document.getElementById('modal-img').src = p.FOTO_PLATO;
            document.getElementById('contenedor-pasos').innerHTML = `
                <h2 class="text-2xl font-black italic uppercase text-white mb-2 text-left">${p.PLATO}</h2>
                <p class="text-xs opacity-50 text-left mb-6">${p.DESCRIPCION || ''}</p>
                <div class="flex items-center justify-between bg-white/5 p-4 rounded-2xl">
                    <span class="text-[10px] font-black uppercase opacity-60 italic">Cantidad</span>
                    <div class="flex items-center gap-6">
                        <button onclick="itemActual.cantidad=Math.max(1,itemActual.cantidad-1); actualizarBarraModal()" class="w-10 h-10 bg-white/10 rounded-xl font-bold">−</button>
                        <span id="cant-modal" class="text-xl font-black">1</span>
                        <button onclick="itemActual.cantidad++; actualizarBarraModal()" class="w-10 h-10 bg-cyan-400 rounded-xl text-dark font-bold">+</button>
                    </div>
                </div>`;
            document.getElementById('modal-plato').style.display = 'flex';
            actualizarBarraModal();
        }

        function actualizarBarraModal() {
            document.getElementById('cant-modal').innerText = itemActual.cantidad;
            document.getElementById('total-modal-btn').innerText = (itemActual.pBase * itemActual.cantidad).toFixed(2) + "€";
        }

        function confirmarAnadir() {
            cesta.push({ nombre: `${itemActual.cantidad}x ${itemActual.data.PLATO}`, total: itemActual.pBase * itemActual.cantidad });
            actualizarCestaBar();
            cerrarModal();
        }

        function actualizarCestaBar() {
            const bar = document.getElementById('cesta-flotante');
            if(cesta.length > 0) {
                bar.classList.replace('hidden', 'flex');
                const total = cesta.reduce((acc, i) => acc + i.total, 0);
                document.getElementById('cesta-info').innerText = `🛒 ${cesta.length} PRODUCTOS`;
                document.getElementById('cesta-total').innerText = `${total.toFixed(2)}€ TOTAL`;
            }
        }

        function abrirCheckout() {
            const lista = document.getElementById('lista-resumen');
            lista.innerHTML = cesta.map(i => `<div class="flex justify-between text-[11px] font-bold uppercase"><span>${i.nombre}</span><span>${i.total.toFixed(2)}€</span></div>`).join('');
            document.getElementById('panel-checkout').style.display = 'flex';
        }

        function abrirLegal() {
            if(db.LEGAL && db.LEGAL[0]) {
                document.getElementById('legal-titulo').innerText = db.LEGAL[0].TITULO;
                document.getElementById('legal-contenido').innerText = db.LEGAL[0].CONTENIDO;
                document.getElementById('modal-legal').style.display = 'flex';
            }
        }

        function cerrarModal() { document.getElementById('modal-plato').style.display = 'none'; }
        function vaciarCesta() { cesta = []; location.reload(); }
        function cerrarInstall() { document.getElementById('install-prompt').style.display = 'none'; }

        async function enviarPedidoFinal() {
            if(!document.getElementById('check-legal').checked) { alert("Debes aceptar los términos legales para pedir."); return; }
            
            const paquete = {
                cliente_info: document.getElementById('nombre-cli').value.toUpperCase(),
                telf_info: document.getElementById('telefono').value,
                dir_info: document.getElementById('dir-cli').value.toUpperCase(),
                pedido_info: cesta.map(i => i.nombre).join(" | "),
                total_info: cesta.reduce((acc, i) => acc + i.total, 0).toFixed(2),
                pago_info: document.getElementById('pago-cli').value,
                id_res_info: rActivo.id
            };

            fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(paquete) });
            alert("✅ ¡Pedido enviado con éxito!");
            document.getElementById('install-prompt').style.display = 'block';
        }

        init();
    </script>
</body>
</html>
