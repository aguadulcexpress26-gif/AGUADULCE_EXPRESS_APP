<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #334155; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #06b6d4; }
        input:checked + .slider:before { transform: translateX(24px); }
        .modal-blur { backdrop-filter: blur(8px); background: rgba(0,0,0,0.4); }
    </style>
</head>
<body class="bg-[#020617] text-slate-100 min-h-screen">

    <nav class="sticky top-0 z-40 glass border-b border-white/5 p-5 shadow-2xl">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-cyan-400 font-black italic tracking-tighter text-xl">AGUADULCE COCINA</h1>
                <p id="resNombre" class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Cargando...</p>
                <div id="statusBadge" class="inline-flex items-center gap-1.5 mt-2 px-2 py-0.5 rounded-full bg-red-500/10 text-red-500 text-[9px] font-bold">
                    <span class="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse"></span> CONECTANDO
                </div>
            </div>
            <div class="flex flex-col items-end gap-1">
                <span id="txtEstado" class="text-[9px] font-black text-slate-500">CERRADO</span>
                <label class="switch">
                    <input type="checkbox" id="tiendaToggle" onchange="abrirConfirmarEstado()">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
        
        <div class="max-w-xl mx-auto grid grid-cols-2 gap-3 mt-4">
            <div class="bg-white/5 rounded-2xl p-3 border border-white/5">
                <p class="text-[8px] text-slate-500 font-bold uppercase">Hoy</p>
                <p id="vHoy" class="text-lg font-black">0.00€</p>
            </div>
            <div class="bg-white/5 rounded-2xl p-3 border border-white/5">
                <p class="text-[8px] text-slate-500 font-bold uppercase">Semana</p>
                <p id="vSem" class="text-lg font-black text-cyan-400">0.00€</p>
            </div>
        </div>
    </nav>

    <main class="max-w-xl mx-auto p-4 space-y-4" id="contenedorPedidos"></main>

    <div id="customModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-6 modal-blur">
        <div class="glass w-full max-w-xs rounded-[2.5rem] p-8 border border-white/10 shadow-2xl text-center">
            <div id="modalIcon" class="mx-auto w-16 h-16 rounded-full flex items-center justify-center mb-4"></div>
            <h3 id="modalTitle" class="text-xl font-black mb-2"></h3>
            <p id="modalBody" class="text-slate-400 text-sm mb-8"></p>
            <div class="flex gap-3">
                <button onclick="cerrarModal()" class="flex-1 bg-slate-800 py-4 rounded-2xl font-bold text-xs">CANCELAR</button>
                <button id="modalConfirmBtn" class="flex-1 bg-cyan-500 text-black py-4 rounded-2xl font-black text-xs shadow-lg shadow-cyan-500/30">ACEPTAR</button>
            </div>
        </div>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbzmIW4rvilG6rCN7NbT-sQw-VniY0PDyi7wxQuBYbmDXOGbMup8J4tMEu99uqwzMHuq/exec"; 
        const MI_ID_REST = "RT33M5";
        let pedidosActivos = [];
        let tiendaAbierta = false;

        async function cargar() {
            try {
                const r = await fetch(`${scriptURL}?action=leerPanelCompleto&idRest=${MI_ID_REST}`);
                const data = await r.json();
                
                // Actualizar Info Restaurante
                document.getElementById('resNombre').innerText = data.tienda.nombre;
                tiendaAbierta = data.tienda.estado === "Abierto";
                document.getElementById('tiendaToggle').checked = tiendaAbierta;
                document.getElementById('txtEstado').innerText = tiendaAbierta ? "ABIERTO" : "CERRADO";
                document.getElementById('txtEstado').className = tiendaAbierta ? "text-[9px] font-black text-emerald-400" : "text-[9px] font-black text-slate-500";
                
                // Stats
                document.getElementById('vHoy').innerText = data.stats.diaria + "€";
                document.getElementById('vSem').innerText = data.stats.semanal + "€";
                
                // Status
                document.getElementById('statusBadge').className = "inline-flex items-center gap-1.5 mt-2 px-2 py-0.5 rounded-full bg-emerald-500/10 text-emerald-500 text-[9px] font-bold";
                document.getElementById('statusBadge').innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> ONLINE`;

                pedidosActivos = data.pedidos;
                render();
            } catch (e) {
                document.getElementById('statusBadge').className = "inline-flex items-center gap-1.5 mt-2 px-2 py-0.5 rounded-full bg-red-500/10 text-red-500 text-[9px] font-bold";
            }
        }

        function render() {
            const cont = document.getElementById('contenedorPedidos');
            if(pedidosActivos.length === 0) {
                cont.innerHTML = `<div class="text-center py-20 opacity-20 font-black italic">SIN PEDIDOS PENDIENTES</div>`;
                return;
            }
            cont.innerHTML = pedidosActivos.map(p => `
                <div class="glass p-6 rounded-[2.5rem] border border-white/5 relative overflow-hidden group">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <span class="text-cyan-500 font-black text-2xl tracking-tighter italic">#${p.ID_PEDIDO}</span>
                            <h2 class="text-white font-bold uppercase text-xs mt-1">${p.CLIENTE}</h2>
                        </div>
                        <div class="text-right">
                            <p class="text-2xl font-black">${p.TOTAL}€</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="verDetalles('${p.ID_PEDIDO}')" class="bg-white/5 py-4 rounded-2xl text-[10px] font-black border border-white/5">DETALLES</button>
                        <button onclick="confirmarListo('${p.ID_PEDIDO}')" class="bg-cyan-500 text-black py-4 rounded-2xl text-[10px] font-black shadow-lg shadow-cyan-500/20">MARCAR LISTO</button>
                    </div>
                </div>
            `).join('');
        }

        // --- LÓGICA DE MODALES PERSONALIZADOS ---
        function mostrarModal(titulo, cuerpo, icono, accion) {
            const m = document.getElementById('customModal');
            document.getElementById('modalTitle').innerText = titulo;
            document.getElementById('modalBody').innerText = cuerpo;
            const iconCont = document.getElementById('modalIcon');
            
            if(icono === 'check') {
                iconCont.className = "mx-auto w-16 h-16 rounded-full flex items-center justify-center mb-4 bg-emerald-500/20 text-emerald-500";
                iconCont.innerHTML = "✓";
            } else {
                iconCont.className = "mx-auto w-16 h-16 rounded-full flex items-center justify-center mb-4 bg-cyan-500/20 text-cyan-500";
                iconCont.innerHTML = "!";
            }

            document.getElementById('modalConfirmBtn').onclick = async () => {
                cerrarModal();
                await accion();
            };
            m.classList.remove('hidden');
            m.classList.add('flex');
        }

        function cerrarModal() {
            document.getElementById('customModal').classList.add('hidden');
            document.getElementById('tiendaToggle').checked = tiendaAbierta; // Revertir si cancela
        }

        function abrirConfirmarEstado() {
            const nuevo = !tiendaAbierta ? "ABIERTO" : "CERRADO";
            mostrarModal(
                `¿CAMBIAR A ${nuevo}?`,
                `Los clientes ${nuevo === 'ABIERTO' ? 'podrán' : 'no podrán'} realizar pedidos.`,
                'info',
                async () => {
                    tiendaAbierta = !tiendaAbierta;
                    const resStr = tiendaAbierta ? "Abierto" : "Cerrado";
                    await fetch(`${scriptURL}?action=toggleTienda&idRest=${MI_ID_REST}&nuevoEstado=${resStr}`);
                    cargar();
                }
            );
        }

        function confirmarListo(id) {
            mostrarModal(
                "¿PEDIDO LISTO?",
                `Confirmas que el pedido #${id} ha sido preparado.`,
                'check',
                async () => {
                    await fetch(`${scriptURL}?action=marcarListo&idPedido=${id}`);
                    cargar();
                }
            );
        }

        setInterval(cargar, 8000);
        cargar();
    </script>
</body>
</html>
