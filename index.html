<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express Pro v98</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark: #020617; --red: #ef4444; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark); color: white; margin: 0; letter-spacing: -0.015em; }
        
        /* FILTRADO DE CATEGORÍAS */
        .category-bar { display: flex; gap: 10px; overflow-x: auto; padding: 15px 5px; scrollbar-width: none; }
        .cat-chip { padding: 10px 20px; background: rgba(255,255,255,0.05); border-radius: 14px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; white-space: nowrap; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .cat-chip.active { background: var(--cyan); color: var(--dark); border-color: var(--cyan); }

        .plato-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 1.5rem; padding: 15px; display: flex; align-items: center; margin-bottom: 12px; }
        .hidden-plato { display: none !important; }

        /* FORMULARIO DE PAGO */
        #panel-checkout { position: fixed; inset: 0; background: var(--dark); z-index: 2000; display: none; flex-direction: column; overflow-y: auto; padding: 30px 25px; }
        input, select { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 16px; border-radius: 15px; color: white; width: 100%; margin-bottom: 15px; font-size: 0.9rem; }
        .legal-box { font-size: 11px; color: rgba(255,255,255,0.5); line-height: 1.4; display: flex; gap: 10px; align-items: flex-start; margin-top: 20px; }
        input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--cyan); }
    </style>
</head>
<body>

    <header class="p-5 flex items-center justify-between bg-[#020617]/95 backdrop-blur-xl sticky top-0 z-50 border-b border-white/5">
        <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center border-2 border-cyan-400 font-black text-dark text-lg">A</div>
        <div class="text-left"><h1 class="text-lg leading-none font-bold italic uppercase">Aguadulce</h1><p class="text-[8px] tracking-[0.4em] text-cyan-400 font-bold uppercase mt-1">Express Pro</p></div>
    </header>

    <main id="app-container" class="px-5 py-5 pb-32"></main>

    <div id="cesta-flotante" class="fixed bottom-5 left-4 right-4 bg-cyan-400 text-dark p-4 rounded-2xl hidden justify-between items-center z-[100] shadow-2xl">
        <div class="flex-1" onclick="abrirCheckout()">
            <span id="cesta-info" class="font-black text-sm italic uppercase">🛒 0 PRODUCTOS</span>
            <span id="cesta-total" class="block text-[10px] font-bold uppercase tracking-widest">0.00€ TOTAL</span>
        </div>
        <div class="text-red-600 font-black text-2xl pl-4 border-l border-black/10 cursor-pointer" onclick="vaciarCesta()">✕</div>
    </div>

    <div id="panel-checkout">
        <div class="flex items-center gap-4 mb-8">
            <button onclick="cerrarCheckout()" class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 text-cyan-400">←</button>
            <h2 class="text-xl font-black italic uppercase">Finalizar Pedido</h2>
        </div>

        <div class="bg-white/5 p-5 rounded-2xl mb-8 border border-white/10">
            <p class="text-[10px] uppercase font-black text-cyan-400 mb-3 tracking-widest">Información de Entrega</p>
            <input type="text" id="nombre-cli" placeholder="Nombre completo">
            <input type="tel" id="tel-cli" placeholder="Teléfono de contacto">
            <input type="text" id="dir-cli" placeholder="Ubicación exacta / Dirección">
        </div>

        <div class="bg-white/5 p-5 rounded-2xl mb-6 border border-white/10 text-left">
            <p class="text-[10px] uppercase font-black text-cyan-400 mb-3 tracking-widest">Método de Pago</p>
            <div class="text-xs space-y-2 opacity-80 mb-4">
                <p>• Pago en efectivo al repartidor</p>
                <p>• Pago por Bizum</p>
                <p>• Pago con Tarjeta (TPV Inalámbrico)</p>
            </div>
            <select id="pago-cli">
                <option value="Efectivo">Efectivo</option>
                <option value="Bizum">Bizum</option>
                <option value="Tarjeta/TPV">Tarjeta / TPV</option>
            </select>
        </div>

        <div class="legal-box text-left">
            <input type="checkbox" id="check-legal" onchange="validarCheck()">
            <label for="check-legal">Acepto la normativa española de protección de datos y el tratamiento de mi información personal para la gestión de este pedido. (RGPD)</label>
        </div>

        <button id="btn-final" disabled onclick="enviarPedido()" class="w-full bg-white/10 text-white/30 font-black py-5 rounded-2xl mt-8 uppercase tracking-widest text-sm transition-all">
            Efectuar Pedido
        </button>
    </div>

    <script>
        let db = { menu: [], restaurantes: [] };
        let cesta = [];
        let rActivo = { id: null, nombre: "" };

        async function init() {
            const res = await fetch('https://script.google.com/macros/s/AKfycbysDVL_3M-2AfW5eGS8chw3KB3uFIXJU9kVltWHOQF0Lo9mzcBBn6nQwVy1mrkaH2tZ/exec');
            const data = await res.json();
            db.restaurantes = data.RESTAURANTES || [];
            db.menu = data.MENU_GENERAL || [];
            renderHome();
        }

        // --- FILTRADO DE CATEGORÍAS ---
        function filtrarCat(cat, el) {
            document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            
            const tarjetas = document.querySelectorAll('.plato-card');
            const separadores = document.querySelectorAll('.cat-separator');

            tarjetas.forEach(t => {
                if(cat === 'TODOS' || t.getAttribute('data-cat') === cat) {
                    t.classList.remove('hidden-plato');
                } else {
                    t.classList.add('hidden-plato');
                }
            });

            // Esconder separadores si no es "TODOS"
            separadores.forEach(s => s.style.display = (cat === 'TODOS') ? 'flex' : 'none');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function verMenu(nombre, id) {
            const platos = db.menu.filter(p => String(p.ID_RESTAURANTE) === String(id));
            const cats = [...new Set(platos.map(p => p.CATEGORIA || "General"))];
            
            let html = `
                <div class="flex items-center gap-4 mb-4 text-left">
                    <button onclick="renderHome()" class="w-9 h-9 rounded-lg bg-white/5 border border-white/10 text-cyan-400">←</button>
                    <h2 class="text-md font-bold uppercase italic">${nombre}</h2>
                </div>
                <div class="category-bar">
                    <div class="cat-chip active" onclick="filtrarCat('TODOS', this)">Todos</div>
                    ${cats.map(c => `<div class="cat-chip" onclick="filtrarCat('${c}', this)">${c}</div>`).join('')}
                </div>
                <div id="lista-platos" class="mt-4">`;
            
            cats.forEach(cat => {
                html += `<div class="cat-separator text-[10px] font-black text-white/20 uppercase py-4 flex items-center gap-2">${cat}<div class="h-px bg-white/5 flex-1"></div></div>`;
                platos.filter(p => (p.CATEGORIA || "General") === cat).forEach(p => {
                    html += `
                    <div class="plato-card" data-cat="${cat}" onclick='abrirDetalle(${JSON.stringify(p).replace(/'/g, "&apos;")})'>
                        <div class="text-left flex-1 pr-4">
                            <h4 class="font-bold text-[13px] uppercase mb-2">${p.PLATO}</h4>
                            <span class="bg-cyan-400 text-dark px-3 py-1 rounded-lg font-black text-[10px]">${parseFloat(p.PRECIO).toFixed(2)}€</span>
                        </div>
                        <img src="${p.FOTO_PLATO}" class="w-16 h-16 rounded-xl object-cover">
                    </div>`;
                });
            });
            document.getElementById('app-container').innerHTML = html + `</div>`;
        }

        // --- LÓGICA DE CHECKOUT ---
        function abrirCheckout() { document.getElementById('panel-checkout').style.display = 'flex'; }
        function cerrarCheckout() { document.getElementById('panel-checkout').style.display = 'none'; }

        function validarCheck() {
            const btn = document.getElementById('btn-final');
            const check = document.getElementById('check-legal');
            if(check.checked) {
                btn.disabled = false;
                btn.className = "w-full bg-cyan-400 text-dark font-black py-5 rounded-2xl mt-8 uppercase tracking-widest text-sm shadow-xl shadow-cyan-400/30";
            } else {
                btn.disabled = true;
                btn.className = "w-full bg-white/10 text-white/30 font-black py-5 rounded-2xl mt-8 uppercase tracking-widest text-sm";
            }
        }

        function vaciarCesta() {
            if(confirm("¿Vaciar cesta y volver a restaurantes?")) {
                cesta = [];
                rActivo = { id: null, nombre: "" };
                document.getElementById('cesta-flotante').style.display = 'none';
                renderHome();
            }
        }

        function renderHome() { /* ... código renderHome anterior ... */ }
        init();
    </script>
</body>
</html>
