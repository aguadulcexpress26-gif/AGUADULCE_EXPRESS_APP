<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#06b6d4">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/mZwjLXxw/Logo-Aguadulce-Express.jpg">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark: #020617; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark) !important; color: white; margin: 0; overflow-x: hidden; }
        
        #loader { position: fixed; inset: 0; background: var(--dark); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(6,182,212,0.1); border-top-color: var(--cyan); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .brand-header { position: relative; height: 160px; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; }
        #header-bg { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0.5; filter: blur(1px); }
        .brand-overlay { position: absolute; inset: 0; background: linear-gradient(to top, var(--dark), transparent); }
        
        .promo-banner { background: rgba(6,182,212,0.1); padding: 10px 0; overflow: hidden; display: flex; border-y: 1px solid rgba(255,255,255,0.05); }
        .promo-scroll { white-space: nowrap; animation: scroll-text 20s linear infinite; display: flex; gap: 50px; font-size: 11px; font-weight: 800; color: var(--cyan); text-transform: uppercase; }
        @keyframes scroll-text { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        .plato-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 1.5rem; padding: 15px; display: flex; align-items: center; margin-bottom: 15px; width: 100%; }
        
        #modal-plato, #panel-checkout, #modal-legal { position: fixed; inset: 0; background: var(--dark); z-index: 1000; display: none; flex-direction: column; overflow-y: auto; padding-bottom: 100px; }
        
        .opcion-btn { padding: 12px 20px; border-radius: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); font-size: 13px; text-align: left; margin-bottom: 8px; transition: 0.3s; }
        .opcion-btn.selected { background: var(--cyan); color: var(--dark); font-weight: 800; border-color: var(--cyan); }
        
        input, select { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 18px; border-radius: 20px; color: white; width: 100%; margin-bottom: 15px; font-size: 14px; }
        
        #install-prompt { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #fff; color: #000; padding: 25px; border-radius: 28px; z-index: 9999; display: none; box-shadow: 0 25px 60px rgba(0,0,0,0.8); border: 1px solid rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner mb-4"></div>
        <p class="text-cyan-400 text-[10px] font-black uppercase tracking-[0.3em]">Aguadulce Express v108</p>
    </div>

    <header class="brand-header">
        <div id="header-bg"></div>
        <div class="brand-overlay"></div>
        <div class="brand-content relative z-10 flex items-center gap-4">
            <img id="app-logo" src="https://i.postimg.cc/mZwjLXxw/Logo-Aguadulce-Express.jpg" class="w-14 h-14 rounded-full border-2 border-cyan-400">
            <div>
                <h1 class="text-2xl font-black italic uppercase leading-none">Aguadulce</h1>
                <p class="text-cyan-400 text-[10px] font-black uppercase tracking-widest">Express</p>
            </div>
        </div>
    </header>

    <div class="promo-banner">
        <div class="promo-scroll" id="texto-anuncio">Cargando...</div>
    </div>

    <main id="app-container" class="px-4 py-6"></main>

    <div id="cesta-flotante" class="fixed bottom-6 left-4 right-4 bg-cyan-400 text-dark p-5 rounded-2xl hidden justify-between items-center z-[100] shadow-xl">
        <div class="flex-1" onclick="abrirCheckout()">
            <span id="cesta-info" class="font-black text-sm uppercase">🛒 0 ITEMS</span>
            <span id="cesta-total" class="block text-[11px] font-bold opacity-80 uppercase tracking-tighter">0.00€ TOTAL</span>
        </div>
