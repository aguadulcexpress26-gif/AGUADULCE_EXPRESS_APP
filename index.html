<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express Pro v104</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark: #020617; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark); color: white; margin: 0; -webkit-tap-highlight-color: transparent; }
        #loader { position: fixed; inset: 0; background: var(--dark); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(6,182,212,0.1); border-top-color: var(--cyan); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .plato-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 1.5rem; padding: 15px; display: flex; align-items: center; margin-bottom: 12px; }
        #modal-plato, #panel-checkout { position: fixed; inset: 0; background: var(--dark); z-index: 1000; display: none; flex-direction: column; overflow-y: auto; }
        input, select { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); padding: 16px; border-radius: 18px; color: white; width: 100%; margin-bottom: 12px; }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div></div>

    <header class="p-5 sticky top-0 z-50 bg-[#020617]/95 border-b border-white/5">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center border-2 border-cyan-400 font-black text-dark text-lg">A</div>
            <div class="text-left">
                <h1 class="text-lg leading-none font-bold italic uppercase">Aguadulce</h1>
                <p class="text-[8px] tracking-[0.4em] text-cyan-400 font-bold uppercase mt-1">Express Pro</p>
            </div>
        </div>
    </header>

    <main id="app-container" class="px-5 py-5 pb-32"></main>

    <div id="cesta-flotante" class="fixed bottom-5 left-4 right-4 bg-cyan-400 text-dark p-4 rounded-2xl hidden justify-between items-center z-[100]" onclick="abrirCheckout()">
        <div class="flex-1">
            <span id="cesta-info" class="font-black text-sm uppercase italic">🛒 0 PRODUCTOS</span>
        </div>
        <div class="font-black text-lg" id="cesta-total">0.00€</div>
    </div>

    <div id="modal-plato">
        <button onclick="cerrarModal()" class="p-6 text-cyan-400">✕ CERRAR</button>
        <div class="px-6">
            <h2 id="modal-titulo" class="text-2xl font-black italic uppercase mb-2"></h2>
            <p id="modal-desc" class="opacity-50 text-xs mb-6"></p>
            <div id="contenedor-opciones"></div>
        </div>
        <button onclick="confirmarAnadir()" class="fixed bottom-6 left-6 right-6 bg-cyan-400 text-dark py-5 rounded-2xl font-black">AÑADIR AL PEDIDO</button>
    </div>

    <div id="panel-checkout" class="p-6 text-left">
        <button onclick="cerrarCheckout()" class="mb-8 text-cyan-400">← VOLVER</button>
        <h2 class="text-xl font-black italic uppercase mb-6">Datos de Envío</h2>
        <input type="text" id="nombre-cli" placeholder="Nombre completo">
        <input type="tel" id="telefono" value="+34">
        <input type="text" id="dir-cli" placeholder="Dirección de entrega">
        <select id="pago-cli">
            <option value="Efectivo">Efectivo</option>
            <option value="Bizum">Bizum</option>
            <option value="Tarjeta">Tarjeta</option>
        </select>
        <div id="lista-resumen" class="mt-6 space-y-2 border-t border-white/10 pt-4"></div>
        <button id="btn-final" onclick="enviarPedidoFinal()" class="w-full bg-cyan-400 text-dark py-6 rounded-2xl font-black mt-8">CONFIRMAR PEDIDO</button>
    </div>
