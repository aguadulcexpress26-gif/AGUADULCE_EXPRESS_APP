<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AE COCINA V60 - FINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .card-stats { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255,255,255,0.03); border-radius: 1.5rem; }
        .switch { position: relative; display: inline-block; width: 46px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #334155; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #06b6d4; }
        input:checked + .slider:before { transform: translateX(22px); }
        .modal-blur { backdrop-filter: blur(12px); background: rgba(0,0,0,0.8); }
        .ticket-font { font-family: 'JetBrains+Mono', monospace; white-space: pre-wrap; line-height: 1.4; }
        .btn-logout { position: fixed; bottom: 20px; right: 20px; z-index: 100; width: 42px; height: 42px; border-radius: 12px; background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="min-h-screen pb-24">

    <audio id="alerta" loop src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <div id="loginScreen" class="fixed inset-0 z-[100] bg-slate-950 flex items-center justify-center p-6">
        <div class="glass w-full max-w-xs rounded-[2.5rem] p-8 text-center shadow-2xl">
            <div class="text-cyan-400 font-black italic text-3xl mb-1">AE</div>
            <h2 class="text-white font-black italic text-xl mb-6 tracking-tighter uppercase">Cocina</h2>
            <input type="text" id="pinInput" placeholder="PIN" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 text-center text-2xl font-black text-cyan-400 focus:outline-none mb-4 uppercase">
            <button onclick="verificarPIN()" class="w-full bg-cyan-500 text-black py-4 rounded-2xl font-black uppercase shadow-lg shadow-cyan-500/20 active:scale-95 transition-transform">Entrar</button>
            <p id="loginError" class="text-red-500 text-[10px] font-bold mt-4 uppercase hidden italic">PIN Incorrecto</p>
        </div>
    </div>

    <div id="appContent" class="hidden">
        <nav class="sticky top-0 z-40 glass border-b border-white/5 p-4 shadow-2xl">
            <div class="max-w-xl mx-auto flex justify-between items-start">
                <div>
                    <h1 class="text-cyan-400 font-black italic tracking-tighter text-xl leading-none">AGUADULCE EXPRESS</h1>
                    <p id="resNombreDisplay" class="text-sm text-white font-black uppercase mt-1 italic tracking-tight underline decoration-cyan-500/50">Cargando...</p>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="abrirHistorial()" class="bg-white/5 p-2 rounded-xl border border-white/10">
                        <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </button>
                    <div class="flex flex-col items-end">
                        <span id="txtEstado" class="text-[8px] font-black mb-1 uppercase">---</span>
                        <label class="switch">
                            <input type="checkbox" id="tiendaToggle" onchange="confirmarToggleTienda()">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </div>
        </nav>

        <main class="max-w-xl mx-auto p-4 space-y-4">
            <div id="lista" class="space-y-4 pt-4"></div>
        </main>

        <button onclick="preguntarSalir()" class="btn-logout shadow-lg">
            <svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
    </div>

    <div id="customModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 modal-blur">
        <div class="glass w-full max-w-sm rounded-[2.5rem] p-6 border border-white/10 shadow-2xl">
            <h3 id="modalTitle" class="text-center text-cyan-400 font-black italic uppercase mb-4 text-xs"></h3>
            <div id="modalBody" class="ticket-font bg-black/50 p-5 rounded-2xl text-[10px] text-white mb-6 border border-white/10 overflow-y-auto max-h-[55vh]"></div>
            <div id="modalFooter" class="flex gap-3"></div>
        </div>
    </div>

    <div id="sideHistorial" class="fixed inset-y-0 right-0 w-full max-w-sm glass z-50 transform translate-x-full transition-transform duration-300 p-6 overflow-y-auto">
        <div class="flex justify-between items-center mb-6 border-b border-white/10 pb-4">
            <h2 class="text-xl font-black italic text-cyan-400 uppercase">Historial Hoy</h2>
            <button onclick="cerrarHistorial()" class="text-slate-400 font-bold bg-white/5 px-3 py-1 rounded-lg text-xs">X</button>
        </div>
        <div id="listaHistorial" class="space-y-3"></div>
    </div>

    <script>
        const ACCESS_DB = {
            "DELI10": "6G4L1V",
            "CHUN20": "RT33M5",
            "HARO30": "8N3Z7K",
            "SUCU40": "TR92X5",
            "PERU50": "9V1L8K",
            "LIMA60": "FL44K8",
            "PECA70": "CV11Q9"
        };

        const scriptURL = "https://script.google.com/macros/s/AKfycbzmIW4rvilG6rCN7NbT-sQw-VniY0PDyi7wxQuBYbmDXOGbMup8J4tMEu99uqwzMHuq/exec"; 
        let MI_ID_REST = localStorage.getItem('AE_REST_ID') || "";
        let pedidosActivos = [], historialHoy = [], aceptados = new Set(), tiendaAbierta = false;

        window.onload = () => {
            if(MI_ID_REST) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('appContent').classList.remove('hidden');
                setInterval(cargar, 15000);
                cargar();
            }
        };

        function verificarPIN() {
            const pin = document.getElementById('pinInput').value.trim().toUpperCase();
            const resID = ACCESS_DB[pin];
            
            if (resID) {
                MI_ID_REST = resID;
                localStorage.setItem('AE_REST_ID', MI_ID_REST);
                // Forzamos el cambio de pantalla inmediato antes de recargar
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('appContent').classList.remove('hidden');
                location.reload();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        }

        async function cargar() {
            try {
                const r = await fetch(`${scriptURL}?action=leerPanelCompleto&idRest=${MI_ID_REST}`);
                const data = await r.json();
                
                if(data.tienda) {
                    document.getElementById('resNombreDisplay').innerText = data.tienda.nombre || "Establecimiento";
                    const estadoRecibido = (data.tienda.estado || "").trim().toLowerCase();
                    tiendaAbierta = estadoRecibido === "abierto";
                    document.getElementById('tiendaToggle').checked = tiendaAbierta;
                    const txtE = document.getElementById('txtEstado');
                    txtE.innerText = tiendaAbierta ? "ABIERTO" : "CERRADO";
                    txtE.className = tiendaAbierta ? "text-[8px] font-black text-emerald-400" : "text-[8px] font-black text-red-500";
                }
                
                pedidosActivos = data.pedidos || [];
                historialHoy = data.historial || [];
                
                const alerta = document.getElementById('alerta');
                if(pedidosActivos.length > 0 && pedidosActivos.some(p => !aceptados.has(p.ID_PEDIDO))) {
                    alerta.play().catch(()=>{});
                } else { alerta.pause(); }

                render();
            } catch (e) { console.error(e); }
        }

        function render() {
            const cont = document.getElementById('lista');
            if(pedidosActivos.length === 0) {
                cont.innerHTML = `<div class="text-center py-20 opacity-20 font-black italic text-xs uppercase tracking-widest">SIN PEDIDOS</div>`;
                return;
            }
            cont.innerHTML = pedidosActivos.map(p => `
                <div class="glass p-6 rounded-[2.5rem] border border-white/5 shadow-xl">
                    <div class="flex justify-between items-start mb-6">
                        <div><span class="text-cyan-400 font-black text-2xl italic">#${p.ID_PEDIDO}</span><h2 class="text-white font-bold uppercase text-[10px] mt-1 opacity-60">${p.CLIENTE}</h2></div>
                        <p class="text-2xl font-black text-white">${parseFloat(p.TOTAL).toFixed(2)}€</p>
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="aceptarPedido('${p.ID_PEDIDO}')" class="py-4 rounded-2xl text-[9px] font-black uppercase ${aceptados.has(p.ID_PEDIDO) ? 'bg-slate-800 text-slate-600' : 'bg-white text-black ring-4 ring-white/10'}">${aceptados.has(p.ID_PEDIDO) ? 'ACEPTADO' : 'ACEPTAR'}</button>
                        <button onclick="verDetalles('${p.ID_PEDIDO}')" class="bg-slate-800 text-cyan-400 py-4 rounded-2xl text-[9px] font-black uppercase border border-cyan-400/20">DETALLES</button>
                        <button onclick="confirmarListo('${p.ID_PEDIDO}')" class="bg-cyan-500 text-black py-4 rounded-2xl text-[9px] font-black uppercase">LISTO</button>
                    </div>
                </div>`).join('');
        }

        function verDetalles(id) {
            const p = pedidosActivos.find(x => x.ID_PEDIDO === id) || historialHoy.find(x => x.ID_PEDIDO === id);
            const resNombre = document.getElementById('resNombreDisplay').innerText;
            const ticketSim = 
`********************************
       AGUADULCE EXPRESS        
********************************
        ${resNombre.toUpperCase()}           
--------------------------------
        PEDIDO # ${p.ID_PEDIDO}           
--------------------------------

CLIENTE: ${p.CLIENTE}
DIRECCIÓN: ${p.DIRECCION}

--------------------------------
PRODUCTOS:
--------------------------------
${p.PEDIDO_DETALLE}

--------------------------------
TOTAL:             ${parseFloat(p.TOTAL).toFixed(2)} EUR
PAGO:              ${p.METODO_PAGO || 'EFECTIVO'}
FECHA:             ${p.FECHA}

--------------------------------
   ¡GRACIAS POR SU COMPRA!      
--------------------------------`;

            mostrarModal("VISTA PREVIA TICKET", ticketSim,
                `<div class="flex flex-col w-full gap-2"><button onclick="imprimirTicket('${id}')" class="w-full bg-cyan-600 py-4 rounded-2xl font-black text-[10px] text-white">IMPRIMIR 🖨️</button><button onclick="cerrarModal()" class="w-full bg-slate-800 py-4 rounded-2xl font-black text-[10px] text-slate-500 uppercase">Volver</button></div>`);
        }

        function imprimirTicket(id) {
            const p = pedidosActivos.find(x => x.ID_PEDIDO === id) || historialHoy.find(x => x.ID_PEDIDO === id);
            const resNombre = document.getElementById('resNombreDisplay').innerText;
            const ticketRaw = 
`********************************
       AGUADULCE EXPRESS        
********************************
        ${resNombre.toUpperCase()}           
--------------------------------
        PEDIDO # ${p.ID_PEDIDO}           
--------------------------------

CLIENTE: ${p.CLIENTE}
DIRECCIÓN: ${p.DIRECCIÓN || p.DIRECCION}

--------------------------------
${p.PEDIDO_DETALLE}

--------------------------------
TOTAL:             ${parseFloat(p.TOTAL).toFixed(2)} EUR
PAGO:              ${p.METODO_PAGO || 'EFECTIVO'}
FECHA:             ${p.FECHA}

--------------------------------
   ¡GRACIAS POR SU COMPRA!      
--------------------------------\n\n\n\n`;
            window.location.href = "intent:" + encodeURI(ticketRaw) + "#Intent;scheme=rawbt;package=ru.a402d.rawbtprinter;end;";
        }

        function aceptarPedido(id) { aceptados.add(id); document.getElementById('alerta').pause(); render(); }
        function confirmarListo(id) {
            mostrarModal("¿LISTO?", "Confirma que el pedido ya fue entregado",
                `<div class="flex w-full gap-3"><button onclick="cerrarModal()" class="w-1/2 bg-slate-800 py-4 rounded-2xl font-black text-xs text-slate-400">NO</button><button onclick="ejecutarListo('${id}')" class="w-1/2 bg-cyan-500 py-4 rounded-2xl font-black text-xs text-black">SÍ</button></div>`);
        }
        async function ejecutarListo(id) { cerrarModal(); await fetch(`${scriptURL}?action=marcarListo&idPedido=${id}`); cargar(); }

        function confirmarToggleTienda() {
            const nuevoEstado = !tiendaAbierta ? "Abierto" : "Cerrado";
            mostrarModal("TIENDA", `¿CAMBIAR A ${nuevoEstado.toUpperCase()}?`,
                `<div class="flex w-full gap-3"><button onclick="cancelarToggle()" class="w-1/2 bg-slate-800 py-4 rounded-2xl font-black text-xs text-slate-400">NO</button><button onclick="ejecutarToggle('${nuevoEstado}')" class="w-1/2 bg-cyan-500 py-4 rounded-2xl font-black text-xs text-black">SÍ</button></div>`);
        }
        function cancelarToggle() { document.getElementById('tiendaToggle').checked = tiendaAbierta; cerrarModal(); }
        async function ejecutarToggle(estado) { cerrarModal(); await fetch(`${scriptURL}?action=toggleTienda&idRest=${MI_ID_REST}&nuevoEstado=${estado}`); setTimeout(cargar, 1000); }

        function preguntarSalir() {
            mostrarModal("CERRAR SESIÓN", "¿Deseas salir del panel?",
                `<div class="flex w-full gap-3"><button onclick="cerrarModal()" class="w-1/2 bg-slate-800 py-4 rounded-2xl font-black text-xs text-slate-400">NO</button><button onclick="ejecutarSalir()" class="w-1/2 bg-red-500 py-4 rounded-2xl font-black text-xs text-white">SÍ</button></div>`);
        }
        function ejecutarSalir() { localStorage.removeItem('AE_REST_ID'); location.reload(); }

        function abrirHistorial() {
            const listaH = document.getElementById('listaHistorial');
            listaH.innerHTML = historialHoy.length === 0 ? '<p class="opacity-20 italic text-xs text-center py-10">Vacío</p>' : 
                historialHoy.map(p => `<div class="bg-white/5 p-4 rounded-2xl border border-white/5 mb-2" onclick="verDetalles('${p.ID_PEDIDO}')"><div class="flex justify-between font-black text-cyan-400 text-xs"><span>#${p.ID_PEDIDO}</span><span>${parseFloat(p.TOTAL).toFixed(2)}€</span></div><p class="text-[9px] opacity-50 uppercase mt-1 italic">${p.CLIENTE}</p></div>`).join('');
            document.getElementById('sideHistorial').classList.remove('translate-x-full');
        }
        function cerrarHistorial() { document.getElementById('sideHistorial').classList.add('translate-x-full'); }

        function mostrarModal(titulo, bodyCont, footer) {
            document.getElementById('modalTitle').innerText = titulo;
            document.getElementById('modalBody').innerText = bodyCont;
            document.getElementById('modalFooter').innerHTML = footer;
            document.getElementById('customModal').classList.remove('hidden');
        }
        function cerrarModal() { document.getElementById('customModal').classList.add('hidden'); }
    </script>
</body>
</html>
