<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express Pro v62</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark: #020617; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: white; margin: 0; -webkit-tap-highlight-color: transparent; }
        .brand { font-family: 'Orbitron', sans-serif; }
        
        /* Tarjetas Personalizadas */
        .card-rest {
            background: linear-gradient(145deg, rgba(30,41,59,0.7) 0%, rgba(2,6,23,1) 100%);
            border: 1px solid rgba(6,182,212,0.15);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card-rest:active { transform: scale(0.96); border-color: var(--cyan); box-shadow: 0 0 20px rgba(6,182,212,0.2); }
        
        .status-pill {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 10px; border-radius: 99px; font-size: 9px;
            font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
        }

        /* Modal y Detalles */
        #modal-plato { position: fixed; inset: 0; background: var(--dark); z-index: 1000; display: none; flex-direction: column; overflow-y: auto; }
        .foto-header { width: 100%; height: 320px; object-fit: cover; }
    </style>
</head>
<body>

    <header class="sticky top-0 z-50 bg-[#020617]/90 backdrop-blur-xl px-6 py-5 flex items-center justify-between border-b border-white/10">
        <div class="brand">
            <div class="text-2xl text-cyan-400 leading-none">AGUADULCE</div>
            <div class="text-[10px] tracking-[0.4em] text-white/70 text-right">EXPRESS</div>
        </div>
        <img src="apple-touch-icon.png" class="w-11 h-11 bg-white rounded-full p-1 border-2 border-cyan-400 shadow-[0_0_10px_rgba(6,182,212,0.5)]">
    </header>

    <main id="app-container" class="px-6 py-8">
        <div id="loading-state" class="text-center p-20">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-cyan-400 mb-4"></div>
            <p class="brand text-[10px] text-cyan-400 uppercase tracking-widest">Sincronizando Bóveda...</p>
        </div>
    </main>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyutzaHTfEwHGnoWVy_ptlNg5vTU1GvwflEwU4-KIRt2q7CvU0tr_SacmnhakPTTJ_l/exec';
        let db = { restaurantes: [], menu: [] };

        async function cargarDatos() {
            try {
                const respuesta = await fetch(scriptURL);
                const data = await respuesta.json();
                const findSheet = (n) => data[Object.keys(data).find(k => k.toLowerCase().trim() === n.toLowerCase())] || [];
                
                db.restaurantes = findSheet('RESTAURANTES');
                db.menu = findSheet('MENU_GENERAL');

                renderizarRestaurantes();
            } catch (e) {
                document.getElementById('app-container').innerHTML = `<p class="text-red-500 text-center brand text-[10px]">ERROR DE CONEXIÓN</p>`;
            }
        }

        function renderizarRestaurantes() {
            const contenedor = document.getElementById('app-container');
            let html = `<div class="mb-10 text-center"><h2 class="brand text-[9px] tracking-[0.5em] text-slate-500 uppercase">Explora Locales</h2></div>`;
            
            db.restaurantes.forEach(rest => {
                const esAbierto = rest.ESTADO?.toLowerCase() === 'abierto';
                html += `
                <div class="card-rest p-5 rounded-[2.5rem] flex items-center justify-between mb-5 shadow-2xl" 
                     onclick="verMenuRestaurante('${rest.NOMBRE_RESTAURANTE}', '${rest.ID_RESTAURANTE}')">
                    <div class="flex items-center gap-5">
                        <div class="relative">
                            <img src="${rest.FOTO || 'https://via.placeholder.com/150'}" class="w-20 h-20 rounded-[2rem] object-cover border border-white/10 shadow-lg">
                            ${esAbierto ? '<span class="absolute -top-1 -right-1 flex h-4 w-4"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span><span class="relative inline-flex rounded-full h-4 w-4 bg-cyan-500 border-2 border-dark"></span></span>' : ''}
                        </div>
                        <div class="text-left">
                            <p class="text-[8px] text-cyan-400/60 font-bold uppercase tracking-widest mb-1">${rest.CATEGORIA || 'RESTAURANTE'}</p>
                            <h3 class="font-bold text-lg uppercase tracking-tight text-white leading-tight mb-2">${rest.NOMBRE_RESTAURANTE}</h3>
                            <div class="status-pill ${esAbierto ? 'bg-cyan-500/10 text-cyan-400' : 'bg-red-500/10 text-red-400'}">
                                ${esAbierto ? '● ABIERTO' : '○ CERRADO'}
                            </div>
                        </div>
                    </div>
                    <div class="text-cyan-400/40 pr-2">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
                        </svg>
                    </div>
                </div>`;
            });
            contenedor.innerHTML = html;
        }

        function verMenuRestaurante(nombreRest, idRest) {
            const contenedor = document.getElementById('app-container');
            const platos = db.menu.filter(p => String(p.ID_RESTAURANTE) === String(idRest));
            let html = `
                <button onclick="renderizarRestaurantes()" class="text-cyan-400 text-[10px] brand mb-8 tracking-widest flex items-center gap-2 bg-white/5 px-5 py-2 rounded-full border border-white/10 uppercase">
                    <span>←</span> Volver
                </button>
                <h2 class="brand text-3xl text-white mb-8 uppercase tracking-tighter text-left">${nombreRest}</h2>
                <div class="grid gap-5">`;

            platos.forEach(plato => {
                html += `
                <div class="bg-gradient-to-r from-white/5 to-transparent p-4 rounded-[2rem] flex justify-between items-center border border-white/5 active:scale-95 transition-all" onclick="alert('Punto 3: Pronto...')">
                    <div class="flex-1 pr-4 text-left">
                        <div class="font-bold text-white text-md uppercase leading-tight">${plato.PLATO || 'Sin Nombre'}</div>
                        <div class="text-cyan-400 font-black mt-2 text-xl tracking-tighter">$${parseFloat(plato.PRECIO || 0).toFixed(2)}</div>
                    </div>
                    <img src="${plato.FOTO_PLATO || 'https://via.placeholder.com/150'}" class="w-24 h-24 rounded-[1.8rem] object-cover border border-white/10 shadow-xl">
                </div>`;
            });
            contenedor.innerHTML = html + `</div>`;
        }

        cargarDatos();
    </script>
</body>
</html>
