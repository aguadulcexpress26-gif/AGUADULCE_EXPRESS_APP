<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express v74</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark: #020617; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: white; margin: 0; -webkit-tap-highlight-color: transparent; }
        
        /* HEADER PREMIUM */
        header { background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo-box { width: 42px; height: 42px; background: white; border-radius: 12px; padding: 2px; border: 2px solid var(--cyan); }

        /* TARJETAS */
        .card-rest { position: relative; overflow: hidden; border-radius: 2rem; height: 170px; border: 1px solid rgba(255,255,255,0.06); transition: 0.3s; }
        .card-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .card-gradient { position: absolute; inset: 0; background: linear-gradient(to top, var(--dark) 5%, transparent 100%); }

        /* MODAL */
        #modal-plato { position: fixed; inset: 0; background: var(--dark); z-index: 1000; display: none; flex-direction: column; overflow-y: auto; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .extra-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.2rem; padding: 14px; }
        .extra-card.active { border-color: var(--cyan); background: rgba(6, 182, 212, 0.1); }
    </style>
</head>
<body>

    <header class="sticky top-0 z-50 px-6 py-4 flex items-center gap-4">
        <div class="logo-box flex items-center justify-center font-black text-dark text-xl">A</div>
        <div class="flex flex-col text-left">
            <span class="font-black text-xl tracking-tighter text-white uppercase leading-none">Aguadulce</span>
            <span class="text-[8px] font-bold tracking-[0.5em] text-cyan-400 uppercase">Express</span>
        </div>
    </header>

    <main id="app-container" class="px-5 py-6 pb-24">
        <div class="py-32 text-center">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-cyan-400"></div>
            <p class="text-[9px] text-cyan-400/50 font-black uppercase tracking-widest mt-4">Sincronizando menú...</p>
        </div>
    </main>

    <div id="modal-plato">
        <button onclick="cerrarModal()" class="absolute top-6 left-6 z-[1010] bg-black/50 backdrop-blur-md w-10 h-10 rounded-xl flex items-center justify-center text-white border border-white/10">✕</button>
        <img id="modal-img" src="" class="w-full h-[35vh] object-cover">
        
        <div class="px-7 py-8 pb-40">
            <div id="modal-info" class="text-left"></div>
            <div id="modal-extras" class="mt-8 space-y-3"></div>
            
            <div class="mt-10 flex items-center justify-between bg-white/5 p-4 rounded-2xl border border-white/10">
                <span class="text-[10px] font-black uppercase text-slate-500 ml-2">Cantidad</span>
                <div class="flex items-center gap-5">
                    <button onclick="updateQty(-1)" class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center text-lg font-bold border border-white/10">-</button>
                    <span id="qty-num" class="text-xl font-black text-cyan-400">1</span>
                    <button onclick="updateQty(1)" class="w-10 h-10 rounded-xl bg-cyan-500 text-dark flex items-center justify-center text-lg font-black shadow-lg">+</button>
                </div>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-dark via-dark to-transparent">
            <button class="w-full bg-cyan-500 text-dark font-black py-5 rounded-2xl uppercase text-xs tracking-widest shadow-xl active:scale-95 transition-all">
                Añadir al carrito • <span id="total-price">0.00</span>€
            </button>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyutzaHTfEwHGnoWVy_ptlNg5vTU1GvwflEwU4-KIRt2q7CvU0tr_SacmnhakPTTJ_l/exec';
        let db = { rest: [], menu: [] };
        let activePlato = null, cantidad = 1, extrasSel = [];

        async function cargar() {
            try {
                const res = await fetch(scriptURL);
                const data = await res.json();
                const findS = (n) => data[Object.keys(data).find(k => k.toLowerCase().trim() === n.toLowerCase())] || [];
                db.rest = findS('RESTAURANTES');
                db.menu = findS('MENU_GENERAL');
                renderHome();
            } catch (e) {
                document.getElementById('app-container').innerHTML = `<p class="py-20 text-red-400 font-black text-[10px] uppercase">Error de enlace</p>`;
            }
        }

        function renderHome() {
            const container = document.getElementById('app-container');
            let html = `<h2 class="text-[9px] tracking-[0.3em] text-slate-500 uppercase font-black mb-6 ml-1 text-left">Locales Disponibles</h2>`;
            db.rest.forEach(r => {
                html += `
                <div class="card-rest mb-5 shadow-2xl" onclick="verMenu('${r.NOMBRE_RESTAURANTE}', '${r.ID_RESTAURANTE}')">
                    <img src="${r.FOTO || 'https://via.placeholder.com/600x400'}" class="card-img">
                    <div class="card-gradient"></div>
                    <div class="absolute bottom-5 left-6 right-6 text-left">
                        <p class="text-[8px] text-cyan-400 font-black uppercase tracking-[0.2em] mb-1">${r.CATEGORIA || 'PREMIUM'}</p>
                        <h3 class="text-xl font-black text-white uppercase tracking-tighter leading-none">${r.NOMBRE_RESTAURANTE}</h3>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        function verMenu(nombre, id) {
            const container = document.getElementById('app-container');
            // FILTRO BLINDADO: Compara IDs ignorando espacios y mayúsculas
            const platos = db.menu.filter(m => 
                String(m.ID_RESTAURANTE || '').trim().toUpperCase() === String(id || '').trim().toUpperCase()
            );

            let html = `
                <div class="flex items-center gap-4 mb-8 text-left">
                    <button onclick="renderHome()" class="bg-white/5 w-10 h-10 rounded-xl border border-white/10 text-cyan-400 flex items-center justify-center shadow-lg">←</button>
                    <div><h2 class="text-xl font-black text-white uppercase tracking-tighter leading-none">${nombre}</h2><p class="text-[9px] text-cyan-400 font-black uppercase tracking-[0.3em] mt-1">Nuestra Carta</p></div>
                </div>
                <div class="grid gap-3">`;

            if(platos.length === 0) {
                html += `<div class="py-20 opacity-40 text-[10px] uppercase font-bold tracking-widest text-center">Menú no cargado aún</div>`;
            }

            platos.forEach(p => {
                html += `
                <div class="bg-white/5 p-4 rounded-2xl flex justify-between items-center border border-white/5 active:scale-95 transition-all shadow-xl" 
                     onclick='abrirPlato(${JSON.stringify(p).replace(/'/g, "&apos;")})'>
                    <div class="text-left flex-1 pr-4">
                        <div class="font-bold text-white text-xs uppercase mb-1 leading-snug">${p.PLATO}</div>
                        <div class="text-cyan-400 font-black text-lg tracking-tighter">${parseFloat(p.PRECIO || 0).toFixed(2)}€</div>
                    </div>
                    <img src="${p.FOTO_PLATO || 'https://via.placeholder.com/150'}" class="w-16 h-16 rounded-xl object-cover border border-white/10 shadow-lg">
                </div>`;
            });
            container.innerHTML = html + `</div>`;
            window.scrollTo(0,0);
        }

        function abrirPlato(p) {
            activePlato = p; cantidad = 1; extrasSel = [];
            const modal = document.getElementById('modal-plato');
            document.getElementById('modal-img').src = p.FOTO_PLATO || 'https://via.placeholder.com/800x600';
            document.getElementById('modal-info').innerHTML = `
                <h2 class="text-2xl font-black text-white uppercase tracking-tighter mb-2 leading-tight">${p.PLATO}</h2>
                <p class="text-slate-400 text-[11px] leading-relaxed mb-6">${p.DESCRIPCION || 'Elaborado con los mejores ingredientes de la zona.'}</p>
                <div class="text-2xl font-black text-cyan-400">${parseFloat(p.PRECIO || 0).toFixed(2)}€</div>
            `;

            let exHtml = '';
            if(p.EXTRAS) {
                exHtml = `<h4 class="text-[9px] font-black uppercase tracking-widest text-slate-500 mb-3 ml-1">Extras opcionales</h4><div class="grid gap-2">`;
                p.EXTRAS.split(',').forEach((ex, i) => {
                    const [n, pr] = ex.split(':');
                    if(n && pr) {
                        exHtml += `<div id="ex-${i}" onclick="toggleExtra('${n.trim()}', ${pr}, ${i})" class="extra-card flex justify-between items-center">
                            <span class="text-[11px] font-bold text-white uppercase">${n.trim()}</span>
                            <span class="text-[11px] font-black text-cyan-400">+${parseFloat(pr).toFixed(2)}€</span>
                        </div>`;
                    }
                });
                exHtml += `</div>`;
            }
            document.getElementById('modal-extras').innerHTML = exHtml;
            
            recalc();
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function toggleExtra(n, pr, i) {
            const idx = extrasSel.findIndex(e => e.n === n);
            const el = document.getElementById(`ex-${i}`);
            if(idx > -1) { extrasSel.splice(idx, 1); el.classList.remove('active'); }
            else { extrasSel.push({n, pr}); el.classList.add('active'); }
            recalc();
        }

        function updateQty(v) { cantidad = Math.max(1, cantidad + v); document.getElementById('qty-num').innerText = cantidad; recalc(); }

        function recalc() {
            let total = (parseFloat(activePlato.PRECIO || 0) + extrasSel.reduce((a, b) => a + b.pr, 0)) * cantidad;
            document.getElementById('total-price').innerText = total.toFixed(2);
        }

        function cerrarModal() { document.getElementById('modal-plato').style.display = 'none'; document.body.style.overflow = 'auto'; }

        cargar();
    </script>
</body>
</html>
