<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Reparto App</title>
</head>
<body class="bg-[#0a0f1a] text-white p-4">
    <div class="bg-[#1a2235] p-5 rounded-3xl mb-6 flex justify-between items-center">
        <h1 class="text-emerald-400 font-black italic">REPARTO APP</h1>
        <span class="text-xs font-bold bg-emerald-500/20 text-emerald-400 px-3 py-1 rounded-full" id="rep-nom"></span>
    </div>

    <div id="lista" class="grid gap-6"></div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbzmIW4rvilG6rCN7NbT-sQw-VniY0PDyi7wxQuBYbmDXOGbMup8J4tMEu99uqwzMHuq/exec";
        const auth = localStorage.getItem('ag_auth');
        const nombreRep = localStorage.getItem('ag_nombre');

        if(!auth || localStorage.getItem('ag_rol') !== "REPARTIDOR") window.location.href="index.html";
        document.getElementById('rep-nom').innerText = nombreRep;

        async function cargar() {
            const res = await fetch(`${scriptURL}?action=leerRepartidor&auth=${auth}`);
            const pedidos = await res.json();
            document.getElementById('lista').innerHTML = pedidos.map(p => {
                let btn = "";
                if(p.ESTADO === "LISTO") btn = `<button onclick="actualizar('${p.ID_PEDIDO}','RECOGIDO','${nombreRep}')" class="w-full bg-emerald-500 text-white font-black py-4 rounded-2xl">ACEPTAR Y RECOGER</button>`;
                if(p.ESTADO === "RECOGIDO") btn = `<button onclick="actualizar('${p.ID_PEDIDO}','FINALIZADO')" class="w-full bg-white text-slate-900 font-black py-4 rounded-2xl font-black">CONFIRMAR ENTREGA</button>`;
                
                return `
                    <div class="bg-[#1a2235] p-6 rounded-[2.5rem] border border-white/5">
                        <p class="font-black text-2xl mb-1 italic">#${p.ID_PEDIDO}</p>
                        <p class="text-emerald-400 font-bold mb-4">${p.DIRECCION}</p>
                        <div class="flex justify-between items-center mb-6">
                            <span class="text-xl font-black">${p.TOTAL}€</span>
                            <span class="bg-black/30 px-3 py-1 rounded-lg text-xs font-bold">${p.PAGO}</span>
                        </div>
                        ${btn}
                    </div>
                `;
            }).join('') || "<div class='text-center py-20 opacity-20 font-black italic uppercase'>No hay pedidos listos cerca</div>";
        }

        async function actualizar(id, estado, rep = null) {
            await fetch(scriptURL, { method: 'POST', body: JSON.stringify({action:"actualizarEstado", idPedido:id, nuevoEstado:estado, repartidor:rep}) });
            cargar();
        }
        setInterval(cargar, 20000); cargar();
    </script>
</body>
</html>
