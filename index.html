<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express Pro v96</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark: #020617; --red: #ef4444; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--dark) !important; color: white; margin: 0; 
            -webkit-tap-highlight-color: transparent; letter-spacing: -0.015em; 
        }
        
        /* Encabezados de Categoría dentro del Restaurante */
        .cat-separator {
            font-size: 0.7rem; font-weight: 800; color: rgba(255,255,255,0.4);
            letter-spacing: 0.2em; text-transform: uppercase;
            margin: 25px 0 15px 5px; border-left: 3px solid var(--cyan); padding-left: 10px;
        }

        .plato-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 1.5rem; padding: 15px; display: flex; align-items: center;
            justify-content: space-between; margin-bottom: 12px;
        }

        .precio-badge {
            background: var(--cyan); color: var(--dark); padding: 5px 12px;
            border-radius: 10px; font-weight: 800; font-size: 0.95rem;
        }

        .step-title { 
            font-size: 0.75rem; font-weight: 800; color: var(--cyan); 
            letter-spacing: 0.1em; text-transform: uppercase; 
            margin-bottom: 1rem; display: block; text-align: left;
        }

        /* BARRA CESTA FLOTANTE */
        #cesta-flotante { 
            position: fixed; bottom: 20px; right: 15px; left: 15px; 
            background: var(--cyan); color: var(--dark); 
            padding: 15px 20px; border-radius: 20px; 
            display: none; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); z-index: 500;
        }
        .btn-vaciar-x { color: var(--red); font-size: 1.4rem; font-weight: 900; cursor: pointer; padding-left: 15px; border-left: 1px solid rgba(0,0,0,0.1); }

        #modal-plato { position: fixed; inset: 0; background: var(--dark); z-index: 1000; display: none; flex-direction: column; overflow-y: auto; }
        .foto-header-modal { width: 100%; height: 280px; object-fit: cover; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; }
        
        /* Fila de Extra con Precio Nombre:Precio */
        .extra-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .extra-precio-tag { color: var(--red); font-weight: 800; font-size: 0.75rem; }
    </style>
</head>
<body>

    <header class="p-5 flex items-center gap-4 bg-[#020617]/95 backdrop-blur-xl sticky top-0 z-50 border-b border-white/5">
        <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center border-2 border-cyan-400 font-black text-dark text-lg">A</div>
        <div class="text-left">
            <h1 class="text-lg leading-none text-white font-bold italic uppercase tracking-tight">Aguadulce</h1>
            <p class="text-[8px] tracking-[0.4em] text-cyan-400 uppercase font-bold mt-1">Express Pro</p>
        </div>
    </header>

    <main id="app-container" class="px-5 py-5 pb-32"></main>

    <div id="cesta-flotante">
        <div class="flex flex-col text-left flex-1" onclick="abrirCestaFull()">
            <span id="cesta-info" class="font-black text-sm uppercase italic">0 PRODUCTOS</span>
            <span id="cesta-total" class="text-[10px] font-bold opacity-80 uppercase tracking-widest">0.00€ TOTAL</span>
        </div>
        <div class="btn-vaciar-x" onclick="vaciarCesta()">✕</div>
    </div>

    <div id="modal-plato">
        <button onclick="cerrarModal()" class="absolute top-5 left-5 z-50 bg-black/50 backdrop-blur-md w-10 h-10 rounded-full text-white">✕</button>
        <img id="modal-img" src="" class="foto-header-modal">
        <div class="px-6 py-8 pb-32">
            <div class="flex justify-between items-start mb-6 text-left">
                <div class="flex-1 pr-4">
                    <h2 id="modal-titulo" class="text-xl uppercase font-black italic text-white leading-tight"></h2>
                    <p id="modal-desc" class="opacity-60 text-[11px] mt-2 leading-relaxed"></p>
                </div>
                <div id="modal-precio-base" class="precio-badge">0€</div>
            </div>
            
            <div id="contenedor-pasos" class="space-y-8"></div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 p-5 bg-gradient-to-t from-dark via-dark/95 to-transparent">
            <button onclick="confirmarYAnadir()" class="w-full bg-cyan-500 text-dark font-black py-4 rounded-2xl uppercase tracking-widest text-xs flex justify-between px-8 items-center">
                <span>Añadir al pedido</span>
                <span id="total-modal-btn">0.00€</span>
            </button>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbysDVL_3M-2AfW5eGS8chw3KB3uFIXJU9kVltWHOQF0Lo9mzcBBn6nQwVy1mrkaH2tZ/exec';
        let db = { menu: [], restaurantes: [] };
        let cesta = [];
        let rActivo = { id: null, nombre: "" };

        async function init() {
            try {
                const res = await fetch(scriptURL);
                const data = await res.json();
                db.restaurantes = data.RESTAURANTES || [];
                db.menu = data.MENU_GENERAL || [];
                renderHome();
            } catch (e) { console.error("Error cargando base de datos"); }
        }

        function renderHome() {
            let html = `<div class="mb-5 text-left text-slate-500 text-[9px] uppercase font-bold tracking-widest px-1">Restaurantes Disponibles</div>`;
            db.restaurantes.forEach(r => {
                html += `
                <div class="relative rounded-[2rem] overflow-hidden h-[160px] mb-4 border border-white/5" onclick="verMenu('${r.NOMBRE_RESTAURANTE}', '${r.ID_RESTAURANTE}')">
                    <img src="${r.FOTO}" class="absolute inset-0 w-full h-full object-cover opacity-80">
                    <div class="absolute inset-0 bg-gradient-to-t from-dark to-transparent"></div>
                    <div class="absolute bottom-5 left-6 text-left">
                        <p class="text-cyan-400 text-[8px] font-black uppercase mb-1 tracking-widest">${r.CATEGORIA || 'Gourmet'}</p>
                        <h3 class="text-lg italic font-black uppercase text-white">${r.NOMBRE_RESTAURANTE}</h3>
                    </div>
                </div>`;
            });
            document.getElementById('app-container').innerHTML = html;
        }

        function verMenu(nombre, id) {
            const platos = db.menu.filter(p => String(p.ID_RESTAURANTE) === String(id));
            
            // LÓGICA DE CATEGORÍAS
            const categorias = [...new Set(platos.map(p => p.CATEGORIA || "General"))];
            
            let html = `<div class="flex items-center gap-4 mb-6 text-left"><button onclick="renderHome()" class="w-9 h-9 rounded-lg bg-white/5 border border-white/10 text-cyan-400">←</button><h2 class="text-md text-white font-bold uppercase italic">${nombre}</h2></div>`;
            
            categorias.forEach(cat => {
                html += `<div class="cat-separator">${cat}</div>`;
                const platosDeCat = platos.filter(p => (p.CATEGORIA || "General") === cat);
                
                platosDeCat.forEach(p => {
                    html += `
                    <div class="plato-card" onclick='abrirDetalle(${JSON.stringify(p).replace(/'/g, "&apos;")})'>
                        <div class="text-left flex-1 pr-4">
                            <h4 class="font-bold text-white text-[13px] uppercase mb-2 leading-tight">${p.PLATO}</h4>
                            <span class="precio-badge">${parseFloat(p.PRECIO).toFixed(2)}€</span>
                        </div>
                        <img src="${p.FOTO_PLATO}" class="w-16 h-16 rounded-xl object-cover border border-white/5">
                    </div>`;
                });
            });
            
            document.getElementById('app-container').innerHTML = html;
            window.scrollTo(0,0);
        }

        function abrirDetalle(p) {
            if (rActivo.id && rActivo.id !== String(p.ID_RESTAURANTE)) {
                if(!confirm(`¿Vaciar cesta de ${rActivo.nombre} para pedir aquí?`)) return;
                vaciarCesta(false);
            }
            
            document.getElementById('modal-titulo').innerText = p.PLATO;
            document.getElementById('modal-desc').innerText = p.DESCRIPCION || "";
            document.getElementById('modal-img').src = p.FOTO_PLATO;
            document.getElementById('modal-precio-base').innerText = parseFloat(p.PRECIO).toFixed(2) + "€";
            document.getElementById('total-modal-btn').innerText = parseFloat(p.PRECIO).toFixed(2) + "€";

            let htmlPasos = "";
            const renderSeccion = (titulo, datos, tipo) => {
                if(!datos || datos === "") return "";
                let res = `<div class="text-left"><span class="step-title">${titulo}</span>`;
                if(tipo === 'grid') {
                    res += `<div class="grid grid-cols-2 gap-2">`;
                    datos.split(',').forEach((d, i) => {
                        res += `<div class="border-2 border-white/10 p-3 rounded-xl text-center text-[10px] font-bold uppercase ${i===0?'border-cyan-400 bg-cyan-400/10 text-cyan-400':''}" onclick="selectUnica(this)">${d.trim()}</div>`;
                    });
                    res += `</div>`;
                } else {
                    res += `<div class="space-y-2">`;
                    datos.split(',').forEach(d => {
                        const [nombre, precio] = d.split(':');
                        res += `
                        <div class="extra-row">
                            <div class="flex flex-col text-left">
                                <span class="text-[11px] font-bold uppercase">${nombre.trim()}</span>
                                <span class="extra-precio-tag">+${precio || '0.00'}€</span>
                            </div>
                            <div class="contador-box flex items-center gap-4 bg-white/5 px-3 py-1 rounded-lg">
                                <span class="text-cyan-400 font-bold cursor-pointer" onclick="updateQty(this, -1)">−</span>
                                <span class="text-xs font-bold qty">0</span>
                                <span class="text-cyan-400 font-bold cursor-pointer" onclick="updateQty(this, 1)">+</span>
                            </div>
                        </div>`;
                    });
                    res += `</div>`;
                }
                return res + `</div>`;
            };

            htmlPasos += renderSeccion("Obligatorio", p.SELECCION_OBLIGATORIA, 'grid');
            htmlPasos += renderSeccion("Opciones", p.SELECCION_UNICA, 'grid');
            htmlPasos += renderSeccion("Extras", p.EXTRAS, 'lista');
            htmlPasos += renderSeccion("Bebida", p.SELECCION_DE_BEBIDAS, 'lista');

            document.getElementById('contenedor-pasos').innerHTML = htmlPasos;
            document.getElementById('modal-plato').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function vaciarCesta(aviso = true) {
            if(aviso && !confirm("¿Vaciar cesta?")) return;
            cesta = []; rActivo = { id: null, nombre: "" };
            document.getElementById('cesta-flotante').style.display = 'none';
        }

        function selectUnica(el) {
            el.parentElement.querySelectorAll('div').forEach(d => d.className = "border-2 border-white/10 p-3 rounded-xl text-center text-[10px] font-bold uppercase");
            el.className = "border-2 border-cyan-400 bg-cyan-400/10 text-cyan-400 p-3 rounded-xl text-center text-[10px] font-bold uppercase";
        }

        function cerrarModal() { 
            document.getElementById('modal-plato').style.display = 'none'; 
            document.body.style.overflow = 'auto'; 
        }

        init();
    </script>
</body>
</html>
