<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express Pro v61</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark: #020617; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: white; margin: 0; -webkit-tap-highlight-color: transparent; }
        .brand { font-family: 'Orbitron', sans-serif; }
        #modal-plato { position: fixed; inset: 0; background: var(--dark); z-index: 1000; display: none; flex-direction: column; overflow-y: auto; }
    </style>
</head>
<body>

    <header class="sticky top-0 z-50 bg-[#020617]/90 backdrop-blur-xl px-6 py-5 flex items-center justify-between border-b border-white/10">
        <div class="brand">
            <div class="text-2xl text-cyan-400 leading-none">AGUADULCE</div>
            <div class="text-[10px] tracking-[0.4em] text-white/70 text-right">EXPRESS</div>
        </div>
        <img src="apple-touch-icon.png" class="w-11 h-11 bg-white rounded-full p-1 border-2 border-cyan-400">
    </header>

    <main id="app-container" class="px-6 py-8">
        <div id="loading-state" class="text-center p-20">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-cyan-400 mb-4"></div>
            <p class="brand text-[10px] text-cyan-400 uppercase tracking-widest">Conectando con la Bóveda...</p>
        </div>
    </main>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyutzaHTfEwHGnoWVy_ptlNg5vTU1GvwflEwU4-KIRt2q7CvU0tr_SacmnhakPTTJ_l/exec';
        let db = { restaurantes: [], menu: [] };

        async function cargarDatos() {
            try {
                const respuesta = await fetch(scriptURL);
                const data = await respuesta.json();
                
                // Función para encontrar las hojas sin importar mayúsculas o espacios
                const obtenerHoja = (nombre) => {
                    const clave = Object.keys(data).find(k => k.toLowerCase().trim() === nombre.toLowerCase());
                    return data[clave] || [];
                };

                db.restaurantes = obtenerHoja('RESTAURANTES');
                db.menu = obtenerHoja('MENU_GENERAL');

                if (db.restaurantes.length === 0) {
                    document.getElementById('app-container').innerHTML = `
                        <div class="text-center p-10 border border-dashed border-slate-800 rounded-[2rem] mt-10">
                            <p class="text-slate-500 brand text-[10px]">LA BÓVEDA NO RESPONDE</p>
                            <p class="text-[9px] text-slate-600 mt-2 uppercase">Verifica las pestañas de tu Excel</p>
                        </div>`;
                } else {
                    renderizarRestaurantes();
                }
            } catch (e) {
                document.getElementById('app-container').innerHTML = `
                    <div class="text-center p-10">
                        <p class="text-red-500 brand text-[10px]">ERROR DE ENLACE</p>
                        <button onclick="location.reload()" class="mt-4 text-cyan-400 text-[10px] border border-cyan-400/20 px-6 py-2 rounded-full uppercase">Reintentar</button>
                    </div>`;
            }
        }

        function renderizarRestaurantes() {
            const contenedor = document.getElementById('app-container');
            let html = `<h2 class="brand text-[10px] tracking-[0.3em] text-slate-500 uppercase mb-8 text-center">Locales Disponibles</h2>`;
            
            db.restaurantes.forEach(rest => {
                const nombre = rest.NOMBRE_RESTAURANTE || "Sin Nombre";
                html += `
                <div class="bg-gradient-to-br from-slate-800/40 to-slate-900/80 p-5 rounded-[2.2rem] flex items-center justify-between border border-white/5 mb-4 active:scale-95 transition-all shadow-xl" 
                     onclick="verMenuRestaurante('${nombre}', '${rest.ID_RESTAURANTE}')">
                    <div class="flex items-center gap-5 text-left">
                        <img src="${rest.FOTO || 'https://via.placeholder.com/150'}" class="w-16 h-16 rounded-2xl object-cover border border-cyan-400/20 shadow-lg">
                        <div>
                            <h3 class="font-bold text-lg uppercase tracking-tight text-white leading-none mb-1">${nombre}</h3>
                            <p class="text-[9px] text-cyan-400 font-bold uppercase tracking-widest">${rest.ESTADO || 'Abierto'}</p>
                        </div>
                    </div>
                    <div class="bg-cyan-400/10 w-10 h-10 rounded-2xl flex items-center justify-center border border-cyan-400/10">
                        <span class="text-cyan-400 text-xl">→</span>
                    </div>
                </div>`;
            });
            contenedor.innerHTML = html;
        }

        function verMenuRestaurante(nombreRest, idRest) {
            const contenedor = document.getElementById('app-container');
            const platos = db.menu.filter(p => String(p.ID_RESTAURANTE) === String(idRest));
            
            let html = `
                <button onclick="renderizarRestaurantes()" class="text-cyan-400 text-[10px] brand mb-8 tracking-widest flex items-center gap-2 bg-white/5 px-4 py-2 rounded-full border border-white/5 uppercase">
                    <span>←</span> Volver
                </button>
                <h2 class="brand text-2xl text-white mb-6 uppercase tracking-tight text-left border-l-4 border-cyan-400 pl-4">${nombreRest}</h2>
                <div class="grid gap-4">`;

            platos.forEach(plato => {
                html += `
                <div class="bg-white/5 p-4 rounded-[1.8rem] flex justify-between items-center border border-white/5 active:scale-95 transition-all shadow-sm" 
                     onclick="alert('Punto 3: Cargando detalles de ${plato.PLATO}')">
                    <div class="flex-1 pr-4 text-left">
                        <div class="font-bold text-white text-sm uppercase leading-tight">${plato.PLATO || 'Plato'}</div>
                        <div class="text-cyan-400 font-bold mt-2 text-lg">$${parseFloat(plato.PRECIO || 0).toFixed(2)}</div>
                    </div>
                    <img src="${plato.FOTO_PLATO || 'https://via.placeholder.com/100'}" class="w-20 h-20 rounded-2xl object-cover border border-white/5 shadow-md">
                </div>`;
            });

            contenedor.innerHTML = html + `</div>`;
        }

        cargarDatos();
    </script>
</body>
</html>
