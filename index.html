<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express Pro v94</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark: #020617; }
        
        /* FUENTE ESTILO APTOS: Suave, moderna y profesional */
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--dark) !important; 
            color: white; 
            margin: 0; 
            -webkit-tap-highlight-color: transparent;
            letter-spacing: -0.01em; /* Ajuste típico de Aptos */
        }
        
        .brand { font-family: 'Orbitron', sans-serif; }
        .aptos-bold { font-weight: 700; }
        .aptos-light { font-weight: 400; opacity: 0.8; }

        /* TARJETAS DE PLATO (DISEÑO v61) */
        .plato-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 1.8rem;
            padding: 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
            transition: all 0.2s ease;
        }
        .plato-card:active { transform: scale(0.97); background: rgba(255,255,255,0.05); }

        .precio-badge {
            background: var(--cyan);
            color: var(--dark);
            padding: 6px 14px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1.05rem;
            box-shadow: 0 4px 12px rgba(6,182,212,0.3);
            /* Números estilo Aptos: claros y legibles */
        }

        /* MODAL (v61 REAL) */
        #modal-plato { position: fixed; inset: 0; background: var(--dark); z-index: 1000; display: none; flex-direction: column; overflow-y: auto; }
        .foto-header-modal { width: 100%; height: 310px; object-fit: cover; border-bottom-left-radius: 35px; border-bottom-right-radius: 35px; }

        /* ELEMENTOS DE SELECCIÓN */
        .opcion-unica { 
            border: 2px solid rgba(255,255,255,0.1); 
            padding: 14px; border-radius: 16px; 
            text-align: center; font-size: 0.85rem; font-weight: 600; 
            transition: 0.2s;
        }
        .opcion-unica.active { border-color: var(--cyan); background: rgba(6,182,212,0.1); color: var(--cyan); }

        .extra-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .contador-box { display: flex; align-items: center; gap: 16px; background: rgba(255,255,255,0.06); padding: 8px 14px; border-radius: 14px; }
        
        .step-title { 
            font-size: 0.7rem; font-weight: 800; color: var(--cyan); 
            letter-spacing: 0.12em; text-transform: uppercase; 
            margin-bottom: 1.2rem; display: block; 
        }
    </style>
</head>
<body>

    <header class="p-6 flex items-center gap-4 bg-[#020617]/90 backdrop-blur-xl sticky top-0 z-50 border-b border-white/5">
        <div class="w-11 h-11 bg-white rounded-xl flex items-center justify-center border-2 border-cyan-400 font-black text-dark brand text-xl">A</div>
        <div class="text-left">
            <h1 class="brand text-xl leading-none text-white italic">AGUADULCE</h1>
            <p class="text-[9px] tracking-[0.4em] text-cyan-400 uppercase font-bold mt-1">Express Pro</p>
        </div>
    </header>

    <main id="app-container" class="px-6 py-6">
        <div class="text-center py-20 text-cyan-400 animate-pulse font-bold text-xs uppercase tracking-[0.2em]">Sincronizando...</div>
    </main>

    <div id="modal-plato">
        <button onclick="cerrarModal()" class="absolute top-6 left-6 z-50 bg-black/60 backdrop-blur-md w-11 h-11 rounded-xl text-white border border-white/10">✕</button>
        <img id="modal-img" src="" class="foto-header-modal">
        
        <div class="px-7 py-8">
            <div class="flex justify-between items-start mb-8">
                <div class="max-w-[70%] text-left">
                    <h2 id="modal-titulo" class="brand text-2xl uppercase leading-tight italic text-white"></h2>
                    <p id="modal-desc" class="aptos-light text-xs mt-3 leading-relaxed"></p>
                </div>
                <div id="modal-precio-float" class="precio-badge">0.00€</div>
            </div>

            <div id="contenedor-pasos" class="space-y-10">
                </div>

            <button class="w-full bg-cyan-500 text-dark font-black py-5 rounded-3xl mt-12 shadow-lg shadow-cyan-500/20 text-sm uppercase tracking-widest">
                Confirmar y Añadir
            </button>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbysDVL_3M-2AfW5eGS8chw3KB3uFIXJU9kVltWHOQF0Lo9mzcBBn6nQwVy1mrkaH2tZ/exec';
        let db = { menu: [], restaurantes: [] };

        async function init() {
            try {
                const res = await fetch(scriptURL);
                const data = await res.json();
                db.restaurantes = data.RESTAURANTES || [];
                db.menu = data.MENU_GENERAL || [];
                renderHome();
            } catch (e) { console.error("Error cargando datos"); }
        }

        function renderHome() {
            let html = `<div class="mb-6 text-left text-slate-500 text-[10px] uppercase font-bold tracking-widest">Elige tu restaurante</div>`;
            db.restaurantes.forEach(r => {
                html += `
                <div class="relative rounded-[2.2rem] overflow-hidden h-[180px] mb-5 border border-white/5" onclick="verMenu('${r.NOMBRE_RESTAURANTE}', '${r.ID_RESTAURANTE}')">
                    <img src="${r.FOTO}" class="absolute inset-0 w-full h-full object-cover opacity-85">
                    <div class="absolute inset-0 bg-gradient-to-t from-[#020617] via-transparent to-transparent"></div>
                    <div class="absolute bottom-6 left-7 text-left">
                        <p class="text-cyan-400 text-[8px] font-black uppercase mb-1 tracking-widest">${r.CATEGORIA || 'Gourmet'}</p>
                        <h3 class="brand text-xl italic uppercase text-white">${r.NOMBRE_RESTAURANTE}</h3>
                    </div>
                </div>`;
            });
            document.getElementById('app-container').innerHTML = html;
        }

        function verMenu(nombre, id) {
            const platos = db.menu.filter(p => String(p.ID_RESTAURANTE) === String(id));
            let html = `
                <div class="flex items-center gap-4 mb-8 text-left">
                    <button onclick="renderHome()" class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 text-cyan-400">←</button>
                    <div><h2 class="brand text-lg text-white uppercase">${nombre}</h2></div>
                </div>`;
            
            platos.forEach(p => {
                html += `
                <div class="plato-card" onclick='abrirDetalle(${JSON.stringify(p).replace(/'/g, "&apos;")})'>
                    <div class="text-left flex-1 pr-4">
                        <h4 class="aptos-bold text-white text-[14px] uppercase mb-3 leading-tight">${p.PLATO}</h4>
                        <span class="precio-badge">${parseFloat(p.PRECIO).toFixed(2)}€</span>
                    </div>
                    <img src="${p.FOTO_PLATO}" class="w-20 h-20 rounded-2xl object-cover border border-cyan-400/20">
                </div>`;
            });
            document.getElementById('app-container').innerHTML = html;
            window.scrollTo(0,0);
        }

        function abrirDetalle(p) {
            document.getElementById('modal-titulo').innerText = p.PLATO;
            document.getElementById('modal-desc').innerText = p.DESCRIPCION || "Preparado con la mejor selección de ingredientes frescos.";
            document.getElementById('modal-img').src = p.FOTO_PLATO;
            document.getElementById('modal-precio-float').innerText = parseFloat(p.PRECIO).toFixed(2) + "€";
            
            let htmlPasos = "";

            // LÓGICA DE DATOS: Mapea las columnas del Excel a los pasos del Modal
            const agregarPaso = (titulo, datos, tipo) => {
                if(!datos) return "";
                let res = `<div class="text-left"><span class="step-title">${titulo}</span>`;
                if(tipo === 'grid') {
                    res += `<div class="grid grid-cols-2 gap-3">`;
                    datos.split(',').forEach((d, i) => {
                        res += `<div class="opcion-unica ${i===0?'active':''}" onclick="toggleActive(this)">${d.trim()}</div>`;
                    });
                    res += `</div>`;
                } else if(tipo === 'lista') {
                    res += `<div class="space-y-3">`;
                    datos.split(',').forEach(d => {
                        res += `
                        <div class="extra-row">
                            <span class="text-xs font-bold uppercase">${d.trim()}</span>
                            <div class="contador-box"><span class="btn-control">−</span><span class="font-bold">0</span><span class="btn-control">+</span></div>
                        </div>`;
                    });
                    res += `</div>`;
                }
                return res + `</div>`;
            };

            // Mapeo dinámico según tus columnas de Excel
            htmlPasos += agregarPaso("1. Selección Obligatoria", p.SELECCION_OBLIGATORIA, 'grid');
            htmlPasos += agregarPaso("2. Personaliza tu plato", p.SELECCION_UNICA, 'grid');
            htmlPasos += agregarPaso("3. Extras Adicionales", p.EXTRAS, 'lista');
            htmlPasos += agregarPaso("4. Elige tu Bebida", p.SELECCION_DE_BEBIDAS, 'lista');

            document.getElementById('contenedor-pasos').innerHTML = htmlPasos || "<p class='text-xs opacity-50 italic'>Sin opciones adicionales.</p>";
            document.getElementById('modal-plato').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function toggleActive(el) {
            el.parentElement.querySelectorAll('.opcion-unica').forEach(o => o.classList.remove('active'));
            el.classList.add('active');
        }

        function cerrarModal() { 
            document.getElementById('modal-plato').style.display = 'none'; 
            document.body.style.overflow = 'auto'; 
        }

        init();
    </script>
</body>
</html>
