<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Cocina - Aguadulce</title>
    <style>
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .pedido-nuevo { border: 2px solid #22d3ee; animation: pulse 2s infinite; }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen p-4 font-sans">

    <audio id="alerta" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <div class="max-w-2xl mx-auto">
        <header class="flex justify-between items-center mb-6 bg-[#1e293b] p-5 rounded-2xl border border-white/5 shadow-xl">
            <div>
                <h1 class="text-xl font-black text-cyan-400 italic">COCINA AGUADULCE</h1>
                <p id="local" class="text-[10px] text-slate-500 uppercase tracking-widest">Cargando restaurante...</p>
            </div>
            <div id="status" class="text-[9px] font-bold px-3 py-1 rounded-full bg-slate-800 text-slate-400">INICIANDO...</div>
        </header>

        <div id="lista" class="space-y-4">
            </div>
    </div>

    <script>
        // --- PEGA AQUÍ TU URL DE GOOGLE ---
        const scriptURL = "https://script.google.com/macros/s/AKfycbzmIW4rvilG6rCN7NbT-sQw-VniY0PDyi7wxQuBYbmDXOGbMup8J4tMEu99uqwzMHuq/exec"; 
        const MI_ID_REST = "RT33M5";
        let pedidosActuales = [];

        async function fetchPedidos() {
            try {
                const r = await fetch(`${scriptURL}?action=leerCocina&idRest=${MI_ID_REST}`);
                const data = await r.json();
                
                if (data.length > pedidosActuales.length && pedidosActuales.length > 0) {
                    document.getElementById('alerta').play().catch(()=>{});
                }
                
                pedidosActuales = data;
                render(data);
                
                const st = document.getElementById('status');
                st.innerText = "ONLINE";
                st.className = "text-[9px] font-bold px-3 py-1 rounded-full bg-green-500/20 text-green-400";
                document.getElementById('local').innerText = "REST: " + MI_ID_REST;
            } catch (e) {
                const st = document.getElementById('status');
                st.innerText = "ERROR DE RED";
                st.className = "text-[9px] font-bold px-3 py-1 rounded-full bg-red-500/20 text-red-400";
            }
        }

        function render(pedidos) {
            const cont = document.getElementById('lista');
            if (pedidos.length === 0) {
                cont.innerHTML = '<div class="text-center py-20 text-slate-500 text-sm italic">Esperando pedidos nuevos...</div>';
                return;
            }

            cont.innerHTML = pedidos.map(p => `
                <div class="bg-[#1e293b] p-4 rounded-2xl border border-white/5 flex justify-between items-center gap-4 shadow-lg">
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-cyan-400 font-black text-lg">#${p["ID PEDIDO"]}</span>
                            <span class="text-[10px] text-slate-500 font-mono">${p.FECHA.split('T')[1].substring(0,5)}</span>
                        </div>
                        <h2 class="font-bold text-slate-100 uppercase text-sm">${p.CLIENTE}</h2>
                        <p class="text-xs text-slate-400 mt-2 leading-relaxed bg-black/20 p-2 rounded-lg">${p.PEDIDO_DETALLE}</p>
                    </div>
                    <button onclick="completar('${p["ID PEDIDO"]}')" class="bg-cyan-500 hover:bg-cyan-400 text-black font-black py-4 px-6 rounded-xl transition-all active:scale-95 text-xs shadow-lg shadow-cyan-500/20">
                        LISTO
                    </button>
                </div>
            `).join('');
        }

        async function completar(id) {
            if(!confirm("¿Pedido terminado?")) return;
            // Quitamos visualmente para que sea instantáneo
            pedidosActuales = pedidosActuales.filter(p => p["ID PEDIDO"] !== id);
            render(pedidosActuales);
            // Avisamos al Excel
            await fetch(`${scriptURL}?action=marcarListo&idPedido=${id}`);
        }

        setInterval(fetchPedidos, 8000); // Revisa cada 8 segundos
        fetchPedidos();
    </script>
</body>
</html>
