<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Aguadulce Express">
    
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./apple-touch-icon.png.jpeg">

    <title>Aguadulce Express v106 PWA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark: #020617; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark) !important; color: white; margin: 0; -webkit-tap-highlight-color: transparent; }
        
        #loader { position: fixed; inset: 0; background: var(--dark); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(6,182,212,0.1); border-top-color: var(--cyan); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* HEADER DINÁMICO REPARADO */
        .brand-header { position: relative; height: 160px; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; border-bottom: 1px solid rgba(6,182,212,0.1); }
        #header-bg { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0.9; filter: brightness(1.1); transition: background 1s; }
        .brand-overlay { position: absolute; inset: 0; background: linear-gradient(to top, var(--dark), transparent); }
        .brand-content { position: relative; z-index: 10; display: flex; align-items: center; gap: 15px; }
        .brand-logo { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--cyan); object-fit: cover; background: white; }

        /* BANNER */
        .promo-banner { background: rgba(6,182,212,0.05); border-y: 1px solid rgba(6,182,212,0.1); padding: 8px 0; overflow: hidden; display: flex; }
        .promo-scroll { white-space: nowrap; animation: scroll-text 20s linear infinite; display: flex; gap: 50px; font-size: 10px; font-weight: 800; color: var(--cyan); text-transform: uppercase; letter-spacing: 1px; }
        @keyframes scroll-text { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        .plato-card { width: 100% !important; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 2rem; padding: 16px; display: flex; align-items: center; margin-bottom: 16px; box-sizing: border-box; } 
        #modal-plato, #panel-checkout { position: fixed; inset: 0; background: var(--dark); z-index: 1000; display: none; flex-direction: column; overflow-y: auto; }
        .step-tag { font-weight: 800; font-size: 9px; text-transform: uppercase; letter-spacing: 0.2em; color: #22d3ee; margin-bottom: 1rem; display: block; text-align: left; }
        .grid-option { border: 2px solid rgba(255,255,255,0.05); padding: 14px; text-align: center; font-size: 10px; font-weight: 800; text-transform: uppercase; border-radius: 15px; }
        .grid-option.selected { border-color: var(--cyan); background: rgba(6,182,212,0.1); color: var(--cyan); }
        input, select { background: rgba(255,255,255,0.03) !important; border: 1px solid rgba(255,255,255,0.08) !important; padding: 16px !important; border-radius: 18px !important; color: white !important; width: 100%; margin-bottom: 12px; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner mb-4"></div>
        <p class="text-cyan-400 text-[10px] font-black uppercase tracking-[0.3em] animate-pulse">Sincronizando Aguadulce Express...</p>
    </div>

    <header class="brand-header">
        <div id="header-bg"></div>
        <div class="brand-overlay"></div>
        <div class="brand-content">
            <img id="app-logo" src="" class="brand-logo shadow-lg shadow-cyan-500/20">
            <div class="text-left">
                 <h1 class="text-2xl font-black italic uppercase leading-none tracking-tighter">Aguadulce</h1>
                 <p class="text-cyan-400 text-[9px] font-black uppercase tracking-[0.4em] mt-1">Express</p>
            </div>
        </div>
    </header>

    <div class="promo-banner">
        <div class="promo-scroll" id="texto-anuncio">Cargando ofertas del día...</div>
    </div>

    <main id="app-container" class="px-5 py-5 pb-32"></main>

    <div id="cesta-flotante" class="fixed bottom-5 left-4 right-4 bg-cyan-400 text-dark p-4 rounded-2xl hidden justify-between items-center z-[100] shadow-2xl shadow-cyan-400/20">
        <div class="flex-1" onclick="abrirCheckout()">
            <span id="cesta-info" class="font-black text-sm italic uppercase">🛒 0 PRODUCTOS</span>
            <span id="cesta-total" class="block text-[10px] font-bold uppercase tracking-widest">0.00€ TOTAL</span>
        </div>
        <div class="text-red-600 font-black text-2xl pl-4 border-l border-black/10 px-2 cursor-pointer" onclick="vaciarCesta()">✕</div>
    </div>

    <div id="modal-plato">
        <button onclick="cerrarModal()" class="absolute top-5 left-5 z-[1001] bg-black/50 w-10 h-10 rounded-full text-white backdrop-blur-md border border-white/10">✕</button>
        <img id="modal-img" src="" class="w-full h-[250px] object-cover">
        <div class="px-6 py-8 pb-40 text-left">
            <div class="flex justify-between items-start mb-8">
                <div class="flex-1 pr-4">
                    <h2 id="modal-titulo" class="text-2xl font-black italic uppercase text-white leading-tight"></h2>
                    <p id="modal-desc" class="opacity-50 text-[11px] mt-2"></p>
                </div>
                <div id="modal-precio-base" class="bg-cyan-400 text-dark px-4 py-2 rounded-xl font-black text-lg">0€</div>
            </div>
            <div id="contenedor-pasos" class="space-y-10"></div>
        </div>
        <div class="fixed bottom-0 left-0 right-0 p-5 bg-gradient-to-t from-dark via-dark to-transparent">
            <button id="btn-anadir-modal" onclick="confirmarAnadir()" class="w-full bg-cyan-400 text-dark font-black py-5 rounded-2xl uppercase text-xs flex justify-between px-8 items-center">
                <span id="txt-anadir">Añadir</span>
                <span id="total-modal-btn">0.00€</span>
            </button>
        </div>
    </div>

    <div id="panel-checkout" class="p-6">
        <div class="flex items-center gap-4 mb-8">
            <button onclick="cerrarCheckout()" class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 text-cyan-400">←</button>
            <h2 class="text-xl font-black italic uppercase">Tu Pedido</h2>
        </div>
        <div id="lista-checkout-items" class="space-y-4 text-left">
             <p class="step-tag">Datos de Entrega</p>
             <input type="text" id="nombre-cli" placeholder="NOMBRE COMPLETO">
             <input type="tel" id="telefono" value="+34">
             <input type="text" id="dir-cli" placeholder="DIRECCIÓN DE ENTREGA">
             <select id="pago-cli">
                 <option value="EFECTIVO">EFECTIVO</option>
                 <option value="BIZUM">BIZUM</option>
                 <option value="TARJETA">TARJETA AL REPARTIDOR</option>
             </select>
             <div id="legal-box"></div> </div>
        <div id="lista-resumen" class="mt-8 p-6 bg-white/5 rounded-[2rem] space-y-3"></div>
        <button id="btn-final" onclick="enviarPedidoFinal()" class="w-full bg-cyan-400 text-dark py-6 rounded-2xl font-black uppercase text-sm mt-6">Efectuar Pedido</button>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzmIW4rvilG6rCN7NbT-sQw-VniY0PDyi7wxQuBYbmDXOGbMup8J4tMEu99uqwzMHuq/exec';
        let db = { menu: [], restaurantes: [], config: {}, anuncios: "" };
        let cesta = [];
        let rActivo = { id: null, nombre: "" };
        let itemActual = { pBase: 0, pOpciones: 0, pExtras: 0, cantidad: 1, obligatorioOk: false, data: null };

        async function init() {
            try {
                const res = await fetch(scriptURL);
                const data = await res.json();
                db.restaurantes = data.RESTAURANTES || [];
                db.menu = data.MENU_GENERAL || [];
                if(data.CONFIG && data.CONFIG[0]) {
                    document.getElementById('app-logo').src = data.CONFIG[0].LOGO_URL;
                    document.getElementById('header-bg').style.backgroundImage = `url('${data.CONFIG[0].FONDO_URL}')`;
                }
                if(data.ANUNCIOS && data.ANUNCIOS.length > 0) {
                    const frases = data.ANUNCIOS.map(a => a.TEXTO).join(" • ");
                    document.getElementById('texto-anuncio').innerText = frases + " • " + frases;
                }
                document.getElementById('loader').style.display = 'none';
                renderHome();
            } catch (e) { console.error(e); }
        }

        function renderHome() {
    let html = `<p class="step-tag mb-6 ml-2 italic">Selecciona un restaurante</p>`;
    const ahora = new Date();
    const horaActual = ahora.getHours() * 100 + ahora.getMinutes();

    db.restaurantes.forEach(r => {
        // Leemos los 2 turnos desde el Excel
        const ape1 = parseInt((r.HORA_APERTURA_1 || "00:00").replace(':', ''));
        const cie1 = parseInt((r.HORA_CIERRE_1 || "00:00").replace(':', ''));
        const ape2 = parseInt((r.HORA_APERTURA_2 || "00:00").replace(':', ''));
        const cie2 = parseInt((r.HORA_CIERRE_2 || "00:00").replace(':', ''));
        
        const enHorario = ((horaActual >= ape1 && horaActual <= cie1) || (horaActual >= ape2 && horaActual <= cie2));
        const manualAbierto = (r.ESTADO && r.ESTADO.toLowerCase().trim() === "abierto");

        if (enHorario && manualAbierto) {
            html += `
            <div class="relative rounded-[2.5rem] overflow-hidden h-[170px] mb-5 border border-white/5 shadow-2xl active:scale-95 transition-all" onclick="verMenu('${r.NOMBRE_RESTAURANTE}', '${r.ID_RESTAURANTE}')">
                <img src="${r.FOTO}" class="absolute inset-0 w-full h-full object-cover opacity-60">
                <div class="absolute inset-0 bg-gradient-to-t from-dark via-transparent"></div>
                <div class="absolute bottom-6 left-8 text-left">
                    <p class="text-cyan-400 text-[8px] font-black uppercase mb-1 tracking-widest">${r.CATEGORIA || 'Gourmet'}</p>
                    <h2 class="text-2xl font-black italic uppercase text-white leading-tight">${r.NOMBRE_RESTAURANTE}</h2>
                </div>
            </div>`;
        } else {
            html += `
            <div class="relative rounded-[2.5rem] overflow-hidden h-[170px] mb-5 border border-white/5 grayscale opacity-40">
                <img src="${r.FOTO}" class="absolute inset-0 w-full h-full object-cover">
                <div class="absolute inset-0 bg-black/60 flex flex-col items-center justify-center">
                    <p class="text-white font-black italic uppercase border-2 border-white px-4 py-1 text-[10px]">Cerrado</p>
                    <p class="text-cyan-400 text-[8px] font-bold mt-2 uppercase tracking-[0.2em]">Abre: ${r.HORA_APERTURA_1} / ${r.HORA_APERTURA_2}</p>
                </div>
            </div>`;
        }
    });
    document.getElementById('app-container').innerHTML = html;
}
        function verMenu(nombre, id) {
            const platos = db.menu.filter(p => String(p.ID_RESTAURANTE) === String(id));
            const cats = [...new Set(platos.map(p => p.CATEGORIA || "General"))];
            let html = `<div class="flex items-center gap-4 mb-6"><button onclick="renderHome()" class="w-10 h-10 rounded-xl bg-white/5 text-cyan-400">←</button><h2 class="text-xl font-black uppercase italic">${nombre}</h2></div>`;
            html += `<div class="space-y-4">` + platos.map(p => `
                <div class="plato-card" onclick='abrirDetalle(${JSON.stringify(p).replace(/'/g, "&apos;")})'>
                    <div class="flex-1 text-left"><h4 class="font-black text-sm uppercase">${p.PLATO}</h4><p class="text-cyan-400 font-black text-xs">${parseFloat(p.PRECIO).toFixed(2)}€</p></div>
                    <img src="${p.FOTO_PLATO}" class="w-16 h-16 rounded-xl object-cover">
                </div>`).join('') + `</div>`;
            document.getElementById('app-container').innerHTML = html;
        }

        function abrirDetalle(p) {
            rActivo.id = p.ID_RESTAURANTE;
            itemActual = { pBase: parseFloat(p.PRECIO), pOpciones: 0, pExtras: 0, cantidad: 1, obligatorioOk: !p.SELECCION_OBLIGATORIA, data: p };
            document.getElementById('modal-titulo').innerText = p.PLATO;
            document.getElementById('modal-desc').innerText = p.DESCRIPCION || "";
            document.getElementById('modal-img').src = p.FOTO_PLATO;
            document.getElementById('modal-precio-base').innerText = itemActual.pBase.toFixed(2) + "€";
            
            let html = "";
            const renderGrid = (titulo, datos, id) => {
                if(!datos) return "";
                return `<div class="text-left"><span class="step-tag">${titulo}</span><div class="grid grid-cols-2 gap-2">` + 
                datos.split(',').map(d => {
                    const n = d.split(':+')[0].trim();
                    const pr = parseFloat(d.split(':+')[1]) || 0;
                    return `<div class="grid-option" onclick="toggleSeleccion(this, ${pr}, '${id}')">${n}</div>`;
                }).join('') + `</div></div>`;
            };
            html += renderGrid("Obligatorio", p.SELECCION_OBLIGATORIA, 'oblig');
            html += renderGrid("Personalizar", p.SELECCION_UNICA, 'unica');
            document.getElementById('contenedor-pasos').innerHTML = html;
            document.getElementById('modal-plato').style.display = 'flex';
            actualizarBarraModal();
        }

        function toggleSeleccion(el, precio, id) {
            el.parentElement.querySelectorAll('.grid-option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            if(id === 'oblig') itemActual.obligatorioOk = true;
            itemActual.pOpciones = precio;
            actualizarBarraModal();
        }

        function actualizarBarraModal() {
            const total = (itemActual.pBase + itemActual.pOpciones) * itemActual.cantidad;
            document.getElementById('total-modal-btn').innerText = total.toFixed(2) + "€";
            document.getElementById('btn-anadir-modal').disabled = !itemActual.obligatorioOk;
            document.getElementById('btn-anadir-modal').className = itemActual.obligatorioOk ? "w-full bg-cyan-400 text-dark font-black py-5 rounded-2xl flex justify-between px-8" : "w-full bg-white/10 text-white/20 font-black py-5 rounded-2xl flex justify-between px-8";
        }

        function confirmarAnadir() {
            let sel = [];
            document.querySelectorAll('.grid-option.selected').forEach(el => sel.push(el.innerText));
            const textoExtras = sel.length > 0 ? ` [${sel.join(', ')}]` : "";
            cesta.push({ nombre: `${itemActual.cantidad}x ${itemActual.data.PLATO}${textoExtras}`, total: (itemActual.pBase + itemActual.pOpciones) * itemActual.cantidad });
            actualizarCestaBar();
            cerrarModal();
        }

        function abrirCheckout() {
            const modal = document.getElementById('panel-checkout');
            modal.style.display = 'flex';
            const subtotal = cesta.reduce((acc, i) => acc + i.total, 0);
            
            document.getElementById('nombre-cli').value = localStorage.getItem('ae_nombre') || "";
            document.getElementById('telefono').value = localStorage.getItem('ae_telf') || "+34";
            document.getElementById('dir-cli').value = localStorage.getItem('ae_dir') || "";
            const yaAcepto = localStorage.getItem('ae_legal') === "true";

            document.getElementById('legal-box').innerHTML = `
                <div class="p-3 bg-white/5 border border-white/5 rounded-xl mt-4">
                    <label class="flex items-start gap-3 cursor-pointer">
                        <input type="checkbox" id="check-legal" ${yaAcepto ? 'checked' : ''} onchange="document.getElementById('btn-final').disabled = !this.checked" class="mt-1 w-4 h-4 accent-cyan-400">
                        <span class="text-[9px] text-white/50 leading-tight">Acepto los <a href="#" onclick="event.preventDefault(); document.getElementById('modal-legal').style.display='flex'" class="text-cyan-400 underline">términos y condiciones</a>.</span>
                    </label>
                </div>`;
            document.getElementById('btn-final').disabled = !yaAcepto;
            document.getElementById('lista-resumen').innerHTML = `<div class="flex justify-between font-black text-cyan-400 uppercase italic"><span>Total</span><span>${(subtotal + 3.5).toFixed(2)}€</span></div>`;
        }

        async function enviarPedidoFinal() {
    // 1. OBTENER DATOS (Tus IDs originales)
    const nomCli = document.getElementById('cliente-nombre').value;
    const telCli = document.getElementById('cliente-telf').value;
    const dirCli = document.getElementById('cliente-dir').value;
    const pagoCli = document.getElementById('metodo-pago').value;

    // 2. VALIDACIÓN
    if (!nomCli || !telCli || !dirCli) {
        alert("⚠️ Completa tus datos de entrega");
        return;
    }

    // --- GUARDAR PARA LA PRÓXIMA COMPRA ---
    localStorage.setItem('ae_nombre', nomCli);
    localStorage.setItem('ae_telf', telCli);
    localStorage.setItem('ae_dir', dirCli);
    localStorage.setItem('ae_legal', "true");

    // 3. CÁLCULO
    const subtotal = cesta.reduce((acc, i) => acc + (parseFloat(i.total) || 0), 0);
    const totalConCargos = (subtotal + 3.50).toFixed(2);

    const paquete = {
        cliente_info: nomCli.toUpperCase(),
        telf_info: telCli,
        dir_info: dirCli.toUpperCase(),
        pedido_info: cesta.map(i => i.nombre).join(" | "),
        total_info: totalConCargos + "€",
        pago_info: pagoCli,
        id_res_info: rActivo.id 
    };

    const btn = document.getElementById('btn-final');
    btn.innerText = "⏳ ENVIANDO...";
    btn.disabled = true;

    try {
        await fetch(scriptURL, { method: "POST", mode: "no-cors", body: JSON.stringify(paquete) });
        document.getElementById('modal-exito').style.display = 'flex';
        cesta = [];
        actualizarCestaBar();
        cerrarCheckout();
    } catch (error) {
        alert("❌ Error de red");
        btn.innerText = "Efectuar Pedido";
        btn.disabled = false;
    }

        function actualizarCestaBar() {
            const total = cesta.reduce((acc, i) => acc + i.total, 0);
            document.getElementById('cesta-flotante').classList.toggle('hidden', cesta.length === 0);
            document.getElementById('cesta-info').innerText = `🛒 ${cesta.length} PRODUCTOS`;
            document.getElementById('cesta-total').innerText = `${total.toFixed(2)}€ TOTAL`;
        }

        function cerrarModal() { document.getElementById('modal-plato').style.display = 'none'; }
        function cerrarCheckout() { document.getElementById('panel-checkout').style.display = 'none'; }
        function vaciarCesta() { cesta = []; actualizarCestaBar(); }
        function cerrarExito() { document.getElementById('modal-exito').style.display = 'none'; renderHome(); }
        init();
    </script>

    <div id="modal-legal" class="fixed inset-0 z-[7000] hidden items-center justify-center p-6 backdrop-blur-xl bg-black/80">
        <div class="bg-[#020617] w-full max-w-sm rounded-[2rem] p-8 border border-white/10 shadow-2xl">
            <h3 class="text-cyan-400 font-black uppercase text-xs mb-4 italic">Aviso Legal</h3>
            <p class="text-[10px] text-white/60 mb-6 italic font-medium leading-relaxed">Sus datos se procesan según el RGPD 3/2018 exclusivamente para la entrega de este pedido.</p>
            <button onclick="document.getElementById('modal-legal').style.display='none'" class="w-full bg-cyan-400 text-black py-4 rounded-2xl font-black uppercase text-[10px]">Cerrar</button>
        </div>
    </div>

    <div id="modal-exito" class="fixed inset-0 z-[6000] hidden items-center justify-center p-6 backdrop-blur-md bg-black/80">
        <div class="bg-white/10 border border-cyan-400/30 p-8 rounded-[2.5rem] w-full max-w-sm text-center">
            <div class="w-20 h-20 bg-cyan-400 rounded-full flex items-center justify-center mx-auto mb-6"><svg class="w-10 h-10 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg></div>
            <h2 class="text-2xl font-black italic uppercase mb-2">¡PEDIDO ENVIADO!</h2>
            <button onclick="cerrarExito()" class="w-full bg-cyan-400 text-black py-5 rounded-2xl font-black uppercase text-sm mt-4">LISTO</button>
        </div>
    </div>
</body>
</html>
