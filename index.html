<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express v3.0 - New Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark: #020617; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark); color: white; margin: 0; -webkit-tap-highlight-color: transparent; }
        #loader { position: fixed; inset: 0; background: var(--dark); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(6,182,212,0.1); border-top-color: var(--cyan); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .cat-chip { padding: 10px 20px; background: rgba(255,255,255,0.05); border-radius: 14px; font-size: 11px; font-weight: 800; text-transform: uppercase; white-space: nowrap; border: 1px solid rgba(255,255,255,0.1); }
        .cat-chip.active { background: var(--cyan); color: var(--dark); border-color: var(--cyan); }
        .plato-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 1.5rem; padding: 15px; display: flex; align-items: center; margin-bottom: 12px; }
        #modal-plato, #panel-checkout { position: fixed; inset: 0; background: var(--dark); z-index: 1000; display: none; flex-direction: column; overflow-y: auto; }
        input, select { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 16px; border-radius: 15px; color: white; width: 100%; margin-bottom: 15px; outline: none; }
        .grid-option { border: 2px solid rgba(255,255,255,0.05); padding: 14px; text-align: center; border-radius: 15px; font-size: 12px; font-weight: 700; }
        .grid-option.selected { border-color: var(--cyan); background: rgba(6,182,212,0.1); color: var(--cyan); }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner mb-4"></div><p class="text-cyan-400 text-[10px] font-black uppercase tracking-widest">Iniciando Sistema Nuevo...</p></div>

    <header class="p-5 flex items-center justify-between sticky top-0 bg-[#020617]/90 backdrop-blur-xl z-50 border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center font-black text-dark">A</div>
            <div><h1 class="text-lg font-bold italic uppercase leading-none">Aguadulce</h1><p class="text-[8px] text-cyan-400 font-bold uppercase tracking-widest mt-1">Express Pro</p></div>
        </div>
    </header>

    <main id="app-container" class="px-5 py-5 pb-32"></main>

    <div id="cesta-flotante" class="fixed bottom-5 left-4 right-4 bg-cyan-400 text-dark p-4 rounded-2xl hidden justify-between items-center z-[100] shadow-2xl shadow-cyan-400/20">
        <div class="flex-1" onclick="abrirCheckout()">
            <span id="cesta-info" class="font-black text-sm italic uppercase">🛒 0 PRODUCTOS</span>
            <span id="cesta-total" class="block text-[10px] font-bold uppercase">0,00€ TOTAL</span>
        </div>
        <div class="text-red-600 font-black text-2xl px-4 cursor-pointer" onclick="vaciarCesta()">✕</div>
    </div>

    <div id="modal-plato">
        <button onclick="cerrarModal()" class="absolute top-5 left-5 bg-black/50 w-10 h-10 rounded-full text-white z-50">✕</button>
        <img id="modal-img" src="" class="w-full h-[250px] object-cover">
        <div class="px-6 py-8 pb-40">
            <div class="flex justify-between items-start mb-6">
                 <div class="flex-1"><h2 id="modal-titulo" class="text-2xl font-black italic uppercase"></h2><p id="modal-desc" class="opacity-50 text-xs mt-1"></p></div>
                 <div id="modal-precio-base" class="bg-cyan-400 text-dark px-4 py-2 rounded-xl font-black">0€</div>
            </div>
            <div id="contenedor-pasos" class="space-y-8"></div>
        </div>
        <div class="fixed bottom-0 left-0 right-0 p-5 bg-gradient-to-t from-dark">
            <button id="btn-anadir-modal" onclick="confirmarAnadir()" class="w-full bg-white/10 text-white/20 font-black py-5 rounded-2xl uppercase text-xs flex justify-between px-8 items-center" disabled>
                 <span id="txt-anadir">Selecciona Opciones</span>
                 <span id="total-modal-btn">0,00€</span>
            </button>
        </div>
    </div>

    <div id="panel-checkout" class="p-6">
        <div class="flex items-center gap-4 mb-8">
            <button onclick="cerrarCheckout()" class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 text-cyan-400">←</button>
            <h2 class="text-xl font-black italic uppercase">Finalizar Registro</h2>
        </div>
        <div class="space-y-4">
            <input type="text" id="nombre-cli" placeholder="Nombre completo">
            <input type="tel" id="tel-cli" placeholder="Teléfono de contacto">
            <input type="text" id="dir-cli" placeholder="Dirección de entrega">
            <select id="pago-cli">
                <option value="EFECTIVO">EFECTIVO</option>
                <option value="BIZUM">BIZUM</option>
                <option value="TARJETA">TARJETA</option>
            </select>
            <div class="flex gap-4 p-4 bg-white/5 rounded-2xl">
                <input type="checkbox" id="check-legal" onchange="validarCheck()" style="width:20px; height:20px; margin:0">
                <label for="check-legal" class="text-[10px] opacity-60">Confirmo que los datos son correctos para el registro.</label>
            </div>
            <button id="btn-final" onclick="enviarPedidoFinal()" disabled class="w-full bg-white/10 text-white/20 py-5 rounded-2xl font-black uppercase text-sm">Efectuar Pedido</button>
        </div>
    </div>

    <script>
        // PEGA TU NUEVA URL AQUÍ
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxRlF32urNqCqeKzhiDyHuIZ63IePkX_lZnvYjeJ92z2Wik0_t9qA8ecC1teTLPM0pE/exec';
        
        let db = { menu: [], restaurantes: [] };
        let cesta = [];
        let rActivo = { id: null, nombre: "" };
        let itemActual = { pBase: 0, pOpciones: 0, pExtras: 0, obligatorioOk: false, data: null };

        async function init() {
            try {
                const res = await fetch(scriptURL);
                const data = await res.json();
                db.restaurantes = data.RESTAURANTES || [];
                db.menu = data.MENU_GENERAL || [];
                document.getElementById('loader').style.display = 'none';
                renderHome();
            } catch (e) { alert("Error al cargar datos"); }
        }

        function renderHome() {
            let html = `<p class="text-[9px] font-black text-white/20 uppercase tracking-widest mb-6">Restaurantes Disponibles</p>`;
            db.restaurantes.forEach(r => {
                html += `<div class="relative rounded-[2rem] overflow-hidden h-[160px] mb-5 border border-white/5 shadow-2xl" onclick="verMenu('${r.NOMBRE_RESTAURANTE}', '${r.ID_RESTAURANTE}')">
                    <img src="${r.FOTO}" class="absolute inset-0 w-full h-full object-cover opacity-60 scale-110">
                    <div class="absolute inset-0 bg-gradient-to-t from-dark"></div>
                    <div class="absolute bottom-6 left-8">
                        <p class="text-cyan-400 text-[9px] font-black uppercase tracking-widest mb-1">${r.CATEGORIA || 'GENERAL'}</p>
                        <h2 class="text-2xl font-black italic uppercase">${r.NOMBRE_RESTAURANTE}</h2>
                    </div>
                </div>`;
            });
            document.getElementById('app-container').innerHTML = html;
        }

        function verMenu(nombre, id) {
            const platos = db.menu.filter(p => String(p.ID_RESTAURANTE) === String(id));
            const cats = [...new Set(platos.map(p => p.CATEGORIA || "General"))];
            let html = `<div class="flex items-center gap-4 mb-4"><button onclick="renderHome()" class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 text-cyan-400">←</button><h2 class="text-lg font-bold uppercase italic">${nombre}</h2></div>
                <div class="flex gap-3 overflow-x-auto pb-4 scrollbar-hide">
                    <div class="cat-chip active" onclick="filtrarCat('TODOS', this)">Todos</div>
                    ${cats.map(c => `<div class="cat-chip" onclick="filtrarCat('${c}', this)">${c}</div>`).join('')}
                </div><div id="lista-platos" class="mt-4">`;
            
            platos.forEach(p => {
                html += `<div class="plato-card" data-cat="${p.CATEGORIA || 'General'}" onclick='abrirDetalle(${JSON.stringify(p).replace(/'/g, "&apos;")})'>
                    <div class="flex-1 pr-4"><h4 class="font-bold text-sm uppercase mb-2 leading-tight">${p.PLATO}</h4>
                    <span class="bg-cyan-400 text-dark px-3 py-1 rounded-lg font-black text-[10px]">${parseFloat(p.PRECIO).toFixed(2)}€</span></div>
                    <img src="${p.FOTO_PLATO}" class="w-20 h-20 rounded-2xl object-cover border border-white/5"></div>`;
            });
            document.getElementById('app-container').innerHTML = html + `</div>`;
        }

        function filtrarCat(cat, el) {
            document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.plato-card').forEach(p => {
                p.style.display = (cat === 'TODOS' || p.getAttribute('data-cat') === cat) ? 'flex' : 'none';
            });
        }

        function abrirDetalle(p) {
            if (rActivo.id && rActivo.id !== String(p.ID_RESTAURANTE)) {
                if(!confirm(`¿Cambiar a ${rActivo.nombre}?`)) return;
                vaciarCesta(false);
            }
            rActivo.nombre = p.NOMBRE_RESTAURANTE; rActivo.id = String(p.ID_RESTAURANTE);
            itemActual.data = p; itemActual.pBase = parseFloat(p.PRECIO);
            itemActual.pOpciones = 0; itemActual.pExtras = 0;
            itemActual.obligatorioOk = !p.SELECCION_OBLIGATORIA;
            
            document.getElementById('modal-titulo').innerText = p.PLATO;
            document.getElementById('modal-desc').innerText = p.DESCRIPCION || "";
            document.getElementById('modal-img').src = p.FOTO_PLATO;
            document.getElementById('modal-precio-base').innerText = itemActual.pBase.toFixed(2) + "€";
            
            let html = "";
            const renderSeccion = (titulo, datos, tipo, id) => {
                if(!datos) return "";
                let res = `<div><p class="text-[9px] font-black text-cyan-400 uppercase tracking-widest mb-3">${titulo}</p>`;
                if(tipo === 'grid') {
                    res += `<div class="grid grid-cols-2 gap-2">`;
                    datos.split(',').forEach(d => {
                        let [n, pr] = d.includes(':+') ? d.split(':+') : [d, 0];
                        pr = parseFloat(pr) || 0;
                        res += `<div class="grid-option" onclick="toggleSel(this, ${pr}, '${id}')">${n.trim()} ${pr > 0 ? `<span class="block text-[8px] text-red-400">+${pr.toFixed(2)}€</span>` : ''}</div>`;
                    });
                    res += `</div>`;
                }
                return res + `</div>`;
            };

            html += renderSeccion("Selección Obligatoria", p.SELECCION_OBLIGATORIA, 'grid', 'oblig');
            html += renderSeccion("Opciones", p.SELECCION_UNICA, 'grid', 'unica');
            document.getElementById('contenedor-pasos').innerHTML = html;
            document.getElementById('modal-plato').style.display = 'flex';
            updBarra();
        }

        function toggleSel(el, pr, id) {
            el.parentElement.querySelectorAll('.grid-option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            if(id === 'oblig') itemActual.obligatorioOk = true;
            itemActual.pOpciones = pr;
            updBarra();
        }

        function updBarra() {
            const b = document.getElementById('btn-anadir-modal');
            const total = itemActual.pBase + itemActual.pOpciones + itemActual.pExtras;
            document.getElementById('total-modal-btn').innerText = total.toFixed(2).replace('.', ',') + "€";
            if(itemActual.obligatorioOk) {
                b.className = "w-full bg-cyan-400 text-dark font-black py-5 rounded-2xl uppercase text-xs flex justify-between px-8 items-center";
                document.getElementById('txt-anadir').innerText = "Añadir al Pedido";
                b.disabled = false;
            } else {
                b.className = "w-full bg-white/10 text-white/20 font-black py-5 rounded-2xl uppercase text-xs flex justify-between px-8 items-center";
                document.getElementById('txt-anadir').innerText = "Falta Selección";
                b.disabled = true;
            }
        }

        function confirmarAnadir() {
            cesta.push({ nombre: itemActual.data.PLATO, total: itemActual.pBase + itemActual.pOpciones + itemActual.pExtras });
            updCestaBar(); cerrarModal();
        }

        function updCestaBar() {
            const bar = document.getElementById('cesta-flotante');
            if(cesta.length > 0) {
                bar.classList.remove('hidden'); bar.classList.add('flex');
                const t = cesta.reduce((acc, i) => acc + i.total, 0);
                document.getElementById('cesta-info').innerText = `🛒 ${cesta.length} PRODUCTOS`;
                document.getElementById('cesta-total').innerText = `${t.toFixed(2).replace('.', ',')}€ TOTAL`;
            } else { bar.classList.add('hidden'); }
        }

        function vaciarCesta(r = true) {
            cesta = []; rActivo = { id: null, nombre: "" };
            document.getElementById('cesta-flotante').classList.add('hidden');
            if(r) renderHome();
        }

        function abrirCheckout() { document.getElementById('panel-checkout').style.display = 'flex'; }
        function cerrarCheckout() { document.getElementById('panel-checkout').style.display = 'none'; }
        function cerrarModal() { document.getElementById('modal-plato').style.display = 'none'; }

        function validarCheck() {
            const b = document.getElementById('btn-final');
            const c = document.getElementById('check-legal');
            b.disabled = !c.checked;
            b.className = c.checked ? "w-full bg-cyan-400 text-dark font-black py-5 rounded-2xl uppercase text-sm shadow-xl" : "w-full bg-white/10 text-white/20 py-5 rounded-2xl font-black uppercase text-sm";
        }

        async function enviarPedidoFinal() {
            const b = document.getElementById('btn-final'); b.disabled = true; b.innerText = "REGISTRANDO...";
            const resI = db.restaurantes.find(r => String(r.ID_RESTAURANTE) === String(rActivo.id)) || {};
            const sub = cesta.reduce((acc, i) => acc + i.total, 0);
            const env = parseFloat(String(resI.COSTO_ENVIO || "3.50").replace(',', '.'));
            const total = (sub + env).toFixed(2);

            const paquete = {
                local_info: String(resI.NOMBRE_RESTAURANTE || "S/N").toUpperCase(),
                cliente_info: document.getElementById('nombre-cli').value.toUpperCase(),
                dir_info: document.getElementById('dir-cli').value.toUpperCase(),
                pedido_info: cesta.map(i => `1x ${i.nombre}`).join(" | "),
                monto_info: total.replace('.', ','),
                telf_info: document.getElementById('tel-cli').value.trim()
            };

            try {
                await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(paquete) });
                document.getElementById('app-container').innerHTML = `
                    <div class="flex flex-col items-center justify-center min-h-[60vh] text-center px-10">
                        <div class="w-20 h-20 bg-cyan-400 rounded-full flex items-center justify-center mb-6 shadow-2xl shadow-cyan-400/30">
                            <span class="text-dark text-3xl font-black">✔</span>
                        </div>
                        <h2 class="text-2xl font-black italic uppercase mb-2">¡PEDIDO REGISTRADO!</h2>
                        <p class="opacity-50 text-xs leading-relaxed mb-10">La información se ha enviado correctamente a la nueva base de datos.</p>
                        <button onclick="location.reload()" class="w-full bg-white text-dark py-5 rounded-2xl font-black uppercase text-xs tracking-widest">VOLVER AL INICIO</button>
                    </div>`;
                vaciarCesta(false); cerrarCheckout();
            } catch (e) { alert("Error"); b.disabled = false; b.innerText = "REINTENTAR"; }
        }
        init();
    </script>
</body>
</html>
