<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Reparto - Aguadulce Express</title>
</head>
<body class="bg-slate-50 p-4 font-sans pb-20">

    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black text-slate-800 italic">LOGÍSTICA</h1>
            <span class="bg-emerald-500 text-white text-[10px] font-bold px-3 py-1 rounded-full shadow-lg">EN LÍNEA</span>
        </header>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-slate-900 text-white p-5 rounded-3xl shadow-xl border-b-4 border-emerald-500">
                <p class="text-[10px] uppercase font-bold opacity-60 mb-1">Efectivo</p>
                <h2 id="saldoEfectivo" class="text-2xl font-black text-emerald-400">0.00 €</h2>
            </div>
            <div class="bg-slate-900 text-white p-5 rounded-3xl shadow-xl border-b-4 border-cyan-500">
                <p class="text-[10px] uppercase font-bold opacity-60 mb-1">Tarjeta (TPV)</p>
                <h2 id="saldoTPV" class="text-2xl font-black text-cyan-400">0.00 €</h2>
            </div>
        </div>

        <h3 class="text-xs font-bold text-slate-400 uppercase mb-4 tracking-widest text-center">Pedidos Disponibles</h3>

        <div id="contenedor-reparto" class="space-y-4">
            <div class="text-center py-10 opacity-40 italic">Buscando entregas...</div>
        </div>
    </div>

    <audio id="audioAlerta" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbzmIW4rvilG6rCN7NbT-sQw-VniY0PDyi7wxQuBYbmDXOGbMup8J4tMEu99uqwzMHuq/exec"; // <--- PEGA TU URL /exec
        const nombreRepartidor = "JUAN"; // Debe coincidir con la Columna B de tu hoja REPARTIDORES
        let totalPedidosActual = 0;

        async function refrescarDatos() {
            try {
                // 1. Cargar Billetera
                const resB = await fetch(`${scriptURL}?action=consultarBilletera&nombre=${nombreRepartidor}`);
                const dataB = await resB.json();
                document.getElementById('saldoEfectivo').innerText = parseFloat(dataB.efectivo || 0).toFixed(2) + " €";
                document.getElementById('saldoTPV').innerText = parseFloat(dataB.tpv || 0).toFixed(2) + " €";

                // 2. Cargar Pedidos 'Listos'
                const resP = await fetch(`${scriptURL}?action=leerRepartidor`);
                const pedidos = await resP.json();
                
                // Si hay pedidos nuevos, sonar alerta
                if (pedidos.length > totalPedidosActual) {
                    document.getElementById('audioAlerta').play().catch(e => console.log("Audio bloqueado"));
                    if ("vibrate" in navigator) navigator.vibrate(200);
                }
                totalPedidosActual = pedidos.length;
                renderPedidos(pedidos);

            } catch (e) { console.error("Error:", e); }
        }

        function renderPedidos(lista) {
            const cont = document.getElementById('contenedor-reparto');
            if (lista.length === 0) {
                cont.innerHTML = `<div class="text-center py-10 text-slate-300 italic">No hay nada para recoger ahora...</div>`;
                return;
            }
            cont.innerHTML = lista.map(p => `
                <div class="bg-white border-2 border-slate-100 rounded-3xl p-5 shadow-sm">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[10px] font-bold text-cyan-600 uppercase">Listo en Cocina</span>
                        <span class="text-lg font-black text-slate-900">${parseFloat(p.TOTAL_INFO || p.G || 0).toFixed(2)} €</span>
                    </div>
                    <h2 class="text-xl font-black text-slate-800">${p.ID_PEDIDO || p.A}</h2>
                    <p class="text-xs text-slate-500 mb-4 italic">📍 ${p.DIRECCION_CLIENTE || p.E}</p>
                    
                    <button onclick="tomarYEntregar('${p.ID_PEDIDO || p.A}', '${p.TOTAL_INFO || p.G || 0}')" class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl text-sm active:scale-95 transition-all">
                        TOMAR Y ENTREGAR
                    </button>
                </div>
            `).join('');
        }

        async function tomarYEntregar(id, monto) {
            const confirmacion = confirm(`¿Has entregado el pedido ${id} y cobrado ${monto} €?`);
            if (confirmacion) {
                await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ 
                        action: "cambiarEstado", 
                        idPedido: id, 
                        nuevoEstado: "finalizado",
                        nombreRepartidor: nombreRepartidor 
                    })
                });
                alert("Entrega registrada en billetera.");
                refrescarDatos();
            }
        }

        setInterval(refrescarDatos, 15000);
        refrescarDatos();
    </script>
</body>
</html>
