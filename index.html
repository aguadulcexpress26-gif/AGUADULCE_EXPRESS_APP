<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aguadulce Express Pro v97</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #06b6d4; --dark: #020617; --red: #ef4444; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark) !important; color: white; margin: 0; -webkit-tap-highlight-color: transparent; letter-spacing: -0.01em; }
        .brand { font-family: 'Orbitron', sans-serif; }
        
        /* TARJETAS DE PLATO (DISEÑO v61) */
        .plato-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 1.8rem; padding: 18px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; transition: 0.2s; }
        .precio-badge { background: var(--cyan); color: var(--dark); padding: 6px 14px; border-radius: 12px; font-weight: 800; font-size: 1.05rem; box-shadow: 0 4px 12px rgba(6,182,212,0.3); font-family: 'Orbitron', sans-serif; }

        /* MODAL Y PASOS */
        #modal-plato { position: fixed; inset: 0; background: var(--dark); z-index: 1000; display: none; flex-direction: column; overflow-y: auto; }
        .foto-header-modal { width: 100%; height: 310px; object-fit: cover; border-bottom-left-radius: 35px; border-bottom-right-radius: 35px; }
        .opcion-unica { border: 2px solid rgba(255,255,255,0.1); padding: 14px; border-radius: 16px; text-align: center; font-size: 0.85rem; font-weight: 600; transition: 0.2s; }
        .opcion-unica.active { border-color: var(--cyan); background: rgba(6,182,212,0.1); color: var(--cyan); }

        /* EXTRAS CON PRECIOS EN ROJO Y ALINEADOS */
        .extra-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .extra-info { display: flex; flex-direction: column; text-align: left; }
        .extra-nombre { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; }
        .extra-precio { font-size: 0.75rem; font-weight: 800; color: var(--red); margin-top: 2px; }
        .contador-box { display: flex; align-items: center; gap: 16px; background: rgba(255,255,255,0.06); padding: 8px 14px; border-radius: 14px; }
        .btn-control { color: var(--cyan); font-size: 1.4rem; font-weight: bold; cursor: pointer; width: 25px; text-align: center; }
        .step-title { font-size: 0.7rem; font-weight: 800; color: var(--cyan); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 1.2rem; display: block; }

        /* ALERTAS Y CESTA */
        #alerta-cruzada { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 30px; }
        #cesta-flotante { position: fixed; bottom: 20px; right: 20px; background: var(--cyan); color: var(--dark); padding: 15px 25px; border-radius: 20px; font-weight: 900; display: none; z-index: 500; box-shadow: 0 10px 30px rgba(6,182,212,0.4); font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body>

    <header class="p-6 flex justify-between items-center bg-[#020617]/90 backdrop-blur-xl sticky top-0 z-50 border-b border-white/5">
        <div class="flex items-center gap-4">
            <div class="w-11 h-11 bg-white rounded-xl flex items-center justify-center border-2 border-cyan-400 font-black text-dark brand text-xl">A</div>
            <div class="text-left"><h1 class="brand text-xl text-white italic">AGUADULCE</h1><p class="text-[9px] tracking-[0.4em] text-cyan-400 uppercase font-bold">Express Pro</p></div>
        </div>
        <button onclick="vaciarCesta()" id="btn-vaciar" class="hidden text-[10px] bg-red-500/10 text-red-500 border border-red-500/20 px-4 py-2 rounded-xl font-bold">VACIAR CESTA</button>
    </header>

    <main id="app-container" class="px-6 py-6"></main>

    <div id="cesta-flotante" onclick="verCesta()">PEDIDO (<span id="count">0</span>)</div>

    <div id="modal-plato">
        <button onclick="cerrarModal()" class="absolute top-6 left-6 z-50 bg-black/60 backdrop-blur-md w-11 h-11 rounded-xl text-white">✕</button>
        <img id="modal-img" src="" class="foto-header-modal">
        <div class="px-7 py-8 pb-32">
            <div class="flex justify-between items-start mb-8">
                <div class="max-w-[70%] text-left">
                    <h2 id="modal-titulo" class="brand text-2xl uppercase italic text-white"></h2>
                    <p id="modal-desc" class="opacity-70 text-xs mt-3 leading-relaxed"></p>
                </div>
                <div id="modal-total" class="precio-badge">0.00€</div>
            </div>
            <div id="contenedor-pasos" class="space-y-10"></div>
            <div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-dark via-dark to-transparent">
                <button onclick="confirmarPlato()" class="w-full bg-cyan-500 text-dark font-black py-5 rounded-3xl uppercase tracking-widest text-sm brand shadow-lg shadow-cyan-500/20">Confirmar y Añadir</button>
            </div>
        </div>
    </div>

    <div id="alerta-cruzada">
        <div class="bg-white/5 border border-white/10 p-8 rounded-[2.5rem] backdrop-blur-3xl text-center max-w-xs">
            <div class="text-red-500 text-5xl mb-4">⚠️</div>
            <h3 class="brand text-lg mb-4 text-white">OPERACIÓN BLOQUEADA</h3>
            <p id="error-msg" class="text-xs opacity-80 leading-relaxed mb-8"></p>
            <button onclick="cerrarAlerta()" class="w-full border border-white/20 py-4 rounded-2xl text-xs font-bold uppercase mb-3">Seguir en mi restaurante</button>
            <button onclick="vaciarCesta(); cerrarAlerta();" class="w-full bg-red-600 text-white py-4 rounded-2xl text-xs font-bold uppercase">Vaciar Cesta y cambiar</button>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbysDVL_3M-2AfW5eGS8chw3KB3uFIXJU9kVltWHOQF0Lo9mzcBBn6nQwVy1mrkaH2tZ/exec';
        let db = { menu: [], restaurantes: [] };
        let cesta = [];
        let rActivo = { id: null, nombre: "" };
        let platoActual = null;
        let subtotal = 0;

        async function init() {
            try {
                const res = await fetch(scriptURL);
                const data = await res.json();
                db.restaurantes = data.RESTAURANTES || [];
                db.menu = data.MENU_GENERAL || [];
                renderHome();
            } catch (e) { console.error("Error"); }
        }

        function renderHome() {
            let html = `<div class="mb-6 text-left text-slate-500 text-[10px] uppercase font-bold tracking-widest">Nuestra Selección</div>`;
            db.restaurantes.forEach(r => {
                html += `
                <div class="relative rounded-[2.2rem] overflow-hidden h-[180px] mb-5 border border-white/5" onclick="verMenu('${r.NOMBRE_RESTAURANTE}', '${r.ID_RESTAURANTE}')">
                    <img src="${r.FOTO}" class="absolute inset-0 w-full h-full object-cover opacity-85">
                    <div class="absolute inset-0 bg-gradient-to-t from-[#020617] via-transparent to-transparent"></div>
                    <div class="absolute bottom-6 left-7 text-left">
                        <p class="text-cyan-400 text-[8px] font-black uppercase mb-1 tracking-widest">${r.CATEGORIA || 'Premium'}</p>
                        <h3 class="brand text-xl italic uppercase text-white">${r.NOMBRE_RESTAURANTE}</h3>
                    </div>
                </div>`;
            });
            document.getElementById('app-container').innerHTML = html;
        }

        function verMenu(nombre, id) {
            const platos = db.menu.filter(p => String(p.ID_RESTAURANTE) === String(id));
            let html = `<div class="flex items-center gap-4 mb-8 text-left"><button onclick="renderHome()" class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 text-cyan-400">←</button><div><h2 class="brand text-lg text-white uppercase">${nombre}</h2></div></div>`;
            platos.forEach(p => {
                html += `
                <div class="plato-card" onclick='abrirDetalle(${JSON.stringify(p).replace(/'/g, "&apos;")}, "${nombre}")'>
                    <div class="text-left flex-1 pr-4">
                        <h4 class="font-bold text-white text-[14px] uppercase mb-3 leading-tight">${p.PLATO}</h4>
                        <span class="precio-badge">${parseFloat(p.PRECIO).toFixed(2)}€</span>
                    </div>
                    <img src="${p.FOTO_PLATO}" class="w-20 h-20 rounded-2xl object-cover border border-cyan-400/20">
                </div>`;
            });
            document.getElementById('app-container').innerHTML = html;
            window.scrollTo(0,0);
        }

        function abrirDetalle(p, restNombre) {
            // BLOQUEO VENTAS CRUZADAS
            if (rActivo.id && rActivo.id !== String(p.ID_RESTAURANTE)) {
                document.getElementById('error-msg').innerText = `Ya tienes productos de "${rActivo.nombre}" en la cesta. No se permiten pedidos de múltiples locales.`;
                document.getElementById('alerta-cruzada').style.display = 'flex';
                return;
            }

            platoActual = p;
            subtotal = parseFloat(p.PRECIO);
            document.getElementById('modal-titulo').innerText = p.PLATO;
            document.getElementById('modal-desc').innerText = p.DESCRIPCION || "Sabor artesanal.";
            document.getElementById('modal-img').src = p.FOTO_PLATO;
            actualizarTotal();

            let html = "";
            const addStep = (titulo, datos, tipo) => {
                if(!datos) return "";
                let res = `<div class="text-left"><span class="step-title">${titulo}</span>`;
                if(tipo === 'grid') {
                    res += `<div class="grid grid-cols-2 gap-3">`;
                    datos.split(',').forEach((d, i) => {
                        res += `<div class="opcion-unica ${i===0?'active':''}" onclick="toggleActive(this)">${d.trim()}</div>`;
                    });
                    res += `</div>`;
                } else {
                    res += `<div class="space-y-2">`;
                    datos.split(',').forEach(d => {
                        res += `
                        <div class="extra-row">
                            <div class="extra-info"><span class="extra-nombre">${d.trim()}</span><span class="extra-precio">+0.50€</span></div>
                            <div class="contador-box">
                                <span class="btn-control" onclick="calc(this, -0.5)">−</span>
                                <span class="qty font-bold">0</span>
                                <span class="btn-control" onclick="calc(this, 0.5)">+</span>
                            </div>
                        </div>`;
                    });
                    res += `</div>`;
                }
                return res + `</div>`;
            };

            html += addStep("1. Selección Obligatoria", p.SELECCION_OBLIGATORIA, 'grid');
            html += addStep("2. Personaliza tu plato", p.SELECCION_UNICA, 'grid');
            html += addStep("3. Extras Adicionales", p.EXTRAS, 'lista');
            html += addStep("4. Elige tu Bebida", p.SELECCION_DE_BEBIDAS, 'lista');

            document.getElementById('contenedor-pasos').innerHTML = html;
            document.getElementById('modal-plato').style.display = 'flex';
        }

        function calc(btn, val) {
            const qty = btn.parentElement.querySelector('.qty');
            let n = parseInt(qty.innerText);
            if (n + (val > 0 ? 1 : -1) < 0) return;
            n += (val > 0 ? 1 : -1);
            qty.innerText = n;
            subtotal += val;
            actualizarTotal();
        }

        function actualizarTotal() { document.getElementById('modal-total').innerText = subtotal.toFixed(2) + "€"; }
        
        function confirmarPlato() {
            if (!rActivo.id) {
                rActivo.id = String(platoActual.ID_RESTAURANTE);
                rActivo.nombre = db.restaurantes.find(r => String(r.ID_RESTAURANTE) === rActivo.id).NOMBRE_RESTAURANTE;
                document.getElementById('btn-vaciar').classList.remove('hidden');
            }
            cesta.push({ nombre: platoActual.PLATO, total: subtotal });
            document.getElementById('count').innerText = cesta.length;
            document.getElementById('cesta-flotante').style.display = 'block';
            cerrarModal();
        }

        function vaciarCesta() {
            cesta = []; rActivo = { id: null, nombre: "" };
            document.getElementById('count').innerText = "0";
            document.getElementById('cesta-flotante').style.display = 'none';
            document.getElementById('btn-vaciar').classList.add('hidden');
        }

        function toggleActive(el) { el.parentElement.querySelectorAll('.opcion-unica').forEach(o => o.classList.remove('active')); el.classList.add('active'); }
        function cerrarModal() { document.getElementById('modal-plato').style.display = 'none'; document.body.style.overflow = 'auto'; }
        function cerrarAlerta() { document.getElementById('alerta-cruzada').style.display = 'none'; }
        init();
    </script>
</body>
</html>
