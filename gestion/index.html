<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Logística Aguadulce</title>
</head>
<body class="bg-[#0a0f1a] text-white flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-md text-center">
        <h1 class="text-3xl font-black italic text-cyan-400 mb-2 tracking-tighter uppercase">Logística Aguadulce</h1>
        <p class="text-slate-400 text-sm mb-12 font-medium">Selecciona tu panel de acceso</p>

        <div class="grid gap-6">
            <button onclick="solicitarAcceso('PARTNER')" class="bg-white text-slate-900 flex items-center justify-center gap-4 p-8 rounded-[2.5rem] shadow-2xl active:scale-95 transition-all">
                <span class="text-3xl">👨‍🍳</span>
                <span class="text-xl font-black uppercase italic">Panel Cocina</span>
            </button>

            <button onclick="solicitarAcceso('REPARTIDOR')" class="bg-[#00c67e] text-white flex items-center justify-center gap-4 p-8 rounded-[2.5rem] shadow-2xl active:scale-95 transition-all">
                <span class="text-3xl">🛵</span>
                <span class="text-xl font-black uppercase italic">Panel Reparto</span>
            </button>
        </div>
    </div>

    <script>
        // --- ESTA ES LA LÍNEA QUE FALTA ---
        // Debes pegar aquí tu URL de la "Nueva Implementación" de Google Apps Script
        const scriptURL = "https://script.google.com/macros/s/AKfycbzmIW4rvilG6rCN7NbT-sQw-VniY0PDyi7wxQuBYbmDXOGbMup8J4tMEu99uqwzMHuq/exec"; 

        async function solicitarAcceso(rolDeseado) {
            const pin = prompt("Introduce tu PIN de 4 dígitos para entrar:");
            
            if (!pin) return;

            try {
                // El sistema usa el PIN para consultar el ROL e ID_RESTAURANTE
                const res = await fetch(`${scriptURL}?action=login&auth=${pin}`);
                const data = await res.json();

                if (data.error) {
                    alert("❌ PIN INCORRECTO");
                    return;
                }

                // Verifica que el usuario entre al panel que le corresponde
                if (data.rol !== rolDeseado) {
                    alert(`⚠️ Este PIN es de ${data.rol}. Entra al panel correcto.`);
                    return;
                }

                // Guardamos los datos localmente para que el panel sepa qué mostrar
                localStorage.setItem('ag_auth', pin);
                localStorage.setItem('ag_nombre', data.nombre);
                localStorage.setItem('ag_rol', data.rol);
                localStorage.setItem('ag_idRest', data.idRest);

                // Redirección final
                if (data.rol === "PARTNER") window.location.href = "cocina.html";
                if (data.rol === "REPARTIDOR") window.location.href = "reparto.html";

            } catch (error) {
                // Si la scriptURL está mal o no tiene permisos, salta este error
                alert("Error de conexión. Verifica la URL de Apps Script y los permisos.");
                console.error(error);
            }
        }
    </script>
</body>
</html>
